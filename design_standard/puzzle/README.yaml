# Puzzle Genre Design Standard (퍼즐 장르 설계 표준)
# Workflow 0단계 산출물
# Version 1.1 | 2026-03-11 | 기획자 경험 기반 초안

genre: Puzzle
version: "1.1"
date: "2026-03-11"
scope: "Sort / Block / Screw / Match / Merge 등 하이브리드 캐주얼 퍼즐 전체"

purpose: |
  이 문서는 기획 AI Workflow 0단계에서 정의하는 장르별 설계 표준입니다.
  퍼즐 장르의 게임을 기획할 때 AI가 참조하는 Base Design DB의 스키마가 되며,
  해당 장르의 모든 프로젝트가 공유하는 공용 문서입니다.
  Workflow(How)는 모든 팀 공통이고, 설계 표준(What)은 장르 단위입니다.

files:
  component_map: component_map.yaml       # 구성요소 맵 (도메인 9종 → 퍼즐 맥락)
  domain_priority: domain_priority.yaml   # 도메인 착수 우선순위 (Tier 1/2/3)
  parameters: parameters.yaml             # 파라미터 정의 (9 도메인, ~75 params)
  schema:                                 # DB 스키마 (데이터 테이블 정의)
    rawdata: schema/rawdata-schema.sql
    metadata: schema/metadata-schema.sql
    rawdata_doc: schema/rawdata-planner-doc.md
    metadata_doc: schema/metadata-planner-doc.md
    leveldata: schema/leveldata-spec.md
    piggybank: schema/piggybank-spec.md

parameter_counts:
  InGame: 10     # 7 필수, 3 선택 | 9 커스텀, 1 공통
  Content: 12    # 10 필수, 2 선택 | 6 커스텀, 6 공통
  Balance: 12    # 10 필수, 2 선택 | 2 커스텀, 10 공통
  OutGame: 11    # 9 필수, 2 선택 | 2 커스텀, 9 공통
  BM: 10         # 6 필수, 4 선택 | 0 커스텀, 10 공통
  UX: 7          # 7 필수, 0 선택 | 2 커스텀, 5 공통
  Meta: 5        # 0 필수, 5 선택 | 1 커스텀, 4 공통
  Social: 4      # 0 필수, 4 선택 | 0 커스텀, 4 공통
  LiveOps: 4     # 0 필수, 4 선택 | 0 커스텀, 4 공통
  total: 75

management_principles:
  - "이 문서는 퍼즐 장르의 모든 프로젝트 팀이 함께 쌓아나갑니다"
  - "팀 간 의견 차이: 필수/선택으로 구분하여 수용"
  - "AI Tester 레퍼런스 분석 결과가 새로운 파라미터를 발견하면 추가"
  - "출시 후 라이브 운영에서 새로운 파라미터가 필요해지면 추가"
  - "합의 불가 시 해당 장르의 리드 디렉터가 최종 결정"

changelog:
  - version: "1.0"
    date: "2026-03-11"
    changes: "초안 작성. 기획자 경험 기반. 구성요소 맵, 파라미터 정의, 공통/커스텀 구분, DB 스키마, 도메인 우선순위 포함."
  - version: "1.1"
    date: "2026-03-11"
    changes: "스키마 대조 반영: Balance에 target_near_miss_rate, max_hopeless_fail_rate, optimal_moves_policy 추가. Content에 gimmick_intro_schedule, level_composition_params 추가. OutGame booster_types 카테고리 분류 구체화."

