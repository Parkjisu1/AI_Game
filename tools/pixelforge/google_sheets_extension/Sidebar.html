<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Google Sans', Arial, sans-serif; background: #ffffff; color: #1a1a1a; padding: 16px; }
    h2 { color: #1a1a1a; margin-bottom: 12px; font-size: 18px; font-weight: 700; }
    .card { background: #f5f5f5; border-radius: 10px; padding: 14px; margin-bottom: 12px; border: 1px solid #e0e0e0; }
    .card h3 { color: #333; font-size: 13px; margin-bottom: 8px; font-weight: 600; }
    label { display: block; font-size: 11px; color: #666; margin-bottom: 3px; }
    input, textarea { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #d0d0d0; background: #fff; color: #1a1a1a; font-size: 12px; margin-bottom: 8px; }
    textarea { height: 60px; resize: vertical; }
    input:focus, textarea:focus { border-color: #333; outline: none; }
    .row { display: flex; gap: 8px; }
    .row > div { flex: 1; }
    .btn { width: 100%; padding: 10px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; margin-bottom: 6px; }
    .btn-primary { background: #1a1a1a; color: #ffffff; }
    .btn-primary:hover { background: #333; }
    .btn-secondary { background: #e8e8e8; color: #1a1a1a; }
    .btn-secondary:hover { background: #d5d5d5; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .status { font-size: 11px; color: #888; margin-top: 4px; }
    .status.success { color: #16a34a; }
    .status.error { color: #dc2626; }
    .balance-box { display: flex; align-items: center; gap: 8px; margin-top: 6px; padding: 8px; background: #e8e8e8; border-radius: 8px; }
    .balance-num { font-size: 20px; font-weight: 700; color: #1a1a1a; }
    .balance-label { font-size: 11px; color: #666; }
    .key-status { font-size: 11px; padding: 3px 8px; border-radius: 12px; display: inline-block; }
    .key-saved { background: #dcfce7; color: #16a34a; }
    .key-none { background: #fee2e2; color: #dc2626; }
    .dl-link { font-size: 11px; color: #2563eb; text-decoration: underline; cursor: pointer; display: block; margin: 2px 0; }
    .sel-info { font-size: 10px; color: #666; padding: 1px 0; }
    .progress { font-size: 11px; color: #333; background: #e8e8e8; padding: 6px 10px; border-radius: 6px; margin: 6px 0; }
    #log { font-family: 'Consolas', monospace; font-size: 10px; background: #1a1a1a; color: #ccc; padding: 8px; border-radius: 6px; max-height: 150px; overflow-y: auto; white-space: pre-wrap; }
  </style>
</head>
<body>

  <h2>PixelForge</h2>

  <div class="card">
    <h3>API 설정</h3>
    <div id="keyStatus"></div>
    <label>PixelLab API Key</label>
    <input type="password" id="apiKey" placeholder="API Key 입력...">
    <button class="btn btn-secondary" onclick="saveKey()">API Key 저장</button>
    <div class="balance-box">
      <div>
        <div class="balance-num" id="balanceNum">--</div>
        <div class="balance-label">남은 생성 횟수</div>
      </div>
      <div style="margin-left:auto">
        <button class="btn btn-secondary" style="width:auto;padding:6px 12px;margin:0" onclick="checkBalance()">새로고침</button>
      </div>
    </div>
  </div>

  <div class="card">
    <h3>저장 설정</h3>
    <label>Google Drive 폴더명</label>
    <input id="driveFolderName" value="PixelForge_Output" placeholder="Drive 폴더명">
  </div>

  <div class="card">
    <h3>선택 행 정보</h3>
    <button class="btn btn-secondary" onclick="loadRows()">선택 행 불러오기</button>
    <div id="selectionInfo"></div>
    <label>프롬프트 (자동 생성, 수정 가능)</label>
    <textarea id="prompt" placeholder="행을 선택 후 불러오기 클릭"></textarea>
    <div class="status" id="noteStatus"></div>
  </div>

  <div class="card">
    <h3>생성</h3>
    <button class="btn btn-primary" id="genBtn" onclick="generate()">선택 행 생성</button>
    <button class="btn btn-secondary" onclick="generateAll()">빈 행 전체 생성</button>
    <div id="progressArea"></div>
    <div class="status" id="genStatus"></div>
    <div id="downloadLinks"></div>
  </div>

  <div class="card">
    <h3>로그</h3>
    <div id="log"></div>
  </div>

<script>
  var selectedRows = [];
  var isGenerating = false;

  // ── 사이드바 열릴 때 자동 실행 ──
  window.onload = function() {
    google.script.run
      .withSuccessHandler(function(key) {
        if (key) {
          document.getElementById('apiKey').value = key;
          showKeyStatus(true, key);
          checkBalance();
        } else {
          showKeyStatus(false);
        }
      })
      .withFailureHandler(function() { showKeyStatus(false); })
      .getSavedApiKey();
  };

  function showKeyStatus(saved, key) {
    var el = document.getElementById('keyStatus');
    if (saved && key) {
      el.innerHTML = '<span class="key-status key-saved">저장됨: ' + key.substring(0,8) + '...</span>';
    } else {
      el.innerHTML = '<span class="key-status key-none">API Key를 입력하세요</span>';
    }
  }

  function log(msg) {
    var el = document.getElementById('log');
    el.textContent += msg + '\n';
    el.scrollTop = el.scrollHeight;
  }

  function saveKey() {
    var key = document.getElementById('apiKey').value.trim();
    if (!key) { log('API Key를 입력하세요'); return; }
    google.script.run
      .withSuccessHandler(function() {
        log('API Key 영구 저장 완료');
        showKeyStatus(true, key);
        checkBalance();
      })
      .withFailureHandler(function(e) { log('저장 실패: ' + e.message); })
      .saveApiKey(key);
  }

  function checkBalance() {
    document.getElementById('balanceNum').textContent = '...';
    google.script.run
      .withSuccessHandler(function(data) {
        var gens = data.subscription ? data.subscription.generations : 0;
        var total = data.subscription ? data.subscription.total : 0;
        var credits = data.credits ? data.credits.usd : 0;
        document.getElementById('balanceNum').textContent = gens + ' / ' + total;
        if (credits > 0) {
          document.getElementById('balanceNum').textContent += ' + $' + credits.toFixed(2);
        }
        log('잔액: ' + gens + '/' + total + (credits > 0 ? ' + $' + credits.toFixed(2) : ''));
      })
      .withFailureHandler(function(e) {
        document.getElementById('balanceNum').textContent = '에러';
        log('잔액 확인 실패: ' + e.message);
      })
      .getBalance();
  }

  function loadRows() {
    log('선택 행 불러오는 중...');
    google.script.run
      .withSuccessHandler(function(data) {
        if (!data || data.length === 0) {
          log('5행 이상 선택하세요');
          return;
        }
        selectedRows = data;
        var info = document.getElementById('selectionInfo');
        if (data.length === 1) {
          var d = data[0];
          info.innerHTML = '<div class="sel-info" style="font-size:12px;color:#333;padding:4px 0;">Level ' + d.level + ' (' + d.cols + 'x' + d.rows + ')</div>';
          document.getElementById('prompt').value = d.prompt;
          document.getElementById('prompt').disabled = false;
          log('Level ' + d.level + ': ' + d.cols + 'x' + d.rows);
        } else {
          var html = '<div style="font-size:12px;font-weight:600;margin:4px 0;">' + data.length + '행 선택 (다중 생성)</div>';
          for (var i = 0; i < Math.min(data.length, 5); i++) {
            html += '<div class="sel-info">Level ' + data[i].level + ': ' + data[i].cols + 'x' + data[i].rows + '</div>';
          }
          if (data.length > 5) html += '<div class="sel-info">... 외 ' + (data.length-5) + '개</div>';
          info.innerHTML = html;
          document.getElementById('prompt').value = '(각 행의 designer_note 자동 사용)';
          document.getElementById('prompt').disabled = true;
          log(data.length + '행 선택됨');
        }
      })
      .withFailureHandler(function(e) { log('에러: ' + e.message); })
      .getSelectedRowsData();
  }

  function generate() {
    if (selectedRows.length === 0) { log('먼저 행 선택 후 불러오기'); return; }
    if (isGenerating) return;
    isGenerating = true;

    var btn = document.getElementById('genBtn');
    btn.disabled = true;
    var folderName = document.getElementById('driveFolderName').value.trim() || 'PixelForge_Output';
    var dlDiv = document.getElementById('downloadLinks');
    dlDiv.innerHTML = '';

    if (selectedRows.length === 1) {
      var prompt = document.getElementById('prompt').value;
      btn.textContent = '생성 중...';
      log('Level ' + selectedRows[0].level + ' 생성 중...');

      google.script.run
        .withSuccessHandler(function(result) {
          btn.disabled = false; btn.textContent = '선택 행 생성'; isGenerating = false;
          document.getElementById('genStatus').textContent = '생성 완료!';
          document.getElementById('genStatus').className = 'status success';
          showDownload(dlDiv, result);
          checkBalance(); // 생성 후 잔액 갱신
        })
        .withFailureHandler(function(e) {
          btn.disabled = false; btn.textContent = '선택 행 생성'; isGenerating = false;
          document.getElementById('genStatus').textContent = e.message;
          document.getElementById('genStatus').className = 'status error';
          log('에러: ' + e.message);
        })
        .generateFromSidebar(selectedRows[0].row, prompt, folderName);
    } else {
      var total = selectedRows.length;
      var current = 0;
      var progArea = document.getElementById('progressArea');

      function next() {
        if (current >= total) {
          btn.disabled = false; btn.textContent = '선택 행 생성'; isGenerating = false;
          document.getElementById('genStatus').textContent = total + '개 완료!';
          document.getElementById('genStatus').className = 'status success';
          progArea.innerHTML = '';
          log('=== ' + total + '개 완료 ===');
          checkBalance(); // 전체 완료 후 잔액 갱신
          return;
        }
        var r = selectedRows[current];
        var pct = Math.round(((current+1) / total) * 100);
        btn.textContent = '생성 중... (' + (current+1) + '/' + total + ')';
        progArea.innerHTML = '<div class="progress">Level ' + r.level + ' (' + (current+1) + '/' + total + ')</div>';
        log('Level ' + r.level + ' 생성 중... (' + (current+1) + '/' + total + ')');

        google.script.run
          .withSuccessHandler(function(result) {
            showDownload(dlDiv, result);
            current++;
            next();
          })
          .withFailureHandler(function(e) {
            log('Level ' + r.level + ' 실패: ' + e.message);
            current++;
            next();
          })
          .generateFromSidebar(r.row, r.prompt, folderName);
      }
      next();
    }
  }

  function showDownload(container, result) {
    if (result.imgDownloadUrl) {
      var a = document.createElement('a');
      a.className = 'dl-link'; a.href = result.imgDownloadUrl; a.target = '_blank';
      a.textContent = '이미지: ' + result.filename;
      container.appendChild(a);
    }
    if (result.paletteUrl) {
      var ap = document.createElement('a');
      ap.className = 'dl-link'; ap.href = result.paletteUrl; ap.target = '_blank';
      ap.textContent = '팔레트: ' + result.paletteFilename;
      container.appendChild(ap);
    }
    if (result.jsonContent) {
      var a2 = document.createElement('a');
      a2.className = 'dl-link';
      var blob = new Blob([result.jsonContent], {type: 'application/json'});
      a2.href = URL.createObjectURL(blob);
      a2.download = result.jsonFilename;
      a2.textContent = 'JSON: ' + result.jsonFilename;
      container.appendChild(a2);
    }
  }

  function generateAll() {
    if (!confirm('빈 행 전체 생성?')) return;
    var folderName = document.getElementById('driveFolderName').value.trim() || 'PixelForge_Output';
    log('전체 생성 시작...');
    google.script.run
      .withSuccessHandler(function() {
        log('완료!');
        checkBalance();
      })
      .withFailureHandler(function(e) { log('에러: ' + e.message); })
      .generateAllEmpty(folderName);
  }
</script>

</body>
</html>
