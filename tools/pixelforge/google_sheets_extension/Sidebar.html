<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Google Sans', Arial, sans-serif; background: #1a1a2e; color: #e0e0e0; padding: 16px; }
    h2 { color: #7c4dff; margin-bottom: 12px; font-size: 18px; }
    .card { background: #16213e; border-radius: 10px; padding: 14px; margin-bottom: 12px; border: 1px solid #2a2a4a; }
    .card h3 { color: #a78bfa; font-size: 13px; margin-bottom: 8px; }
    label { display: block; font-size: 11px; color: #9ca3af; margin-bottom: 3px; }
    input, textarea { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #2a2a4a; background: #0f0f23; color: #e0e0e0; font-size: 12px; margin-bottom: 8px; }
    textarea { height: 60px; resize: vertical; }
    input:focus, textarea:focus { border-color: #7c4dff; outline: none; }
    .row { display: flex; gap: 8px; }
    .row > div { flex: 1; }
    .btn { width: 100%; padding: 10px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; margin-bottom: 6px; }
    .btn-primary { background: #7c4dff; color: white; }
    .btn-primary:hover { background: #6a3de8; }
    .btn-secondary { background: #2a2a4a; color: #a78bfa; }
    .btn-secondary:hover { background: #3a3a5a; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .status { font-size: 11px; color: #6b7280; margin-top: 4px; }
    .status.success { color: #34d399; }
    .status.error { color: #f87171; }
    .balance { display: inline-block; background: #7c4dff22; color: #a78bfa; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
    .preview { width: 100%; border-radius: 8px; margin-top: 8px; display: none; }
    #log { font-family: 'Consolas', monospace; font-size: 10px; background: #0a0a0e; color: #9ca3af; padding: 8px; border-radius: 6px; max-height: 120px; overflow-y: auto; white-space: pre-wrap; }
  </style>
</head>
<body>

  <h2>🎨 PixelForge</h2>

  <!-- API 설정 -->
  <div class="card">
    <h3>⚙️ API 설정</h3>
    <label>PixelLab API Key</label>
    <input type="password" id="apiKey" placeholder="API Key 입력...">
    <div class="row">
      <div><button class="btn btn-secondary" onclick="saveKey()">저장</button></div>
      <div><button class="btn btn-secondary" onclick="checkBalance()">잔액 확인</button></div>
    </div>
    <div class="status" id="balanceStatus">잔액: <span class="balance" id="balance">--</span></div>
  </div>

  <!-- 선택 행 정보 -->
  <div class="card">
    <h3>📋 선택 행 정보</h3>
    <button class="btn btn-secondary" onclick="loadRow()">🔄 선택 행 불러오기</button>
    <div class="row" style="margin-top: 8px;">
      <div><label>Level</label><input id="level" readonly></div>
      <div><label>Cols</label><input id="cols" readonly></div>
      <div><label>Rows</label><input id="rows" readonly></div>
    </div>
    <label>프롬프트 (자동 생성, 수정 가능)</label>
    <textarea id="prompt" placeholder="선택 행을 불러오면 자동 입력됩니다"></textarea>
    <div class="status" id="noteStatus"></div>
  </div>

  <!-- 생성 -->
  <div class="card">
    <h3>🎨 생성</h3>
    <button class="btn btn-primary" id="genBtn" onclick="generate()">선택 행 생성</button>
    <button class="btn btn-secondary" onclick="generateAll()">빈 행 전체 생성</button>
    <img id="preview" class="preview" alt="미리보기">
    <div class="status" id="genStatus"></div>
  </div>

  <!-- 로그 -->
  <div class="card">
    <h3>📝 로그</h3>
    <div id="log"></div>
  </div>

<script>
  let currentRow = null;

  function log(msg) {
    const el = document.getElementById('log');
    el.textContent += msg + '\n';
    el.scrollTop = el.scrollHeight;
  }

  function saveKey() {
    const key = document.getElementById('apiKey').value.trim();
    if (!key) return;
    google.script.run
      .withSuccessHandler(() => { log('API Key 저장됨'); })
      .withFailureHandler(e => { log('에러: ' + e.message); })
      .saveApiKey(key);
  }

  function checkBalance() {
    log('잔액 확인 중...');
    google.script.run
      .withSuccessHandler(data => {
        const gens = data.subscription ? data.subscription.generations : 0;
        const total = data.subscription ? data.subscription.total : 0;
        document.getElementById('balance').textContent = gens + '/' + total;
        log('잔액: ' + gens + '/' + total);
      })
      .withFailureHandler(e => { log('에러: ' + e.message); })
      .getBalance();
  }

  function loadRow() {
    log('행 정보 불러오는 중...');
    google.script.run
      .withSuccessHandler(data => {
        if (!data) { log('헤더 행은 선택할 수 없습니다'); return; }
        currentRow = data.row;
        document.getElementById('level').value = data.level || '';
        document.getElementById('cols').value = data.cols;
        document.getElementById('rows').value = data.rows;
        document.getElementById('prompt').value = data.prompt;
        document.getElementById('noteStatus').textContent =
          'designer_note → 프롬프트 자동 변환됨';
        document.getElementById('noteStatus').className = 'status success';
        log('Level ' + data.level + ': ' + data.cols + 'x' + data.rows + ', prompt="' + data.prompt.substring(0,50) + '..."');
      })
      .withFailureHandler(e => { log('에러: ' + e.message); })
      .getSelectedRowData();
  }

  function generate() {
    if (!currentRow) { log('먼저 행을 선택하세요'); return; }
    const btn = document.getElementById('genBtn');
    btn.disabled = true;
    btn.textContent = '생성 중...';
    const prompt = document.getElementById('prompt').value;
    log('Level ' + document.getElementById('level').value + ' 생성 중...');

    google.script.run
      .withSuccessHandler(result => {
        btn.disabled = false;
        btn.textContent = '선택 행 생성';
        document.getElementById('genStatus').textContent = '✅ 생성 완료!';
        document.getElementById('genStatus').className = 'status success';
        if (result.imgUrl) {
          log('이미지: ' + result.imgUrl);
          log('JSON: ' + result.jsonUrl);
        }
      })
      .withFailureHandler(e => {
        btn.disabled = false;
        btn.textContent = '선택 행 생성';
        document.getElementById('genStatus').textContent = '❌ ' + e.message;
        document.getElementById('genStatus').className = 'status error';
        log('에러: ' + e.message);
      })
      .generateFromSidebar(currentRow, prompt);
  }

  function generateAll() {
    if (!confirm('빈 행 전체를 생성합니다. 진행할까요?')) return;
    log('전체 생성 시작...');
    google.script.run
      .withSuccessHandler(() => { log('전체 생성 완료!'); })
      .withFailureHandler(e => { log('에러: ' + e.message); })
      .generateAllEmpty();
  }
</script>

</body>
</html>
