# ============================================================
# Car Match - Traffic Puzzle
# Layer 2: 시스템 명세서 (시스템 목록, 연결 관계)
# ============================================================

project:
  name: "CarMatch"
  genre: Puzzle
  target_path: "E:/Playable_Build_In_Render/NewPlayable/AI_WORK_FLOW_TEST/Assets/1.Scripts"

# ------------------------------------------------------------
# 시스템 목록 및 계층
# ------------------------------------------------------------
systems:

  # === Core Layer (장르 무관 기반) ===
  core:
    - name: GameManager
      role: Manager
      description: "게임 전체 흐름 제어, 씬 전환"
      singleton: true

    - name: DataManager
      role: Manager
      description: "유저 데이터 저장/로드"
      singleton: true

    - name: SoundManager
      role: Manager
      description: "BGM, SFX 재생"
      singleton: true

    - name: ObjectPool
      role: Pool
      description: "차량, 이펙트 오브젝트 풀링"

    - name: EventBus
      role: Service
      description: "시스템 간 이벤트 통신"
      singleton: true

  # === Domain Layer (재사용 도메인) ===
  domain:
    - name: BoardManager
      role: Manager
      description: "보드 상태 관리, 차량 배치"

    - name: CarController
      role: Controller
      description: "개별 차량 제어, 이동 처리"

    - name: HolderController
      role: Controller
      description: "홀더 상태 관리, 매칭 검사"

    - name: MatchChecker
      role: Calculator
      description: "3매치 검사 로직"

    - name: MoveValidator
      role: Validator
      description: "차량 수집 가능 여부 검사"

    - name: ObstacleController
      role: Controller
      description: "장애물 동작 제어"

    - name: LevelDataLoader
      role: Provider
      description: "레벨 데이터 로드 및 제공"

    - name: BoosterProcessor
      role: Processor
      description: "부스터 사용 처리"

    - name: ScoreCalculator
      role: Calculator
      description: "점수, 보상 계산"

    - name: StageStateHandler
      role: Handler
      description: "스테이지 진행 상태 관리"

  # === Game Layer (프로젝트 특화 UI) ===
  game:
    - name: MainMenuPage
      role: View
      description: "메인 메뉴 UI"

    - name: LevelSelectPage
      role: View
      description: "레벨 선택 UI"

    - name: GamePlayPage
      role: View
      description: "게임 플레이 UI"

    - name: ResultPopup
      role: View
      description: "결과 팝업"

    - name: SettingsPopup
      role: View
      description: "설정 팝업"

    - name: ShopPage
      role: View
      description: "상점 UI"

    - name: BoosterBar
      role: Component
      description: "부스터 버튼 바"

    - name: HolderView
      role: View
      description: "홀더 UI 표시"

# ------------------------------------------------------------
# 시스템 의존성 (requires/provides)
# ------------------------------------------------------------
dependencies:

  GameManager:
    requires: [DataManager, SoundManager, EventBus]
    provides: [StartGame, PauseGame, EndGame, LoadScene]

  BoardManager:
    requires: [LevelDataLoader, ObjectPool, CarController, ObstacleController]
    provides: [InitBoard, GetCarAt, GetEmptyCells]

  CarController:
    requires: [ObjectPool, MoveValidator]
    provides: [MoveTo, Collect, GetColor, IsCollectable]

  HolderController:
    requires: [MatchChecker, EventBus]
    provides: [AddCar, RemoveCar, IsFull, GetCarCount]

  MatchChecker:
    requires: []
    provides: [CheckMatch, GetMatchedCars]

  MoveValidator:
    requires: [BoardManager]
    provides: [CanCollect, HasOpenSide]

  ObstacleController:
    requires: [BoardManager]
    provides: [Activate, Deactivate, GetType]

  LevelDataLoader:
    requires: [DataManager]
    provides: [LoadLevel, GetLevelData, GetLevelCount]

  BoosterProcessor:
    requires: [BoardManager, HolderController, DataManager]
    provides: [UseUndo, UseShuffle, UseSuperUndo, UseMagnet]

  ScoreCalculator:
    requires: []
    provides: [CalculateScore, CalculateReward, CalculateStars]

  StageStateHandler:
    requires: [BoardManager, HolderController, EventBus]
    provides: [CheckWin, CheckFail, GetProgress]

  GamePlayPage:
    requires: [BoardManager, HolderController, BoosterProcessor, StageStateHandler]
    provides: [ShowBoard, UpdateHolder, ShowResult]

# ------------------------------------------------------------
# 이벤트 정의
# ------------------------------------------------------------
events:
  - name: OnCarCollected
    sender: CarController
    receivers: [HolderController, StageStateHandler]
    payload: {carId: string, color: CarColor}

  - name: OnMatchFound
    sender: MatchChecker
    receivers: [HolderController, ScoreCalculator, GamePlayPage]
    payload: {carIds: string[], color: CarColor}

  - name: OnHolderFull
    sender: HolderController
    receivers: [StageStateHandler]
    payload: {}

  - name: OnBoardCleared
    sender: BoardManager
    receivers: [StageStateHandler]
    payload: {}

  - name: OnStageWin
    sender: StageStateHandler
    receivers: [GameManager, GamePlayPage, ScoreCalculator]
    payload: {levelId: int, moveCount: int}

  - name: OnStageFail
    sender: StageStateHandler
    receivers: [GameManager, GamePlayPage]
    payload: {levelId: int}

  - name: OnBoosterUsed
    sender: BoosterProcessor
    receivers: [DataManager, GamePlayPage]
    payload: {boosterType: BoosterType}

# ------------------------------------------------------------
# 데이터 모델
# ------------------------------------------------------------
data_models:
  CarData:
    fields:
      - {name: id, type: string}
      - {name: color, type: CarColor}
      - {name: position, type: Vector2Int}
      - {name: isCollectable, type: bool}

  LevelData:
    fields:
      - {name: levelId, type: int}
      - {name: gridSize, type: Vector2Int}
      - {name: cars, type: List<CarData>}
      - {name: obstacles, type: List<ObstacleData>}
      - {name: holderSize, type: int}

  ObstacleData:
    fields:
      - {name: type, type: ObstacleType}
      - {name: position, type: Vector2Int}
      - {name: properties, type: Dictionary<string, object>}

  UserProgressData:
    fields:
      - {name: currentLevel, type: int}
      - {name: stars, type: Dictionary<int, int>}
      - {name: coins, type: int}
      - {name: boosters, type: Dictionary<BoosterType, int>}

# ------------------------------------------------------------
# Enum 정의
# ------------------------------------------------------------
enums:
  CarColor:
    values: [Red, Blue, Green, Yellow, Purple, Orange]

  ObstacleType:
    values: [Wall, Box, Elevator, Tunnel]

  BoosterType:
    values: [Undo, Shuffle, SuperUndo, Magnet]

  GameState:
    values: [Idle, Playing, Paused, Win, Fail]
