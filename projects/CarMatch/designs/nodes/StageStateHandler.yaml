# AI_기획서 - StageStateHandler
nodeId: StageStateHandler
type: class
layer: Domain
role: Handler
phase: 3d

description: "스테이지 진행 상태 관리, 승리/패배 판정"

using:
  - System
  - UnityEngine

baseClass: MonoBehaviour

fields:
  - name: boardManager
    type: BoardManager
    access: private
    serializeField: true

  - name: holderController
    type: HolderController
    access: private
    serializeField: true

  - name: currentState
    type: GameState
    access: private

  - name: moveCount
    type: int
    access: private
    description: "이동 횟수"

  - name: currentLevelId
    type: int
    access: private

properties:
  - name: State
    type: GameState
    access: public
    getter: "return currentState;"

  - name: MoveCount
    type: int
    access: public
    getter: "return moveCount;"

provides:
  - signature: "void StartStage(int levelId)"
    description: "스테이지 시작"
    logic:
      - "currentLevelId = levelId"
      - "moveCount = 0"
      - "currentState = GameState.Playing"

  - signature: "void CheckGameState()"
    description: "게임 상태 확인 및 업데이트"
    logic:
      - "보드가 비었으면 Win"
      - "홀더가 가득 차고 매칭 불가면 Fail"
      - "그 외 Playing 유지"

  - signature: "bool CheckWin()"
    description: "승리 조건 확인"
    logic:
      - "boardManager.IsBoardCleared() 확인"
      - "true면 OnStageWin 이벤트 발생"
    return: "승리 여부"

  - signature: "bool CheckFail()"
    description: "패배 조건 확인"
    logic:
      - "holderController.IsFull() 확인"
      - "매칭 가능한 차량이 없는지 확인"
      - "둘 다 true면 OnStageFail 이벤트 발생"
    return: "패배 여부"

  - signature: "void IncrementMoveCount()"
    description: "이동 횟수 증가"

  - signature: "float GetProgress()"
    description: "진행률 반환 (클리어한 차량 비율)"

  - signature: "void PauseGame()"
    description: "게임 일시 정지"
    logic:
      - "currentState = GameState.Paused"
      - "Time.timeScale = 0"

  - signature: "void ResumeGame()"
    description: "게임 재개"
    logic:
      - "currentState = GameState.Playing"
      - "Time.timeScale = 1"

requires:
  - BoardManager
  - HolderController
  - GameState
  - EventBus

events:
  publish:
    - OnStageWin
    - OnStageFail
  subscribe:
    - OnCarCollected
    - OnMatchFound
    - OnHolderFull
    - OnBoardCleared

output:
  path: "Handler/StageStateHandler.cs"
  namespace: "CarMatch"
