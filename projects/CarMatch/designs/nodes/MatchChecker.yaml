# AI_기획서 - MatchChecker
nodeId: MatchChecker
type: class
layer: Domain
role: Calculator
phase: 3a

description: "3매치 검사 로직"

using:
  - System
  - System.Collections.Generic
  - System.Linq

fields:
  - name: matchCount
    type: int
    access: private
    default: 3
    description: "매칭에 필요한 개수"

provides:
  - signature: "List<CarController> CheckMatch(List<CarController> cars)"
    description: "매칭된 차량 리스트 반환"
    logic:
      - "색상별로 그룹화"
      - "3개 이상인 그룹 찾기"
      - "연속된 3개 반환"
    return: "매칭된 차량 리스트, 없으면 빈 리스트"

  - signature: "bool HasPotentialMatch(List<CarController> cars)"
    description: "매칭 가능성이 있는지 확인"
    logic:
      - "색상별 개수 계산"
      - "2개 이상인 색상이 있으면 true"

  - signature: "Dictionary<CarColor, int> GetColorCounts(List<CarController> cars)"
    description: "색상별 차량 개수 반환"

private_methods:
  - signature: "List<CarController> FindConsecutiveMatch(List<CarController> cars, CarColor color)"
    description: "연속된 같은 색상 3개 찾기"
    logic:
      - "해당 색상 차량만 필터링"
      - "연속된 인덱스에 있는 3개 찾기"

requires:
  - CarController
  - CarColor

output:
  path: "Logic/MatchChecker.cs"
  namespace: "CarMatch"
