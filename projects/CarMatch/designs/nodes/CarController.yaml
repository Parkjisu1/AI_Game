# AI_기획서 - CarController
nodeId: CarController
type: class
layer: Domain
role: Controller
phase: 3b

description: "개별 차량 제어, 이동 및 상태 관리"

using:
  - System
  - UnityEngine
  - DG.Tweening

baseClass: MonoBehaviour
interfaces:
  - IPoolable

fields:
  - name: data
    type: CarData
    access: private
    description: "차량 데이터"

  - name: isCollectable
    type: bool
    access: private
    description: "수집 가능 여부"

  - name: meshRenderer
    type: MeshRenderer
    access: private
    serializeField: true

  - name: colorMaterials
    type: Material[]
    access: private
    serializeField: true
    description: "색상별 머티리얼"

  - name: moveSpeed
    type: float
    access: private
    default: 0.3f
    serializeField: true

  - name: selectEffect
    type: GameObject
    access: private
    serializeField: true

properties:
  - name: Color
    type: CarColor
    access: public
    getter: "return data.color;"

  - name: Position
    type: Vector2Int
    access: public
    getter: "return data.position;"

  - name: IsCollectable
    type: bool
    access: public
    getter: "return isCollectable;"

  - name: Id
    type: string
    access: public
    getter: "return data.id;"

provides:
  - signature: "void Initialize(CarData carData)"
    description: "차량 초기화"
    logic:
      - "data 설정"
      - "색상에 맞는 머티리얼 적용"
      - "위치 설정"

  - signature: "void SetCollectable(bool value)"
    description: "수집 가능 상태 설정"
    logic:
      - "isCollectable 설정"
      - "시각적 피드백 (하이라이트 등)"

  - signature: "void MoveTo(Vector3 targetPosition, System.Action onComplete = null)"
    description: "목표 위치로 이동"
    logic:
      - "DOTween으로 부드럽게 이동"
      - "완료 시 콜백 실행"

  - signature: "void Collect(Transform holderSlot)"
    description: "홀더로 수집"
    logic:
      - "data.isInHolder = true"
      - "홀더 슬롯으로 이동"
      - "OnCarCollected 이벤트 발생"

  - signature: "void ReturnToBoard(Vector2Int position)"
    description: "보드로 되돌리기 (Undo용)"
    logic:
      - "data.isInHolder = false"
      - "data.position = position"
      - "보드 위치로 이동"

  - signature: "void OnSpawn()"
    description: "풀에서 꺼낼 때 호출"

  - signature: "void OnDespawn()"
    description: "풀로 반환할 때 호출"

  - signature: "void PlaySelectEffect()"
    description: "선택 이펙트 재생"

private_methods:
  - signature: "void ApplyColorMaterial(CarColor color)"
    description: "색상 머티리얼 적용"

requires:
  - CarData
  - CarColor
  - IPoolable

events:
  publish:
    - OnCarCollected

output:
  path: "Controller/CarController.cs"
  namespace: "CarMatch"
