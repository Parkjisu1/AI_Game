# AI_기획서 - BoosterProcessor
nodeId: BoosterProcessor
type: class
layer: Domain
role: Processor
phase: 3d

description: "부스터 사용 처리"

using:
  - System
  - System.Collections.Generic
  - UnityEngine

baseClass: MonoBehaviour

fields:
  - name: boardManager
    type: BoardManager
    access: private
    serializeField: true

  - name: holderController
    type: HolderController
    access: private
    serializeField: true

  - name: moveHistory
    type: Stack<MoveRecord>
    access: private
    description: "이동 기록 (Undo용)"

  - name: maxHistorySize
    type: int
    access: private
    default: 50

nested_classes:
  - name: MoveRecord
    fields:
      - {name: car, type: CarController, access: public}
      - {name: fromPosition, type: Vector2Int, access: public}
      - {name: wasInHolder, type: bool, access: public}

provides:
  - signature: "bool UseUndo()"
    description: "Undo 부스터 사용"
    logic:
      - "moveHistory에서 마지막 기록 꺼내기"
      - "차량을 원래 위치로 되돌리기"
      - "부스터 소모 처리"
      - "OnBoosterUsed 이벤트 발생"
    return: "성공 여부"

  - signature: "bool UseShuffle()"
    description: "Shuffle 부스터 사용"
    logic:
      - "보드의 모든 차량 위치 랜덤 재배치"
      - "수집 가능 상태 업데이트"
      - "부스터 소모 처리"
    return: "성공 여부"

  - signature: "bool UseSuperUndo()"
    description: "Super Undo 부스터 사용"
    logic:
      - "홀더의 마지막 차량을 보드로 되돌리기"
      - "빈 위치 찾아서 배치"
      - "부스터 소모 처리"
    return: "성공 여부"

  - signature: "bool UseMagnet()"
    description: "Magnet 부스터 사용"
    logic:
      - "보드에서 가장 많은 색상 찾기"
      - "해당 색상 차량 3개를 자동으로 홀더에 추가"
      - "부스터 소모 처리"
    return: "성공 여부"

  - signature: "void RecordMove(CarController car, Vector2Int fromPosition)"
    description: "이동 기록 저장"
    logic:
      - "MoveRecord 생성"
      - "moveHistory에 Push"
      - "최대 크기 초과 시 오래된 기록 제거"

  - signature: "bool CanUseBooster(BoosterType type)"
    description: "부스터 사용 가능 여부 확인"
    logic:
      - "DataManager에서 보유 개수 확인"
      - "Undo: moveHistory가 비어있지 않아야 함"
      - "SuperUndo: 홀더에 차량이 있어야 함"
      - "Magnet: 보드에 차량이 3개 이상이어야 함"

  - signature: "void ClearHistory()"
    description: "이동 기록 초기화"

private_methods:
  - signature: "Vector2Int FindEmptyPosition()"
    description: "빈 위치 찾기"

  - signature: "void ConsumeBooster(BoosterType type)"
    description: "부스터 소모"

requires:
  - BoardManager
  - HolderController
  - CarController
  - BoosterType
  - DataManager
  - EventBus

events:
  publish:
    - OnBoosterUsed

output:
  path: "Processor/BoosterProcessor.cs"
  namespace: "CarMatch"
