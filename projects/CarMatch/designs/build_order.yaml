# ============================================================
# Car Match - Traffic Puzzle
# 빌드 순서 (의존성 기반 생성 순서)
# ============================================================

project: CarMatch
total_phases: 5

# ------------------------------------------------------------
# Phase 0: Enums & Data Models (의존성 없음)
# ------------------------------------------------------------
phase_0:
  name: "Enums & Data Structures"
  description: "기본 열거형과 데이터 모델"
  parallel: true
  nodes:
    - CarColor
    - ObstacleType
    - BoosterType
    - GameState
    - CarData
    - ObstacleData
    - LevelData
    - UserProgressData

# ------------------------------------------------------------
# Phase 1: Core Interfaces & Base Classes
# ------------------------------------------------------------
phase_1:
  name: "Interfaces & Base"
  description: "인터페이스 정의 및 기본 클래스"
  parallel: true
  depends_on: [phase_0]
  nodes:
    - IPoolable
    - IObstacle
    - IBooster
    - ISaveable
    - Singleton          # Base class for managers

# ------------------------------------------------------------
# Phase 2: Core Managers (독립적 싱글톤)
# ------------------------------------------------------------
phase_2:
  name: "Core Managers"
  description: "게임 전역 관리자"
  parallel: true
  depends_on: [phase_1]
  nodes:
    - EventBus
    - ObjectPool
    - SoundManager
    - DataManager

# ------------------------------------------------------------
# Phase 3: Domain Logic (게임 핵심 로직)
# ------------------------------------------------------------
phase_3:
  name: "Domain Logic"
  description: "게임 핵심 도메인 로직"
  depends_on: [phase_2]

  # 3-A: 독립 유틸리티
  phase_3a:
    parallel: true
    nodes:
      - MatchChecker
      - ScoreCalculator
      - LevelDataLoader

  # 3-B: 컨트롤러 (3-A 의존)
  phase_3b:
    parallel: true
    depends_on: [phase_3a]
    nodes:
      - MoveValidator
      - CarController
      - ObstacleController

  # 3-C: 메인 컨트롤러 (3-B 의존)
  phase_3c:
    parallel: true
    depends_on: [phase_3b]
    nodes:
      - BoardManager
      - HolderController

  # 3-D: 프로세서 (3-C 의존)
  phase_3d:
    parallel: false
    depends_on: [phase_3c]
    nodes:
      - BoosterProcessor
      - StageStateHandler

# ------------------------------------------------------------
# Phase 4: Game Layer (UI & 통합)
# ------------------------------------------------------------
phase_4:
  name: "Game Layer"
  description: "UI 및 게임 통합"
  depends_on: [phase_3]

  # 4-A: UI Components
  phase_4a:
    parallel: true
    nodes:
      - BoosterBar
      - HolderView
      - CarView
      - ObstacleView

  # 4-B: Pages & Popups
  phase_4b:
    parallel: true
    depends_on: [phase_4a]
    nodes:
      - MainMenuPage
      - LevelSelectPage
      - SettingsPopup
      - ShopPage

  # 4-C: GamePlay (모든 시스템 통합)
  phase_4c:
    parallel: false
    depends_on: [phase_4b]
    nodes:
      - GamePlayPage
      - ResultPopup

# ------------------------------------------------------------
# Phase 5: Game Manager (최종 통합)
# ------------------------------------------------------------
phase_5:
  name: "Integration"
  description: "게임 매니저 및 최종 통합"
  depends_on: [phase_4]
  nodes:
    - GameManager

# ------------------------------------------------------------
# 생성 순서 요약
# ------------------------------------------------------------
summary:
  total_nodes: 35
  phases:
    - {phase: 0, count: 8, name: "Enums & Data"}
    - {phase: 1, count: 5, name: "Interfaces"}
    - {phase: 2, count: 4, name: "Core Managers"}
    - {phase: 3, count: 10, name: "Domain Logic"}
    - {phase: 4, count: 7, name: "Game Layer"}
    - {phase: 5, count: 1, name: "Integration"}

# ------------------------------------------------------------
# 병렬 작업 가능 그룹
# ------------------------------------------------------------
parallel_groups:
  - group: "Phase 0 전체"
    nodes: 8
    estimated_files: 8

  - group: "Phase 2 전체"
    nodes: 4
    estimated_files: 4

  - group: "Phase 3-A + 3-B"
    nodes: 6
    estimated_files: 6

  - group: "Phase 4-A + 4-B"
    nodes: 8
    estimated_files: 8
