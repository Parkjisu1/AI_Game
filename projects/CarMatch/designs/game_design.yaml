# ============================================================
# Car Match - Traffic Puzzle
# Layer 1: 게임 기획서 (인간 읽기용)
# ============================================================

game:
  name: "Car Match"
  genre: Puzzle
  subgenre: Match3 + Traffic Management
  platform: Mobile (Unity)
  target_path: "E:/Playable_Build_In_Render/NewPlayable/AI_WORK_FLOW_TEST"

# ------------------------------------------------------------
# 핵심 컨셉
# ------------------------------------------------------------
concept:
  one_liner: "자동차를 탭하여 수집하고, 같은 색상 3개를 매칭하여 클리어하는 퍼즐 게임"

  core_loop:
    - 차량 탭하여 홀더로 수집
    - 같은 색상 3개 매칭 시 클리어
    - 모든 차량 클리어 → 스테이지 클리어
    - 홀더가 가득 차면 실패

  unique_selling_points:
    - 동적 장애물 (엘리베이터, 터널, 벽, 박스)
    - 심플하지만 전략적인 퍼즐
    - 오프라인 플레이 가능
    - 비비드한 3D 그래픽

# ------------------------------------------------------------
# 게임플레이 규칙
# ------------------------------------------------------------
gameplay:
  car_collection:
    rule: "한 면 이상이 열린 차량만 수집 가능"
    action: "차량 탭 → 홀더로 이동"
    holder_size: 7  # 최대 수용 가능 차량 수

  matching:
    rule: "홀더에서 같은 색상 3개가 모이면 자동 클리어"
    colors:
      - Red
      - Blue
      - Green
      - Yellow
      - Purple
      - Orange

  fail_condition: "홀더가 7개로 가득 차고 매칭 불가 시 실패"

  win_condition: "모든 차량을 클리어"

# ------------------------------------------------------------
# 장애물 시스템
# ------------------------------------------------------------
obstacles:
  wall:
    description: "차량 이동 경로를 막는 정적 장애물"
    behavior: "통과 불가, 파괴 불가"

  box:
    description: "차량이 밀 수 있는 이동 가능 장애물"
    behavior: "차량 수집 시 뒤로 밀림"

  elevator:
    description: "차량을 위아래로 이동시키는 동적 장애물"
    behavior: "주기적으로 또는 트리거 시 차량 이동"

  tunnel:
    description: "차량을 다른 위치로 이동시키는 포탈"
    behavior: "입구 → 출구로 차량 이동"

# ------------------------------------------------------------
# 부스터 시스템
# ------------------------------------------------------------
boosters:
  undo:
    name: "Undo"
    description: "마지막 이동 되돌리기"
    cost: 1

  shuffle:
    name: "Shuffle"
    description: "보드의 차량 위치 재배치"
    cost: 2

  super_undo:
    name: "Super Undo"
    description: "홀더의 차량을 보드로 되돌리기"
    cost: 3

  magnet:
    name: "Magnet"
    description: "같은 색상 차량 자동 매칭"
    cost: 3

# ------------------------------------------------------------
# 레벨 진행
# ------------------------------------------------------------
progression:
  difficulty_curve:
    - levels: 1-10
      features: "기본 매칭만"
      car_count: 9-15
      colors: 3

    - levels: 11-30
      features: "Wall 장애물 추가"
      car_count: 15-21
      colors: 4

    - levels: 31-50
      features: "Box 장애물 추가"
      car_count: 18-24
      colors: 5

    - levels: 51-80
      features: "Elevator 추가"
      car_count: 21-30
      colors: 5

    - levels: 81+
      features: "Tunnel 추가, 복합 장애물"
      car_count: 24-36
      colors: 6

# ------------------------------------------------------------
# 보상 시스템
# ------------------------------------------------------------
rewards:
  stage_clear:
    - type: Coin
      amount: "10-50 (난이도별)"
    - type: Star
      amount: "1-3 (성과별)"

  daily_reward:
    description: "매일 접속 보상"
    items: [Coin, Booster, Ticket]

  achievement:
    description: "업적 달성 보상"
    items: [Coin, Booster, Cosmetic]

# ------------------------------------------------------------
# UI 구성
# ------------------------------------------------------------
ui_screens:
  - name: MainMenu
    elements: [PlayButton, SettingsButton, ShopButton, DailyReward]

  - name: LevelSelect
    elements: [LevelGrid, ChapterProgress, BackButton]

  - name: GamePlay
    elements: [Board, Holder, BoosterBar, PauseButton, LevelInfo]

  - name: Result
    elements: [Stars, CoinReward, NextButton, RetryButton]

  - name: Shop
    elements: [CoinPack, BoosterPack, AdReward]

  - name: Settings
    elements: [Sound, Music, Vibration, Language]

# ------------------------------------------------------------
# 참고 자료
# ------------------------------------------------------------
references:
  - "https://play.google.com/store/apps/details?id=com.grandgames.carmatch"
  - "https://apps.apple.com/us/app/car-match-traffic-puzzle/id6504421808"
