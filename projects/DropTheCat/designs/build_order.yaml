# =============================================================================
# Drop the Cat (빠지냥이) - Build Order
# =============================================================================
# Version: 1.0.0
# Total Nodes: 25
# Phase 0: 5 (Core) | Phase 1: 6 (Domain-Base) | Phase 2: 7 (Domain-Upper) | Phase 3: 7 (Game)
# =============================================================================

# 빌드 순서 규칙:
# - 같은 Phase 내의 노드는 병렬 빌드 가능
# - 다음 Phase는 이전 Phase 완료 후 시작
# - 의존성이 없는 노드부터 우선 빌드

# =============================================================================
# Phase 0: Core Infrastructure (의존성 없음)
# =============================================================================
phase_0:
  name: "Core Infrastructure"
  description: "장르 무관 기반 시스템. 모든 다른 시스템의 근간"
  parallel: true
  nodes:
    - nodeId: "Singleton"
      layer: "Core"
      genre: "Generic"
      role: "Base"
      dependencies: []
      estimated_complexity: "low"

    - nodeId: "EventManager"
      layer: "Core"
      genre: "Generic"
      role: "Manager"
      dependencies:
        - "Singleton"
      estimated_complexity: "medium"

    - nodeId: "ObjectPool"
      layer: "Core"
      genre: "Generic"
      role: "Pool"
      dependencies: []
      estimated_complexity: "medium"

    - nodeId: "SaveManager"
      layer: "Core"
      genre: "Generic"
      role: "Manager"
      dependencies:
        - "Singleton"
      estimated_complexity: "low"

    - nodeId: "SoundManager"
      layer: "Core"
      genre: "Generic"
      role: "Manager"
      dependencies:
        - "Singleton"
        - "SaveManager"
      estimated_complexity: "medium"

  build_order_within_phase:
    - group: 1
      nodes: ["Singleton", "ObjectPool"]
      note: "의존성 없음, 최우선 빌드"
    - group: 2
      nodes: ["EventManager", "SaveManager"]
      note: "Singleton 의존"
    - group: 3
      nodes: ["SoundManager"]
      note: "Singleton + SaveManager 의존"

# =============================================================================
# Phase 1: Domain Base (Core만 의존)
# =============================================================================
phase_1:
  name: "Domain Base Systems"
  description: "Core만 의존하는 기반 도메인 시스템"
  parallel: true
  nodes:
    - nodeId: "LevelDataProvider"
      layer: "Domain"
      genre: "Puzzle"
      role: "Provider"
      dependencies: []
      estimated_complexity: "medium"

    - nodeId: "CurrencyManager"
      layer: "Domain"
      genre: "Generic"
      role: "Manager"
      dependencies:
        - "Singleton"
        - "SaveManager"
        - "EventManager"
      estimated_complexity: "low"

    - nodeId: "GridManager"
      layer: "Domain"
      genre: "Puzzle"
      role: "Manager"
      dependencies:
        - "Singleton"
        - "EventManager"
        - "ObjectPool"
      estimated_complexity: "high"

    - nodeId: "TileController"
      layer: "Domain"
      genre: "Puzzle"
      role: "Controller"
      dependencies:
        - "GridManager"
        - "ObjectPool"
      estimated_complexity: "medium"

    - nodeId: "CatController"
      layer: "Domain"
      genre: "Puzzle"
      role: "Controller"
      dependencies:
        - "GridManager"
        - "ObjectPool"
      estimated_complexity: "medium"

    - nodeId: "HoleController"
      layer: "Domain"
      genre: "Puzzle"
      role: "Controller"
      dependencies:
        - "GridManager"
        - "ObjectPool"
      estimated_complexity: "low"

  build_order_within_phase:
    - group: 1
      nodes: ["LevelDataProvider", "CurrencyManager", "GridManager"]
      note: "Core만 의존, 병렬 빌드 가능"
    - group: 2
      nodes: ["TileController", "CatController", "HoleController"]
      note: "GridManager 의존, 서로 독립적이므로 병렬 가능"

# =============================================================================
# Phase 2: Domain Upper (다른 Domain 의존)
# =============================================================================
phase_2:
  name: "Domain Upper Systems"
  description: "다른 Domain 시스템에 의존하는 상위 도메인 시스템"
  parallel: true
  nodes:
    - nodeId: "ObstacleManager"
      layer: "Domain"
      genre: "Puzzle"
      role: "Manager"
      dependencies:
        - "GridManager"
        - "EventManager"
      estimated_complexity: "high"

    - nodeId: "ColorMatcher"
      layer: "Domain"
      genre: "Puzzle"
      role: "Validator"
      dependencies:
        - "CatController"
        - "HoleController"
        - "GridManager"
      estimated_complexity: "low"

    - nodeId: "SlideProcessor"
      layer: "Domain"
      genre: "Puzzle"
      role: "Processor"
      dependencies:
        - "GridManager"
        - "TileController"
        - "ObstacleManager"
        - "EventManager"
        - "SoundManager"
      estimated_complexity: "high"

    - nodeId: "DropProcessor"
      layer: "Domain"
      genre: "Puzzle"
      role: "Processor"
      dependencies:
        - "GridManager"
        - "ColorMatcher"
        - "CatController"
        - "HoleController"
        - "EventManager"
        - "SoundManager"
        - "ObjectPool"
      estimated_complexity: "high"

    - nodeId: "ScoreCalculator"
      layer: "Domain"
      genre: "Puzzle"
      role: "Calculator"
      dependencies:
        - "EventManager"
      estimated_complexity: "low"

    - nodeId: "LevelManager"
      layer: "Domain"
      genre: "Puzzle"
      role: "Manager"
      dependencies:
        - "Singleton"
        - "LevelDataProvider"
        - "GridManager"
        - "SaveManager"
        - "EventManager"
      estimated_complexity: "medium"

    - nodeId: "BoosterManager"
      layer: "Domain"
      genre: "Puzzle"
      role: "Manager"
      dependencies:
        - "Singleton"
        - "SaveManager"
        - "CurrencyManager"
        - "EventManager"
        - "GridManager"
      estimated_complexity: "high"

  build_order_within_phase:
    - group: 1
      nodes: ["ObstacleManager", "ColorMatcher", "ScoreCalculator", "LevelManager"]
      note: "Phase 1 의존만, 병렬 빌드 가능"
    - group: 2
      nodes: ["SlideProcessor", "BoosterManager"]
      note: "ObstacleManager 의존 (SlideProcessor), 병렬 가능"
    - group: 3
      nodes: ["DropProcessor"]
      note: "ColorMatcher 의존, SlideProcessor 이벤트 구독"

# =============================================================================
# Phase 3: Game Layer (프로젝트 특화)
# =============================================================================
phase_3:
  name: "Game Layer"
  description: "프로젝트 특화 UI 및 게임 흐름 제어"
  parallel: true
  nodes:
    - nodeId: "GameManager"
      layer: "Game"
      genre: "Puzzle"
      role: "Manager"
      dependencies:
        - "Singleton"
        - "LevelManager"
        - "SlideProcessor"
        - "DropProcessor"
        - "BoosterManager"
        - "CurrencyManager"
        - "SaveManager"
        - "SoundManager"
        - "EventManager"
      estimated_complexity: "high"

    - nodeId: "TitlePage"
      layer: "Game"
      genre: "Puzzle"
      role: "Handler"
      dependencies:
        - "GameManager"
      estimated_complexity: "low"

    - nodeId: "MainPage"
      layer: "Game"
      genre: "Puzzle"
      role: "Handler"
      dependencies:
        - "LevelManager"
        - "CurrencyManager"
        - "GameManager"
        - "EventManager"
      estimated_complexity: "medium"

    - nodeId: "GamePage"
      layer: "Game"
      genre: "Puzzle"
      role: "Handler"
      dependencies:
        - "GridManager"
        - "SlideProcessor"
        - "BoosterManager"
        - "ScoreCalculator"
        - "SoundManager"
        - "EventManager"
      estimated_complexity: "high"

    - nodeId: "LevelClearPopup"
      layer: "Game"
      genre: "Puzzle"
      role: "Handler"
      dependencies:
        - "LevelManager"
        - "CurrencyManager"
        - "SoundManager"
        - "GameManager"
      estimated_complexity: "medium"

    - nodeId: "LevelFailPopup"
      layer: "Game"
      genre: "Puzzle"
      role: "Handler"
      dependencies:
        - "LevelManager"
        - "BoosterManager"
        - "GameManager"
      estimated_complexity: "low"

    - nodeId: "ShopPopup"
      layer: "Game"
      genre: "Puzzle"
      role: "Handler"
      dependencies:
        - "CurrencyManager"
        - "BoosterManager"
      estimated_complexity: "medium"

  build_order_within_phase:
    - group: 1
      nodes: ["GameManager"]
      note: "모든 Domain 시스템 의존, 최우선 빌드"
    - group: 2
      nodes: ["TitlePage", "MainPage", "GamePage", "LevelClearPopup", "LevelFailPopup", "ShopPopup"]
      note: "GameManager 의존, 서로 독립적이므로 전부 병렬 가능"

# =============================================================================
# Summary
# =============================================================================
summary:
  total_nodes: 25
  by_phase:
    phase_0: 5
    phase_1: 6
    phase_2: 7
    phase_3: 7
  by_layer:
    Core: 5
    Domain: 13
    Game: 7
  by_complexity:
    low: 8
    medium: 10
    high: 7
  critical_path:
    - "Singleton → GridManager → ObstacleManager → SlideProcessor → DropProcessor → GameManager → GamePage"
    - "이 경로가 전체 빌드의 최장 의존 체인"
  parallel_opportunities:
    phase_0: "Singleton/ObjectPool 병렬 → EventManager/SaveManager 병렬 → SoundManager"
    phase_1: "LevelDataProvider/CurrencyManager/GridManager 병렬 → Controllers 3개 병렬"
    phase_2: "ObstacleManager/ColorMatcher/ScoreCalculator/LevelManager 병렬 → SlideProcessor/BoosterManager 병렬 → DropProcessor"
    phase_3: "GameManager 먼저 → 나머지 6개 UI 전부 병렬"
