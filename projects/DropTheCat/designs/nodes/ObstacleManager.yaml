# ObstacleManager - Domain Obstacle Management
metadata:
  nodeId: "ObstacleManager"
  version: "1.0.0"
  phase: 2
  role: "Manager"

dependencies:
  internal:
    - "GridManager"
    - "EventManager"
  external:
    - "UnityEngine"
    - "System.Collections.Generic"

contract:
  provides:
    - "void InitObstacles(LevelData levelData)"
    - "bool CanSlideThrough(int x, int y, SlideDirection direction)"
    - "void OnTilePassedOver(int x, int y)"
    - "ObstacleData GetObstacle(int x, int y)"
    - "bool HasObstacle(int x, int y)"
    - "List<Vector2Int> GetPortalPair(Vector2Int portalPos)"
    - "SlideDirection? GetArrowDirection(int x, int y)"
    - "void ClearObstacles()"
  requires:
    - "GridManager.GetCell/SetCellState"
    - "EventManager.Subscribe/Publish"

tags:
  layer: "Domain"
  genre: "Puzzle"
  role: "Manager"
  system: "Obstacle"
  majorFunctions:
    - "StateControl"
    - "ConditionCheck"
  minorFunctions:
    - "Find"
    - "Validate"
    - "Assign"
    - "Iterate"

logicFlow:
  - step: 1
    tag: "StateControl"
    action: "InitObstacles - 레벨 데이터에서 장애물 정보 추출 → 장애물 오브젝트 배치"
    next: 2
  - step: 2
    tag: "ConditionCheck"
    action: "CanSlideThrough - 해당 위치에 Blocker가 있는지, LockedTile이 잠겨있는지, ArrowTile 방향 확인"
    next: 3
  - step: 3
    tag: "StateControl"
    action: "OnTilePassedOver - IceTile인 경우 내구도 감소 (2→1→파괴)"
    next: 4
  - step: 4
    tag: "StateControl"
    action: "SwitchTile 활성화 시 연결된 LockedTile/Blocker 상태 변경"
    next: 5
  - step: 5
    tag: "ResponseTrigger"
    action: "OnCatDropped 구독 → 인접 LockedTile 해제 조건 확인 → OnTileUnlocked 발행"
    next: null

referencePatterns:
  - source: "db/base/puzzle/domain/Box"
    pattern: "장애물 내구도 관리 패턴"
  - source: "db/base/puzzle/domain/Unbreakable"
    pattern: "이동 불가 블록 패턴"

codeHints:
  patterns:
    - "Dictionary<Vector2Int, ObstacleData> obstacleMap"
    - "ObstacleData { type, durability, linkedPositions, arrowDir }"
    - "포탈 쌍: Dictionary<Vector2Int, Vector2Int> portalPairs"
    - "스위치-타일 연결: Dictionary<Vector2Int, List<Vector2Int>> switchLinks"
  avoidPatterns:
    - "장애물 로직을 GridManager에 직접 구현 금지 (분리)"
    - "하드코딩된 장애물 종류 금지 (enum + 데이터 기반)"
