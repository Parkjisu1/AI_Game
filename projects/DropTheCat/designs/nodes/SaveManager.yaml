# SaveManager - Core Save/Load System
metadata:
  nodeId: "SaveManager"
  version: "1.0.0"
  phase: 0
  role: "Manager"

dependencies:
  internal:
    - "Singleton"
  external:
    - "UnityEngine"
    - "System"

contract:
  provides:
    - "void Save<T>(string key, T data)"
    - "T Load<T>(string key, T defaultValue)"
    - "bool HasKey(string key)"
    - "void DeleteKey(string key)"
    - "void DeleteAll()"
  requires:
    - "Singleton<SaveManager>"

tags:
  layer: "Core"
  genre: "Generic"
  role: "Manager"
  system: "Infrastructure"
  majorFunctions:
    - "DataSync"
  minorFunctions:
    - "Validate"
    - "Assign"
    - "Find"

logicFlow:
  - step: 1
    tag: "DataSync"
    action: "Save - 데이터를 JsonUtility.ToJson으로 직렬화 후 PlayerPrefs.SetString"
    next: 2
  - step: 2
    tag: "DataSync"
    action: "Load - PlayerPrefs.GetString으로 JSON 로드 후 JsonUtility.FromJson으로 역직렬화"
    next: 3
  - step: 3
    tag: "ConditionCheck"
    action: "HasKey - PlayerPrefs.HasKey로 존재 여부 확인"
    next: null

referencePatterns:
  - source: "Generic Core"
    pattern: "PlayerPrefs + JSON 직렬화/역직렬화"

codeHints:
  patterns:
    - "public class SaveManager : Singleton<SaveManager>"
    - "JsonUtility.ToJson / FromJson 사용"
    - "PlayerPrefs.SetString / GetString"
    - "PlayerPrefs.Save() 명시적 호출"
  avoidPatterns:
    - "대용량 데이터 PlayerPrefs 저장 금지 (파일 I/O 고려)"
    - "민감 정보 평문 저장 금지"
