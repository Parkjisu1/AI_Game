# GamePage - Game Play UI and Input Handler
metadata:
  nodeId: "GamePage"
  version: "1.0.0"
  phase: 3
  role: "Handler"

dependencies:
  internal:
    - "GridManager"
    - "SlideProcessor"
    - "BoosterManager"
    - "ScoreCalculator"
    - "SoundManager"
    - "EventManager"
  external:
    - "UnityEngine"
    - "UnityEngine.UI"
    - "UnityEngine.EventSystems"

contract:
  provides:
    - "void InitUI(LevelData levelData)"
    - "void UpdateMoveCount(int count)"
    - "void UpdateBoosterButtons()"
    - "void OnPauseClicked()"
    - "void SetInputLocked(bool locked)"
  requires:
    - "GridManager.WorldToGrid/GridToWorld"
    - "SlideProcessor.ProcessSlide/CanSlide"
    - "BoosterManager.UseBooster/GetBoosterCount"
    - "ScoreCalculator.GetMoveCount"
    - "SoundManager.PlaySFX"
    - "EventManager.Subscribe"

tags:
  layer: "Game"
  genre: "Puzzle"
  role: "Handler"
  system: "UI"
  majorFunctions:
    - "FlowControl"
    - "ResponseTrigger"
  minorFunctions:
    - "Find"
    - "Calculate"
    - "Assign"
    - "Notify"

logicFlow:
  - step: 1
    tag: "FlowControl"
    action: "InitUI - 레벨 번호, 이동 횟수 초기화, 부스터 버튼 상태 표시"
    next: 2
  - step: 2
    tag: "ResponseTrigger"
    action: "터치 시작 (OnPointerDown) → 터치 셀의 타일 감지"
    next: 3
  - step: 3
    tag: "FlowControl"
    action: "드래그 방향 계산 (수평/수직 중 우세한 방향)"
    next: 4
  - step: 4
    tag: "ConditionCheck"
    action: "inputLocked 확인 → 잠금이면 무시"
    next: 5
  - step: 5
    tag: "FlowControl"
    action: "SlideProcessor.ProcessSlide(tileGridPos, direction) 호출"
    next: 6
  - step: 6
    tag: "ResponseTrigger"
    action: "OnMoveCountChanged 수신 → UI 이동 횟수 텍스트 갱신"
    next: 7
  - step: 7
    tag: "ResponseTrigger"
    action: "OnBoosterCountChanged 수신 → 부스터 버튼 수량 텍스트 갱신"
    next: 8
  - step: 8
    tag: "ResponseTrigger"
    action: "부스터 버튼 클릭 → BoosterManager.UseBooster 호출"
    next: null

referencePatterns:
  - source: "db/base/puzzle/domain/GameBoard_Handle"
    pattern: "터치 입력 처리, 드래그 방향 판정, 타일 선택"

codeHints:
  patterns:
    - "public class GamePage : MonoBehaviour"
    - "터치/드래그 감지: Input.GetMouseButtonDown/Up + 드래그 거리/방향 계산"
    - "최소 드래그 거리 threshold (0.5f) 이상이면 슬라이드"
    - "SerializeField: Text moveCountText, Text levelText, Button[] boosterButtons, Button pauseButton"
    - "드래그 방향: Mathf.Abs(dx) > Mathf.Abs(dy) → 수평, 아니면 수직"
  avoidPatterns:
    - "게임 로직 직접 구현 금지 (SlideProcessor에 위임)"
    - "Physics2D.Raycast 대신 GridManager.WorldToGrid로 셀 판정"
    - "멀티터치 처리 금지 (단일 터치만)"
