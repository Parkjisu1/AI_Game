# ScoreCalculator - Domain Score & Star Calculator
metadata:
  nodeId: "ScoreCalculator"
  version: "1.0.0"
  phase: 2
  role: "Calculator"

dependencies:
  internal:
    - "EventManager"
  external: []

contract:
  provides:
    - "void IncrementMove()"
    - "int GetMoveCount()"
    - "int CalculateStars(int moveCount, int optimalMoves)"
    - "int CalculateScore(int moveCount, int optimalMoves, int stars)"
    - "int CalculateCoinReward(int stars)"
    - "void Reset()"
  requires:
    - "EventManager.Subscribe/Publish"

tags:
  layer: "Domain"
  genre: "Puzzle"
  role: "Calculator"
  system: "Score"
  majorFunctions:
    - "ValueModification"
  minorFunctions:
    - "Calculate"
    - "Compare"
    - "Notify"

logicFlow:
  - step: 1
    tag: "ResponseTrigger"
    action: "OnMovePerformed 수신 → IncrementMove → OnMoveCountChanged 발행"
    next: 2
  - step: 2
    tag: "ValueModification"
    action: "CalculateStars - moveCount <= optimalMoves → 3, <= optimal+2 → 2, else → 1"
    next: 3
  - step: 3
    tag: "ValueModification"
    action: "CalculateScore - baseScore * starMultiplier * efficiencyBonus"
    next: 4
  - step: 4
    tag: "ValueModification"
    action: "CalculateCoinReward - stars 기반 코인 보상 (1:10, 2:20, 3:50)"
    next: null

referencePatterns:
  - source: "db/base/puzzle/domain/GameState"
    pattern: "점수 상태 관리, 이동 횟수 추적"

codeHints:
  patterns:
    - "순수 로직 클래스 (MonoBehaviour 불필요, 또는 가벼운 MonoBehaviour)"
    - "int _moveCount (이동 횟수 카운터)"
    - "별점 기준: 3성 <= optimal, 2성 <= optimal + 2, 1성 = 나머지"
    - "코인 보상: 3성=50, 2성=20, 1성=10"
  avoidPatterns:
    - "UI 표시 로직 포함 금지 (이벤트로 UI에 전달)"
