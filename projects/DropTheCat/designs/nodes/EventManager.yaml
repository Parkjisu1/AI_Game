# EventManager - Core Event System
metadata:
  nodeId: "EventManager"
  version: "1.0.0"
  phase: 0
  role: "Manager"

dependencies:
  internal:
    - "Singleton"
  external:
    - "UnityEngine"
    - "System"
    - "System.Collections.Generic"

contract:
  provides:
    - "void Subscribe<T>(Action<T> callback)"
    - "void Unsubscribe<T>(Action<T> callback)"
    - "void Publish<T>(T eventData)"
    - "void Clear()"
  requires:
    - "Singleton<EventManager>"

tags:
  layer: "Core"
  genre: "Generic"
  role: "Manager"
  system: "Infrastructure"
  majorFunctions:
    - "ResponseTrigger"
    - "FlowControl"
  minorFunctions:
    - "Assign"
    - "Notify"
    - "Find"

logicFlow:
  - step: 1
    tag: "FlowControl"
    action: "Subscribe<T> - Dictionary<Type, List<Delegate>>에 콜백 등록"
    next: 2
  - step: 2
    tag: "ResponseTrigger"
    action: "Publish<T> - 등록된 콜백 목록 조회 후 순차 실행"
    next: 3
  - step: 3
    tag: "FlowControl"
    action: "Unsubscribe<T> - 콜백 등록 해제"
    next: null

referencePatterns:
  - source: "Generic Core"
    pattern: "Dictionary<Type, List<Delegate>> 기반 이벤트 버스"

codeHints:
  patterns:
    - "public class EventManager : Singleton<EventManager>"
    - "private Dictionary<Type, List<Delegate>> _eventDict = new()"
    - "Subscribe에서 Type 키로 콜백 리스트 관리"
    - "Publish에서 foreach로 등록된 콜백 호출"
  avoidPatterns:
    - "string 기반 이벤트 이름 사용 금지 (Type Safety)"
    - "이벤트 발행 중 구독 목록 수정 금지 (ConcurrentModification)"
