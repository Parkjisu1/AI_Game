# ColorMatcher - Domain Color Matching Validator
metadata:
  nodeId: "ColorMatcher"
  version: "1.0.0"
  phase: 2
  role: "Validator"

dependencies:
  internal:
    - "CatController"
    - "HoleController"
    - "GridManager"
  external: []

contract:
  provides:
    - "MatchResult CheckMatch(CatController cat, HoleController hole)"
    - "bool IsAllCatsMatched()"
    - "int GetRemainingCatCount()"
    - "List<CatController> GetRemainingCats()"
  requires:
    - "CatController.Color/IsCleared"
    - "HoleController.Color/IsRainbow/IsTrap/IsMatched"
    - "GridManager (고양이/구멍 위치 조회)"

tags:
  layer: "Domain"
  genre: "Puzzle"
  role: "Validator"
  system: "Matching"
  majorFunctions:
    - "ConditionCheck"
  minorFunctions:
    - "Compare"
    - "Find"
    - "Validate"
    - "Iterate"

logicFlow:
  - step: 1
    tag: "ConditionCheck"
    action: "CheckMatch - 구멍이 Rainbow인지 확인 → Rainbow면 항상 Success"
    next: 2
  - step: 2
    tag: "ConditionCheck"
    action: "구멍이 Trap이고 색상 불일치인지 확인 → 불일치면 TrapFail"
    next: 3
  - step: 3
    tag: "ConditionCheck"
    action: "고양이 색상 == 구멍 색상 비교 → 일치면 Success, 불일치면 NoMatch"
    next: 4
  - step: 4
    tag: "ConditionCheck"
    action: "IsAllCatsMatched - 모든 CatController가 Cleared 상태인지 순회 확인"
    next: null

referencePatterns:
  - source: "db/base/puzzle/domain/Match"
    pattern: "색상 비교 기반 매칭 로직"

codeHints:
  patterns:
    - "enum MatchResult { Success, NoMatch, TrapFail }"
    - "순수 로직 클래스 (MonoBehaviour 불필요)"
    - "정적 메서드 가능 또는 GridManager 주입"
  avoidPatterns:
    - "매칭 로직에 비주얼/애니메이션 코드 혼입 금지"
    - "색상 비교 시 string 비교 금지 (enum 사용)"
