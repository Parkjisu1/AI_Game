# LevelClearPopup - Game Level Clear Result Popup
metadata:
  nodeId: "LevelClearPopup"
  version: "1.0.0"
  phase: 3
  role: "Handler"

dependencies:
  internal:
    - "LevelManager"
    - "CurrencyManager"
    - "SoundManager"
    - "GameManager"
  external:
    - "UnityEngine"
    - "UnityEngine.UI"
    - "DG.Tweening"

contract:
  provides:
    - "void Show(int stars, int score, int coinReward)"
    - "void Hide()"
    - "void OnNextLevelClicked()"
    - "void OnRetryClicked()"
    - "void OnMainMenuClicked()"
  requires:
    - "LevelManager.NextLevel"
    - "CurrencyManager.AddCoins"
    - "SoundManager.PlaySFX"
    - "GameManager.GoToMain"

tags:
  layer: "Game"
  genre: "Puzzle"
  role: "Handler"
  system: "UI"
  majorFunctions:
    - "FlowControl"
    - "ResponseTrigger"
  minorFunctions:
    - "Assign"
    - "Delay"
    - "Notify"

logicFlow:
  - step: 1
    tag: "FlowControl"
    action: "Show - 팝업 활성화 → 배경 딤 애니메이션 → 팝업 스케일 인"
    next: 2
  - step: 2
    tag: "FlowControl"
    action: "별 순차 등장 애니메이션 (DOTween 시퀀스) + 효과음"
    next: 3
  - step: 3
    tag: "FlowControl"
    action: "점수/코인 보상 텍스트 카운팅 애니메이션"
    next: 4
  - step: 4
    tag: "ResponseTrigger"
    action: "NextLevel 버튼 → LevelManager.NextLevel → 팝업 닫기"
    next: 5
  - step: 5
    tag: "FlowControl"
    action: "인터스티셜 광고 표시 조건 확인 (매 3레벨)"
    next: null

referencePatterns:
  - source: "db/base/puzzle/game/BonusTimePopup"
    pattern: "결과 팝업, 보상 표시, 버튼 액션"

codeHints:
  patterns:
    - "public class LevelClearPopup : MonoBehaviour"
    - "SerializeField: Image[] starImages, Text scoreText, Text coinText, Button nextBtn, Button retryBtn"
    - "별 애니메이션: DOScale(0→1) + DORotate + 파티클"
    - "코인 카운팅: DOTween.To로 0→reward 숫자 애니메이션"
  avoidPatterns:
    - "팝업에서 직접 저장 금지 (LevelManager가 처리)"
    - "광고 SDK 직접 호출 금지 (AdManager 래핑 사용)"
