# LevelDataProvider - Domain Level Data Loading
metadata:
  nodeId: "LevelDataProvider"
  version: "1.0.0"
  phase: 1
  role: "Provider"

dependencies:
  internal: []
  external:
    - "UnityEngine"
    - "System.Collections.Generic"

contract:
  provides:
    - "LevelData LoadLevel(int levelNumber)"
    - "LevelData GetLevelData(int levelNumber)"
    - "int GetTotalLevelCount()"
    - "bool IsLevelValid(int levelNumber)"
  requires: []

tags:
  layer: "Domain"
  genre: "Puzzle"
  role: "Provider"
  system: "Level"
  majorFunctions:
    - "DataSync"
  minorFunctions:
    - "Find"
    - "Validate"

logicFlow:
  - step: 1
    tag: "DataSync"
    action: "Resources.Load로 레벨 JSON TextAsset 로드"
    next: 2
  - step: 2
    tag: "DataSync"
    action: "JSON 파싱하여 LevelData 객체 생성"
    next: 3
  - step: 3
    tag: "ConditionCheck"
    action: "레벨 데이터 유효성 검증 (그리드 크기, 고양이-구멍 색상 쌍 일치 등)"
    next: 4
  - step: 4
    tag: "DataSync"
    action: "파싱된 LevelData를 Dictionary에 캐싱"
    next: null

referencePatterns:
  - source: "db/base/puzzle/domain/Table"
    pattern: "Resources.Load + JSON 파싱 + 캐싱 패턴"

codeHints:
  patterns:
    - "LevelData { gridWidth, gridHeight, cells[], cats[], holes[], obstacles[], optimalMoves, chapter }"
    - "CellInfo { x, y, cellType, color, linkedPortalX, linkedPortalY, arrowDirection }"
    - "Resources/Levels/Level_{number}.json 경로 규칙"
    - "Dictionary<int, LevelData> cache"
  avoidPatterns:
    - "전체 레벨 한번에 로드 금지 (On-demand 로드)"
    - "하드코딩된 레벨 데이터 금지 (JSON 외부화)"
