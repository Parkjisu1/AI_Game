# SoundManager - Core Audio System
metadata:
  nodeId: "SoundManager"
  version: "1.0.0"
  phase: 0
  role: "Manager"

dependencies:
  internal:
    - "Singleton"
    - "SaveManager"
  external:
    - "UnityEngine"
    - "System.Collections"

contract:
  provides:
    - "void PlayBGM(string bgmId)"
    - "void StopBGM()"
    - "void PlaySFX(string sfxId)"
    - "void SetBGMVolume(float volume)"
    - "void SetSFXVolume(float volume)"
    - "void SetMute(bool bgmMute, bool sfxMute)"
    - "bool IsBGMMuted { get; }"
    - "bool IsSFXMuted { get; }"
  requires:
    - "Singleton<SoundManager>"
    - "SaveManager.Save/Load"

tags:
  layer: "Core"
  genre: "Generic"
  role: "Manager"
  system: "Infrastructure"
  majorFunctions:
    - "StateControl"
    - "FlowControl"
  minorFunctions:
    - "Assign"
    - "Find"

logicFlow:
  - step: 1
    tag: "FlowControl"
    action: "초기화 시 SaveManager에서 볼륨/음소거 설정 로드"
    next: 2
  - step: 2
    tag: "StateControl"
    action: "PlayBGM - 현재 BGM 페이드아웃 → 새 BGM AudioClip 로드 → 페이드인"
    next: 3
  - step: 3
    tag: "FlowControl"
    action: "PlaySFX - AudioSource.PlayOneShot으로 효과음 재생"
    next: null

referencePatterns:
  - source: "Generic Core"
    pattern: "AudioSource 2개 (BGM, SFX), Dictionary<string, AudioClip> 캐시"

codeHints:
  patterns:
    - "public class SoundManager : Singleton<SoundManager>"
    - "SerializeField AudioSource bgmSource, sfxSource"
    - "Dictionary<string, AudioClip>으로 클립 캐싱"
    - "코루틴으로 BGM 크로스페이드"
  avoidPatterns:
    - "매 PlaySFX마다 Resources.Load 금지 (캐싱 필수)"
    - "AudioSource를 동적 생성 금지 (풀링 또는 사전 배치)"
