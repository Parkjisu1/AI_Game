# LevelFailPopup - Game Level Fail Popup
metadata:
  nodeId: "LevelFailPopup"
  version: "1.0.0"
  phase: 3
  role: "Handler"

dependencies:
  internal:
    - "LevelManager"
    - "BoosterManager"
    - "GameManager"
  external:
    - "UnityEngine"
    - "UnityEngine.UI"

contract:
  provides:
    - "void Show(string failReason)"
    - "void Hide()"
    - "void OnRetryClicked()"
    - "void OnWatchAdClicked()"
    - "void OnQuitClicked()"
  requires:
    - "LevelManager.RetryLevel"
    - "BoosterManager.AddBooster (광고 보상)"
    - "GameManager.GoToMain"

tags:
  layer: "Game"
  genre: "Puzzle"
  role: "Handler"
  system: "UI"
  majorFunctions:
    - "FlowControl"
    - "ResponseTrigger"
  minorFunctions:
    - "Assign"
    - "Notify"

logicFlow:
  - step: 1
    tag: "FlowControl"
    action: "Show - 팝업 활성화 → 실패 메시지 표시 (함정/막힘 등)"
    next: 2
  - step: 2
    tag: "ResponseTrigger"
    action: "Retry 버튼 → LevelManager.RetryLevel → 팝업 닫기"
    next: 3
  - step: 3
    tag: "FlowControl"
    action: "WatchAd 버튼 → 리워드 광고 재생 → 성공 시 Hint 부스터 지급 → 레벨 계속"
    next: 4
  - step: 4
    tag: "ResponseTrigger"
    action: "Quit 버튼 → GameManager.GoToMain"
    next: null

referencePatterns:
  - source: "db/base/puzzle/game/TouchBlockPopup"
    pattern: "팝업 표시/숨김, 버튼 액션 패턴"

codeHints:
  patterns:
    - "public class LevelFailPopup : MonoBehaviour"
    - "SerializeField: Text failReasonText, Button retryBtn, Button watchAdBtn, Button quitBtn"
    - "리워드 광고 콜백에서 BoosterManager.AddBooster(BoosterId.Hint, 1)"
  avoidPatterns:
    - "광고 SDK 직접 호출 금지"
    - "팝업에서 레벨 데이터 직접 조작 금지"
