# CatController - Domain Cat Object Controller
metadata:
  nodeId: "CatController"
  version: "1.0.0"
  phase: 1
  role: "Controller"

dependencies:
  internal:
    - "GridManager"
    - "ObjectPool"
  external:
    - "UnityEngine"
    - "DG.Tweening"

contract:
  provides:
    - "void Init(CatColor color, Vector2Int gridPos)"
    - "void PlayDropAnimation(Vector3 holeWorldPos, System.Action onComplete)"
    - "void PlayIdleAnimation()"
    - "void StopAnimation()"
    - "CatColor Color { get; }"
    - "Vector2Int GridPosition { get; }"
    - "CatState CurrentState { get; }"
    - "bool IsCleared { get; }"
  requires:
    - "GridManager.GridToWorld"
    - "ObjectPool (반환용)"

tags:
  layer: "Domain"
  genre: "Puzzle"
  role: "Controller"
  system: "Cat"
  majorFunctions:
    - "StateControl"
    - "FlowControl"
  minorFunctions:
    - "Assign"
    - "Spawn"
    - "Despawn"

logicFlow:
  - step: 1
    tag: "StateControl"
    action: "Init - CatColor에 따라 스프라이트 설정, 그리드 위치에 배치"
    next: 2
  - step: 2
    tag: "FlowControl"
    action: "PlayIdleAnimation - DOTween 시퀀스로 미세 상하 움직임 + 눈 깜빡임"
    next: 3
  - step: 3
    tag: "FlowControl"
    action: "PlayDropAnimation - 구멍 위치로 축소 + 하강 애니메이션 → 파티클 이펙트"
    next: 4
  - step: 4
    tag: "StateControl"
    action: "애니메이션 완료 후 Cleared 상태 → 오브젝트 비활성화"
    next: null

referencePatterns:
  - source: "db/base/puzzle/domain/Jewel"
    pattern: "색상별 스프라이트, 상태 관리, 매칭 시 제거 패턴"

codeHints:
  patterns:
    - "public class CatController : MonoBehaviour"
    - "enum CatColor { Red, Blue, Green, Yellow, Purple }"
    - "enum CatState { Idle, Dropping, Cleared }"
    - "SpriteRenderer + Animator 또는 DOTween 시퀀스"
    - "드롭 시 DOScale(Vector3.zero, 0.3f) + DOMove(holePos, 0.3f)"
  avoidPatterns:
    - "고양이 위치를 직접 이동 금지 (고양이는 고정, 구멍이 이동)"
    - "Destroy 직접 호출 금지 (ObjectPool 반환)"
