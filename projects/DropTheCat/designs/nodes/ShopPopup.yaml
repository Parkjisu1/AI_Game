# ShopPopup - Game Shop Popup
metadata:
  nodeId: "ShopPopup"
  version: "1.0.0"
  phase: 3
  role: "Handler"

dependencies:
  internal:
    - "CurrencyManager"
    - "BoosterManager"
  external:
    - "UnityEngine"
    - "UnityEngine.UI"

contract:
  provides:
    - "void Show()"
    - "void Hide()"
    - "void OnPurchaseCoinPack(int packIndex)"
    - "void OnPurchaseBoosterPack()"
    - "void OnRemoveAds()"
    - "void OnRestorePurchases()"
    - "void RefreshUI()"
  requires:
    - "CurrencyManager.AddCoins/GetBalance"
    - "BoosterManager.AddBooster"

tags:
  layer: "Game"
  genre: "Puzzle"
  role: "Handler"
  system: "UI"
  majorFunctions:
    - "ResourceTransfer"
    - "FlowControl"
  minorFunctions:
    - "Assign"
    - "Notify"
    - "Iterate"

logicFlow:
  - step: 1
    tag: "FlowControl"
    action: "Show - 상품 목록 표시 (코인팩, 부스터팩, 광고 제거)"
    next: 2
  - step: 2
    tag: "ResourceTransfer"
    action: "코인팩 구매 - IAP 결제 → 성공 시 CurrencyManager.AddCoins"
    next: 3
  - step: 3
    tag: "ResourceTransfer"
    action: "부스터팩 구매 - IAP 결제 → 성공 시 BoosterManager.AddBooster (각 종류별)"
    next: 4
  - step: 4
    tag: "ResourceTransfer"
    action: "광고 제거 - IAP 결제 → 성공 시 광고 비활성화 플래그 저장"
    next: 5
  - step: 5
    tag: "DataSync"
    action: "구매 복원 - IAP 복원 API 호출"
    next: null

referencePatterns:
  - source: "Generic Game"
    pattern: "상점 UI, IAP 통합, 상품 목록 패턴"

codeHints:
  patterns:
    - "public class ShopPopup : MonoBehaviour"
    - "SerializeField: Button[] coinPackButtons, Button boosterPackBtn, Button removeAdsBtn, Button restoreBtn"
    - "IAP 처리는 #if UNITY_IAP 조건부 컴파일"
    - "OnCoinChanged 구독으로 잔액 실시간 갱신"
  avoidPatterns:
    - "IAP 로직 직접 구현 금지 (IAPManager SDK 래핑 사용)"
    - "결제 없이 아이템 지급 금지 (검증 필수)"
