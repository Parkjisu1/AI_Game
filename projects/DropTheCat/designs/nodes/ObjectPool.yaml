# ObjectPool - Core Object Pooling
metadata:
  nodeId: "ObjectPool"
  version: "1.0.0"
  phase: 0
  role: "Pool"

dependencies:
  internal: []
  external:
    - "UnityEngine"
    - "System.Collections.Generic"

contract:
  provides:
    - "T Get<T>() where T : Component"
    - "void Release(Component obj)"
    - "void PreWarm<T>(T prefab, int count, Transform parent)"
    - "void ClearPool()"
  requires: []

tags:
  layer: "Core"
  genre: "Generic"
  role: "Pool"
  system: "Infrastructure"
  majorFunctions:
    - "ResourceTransfer"
  minorFunctions:
    - "Spawn"
    - "Despawn"
    - "Find"
    - "Iterate"

logicFlow:
  - step: 1
    tag: "ResourceTransfer"
    action: "PreWarm - prefab을 count만큼 Instantiate 후 비활성화하여 풀에 저장"
    next: 2
  - step: 2
    tag: "ResourceTransfer"
    action: "Get - 비활성 오브젝트 검색 → 없으면 새로 생성 → 활성화 후 반환"
    next: 3
  - step: 3
    tag: "ResourceTransfer"
    action: "Release - 오브젝트 비활성화 후 풀에 반환"
    next: null

referencePatterns:
  - source: "db/base/puzzle/core/ObjectPool"
    pattern: "Queue<GameObject> 기반 오브젝트 풀링"

codeHints:
  patterns:
    - "Dictionary<int, Queue<Component>>로 prefab InstanceID별 풀 관리"
    - "Get 시 Queue.Dequeue, Release 시 Queue.Enqueue"
    - "SetActive(true/false)로 활성/비활성 관리"
  avoidPatterns:
    - "Destroy 직접 호출 금지 (Release 사용)"
    - "풀에 반환하지 않고 방치 금지"
