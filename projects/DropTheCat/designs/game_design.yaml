# =============================================================================
# Drop the Cat (빠지냥이) - Game Design Document (Layer 1)
# =============================================================================
# Version: 1.0.0
# Genre: Puzzle (Casual Slide Puzzle)
# Generated for: AI Game Code Generation Pipeline
# =============================================================================

game_overview:
  title: "Drop the Cat"
  title_kr: "빠지냥이"
  genre: "Puzzle"
  sub_genre:
    - "Slide Puzzle"
    - "Color Matching"
    - "Casual"
  platform: "mobile"
  target_user: "casual"
  session_length: "3~5min"
  one_liner: "색깔 구멍이 있는 타일을 슬라이드하여 같은 색 고양이를 구멍에 빠뜨리는 캐주얼 퍼즐 게임"
  references:
    - "Drop the Cat (ACTIONFIT Ltd.) - 원작"
    - "Sokoban - 블록 밀기 퍼즐 메카닉"
    - "Unblock Me - 슬라이드 퍼즐 UX"

# =============================================================================
# Core Experience
# =============================================================================
core_experience:
  main_fun: "제한된 그리드에서 타일을 슬라이드하여 색상 매칭 퍼즐을 풀어내는 논리적 쾌감"
  emotion_goal: "간결한 규칙 속 깊은 사고 → 해결 시 강한 성취감과 귀여운 고양이 리워드"
  core_verbs:
    - "Slide (타일 슬라이드)"
    - "Match (색상 매칭)"
    - "Drop (고양이 드롭)"
    - "Plan (경로 계획)"

# =============================================================================
# Core Loop
# =============================================================================
core_loop:
  main_loop:
    description: "레벨 선택 → 퍼즐 풀기 → 결과 확인 → 보상 획득 → 다음 레벨"
    flow:
      - "레벨 선택 (레벨맵 또는 자동 진행)"
      - "그리드에 배치된 고양이와 구멍 확인"
      - "타일(구멍 포함)을 수평/수직으로 슬라이드"
      - "같은 색 고양이가 구멍 위에 오면 자동 드롭"
      - "모든 고양이 매칭 시 레벨 클리어"
      - "별점(1~3) 및 코인 보상"
    duration: "1~3min per level"

  daily_loop:
    description: "데일리 챌린지 레벨 + 보상 수령"
    flow:
      - "앱 실행 시 데일리 보너스 확인"
      - "일반 레벨 진행 (스태미나 무제한)"
      - "데일리 챌린지 레벨 도전"
      - "광고 시청으로 추가 보상 획득"

  long_term_loop:
    description: "레벨 진행 + 수집 요소 + 난이도 확장"
    flow:
      - "900+ 레벨 순차 진행"
      - "새로운 장애물/특수 요소 점진적 해금"
      - "고양이 스킨 수집"
      - "챕터별 테마 변경"
      - "시즌 이벤트 참여"

# =============================================================================
# Session Structure
# =============================================================================
session_structure:
  start_condition: "레벨 선택 또는 이전 레벨 이후 자동 진행"
  progress_type: "manual"
  end_conditions:
    - success: "모든 고양이가 같은 색 구멍에 드롭됨"
    - fail_wrong_hole: "고양이가 다른 색 구멍에 빠짐 (함정 레벨)"
    - fail_stuck: "더 이상 유효한 이동이 없음 (선택적 - 리트라이 제공)"
    - give_up: "플레이어가 포기 또는 리셋"
  result_handling:
    success: "별점 부여 (이동 횟수 기반) + 코인 보상 + 다음 레벨 해금"
    fail: "리트라이 (무료) 또는 리워드 광고로 힌트 획득"

# =============================================================================
# Monetization
# =============================================================================
monetization:
  main_bm: "f2p"
  revenue_sources:
    - type: "ad_banner"
      placement: "게임플레이 하단"
      frequency: "상시"
    - type: "ad_interstitial"
      placement: "레벨 클리어 후"
      frequency: "매 3레벨마다"
    - type: "ad_rewarded"
      placement: "힌트 획득, 추가 이동 횟수, 실패 시 리트라이"
      frequency: "플레이어 선택"
    - type: "iap_coin_pack"
      items:
        - name: "소형 코인팩"
          price: "$1.99"
          coins: 500
        - name: "중형 코인팩"
          price: "$4.99"
          coins: 1500
        - name: "대형 코인팩"
          price: "$7.99"
          coins: 3000
    - type: "iap_remove_ads"
      price: "$7.99"
      description: "배너 및 인터스티셜 광고 제거"
    - type: "iap_booster_pack"
      price: "$2.99"
      description: "부스터 아이템 번들"

# =============================================================================
# Genre-Specific: Grid System
# =============================================================================
grid_system:
  description: "2D 정사각형 그리드 기반 타일 배치 시스템"
  grid_sizes:
    - min: "3x3"
      levels: "1~50 (튜토리얼)"
    - standard: "4x4 ~ 5x5"
      levels: "51~300"
    - large: "5x5 ~ 6x6"
      levels: "301~600"
    - max: "7x7"
      levels: "601+"
  cell_types:
    - type: "Empty"
      description: "빈 칸 - 타일이 없는 공간, 타일이 이동 가능"
    - type: "CatCell"
      description: "고양이가 위치한 셀 - 고양이는 직접 이동 불가"
    - type: "HoleCell"
      description: "구멍이 있는 타일 - 슬라이드로 이동 가능"
    - type: "BlockerCell"
      description: "이동 불가 장애물 타일"
    - type: "LockedCell"
      description: "특정 조건 충족 시 해제되는 잠긴 타일"
    - type: "PortalCell"
      description: "한 곳에 빠지면 연결된 다른 곳으로 텔레포트"
  slide_rules:
    - "타일은 수평(좌/우) 또는 수직(상/하)으로만 슬라이드"
    - "타일은 다른 타일이나 벽에 부딪힐 때까지 이동"
    - "고양이 셀은 슬라이드 불가 (고정 위치)"
    - "구멍 타일이 고양이 아래에 위치하면 드롭 발생"
    - "블로커는 이동 불가, 슬라이드를 막는 벽 역할"

# =============================================================================
# Genre-Specific: Color Matching
# =============================================================================
color_matching:
  description: "고양이와 구멍의 색상 매칭 시스템"
  colors:
    - id: "red"
      display_name: "빨강"
      hex: "#FF4444"
    - id: "blue"
      display_name: "파랑"
      hex: "#4488FF"
    - id: "green"
      display_name: "초록"
      hex: "#44CC44"
    - id: "yellow"
      display_name: "노랑"
      hex: "#FFCC00"
    - id: "purple"
      display_name: "보라"
      hex: "#AA44FF"
  matching_rules:
    - "같은 색 고양이 + 같은 색 구멍 = 드롭 성공"
    - "다른 색 구멍에 빠지면 = 실패 (함정 레벨 전용)"
    - "레인보우 구멍 (특수) = 아무 색 고양이 드롭 가능"
  color_progression:
    - range: "1~30"
      colors: 1
      description: "단일 색상 튜토리얼"
    - range: "31~100"
      colors: 2
      description: "2색 기본 퍼즐"
    - range: "101~300"
      colors: 3
      description: "3색 중급 퍼즐"
    - range: "301~600"
      colors: 4
      description: "4색 고급 퍼즐"
    - range: "601+"
      colors: 5
      description: "5색 마스터 퍼즐"

# =============================================================================
# Genre-Specific: Obstacle Types
# =============================================================================
obstacle_types:
  - type: "Blocker"
    unlock_level: 20
    description: "이동 불가 고정 블록. 슬라이드 경로를 차단"
    behavior: "절대 이동 불가, 타일의 이동을 막는 벽 역할"

  - type: "LockedTile"
    unlock_level: 60
    description: "잠긴 타일. 인접한 고양이가 드롭되면 해제"
    behavior: "잠금 상태에서는 슬라이드 불가, 조건 충족 시 일반 타일로 전환"

  - type: "Portal"
    unlock_level: 100
    description: "쌍으로 배치. 한 포탈에 빠진 고양이가 다른 포탈에서 나옴"
    behavior: "구멍 역할을 하되, 드롭된 고양이를 연결된 포탈 위치에 재배치"

  - type: "IceTile"
    unlock_level: 150
    description: "얼음 타일. 위를 지나가면 한 턴 후 사라짐"
    behavior: "첫 슬라이드 시 금 → 두번째 슬라이드 시 파괴"

  - type: "ArrowTile"
    unlock_level: 200
    description: "방향 지정 타일. 해당 방향으로만 슬라이드 가능"
    behavior: "화살표 방향으로만 이동 허용, 다른 방향 슬라이드 불가"

  - type: "Trap"
    unlock_level: 250
    description: "함정 구멍. 잘못된 색 고양이가 빠지면 레벨 실패"
    behavior: "색상 불일치 시 실패 판정, 올바른 색상은 정상 드롭"

  - type: "SwitchTile"
    unlock_level: 350
    description: "스위치 타일. 밟으면 특정 잠긴 타일 또는 블로커 해제"
    behavior: "타일이 위를 지나가면 연결된 타일 상태 변경"

# =============================================================================
# Genre-Specific: Level Progression
# =============================================================================
level_progression:
  total_levels: 900
  chapters:
    - chapter: 1
      name: "고양이 마을"
      levels: "1~50"
      theme: "village"
      new_elements: ["기본 슬라이드", "1~2색 매칭"]
      grid_size: "3x3 ~ 4x4"

    - chapter: 2
      name: "정원 미로"
      levels: "51~120"
      theme: "garden"
      new_elements: ["Blocker 도입", "3색 매칭"]
      grid_size: "4x4"

    - chapter: 3
      name: "마법의 성"
      levels: "121~200"
      theme: "castle"
      new_elements: ["LockedTile", "IceTile"]
      grid_size: "4x4 ~ 5x5"

    - chapter: 4
      name: "우주 탐험"
      levels: "201~300"
      theme: "space"
      new_elements: ["Portal", "ArrowTile"]
      grid_size: "5x5"

    - chapter: 5
      name: "해저 왕국"
      levels: "301~420"
      theme: "underwater"
      new_elements: ["Trap", "4색 매칭"]
      grid_size: "5x5 ~ 6x6"

    - chapter: 6
      name: "구름 나라"
      levels: "421~550"
      theme: "cloud"
      new_elements: ["SwitchTile", "복합 장애물 조합"]
      grid_size: "5x5 ~ 6x6"

    - chapter: 7
      name: "화산 섬"
      levels: "551~700"
      theme: "volcano"
      new_elements: ["5색 매칭", "고난이도 퍼즐"]
      grid_size: "6x6"

    - chapter: 8
      name: "별빛 축제"
      levels: "701~900"
      theme: "starlight"
      new_elements: ["전체 장애물 복합", "마스터 난이도"]
      grid_size: "6x6 ~ 7x7"

  star_rating:
    three_star: "최소 이동 횟수 이내 클리어"
    two_star: "최소 이동 횟수 + 2 이내 클리어"
    one_star: "클리어"

  difficulty_curve:
    - range: "1~10"
      difficulty: "tutorial"
      description: "기본 조작 학습, 1색 1고양이"
    - range: "11~50"
      difficulty: "easy"
      description: "기본 매칭, 1~2색, 작은 그리드"
    - range: "51~200"
      difficulty: "medium"
      description: "장애물 도입, 3색, 중간 그리드"
    - range: "201~500"
      difficulty: "hard"
      description: "복합 장애물, 4색, 큰 그리드"
    - range: "501~900"
      difficulty: "expert"
      description: "전체 요소 복합, 5색, 최대 그리드"

# =============================================================================
# Genre-Specific: Booster System
# =============================================================================
booster_system:
  description: "레벨 클리어를 돕는 부스터 아이템 시스템"
  boosters:
    - id: "hint"
      name: "힌트"
      description: "다음 최적 이동을 화살표로 표시"
      cost_coins: 50
      cost_ad: true
      max_per_level: 3

    - id: "undo"
      name: "되돌리기"
      description: "마지막 이동을 취소"
      cost_coins: 30
      cost_ad: true
      max_per_level: 5

    - id: "reset"
      name: "리셋"
      description: "레벨을 초기 상태로 리셋 (무료)"
      cost_coins: 0
      cost_ad: false
      max_per_level: -1

    - id: "magnet"
      name: "자석"
      description: "선택한 고양이를 가장 가까운 같은 색 구멍으로 즉시 드롭"
      cost_coins: 100
      cost_ad: false
      max_per_level: 1

    - id: "shuffle"
      name: "셔플"
      description: "구멍 타일 위치를 랜덤으로 재배치"
      cost_coins: 80
      cost_ad: false
      max_per_level: 1

  acquisition:
    - "레벨 클리어 보상 (간헐적)"
    - "데일리 보너스"
    - "리워드 광고 시청"
    - "코인으로 구매"
    - "IAP 번들 구매"

# =============================================================================
# UI Screens
# =============================================================================
ui_screens:
  - id: "TitlePage"
    type: "Page"
    description: "로고, 로딩바, 버전 정보. 로딩 후 메인으로 자동 전환"
    elements: ["Logo", "LoadingBar", "VersionText"]

  - id: "MainPage"
    type: "Page"
    description: "메인 메뉴. 레벨 선택 맵, 코인 표시, 설정 버튼"
    elements: ["LevelMap", "CoinDisplay", "SettingsButton", "ShopButton", "DailyBonusButton"]

  - id: "GamePage"
    type: "Page"
    description: "게임플레이 화면. 그리드, 상단 UI, 하단 부스터"
    elements: ["GridBoard", "MoveCounter", "LevelNumber", "StarProgress", "BoosterBar", "PauseButton"]

  - id: "LevelClearPopup"
    type: "Popup"
    description: "레벨 클리어 시 별점, 점수, 보상 표시"
    elements: ["StarDisplay", "ScoreText", "CoinReward", "NextButton", "ShareButton"]

  - id: "LevelFailPopup"
    type: "Popup"
    description: "실패 시 리트라이 옵션 제공"
    elements: ["FailMessage", "RetryButton", "WatchAdButton", "QuitButton"]

  - id: "PausePopup"
    type: "Popup"
    description: "일시정지. 계속하기, 재시작, 나가기"
    elements: ["ResumeButton", "RestartButton", "QuitButton", "SoundToggle", "MusicToggle"]

  - id: "SettingsPopup"
    type: "Popup"
    description: "설정 화면. 사운드, 진동, 알림 설정"
    elements: ["SoundToggle", "MusicToggle", "VibrationToggle", "NotificationToggle", "LanguageSelect"]

  - id: "ShopPopup"
    type: "Popup"
    description: "상점. 코인, 부스터, 광고 제거 구매"
    elements: ["CoinPackList", "BoosterPackList", "RemoveAdsButton", "RestorePurchaseButton"]

  - id: "TutorialOverlay"
    type: "Overlay"
    description: "첫 플레이 시 조작법 안내 오버레이"
    elements: ["HandGesture", "InstructionText", "HighlightMask", "NextButton"]

# =============================================================================
# Audio Design
# =============================================================================
audio:
  bgm:
    - id: "bgm_title"
      usage: "타이틀 화면"
    - id: "bgm_main"
      usage: "메인 메뉴"
    - id: "bgm_gameplay"
      usage: "게임플레이 (챕터별 변주 가능)"
  sfx:
    - id: "sfx_slide"
      usage: "타일 슬라이드 시"
    - id: "sfx_drop"
      usage: "고양이 드롭 성공 시"
    - id: "sfx_match"
      usage: "색상 매칭 성공"
    - id: "sfx_fail"
      usage: "잘못된 구멍에 빠짐"
    - id: "sfx_clear"
      usage: "레벨 클리어"
    - id: "sfx_star"
      usage: "별 획득 효과"
    - id: "sfx_button"
      usage: "버튼 클릭"
    - id: "sfx_booster"
      usage: "부스터 사용"
    - id: "sfx_cat_meow"
      usage: "고양이 드롭 시 울음소리"
    - id: "sfx_portal"
      usage: "포탈 이동 시"
    - id: "sfx_ice_break"
      usage: "얼음 타일 파괴"
    - id: "sfx_unlock"
      usage: "잠긴 타일 해제"
