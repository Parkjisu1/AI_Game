---
# ============================================================
# LAYER 3: AI_기획서 노드 (IdleTDPlayable.yaml)
# Project  : SLG-IdleTD
# Platform : playable
# Created  : 2026-02-22
# ============================================================

metadata:
  nodeId: "IdleTDPlayable"
  version: "1.0.0"
  phase: 0
  role: "Controller"
  platform: "playable"
  output_file: "E:/AI/projects/SLG-IdleTD/output/playable.html"

# ============================================================
# 의존성
# ============================================================

dependencies:
  internal: []
  external:
    - name: "Canvas 2D API"
      note: "브라우저 네이티브, CDN 없음"
    - name: "requestAnimationFrame"
      note: "브라우저 네이티브 렌더 루프"
    - name: "TouchEvent / MouseEvent"
      note: "브라우저 네이티브 입력"

# ============================================================
# 계약 (Contract)
# ============================================================

contract:
  provides:
    - "완전한 Tower Defense 플레이어블 광고 경험 (30초 내)"
    - "touchstart + mousedown 입력 지원"
    - "CTA INSTALL NOW 버튼 (스토어 URL 이동)"
    - "3웨이브 적 웨이브 (tutorial-friendly 진행)"
    - "코인 기반 타워 배치/업그레이드 경제"
    - "자동 공격 + Arrow 투사체 시스템"
    - "Victory / Defeat 분기 결과 화면"

  requires:
    - "에셋 PNG 파일들 (C:/Users/user/Desktop/Compressed/ 에 존재)"
    - "에셋이 Base64 인라인으로 HTML에 임베드될 것"
    - "파일 크기 2MB 이하 유지"
    - "외부 네트워크 요청 없음"

# ============================================================
# 태그 분류
# ============================================================

tags:
  layer: "Game"
  genre: "Playable"
  role: "Controller"
  system: "IdleTD"
  majorFunctions:
    - "StateControl"
    - "FlowControl"
    - "ResponseTrigger"
    - "ValueModification"
  minorFunctions:
    - "Assign"
    - "Calculate"
    - "Find"
    - "Notify"
    - "Spawn"
    - "Despawn"
    - "Iterate"

# ============================================================
# Playable 설정
# ============================================================

playable_config:
  canvas_size: { width: 540, height: 960 }
  tech_stack: "canvas"
  asset_mode: "provided"
  max_file_size: "2MB"
  target_networks:
    - "facebook"
    - "meta"

# ============================================================
# 에셋 임베드 명세
# ============================================================

assets:
  mode: "provided"
  source_path: "C:/Users/user/Desktop/Compressed/"
  embed_method: "base64_inline"
  embed_as: "JS const 딕셔너리 (ASSETS['key'] = new Image(); ASSETS['key'].src = 'data:image/png;base64,...')"
  items:
    - key: "bg"
      file: "Map_2048.png"
      usage: "배경 전체 (540x960 drawImage)"
    - key: "tower"
      file: "TowerA.png"
      usage: "타워 스프라이트 (레벨별 크기: Lv1=40, Lv2=48, Lv3=56)"
    - key: "wall"
      file: "WallA.png"
      usage: "우측 기지 성벽 (x=490, y=490, w=60, h=120)"
    - key: "enemyNormal"
      file: "MOB_Cactus01_red_D.png"
      usage: "일반/빠른 적 (일반 size=36, 빠른 size=28)"
    - key: "enemyBoss"
      file: "MOB_Boss_Cactus_Crown_D.png"
      usage: "보스 적 (size=56)"
    - key: "arrow"
      file: "Arrow.png"
      usage: "투사체 (w=20, h=8, 이동방향으로 rotate)"
    - key: "coin"
      file: "Coin.png"
      usage: "HUD 코인 아이콘 (24x24)"
    - key: "button"
      file: "Button.png"
      usage: "하단 타워 배치 버튼 배경 (120x60)"
    - key: "hitEffect"
      file: "Effect_Star_1.png"
      usage: "투사체 명중 이펙트 (32x32, 0.3s fade-out)"
    - key: "hpBar"
      file: "HPSlider.png"
      usage: "적 HP바 배경 (40x6, 적 위 8px)"

# ============================================================
# 레벨 구성
# ============================================================

levels:
  - id: 1
    name: "Tutorial Wave"
    difficulty: "easy"
    enemies:
      - { type: "normal", count: 5, spawn_interval: 1.5 }
    win_condition: "적 5마리 전멸"
    fail_condition: "기지 HP 0 (base.hp <= 0)"
    tutorial_hint: "TAP TO PLACE TOWER!"
    tutorial_hint_pos: { x: 270, y: 180 }
    finger_target_slot: 1
    guaranteed_win: true
    post_wave_hint: "TAP TOWER TO UPGRADE!"

  - id: 2
    name: "Challenge Wave"
    difficulty: "medium"
    enemies:
      - { type: "normal", count: 5, spawn_interval: 1.2 }
      - { type: "fast",   count: 3, spawn_interval: 0.8, spawn_delay: 5.0 }
    win_condition: "적 8마리 전멸"
    fail_condition: "기지 HP 0"
    tutorial_hint: "TAP TOWER TO UPGRADE!"
    fail_bait: false

  - id: 3
    name: "Boss Wave"
    difficulty: "hard"
    enemies:
      - { type: "normal", count: 3, spawn_interval: 1.0 }
      - { type: "fast",   count: 3, spawn_interval: 0.8, spawn_delay: 3.0 }
      - { type: "boss",   count: 1, spawn_delay: 8.0 }
    win_condition: "보스 포함 전 적 전멸"
    fail_condition: "기지 HP 0"
    fail_bait: true
    boss_entry_text: "BOSS INCOMING!"

# ============================================================
# CTA 설정
# ============================================================

cta_config:
  trigger_conditions:
    - condition: "all_waves_clear"
      delay: 2.0
      state: "Victory"
    - condition: "base_hp <= 0"
      delay: 1.0
      state: "Defeat"
    - condition: "timer >= 30"
      delay: 0.0
      state: "TimeUp"
  overlay:
    bg_color: "rgba(0,0,0,0.85)"
    title: "CAN YOU DEFEND THE BASE?"
    title_color: "#FFD700"
    title_font: "bold 28px Arial"
    subtitle: "Download now and play the full game!"
    subtitle_color: "#FFFFFF"
    subtitle_font: "18px Arial"
    button:
      text: "INSTALL NOW"
      color: "#FF6B00"
      hover_color: "#FF8C00"
      text_color: "#FFFFFF"
      font: "bold 22px Arial"
      rect: { x: 120, y: 620, width: 300, height: 70 }
      border_radius: 12
    button_url: "https://example.com"

# ============================================================
# 게임 플로우 (Logic Steps)
# ============================================================

game_flow:
  - step: 1
    state: "LOADING"
    tag: "DataSync"
    action: >
      HTML 파싱 시작과 동시에 Base64 인라인 에셋을 Image 객체로 변환.
      모든 이미지 onload 완료 카운트 확인 후 TUTORIAL 상태 진입.
    next: 2

  - step: 2
    state: "TUTORIAL"
    tag: "FlowControl"
    action: >
      손가락 GIF/애니메이션 아이콘을 Slot 1 방향에 그린다.
      'TAP TO PLACE TOWER!' 텍스트 렌더.
      입력 감지: Slot 1 HitTest 통과 → 무료 타워 배치 → WAVE_1 진입.
    next: 3

  - step: 3
    state: "WAVE_1"
    tag: "Spawn"
    action: >
      WaveManager.startWave(0) 호출.
      1.5초 간격으로 normal 적 5마리 스폰 (-30, 350).
      타워 자동 공격 루프 시작.
      적 전멸 시 → "TAP TOWER TO UPGRADE!" 힌트 2초 표시 후 WAVE_2.
    next: 4

  - step: 4
    state: "WAVE_2"
    tag: "Spawn"
    action: >
      WaveManager.startWave(1) 호출.
      normal 5마리(1.2s 간격) + fast 3마리(0.8s 간격, 5초 딜레이) 스폰.
      추가 슬롯 배치 + 업그레이드 유도.
      적 전멸 시 → WAVE_3.
    next: 5

  - step: 5
    state: "WAVE_3"
    tag: "Spawn"
    action: >
      WaveManager.startWave(2) 호출.
      normal 3 + fast 3 + boss 1 (8초 딜레이) 스폰.
      보스 등장 시 화면 중앙에 "BOSS INCOMING!" 텍스트 1.5초 표시.
      보스 HP바 강조 (빨간색, 큰 크기).
      전멸 시 → RESULT(Victory). 기지 HP 0 → RESULT(Defeat).
    next: 6

  - step: 6
    state: "RESULT"
    tag: "ResponseTrigger"
    action: >
      Victory: 별 3개 이펙트 (Effect_Star_1.png) + "VICTORY!" 골드 텍스트.
      Defeat: 빨간 오버레이 + "DEFEAT..." 회색 텍스트.
      1.5초 후 자동으로 CTA 상태 진입.
    next: 7

  - step: 7
    state: "CTA"
    tag: "ResponseTrigger"
    action: >
      전체화면 반투명 오버레이 렌더.
      CTA 타이틀 + 서브타이틀 + INSTALL NOW 버튼 표시.
      버튼 탭 → window.open(ctaUrl) 또는 mraid.open(ctaUrl).
    next: null

# ============================================================
# 렌더 루프 명세
# ============================================================

render_loop:
  fps_target: 60
  frame_structure:
    - order: 1
      step: "ctx.clearRect 또는 배경 이미지 drawImage"
    - order: 2
      step: "drawEnemyPath (경로 시각화: 반투명 갈색 선)"
    - order: 3
      step: "drawTowerSlots (빈 슬롯: 점선 원, 배치됨: TowerA.png)"
    - order: 4
      step: "drawTowerRangeIndicator (선택된 타워 사거리 원, 반투명)"
    - order: 5
      step: "drawEnemies (스프라이트 + HP바)"
    - order: 6
      step: "drawProjectiles (Arrow, rotate)"
    - order: 7
      step: "drawHitEffects (Effect_Star, alpha 감소)"
    - order: 8
      step: "drawHUD (코인, Wave 번호, 기지HP 하트, 타이머)"
    - order: 9
      step: "drawTutorialOverlay (손가락, 힌트 텍스트) - 해당 상태에만"
    - order: 10
      step: "drawResultOverlay - 해당 상태에만"
    - order: 11
      step: "drawCTAOverlay - CTA 상태에만"

# ============================================================
# 데이터 구조 명세
# ============================================================

data_structures:
  Tower:
    fields:
      - "slotId: number (1~6)"
      - "x: number"
      - "y: number"
      - "level: number (1~3)"
      - "atk: number (10/18/30)"
      - "range: number (120/140/160)"
      - "attackInterval: number (1.0/0.8/0.6)"
      - "attackTimer: number (누적 경과 시간)"
    upgrade_costs:
      lv1_to_lv2: 80
      lv2_to_lv3: 120

  Enemy:
    fields:
      - "id: number (자동 증가)"
      - "type: string ('normal'|'fast'|'boss')"
      - "x: number"
      - "y: number"
      - "waypointIndex: number"
      - "hp: number"
      - "maxHp: number"
      - "speed: number (50/90/30)"
      - "reward: number (15/20/50)"
      - "sprite: string (에셋 키)"
      - "size: number (렌더 크기)"
      - "alive: boolean"

  Projectile:
    fields:
      - "id: number"
      - "x, y: number (발사 위치)"
      - "targetId: number (추적 적 ID)"
      - "damage: number"
      - "speed: 400 (px/s)"
      - "angle: number (라디안)"
      - "alive: boolean"

  HitEffect:
    fields:
      - "x, y: number"
      - "alpha: number (1.0 → 0.0, 0.3s)"
      - "size: 32"

  GameState:
    fields:
      - "state: string (LOADING|TUTORIAL|WAVE_1|WAVE_2|WAVE_3|RESULT|CTA)"
      - "coins: number (초기 100)"
      - "baseHp: number (초기 3)"
      - "currentWave: number (0~2)"
      - "timer: number (경과 초)"
      - "victoryFlag: boolean"
      - "towerCount: number"
      - "enemiesSpawned: number"
      - "enemiesKilled: number"

  WaveData:
    wave1:
      - { type: "normal", count: 5, interval: 1.5, delay: 0 }
    wave2:
      - { type: "normal", count: 5, interval: 1.2, delay: 0 }
      - { type: "fast",   count: 3, interval: 0.8, delay: 5.0 }
    wave3:
      - { type: "normal", count: 3, interval: 1.0, delay: 0 }
      - { type: "fast",   count: 3, interval: 0.8, delay: 3.0 }
      - { type: "boss",   count: 1, interval: 0,   delay: 8.0 }

  TowerSlots:
    - { id: 1, x: 135, y: 250, occupied: false }
    - { id: 2, x: 405, y: 250, occupied: false }
    - { id: 3, x: 135, y: 450, occupied: false }
    - { id: 4, x: 405, y: 450, occupied: false }
    - { id: 5, x: 135, y: 650, occupied: false }
    - { id: 6, x: 405, y: 650, occupied: false }

  EnemyPath:
    waypoints:
      - { x: -30,  y: 350 }
      - { x: 135,  y: 350 }
      - { x: 405,  y: 350 }
      - { x: 405,  y: 550 }
      - { x: 135,  y: 550 }
      - { x: 570,  y: 550 }

# ============================================================
# 로직 상세
# ============================================================

logic_details:
  tower_attack:
    description: "매 프레임 각 타워의 attackTimer += deltaTime. 만료 시 공격 실행."
    steps:
      - "towers.forEach(tower => { tower.attackTimer += dt; })"
      - "if (tower.attackTimer >= tower.attackInterval) {"
      - "  const target = findNearestEnemy(tower.x, tower.y, tower.range);"
      - "  if (target) { spawnProjectile(tower, target); tower.attackTimer = 0; }"
      - "}"

  enemy_movement:
    description: "웨이포인트 배열을 순서대로 추종. 목표 웨이포인트에 도달하면 다음 인덱스."
    steps:
      - "const wp = waypoints[enemy.waypointIndex];"
      - "const dx = wp.x - enemy.x; const dy = wp.y - enemy.y;"
      - "const dist = Math.sqrt(dx*dx + dy*dy);"
      - "if (dist < enemy.speed * dt) {"
      - "  enemy.x = wp.x; enemy.y = wp.y;"
      - "  enemy.waypointIndex++;"
      - "  if (enemy.waypointIndex >= waypoints.length) { /* 기지 도달 */ }"
      - "} else {"
      - "  enemy.x += (dx/dist) * enemy.speed * dt;"
      - "  enemy.y += (dy/dist) * enemy.speed * dt;"
      - "}"

  projectile_movement:
    description: "Arrow는 스폰 시 targetId를 기억. 매 프레임 적 현재 위치로 추적."
    steps:
      - "const target = enemies.find(e => e.id === proj.targetId && e.alive);"
      - "if (!target) { proj.alive = false; return; }"
      - "const dx = target.x - proj.x; const dy = target.y - proj.y;"
      - "const dist = Math.sqrt(dx*dx + dy*dy);"
      - "proj.angle = Math.atan2(dy, dx);"
      - "if (dist < proj.speed * dt) {"
      - "  /* 명중 */ target.hp -= proj.damage;"
      - "  spawnHitEffect(target.x, target.y);"
      - "  proj.alive = false;"
      - "  if (target.hp <= 0) { killEnemy(target); }"
      - "} else {"
      - "  proj.x += (dx/dist) * proj.speed * dt;"
      - "  proj.y += (dy/dist) * proj.speed * dt;"
      - "}"

  input_handling:
    priority_order:
      - 1: "CTA 버튼 HitTest (CTA 상태)"
      - 2: "Tutorial 슬롯 HitTest (TUTORIAL 상태)"
      - 3: "기 배치된 타워 HitTest (업그레이드 시도)"
      - 4: "빈 슬롯 HitTest (새 타워 배치)"
    hit_test: "Math.sqrt((tx-cx)^2 + (ty-cy)^2) < radius"
    slot_radius: 35

  economy:
    place_tower:
      - "if (coins >= 50 && slot.occupied === false)"
      - "  coins -= 50"
      - "  towers.push(new Tower(slot))"
      - "  slot.occupied = true"
    upgrade_tower:
      - "const cost = tower.level === 1 ? 80 : 120"
      - "if (coins >= cost && tower.level < 3)"
      - "  coins -= cost"
      - "  tower.level++; tower.atk = ...; tower.range = ...; tower.attackInterval = ..."
    earn_coin:
      - "coins += enemy.reward"
      - "/* 코인 획득 파티클 효과 (선택적) */"

  wave_management:
    description: "각 웨이브는 스폰 그룹 배열. 그룹별 딜레이와 인터벌로 스폰."
    steps:
      - "waveTimer += dt"
      - "for each spawnGroup in currentWave.groups:"
      - "  if (waveTimer >= group.delay && group.spawned < group.count):"
      - "    if (waveTimer - group.lastSpawnTime >= group.interval):"
      - "      spawnEnemy(group.type)"
      - "      group.spawned++"
      - "      group.lastSpawnTime = waveTimer"
      - "if (enemies.every(e => !e.alive) && allGroupsComplete):"
      - "  onWaveComplete()"

