# ============================================================
# 참조 패턴 (DB Reference)
# ============================================================

referencePatterns:
  - source: "playable/generic/Controller"
    pattern: "requestAnimationFrame 기반 게임 루프 패턴"
    note: "deltaTime 계산: (timestamp - lastTime) / 1000"

  - source: "playable/generic/InputHandler"
    pattern: "touchstart/mousedown 통합 HitTest 패턴"
    note: "canvas.getBoundingClientRect()로 좌표 변환"

  - source: "playable/generic/CTAManager"
    pattern: "MRAID + window.open 폴백 CTA 패턴"
    note: "typeof mraid !== 'undefined' ? mraid.open(url) : window.open(url)"

  - source: "playable/tower_defense/EnemySystem"
    pattern: "웨이포인트 추종 이동 패턴"
    note: "waypointIndex 기반 순차 목표 추종"

# ============================================================
# 코드 힌트
# ============================================================

codeHints:
  patterns:
    - "모든 에셋은 HTML 상단에 const ASSETS = {} 딕셔너리로 선언"
    - "게임 루프: requestAnimationFrame(gameLoop); function gameLoop(ts) { dt = (ts-last)/1000; last=ts; update(dt); render(); requestAnimationFrame(gameLoop); }"
    - "입력 좌표 정규화: const rect = canvas.getBoundingClientRect(); x = (e.clientX - rect.left) * (540/rect.width)"
    - "Arrow rotate: ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.angle); ctx.drawImage(img, -w/2, -h/2, w, h); ctx.restore()"
    - "HP바: ctx.fillStyle='#333'; ctx.fillRect(e.x-20, e.y-28, 40, 6); ctx.fillStyle='#00FF00'; ctx.fillRect(e.x-20, e.y-28, 40*(e.hp/e.maxHp), 6)"
    - "CTA URL: 반드시 하드코딩된 const CTA_URL = 'https://example.com' 상단 선언"

  avoidPatterns:
    - "fetch(), XMLHttpRequest, <script src='http...'> 등 외부 요청 절대 금지"
    - "document.getElementById 대신 canvas context 직접 사용"
    - "setInterval 사용 금지 (requestAnimationFrame 사용)"
