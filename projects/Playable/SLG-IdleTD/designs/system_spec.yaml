---
# ============================================================
# LAYER 2: 시스템 명세서 (system_spec.yaml)
# Project  : SLG-IdleTD
# Platform : playable (HTML5 단일 파일)
# Created  : 2026-02-22
# ============================================================
# NOTE: Playable은 Unity와 달리 단일 시스템(노드 1개)으로 구성됩니다.
#       내부 컴포넌트로 책임을 분리하지만, 최종 출력은 playable.html 1개입니다.
# ============================================================

system_list:
  Core: []
  Domain: []
  Game:
    - "IdleTDPlayable"

systems:
  - nodeId: "IdleTDPlayable"
    layer: "Game"
    genre: "Playable"
    role: "Controller"
    purpose: >
      SLG-IdleTD 플레이어블 광고의 전체 게임 로직 제어.
      타워 배치/업그레이드, 적 웨이브 관리, 투사체 물리, 코인 경제,
      CTA 트리거를 단일 HTML Canvas 파일 안에서 통합 운영한다.

    responsibilities:
      - "Canvas 렌더링 루프 (requestAnimationFrame)"
      - "에셋 Base64 인라인 로드 및 Image 객체 캐싱"
      - "타워 슬롯 탭 감지 및 타워 배치/업그레이드 처리"
      - "적 웨이브 스폰 스케줄링 (3웨이브)"
      - "적 웨이포인트 추종 이동 (경로 행진)"
      - "타워 자동 조준 및 Arrow 투사체 발사"
      - "투사체-적 충돌 감지 및 데미지 처리"
      - "코인 획득/소모 및 HUD 업데이트"
      - "기지 HP 관리 (적 누수 시 감소)"
      - "게임 상태 전환 (tutorial → wave1 → wave2 → wave3 → result → cta)"
      - "CTA 오버레이 표시 및 URL 리다이렉트"
      - "30초 타이머 강제 CTA 트리거"

    states:
      - name: "LOADING"
        description: "에셋 Image 로드 대기 (async)"
      - name: "TUTORIAL"
        description: "첫 탭 전 손가락 힌트 + 텍스트 표시"
      - name: "WAVE_1"
        description: "1웨이브 진행 중"
      - name: "WAVE_2"
        description: "2웨이브 진행 중"
      - name: "WAVE_3"
        description: "3웨이브 (보스) 진행 중"
      - name: "RESULT"
        description: "Victory 또는 Defeat 결과 화면"
      - name: "CTA"
        description: "CTA 오버레이 전체화면"

    behaviors:
      - trigger: "에셋 로드 완료"
        action: "gameState = TUTORIAL, 손가락 힌트 렌더"
        result: "사용자 첫 탭 대기"

      - trigger: "슬롯 탭 (코인 >= 50, 슬롯 비어있음)"
        action: "Tower 객체 생성, coins -= 50, slot.occupied = true"
        result: "타워 배치 완료, 자동 공격 루프 시작"

      - trigger: "슬롯 탭 (TUTORIAL 상태, 첫 번째 슬롯)"
        action: "무료 배치 (coins 소모 없음), gameState = WAVE_1"
        result: "튜토리얼 종료, Wave 1 스폰 시작"

      - trigger: "배치된 타워 탭 (코인 >= 업그레이드 비용)"
        action: "tower.level++, coins -= upgradeCost, stats 갱신"
        result: "타워 레벨업 시각 피드백 (스케일 애니메이션)"

      - trigger: "타워 공격 타이머 만료 (attackInterval)"
        action: "사거리 내 가장 가까운 적 탐색, Arrow 투사체 생성"
        result: "Arrow가 적을 향해 이동 시작"

      - trigger: "Arrow-적 충돌"
        action: "enemy.hp -= tower.atk, Arrow 제거, Effect_Star 재생"
        result: "HP가 0 이하면 적 제거 + 코인 획득"

      - trigger: "적 기지 도달 (waypoint 끝 통과)"
        action: "base.hp--, 적 제거"
        result: "base.hp == 0 → gameState = RESULT(Defeat)"

      - trigger: "웨이브 내 적 전멸"
        action: "웨이브 카운터 증가, 다음 웨이브 스폰 또는 Victory"
        result: "wave3 클리어 → gameState = RESULT(Victory)"

      - trigger: "타이머 >= 30s"
        action: "gameState = CTA 즉시 전환"
        result: "CTA 오버레이 표시"

      - trigger: "RESULT 화면 진입"
        action: "1~2초 대기 후 gameState = CTA"
        result: "CTA 오버레이 표시"

      - trigger: "CTA 버튼 탭"
        action: "window.open(ctaUrl, '_blank') 또는 mraid.open(ctaUrl)"
        result: "앱스토어/구글플레이로 이동"

    components:
      - name: "AssetLoader"
        description: >
          C:/Users/user/Desktop/Compressed/ 의 PNG 파일들을 Base64로 인라인 임베드.
          Image 객체를 캐시 딕셔너리에 저장하여 렌더링 시 즉시 참조.
        assets:
          - "Map_2048.png → bg"
          - "TowerA.png → tower"
          - "WallA.png → wall"
          - "MOB_Cactus01_red_D.png → enemyNormal"
          - "MOB_Boss_Cactus_Crown_D.png → enemyBoss"
          - "Arrow.png → arrow"
          - "Coin.png → coin"
          - "Button.png → button"
          - "Effect_Star_1.png → hitEffect"
          - "HPSlider.png → hpBar"

      - name: "Renderer"
        description: >
          매 프레임 Canvas 2D Context로 씬을 그린다.
          레이어 순서: 배경 → 경로 → 슬롯 → 타워 → 적 → HP바 → 투사체 → 이펙트 → HUD → 오버레이.
        render_layers:
          - 0: "background (Map_2048.png)"
          - 1: "enemy_path_line (점선 또는 흙길 효과)"
          - 2: "tower_slots (빈 슬롯: 원형 점선, 배치됨: TowerA.png)"
          - 3: "enemies (스프라이트 + HP바)"
          - 4: "projectiles (Arrow.png, 이동 방향으로 rotate)"
          - 5: "hit_effects (Effect_Star_1.png, 0.3s fade)"
          - 6: "hud (코인, Wave, 기지HP, 타이머)"
          - 7: "tutorial_overlay (손가락 힌트, 텍스트)"
          - 8: "result_overlay (Victory/Defeat)"
          - 9: "cta_overlay (전체화면, INSTALL NOW 버튼)"

      - name: "InputHandler"
        description: >
          모바일 touchstart + 데스크톱 mousedown 이벤트를 통합 처리.
          HitTest 우선순위: CTA > Tutorial > Tower(upgrade) > Slot(place).
        events:
          - "touchstart (preventDefault로 스크롤 방지)"
          - "mousedown (데스크톱 테스트용)"

      - name: "TowerSystem"
        description: >
          Tower 객체 배열 관리. 슬롯별 배치 상태, 레벨, 공격 타이머 보관.
          매 프레임 attack 루프 실행: 사거리 내 적 탐색 → Arrow 생성.
        tower_object:
          fields:
            - "slotId: number"
            - "x, y: number"
            - "level: 1|2|3"
            - "atk: number"
            - "range: number"
            - "attackInterval: number"
            - "attackTimer: number"

      - name: "EnemySystem"
        description: >
          Enemy 객체 배열 관리. 웨이브 스케줄에 따라 스폰.
          매 프레임 웨이포인트 추종 이동. 기지 도달 시 leakCount 증가.
        enemy_object:
          fields:
            - "id: number"
            - "type: 'normal'|'fast'|'boss'"
            - "x, y: number"
            - "waypointIndex: number"
            - "hp, maxHp: number"
            - "speed: number"
            - "reward: number"

      - name: "ProjectileSystem"
        description: >
          Arrow 투사체 배열 관리. 발사 시 targetEnemy 참조 저장.
          매 프레임 목표 방향으로 이동, 충돌 시 데미지 처리.
        projectile_object:
          fields:
            - "x, y: number"
            - "targetEnemyId: number"
            - "speed: 400"
            - "damage: number"
            - "angle: number (렌더 rotation)"

      - name: "WaveManager"
        description: >
          3웨이브 구성표 보관. 현재 웨이브 인덱스, 스폰 타이머, 남은 적 카운트 관리.
          웨이브 내 적 전멸 감지 → 다음 웨이브 또는 Victory 트리거.
        wave_schedule:
          wave1:
            enemies: [{ type: "normal", count: 5, interval: 1.5 }]
          wave2:
            enemies:
              - { type: "normal", count: 5, interval: 1.2 }
              - { type: "fast",   count: 3, interval: 0.8, delay: 5.0 }
          wave3:
            enemies:
              - { type: "normal", count: 3, interval: 1.0 }
              - { type: "fast",   count: 3, interval: 0.8, delay: 3.0 }
              - { type: "boss",   count: 1, delay: 8.0 }

      - name: "EconomySystem"
        description: >
          코인 잔액 관리. 소모/획득 처리 및 HUD 갱신 알림.
          타워 배치/업그레이드 시 잔액 부족 여부 검증.

      - name: "CTAManager"
        description: >
          CTA 오버레이 표시 조건 감시. 트리거 발생 시 CTA 상태 전환.
          INSTALL NOW 버튼 탭 → 스토어 URL 이동.
        cta_config:
          title: "CAN YOU DEFEND THE BASE?"
          subtitle: "Download now and play the full game!"
          button_text: "INSTALL NOW"
          button_url: "https://example.com"
          triggers:
            - "all_waves_clear"
            - "base_hp <= 0"
            - "timer >= 30"

    relations:
      uses: []
      usedBy: []
      publishes: []
      subscribes: []

    tech_constraints:
      - "외부 HTTP 요청 금지 (에셋 전부 Base64 인라인)"
      - "requestAnimationFrame 기반 렌더 루프"
      - "단일 HTML 파일 (CSS + JS 인라인)"
      - "파일 크기 < 2MB (Facebook 기준)"
      - "touchstart + mousedown 이중 입력 지원"
      - "MRAID 2.0 CTA 처리 (mraid.open 폴백 포함)"
