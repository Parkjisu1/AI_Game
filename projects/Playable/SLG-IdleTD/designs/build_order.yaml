---
# ============================================================
# 빌드 오더 (build_order.yaml)
# Project  : SLG-IdleTD
# Platform : playable
# Created  : 2026-02-22
# ============================================================
# NOTE: Playable 플랫폼은 Phase 분할 없음.
#       단일 노드(IdleTDPlayable)를 playable-coder가 전담 구현.
#       결과물: E:\AI\projects\SLG-IdleTD\output\playable.html
# ============================================================

platform: playable
project: SLG-IdleTD

phases:
  - phase: 0
    label: "Playable 단일 빌드"
    description: "모든 게임 로직을 단일 HTML 파일로 구현"
    nodes:
      - nodeId: "IdleTDPlayable"
        assignee: "playable-coder"
        priority: "high"
        input:
          design_yaml: "E:/AI/projects/SLG-IdleTD/designs/nodes/IdleTDPlayable.yaml"
          assets_path: "C:/Users/user/Desktop/Compressed/"
        output:
          file: "E:/AI/projects/SLG-IdleTD/output/playable.html"
          max_size: "2MB"
        estimated_time: "단일 파일 생성"
        dependencies: []

validation:
  assignee: "validator"
  checks:
    - step: 1
      label: "Isolation"
      rule: "외부 HTTP 요청(fetch, XMLHttpRequest, <script src>, <img src=http>) 없음"
    - step: 2
      label: "Interaction"
      rule: "touchstart 이벤트 핸들러 존재 AND mousedown 이벤트 핸들러 존재"
    - step: 3
      label: "CTA"
      rule: "INSTALL NOW 버튼 존재 AND CTA URL 설정됨 AND 트리거 조건 구현됨"
    - step: 4
      label: "Size"
      rule: "파일 크기 < 2097152 bytes (2MB)"

delivery:
  output_path: "E:/AI/projects/SLG-IdleTD/output/playable.html"
  target_networks:
    - name: "Facebook/Meta"
      max_size: "2MB"
      note: "가장 엄격한 기준 적용"
  asset_source: "C:/Users/user/Desktop/Compressed/"
  embed_method: "Base64 인라인 (JS 변수로 선언)"
