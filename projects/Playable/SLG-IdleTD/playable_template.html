<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Idle Tower Defense - Playable Ad</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#0a0e1a;overflow:hidden;display:flex;align-items:center;justify-content:center;}
canvas{display:block;touch-action:none;cursor:pointer;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(function(){
"use strict";

// ─── CTA URL ───
var CTA_URL = 'https://example.com';

// ─── Asset Definitions (Base64 placeholders replaced at build) ───
var assetDefs = {
  bg:          'data:image/png;base64,__B64_BG__',
  tower:       'data:image/png;base64,__B64_TOWER__',
  wall:        'data:image/png;base64,__B64_WALL__',
  enemyNormal: 'data:image/png;base64,__B64_NORMAL__',
  enemyBoss:   'data:image/png;base64,__B64_BOSS__',
  arrow:       'data:image/png;base64,__B64_ARROW__',
  coin:        'data:image/png;base64,__B64_COIN__',
  button:      'data:image/png;base64,__B64_BUTTON__',
  hitEffect:   'data:image/png;base64,__B64_HIT__',
  hpBar:       'data:image/png;base64,__B64_HP__',
  shadow:      'data:image/png;base64,__B64_SHADOW__',
  turretIcon:  'data:image/png;base64,__B64_TURRET__'
};

var ASSETS = {};
var assetsLoaded = 0;
var assetKeys = Object.keys(assetDefs);
var assetCount = assetKeys.length;

function loadAssets(cb) {
  assetKeys.forEach(function(key) {
    var img = new Image();
    img.onload = function() { assetsLoaded++; if (assetsLoaded >= assetCount) cb(); };
    img.onerror = function() { assetsLoaded++; if (assetsLoaded >= assetCount) cb(); };
    img.src = assetDefs[key];
    ASSETS[key] = img;
  });
}

// ─── Canvas Setup ───
var canvas = document.getElementById('c');
var ctx = canvas.getContext('2d');
var DW = 540, DH = 960;
canvas.width = DW;
canvas.height = DH;

function resizeCanvas() {
  var s = Math.min(window.innerWidth / DW, window.innerHeight / DH);
  canvas.style.width  = (DW * s) + 'px';
  canvas.style.height = (DH * s) + 'px';
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// ─── Constants ───
var WAYPOINTS = [
  {x:-30, y:350}, {x:135, y:350}, {x:405, y:350},
  {x:405, y:550}, {x:135, y:550}, {x:570, y:550}
];

var SLOT_DEFS = [
  {id:1, x:135, y:250}, {id:2, x:405, y:250},
  {id:3, x:135, y:450}, {id:4, x:405, y:450},
  {id:5, x:135, y:650}, {id:6, x:405, y:650}
];
var SLOT_RADIUS = 35;

var TOWER_STATS = [
  null,
  {atk:10, range:120, interval:1.0, size:40},
  {atk:18, range:140, interval:0.8, size:48},
  {atk:30, range:160, interval:0.6, size:56}
];

var ENEMY_DEF = {
  normal: {hp:40,  maxHp:40,  speed:50,  reward:15, size:36},
  fast:   {hp:25,  maxHp:25,  speed:90,  reward:20, size:28},
  boss:   {hp:300, maxHp:300, speed:30,  reward:50, size:56}
};

var WAVES = [
  [
    {type:'normal', count:5, interval:1.5, delay:0}
  ],
  [
    {type:'normal', count:5, interval:1.2, delay:0},
    {type:'fast',   count:3, interval:0.8, delay:5.0}
  ],
  [
    {type:'normal', count:3, interval:1.0, delay:0},
    {type:'fast',   count:3, interval:0.8, delay:3.0},
    {type:'boss',   count:1, interval:0,   delay:8.0}
  ]
];

// ─── Game State ───
var gameState = 'LOADING';
var coins = 100;
var baseHp = 3;
var currentWave = 0;
var gameTimer = 0;
var victoryFlag = false;
var enemyIdCounter = 0;
var projIdCounter = 0;

var enemies = [];
var projectiles = [];
var hitEffects = [];
var towers = [];
var slots = [];

// Wave spawn state
var waveGroups = [];
var waveTimer = 0;
var waveActive = false;
var waveComplete = false;
var bossRef = null;
var bossAlerted = false;
var bossAlertTimer = 0;

// UI helpers
var fingerAnim = 0;
var ctaPulse = 0;
var ctaBtnHover = false;
var ctaTriggered = false;
var insufficientFlash = 0;
var postWaveHint = '';
var postWaveHintTimer = 0;
var resultTimer = 0;
var lastTime = 0;

// coin popup effects
var coinPopups = [];

// ─── Helpers ───
function dist2(ax, ay, bx, by) {
  var dx = ax - bx, dy = ay - by;
  return Math.sqrt(dx*dx + dy*dy);
}

function roundRect(c, x, y, w, h, r) {
  c.beginPath();
  c.moveTo(x+r, y);
  c.lineTo(x+w-r, y);
  c.quadraticCurveTo(x+w, y, x+w, y+r);
  c.lineTo(x+w, y+h-r);
  c.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  c.lineTo(x+r, y+h);
  c.quadraticCurveTo(x, y+h, x, y+h-r);
  c.lineTo(x, y+r);
  c.quadraticCurveTo(x, y, x+r, y);
  c.closePath();
}

// ─── Input ───
function getPos(e) {
  var rect = canvas.getBoundingClientRect();
  var cx = e.touches ? e.touches[0].clientX : e.clientX;
  var cy = e.touches ? e.touches[0].clientY : e.clientY;
  return {
    x: (cx - rect.left) * (DW / rect.width),
    y: (cy - rect.top)  * (DH / rect.height)
  };
}

function onInput(px, py) {
  if (gameState === 'CTA') {
    var bx=120, by=620, bw=300, bh=70;
    if (px>=bx && px<=bx+bw && py>=by && py<=by+bh) openCTA();
    return;
  }
  if (gameState === 'RESULT') return;

  if (gameState === 'TUTORIAL') {
    var s0 = slots[0];
    if (dist2(px, py, s0.x, s0.y) < SLOT_RADIUS) {
      placeTowerAt(s0, true);
      gameState = 'WAVE_1';
      setTimeout(function(){ startWave(0); }, 400);
    }
    return;
  }

  if (gameState === 'WAVE_1' || gameState === 'WAVE_2' || gameState === 'WAVE_3') {
    // Check placed towers (upgrade)
    for (var ti=0; ti<towers.length; ti++) {
      var t = towers[ti];
      if (dist2(px, py, t.x, t.y) < SLOT_RADIUS) {
        upgradeTower(t);
        return;
      }
    }
    // Check empty slots (place)
    for (var si=0; si<slots.length; si++) {
      var sl = slots[si];
      if (!sl.occupied && dist2(px, py, sl.x, sl.y) < SLOT_RADIUS) {
        if (coins >= 50) {
          placeTowerAt(sl, false);
        } else {
          insufficientFlash = 1.0;
        }
        return;
      }
    }
  }
}

canvas.addEventListener('mousedown', function(e){ var p=getPos(e); onInput(p.x, p.y); });
canvas.addEventListener('touchstart', function(e){ e.preventDefault(); var p=getPos(e); onInput(p.x, p.y); }, {passive:false});
canvas.addEventListener('mousemove', function(e){
  if (gameState === 'CTA') {
    var p=getPos(e), bx=120, by=620, bw=300, bh=70;
    ctaBtnHover = (p.x>=bx && p.x<=bx+bw && p.y>=by && p.y<=by+bh);
  }
});

// ─── Tower ───
function placeTowerAt(slot, free) {
  if (!free) coins -= 50;
  slot.occupied = true;
  var st = TOWER_STATS[1];
  towers.push({
    slotId: slot.id, x: slot.x, y: slot.y,
    level: 1, atk: st.atk, range: st.range,
    attackInterval: st.interval, attackTimer: 0
  });
}

function upgradeTower(t) {
  if (t.level >= 3) {
    // max level flash
    insufficientFlash = 0.5;
    return;
  }
  var cost = t.level === 1 ? 80 : 120;
  if (coins < cost) { insufficientFlash = 1.0; return; }
  coins -= cost;
  t.level++;
  var st = TOWER_STATS[t.level];
  t.atk = st.atk; t.range = st.range; t.attackInterval = st.interval;
  // upgrade sparkle
  hitEffects.push({x:t.x, y:t.y, alpha:1.0, size:40, timer:0.5});
}

// ─── Wave ───
function startWave(idx) {
  currentWave = idx;
  waveTimer = 0;
  waveActive = true;
  waveComplete = false;
  bossRef = null;
  bossAlerted = false;
  bossAlertTimer = 0;
  enemies = [];
  projectiles = [];
  waveGroups = WAVES[idx].map(function(g) {
    return {type:g.type, count:g.count, interval:g.interval,
            delay:g.delay, spawned:0, lastSpawnTime:-9999};
  });
}

function spawnEnemy(type) {
  var def = ENEMY_DEF[type];
  var e = {
    id: enemyIdCounter++,
    type: type,
    x: WAYPOINTS[0].x, y: WAYPOINTS[0].y,
    waypointIndex: 1,
    hp: def.hp, maxHp: def.maxHp,
    speed: def.speed, reward: def.reward,
    size: def.size, alive: true
  };
  enemies.push(e);
  if (type === 'boss') { bossRef = e; }
}

function updateWave(dt) {
  if (!waveActive) return;
  waveTimer += dt;

  var allDone = true;
  for (var i=0; i<waveGroups.length; i++) {
    var g = waveGroups[i];
    if (g.spawned < g.count) {
      allDone = false;
      if (waveTimer >= g.delay) {
        if (waveTimer - g.lastSpawnTime >= g.interval) {
          spawnEnemy(g.type);
          g.spawned++;
          g.lastSpawnTime = waveTimer;
        }
      }
    }
  }

  var alive = enemies.filter(function(e){ return e.alive; });
  if (allDone && alive.length === 0 && !waveComplete) {
    waveComplete = true;
    waveActive = false;
    onWaveComplete();
  }
}

function onWaveComplete() {
  if (currentWave === 0) {
    postWaveHint = 'TAP TOWER TO UPGRADE!';
    postWaveHintTimer = 2.5;
    gameState = 'WAVE_2';
    setTimeout(function(){ startWave(1); }, 2600);
  } else if (currentWave === 1) {
    gameState = 'WAVE_3';
    setTimeout(function(){ startWave(2); }, 800);
  } else {
    victoryFlag = true;
    gameState = 'RESULT';
    resultTimer = 2.0;
  }
}

// ─── Enemy Update ───
function updateEnemies(dt) {
  for (var i=0; i<enemies.length; i++) {
    var e = enemies[i];
    if (!e.alive) continue;
    if (e.waypointIndex >= WAYPOINTS.length) {
      e.alive = false;
      baseHp = Math.max(0, baseHp - 1);
      if (baseHp <= 0 && gameState !== 'RESULT' && gameState !== 'CTA') {
        victoryFlag = false;
        gameState = 'RESULT';
        resultTimer = 1.0;
      }
      continue;
    }
    var wp = WAYPOINTS[e.waypointIndex];
    var dx = wp.x - e.x, dy = wp.y - e.y;
    var d = Math.sqrt(dx*dx + dy*dy);
    var step = e.speed * dt;
    if (d <= step) {
      e.x = wp.x; e.y = wp.y;
      e.waypointIndex++;
    } else {
      e.x += (dx/d)*step;
      e.y += (dy/d)*step;
    }
  }
}

// ─── Tower Attack ───
function updateTowers(dt) {
  for (var i=0; i<towers.length; i++) {
    var t = towers[i];
    t.attackTimer += dt;
    if (t.attackTimer >= t.attackInterval) {
      var target = findNearest(t.x, t.y, t.range);
      if (target) {
        t.attackTimer = 0;
        var dx2 = target.x - t.x, dy2 = target.y - t.y;
        projectiles.push({
          id: projIdCounter++,
          x: t.x, y: t.y,
          targetId: target.id,
          damage: t.atk,
          speed: 400,
          angle: Math.atan2(dy2, dx2),
          alive: true
        });
      }
    }
  }
}

function findNearest(tx, ty, range) {
  var nearest = null, minD = Infinity;
  for (var i=0; i<enemies.length; i++) {
    var e = enemies[i];
    if (!e.alive) continue;
    var d = dist2(tx, ty, e.x, e.y);
    if (d <= range && d < minD) { minD = d; nearest = e; }
  }
  return nearest;
}

// ─── Projectile Update ───
function updateProjectiles(dt) {
  for (var i=0; i<projectiles.length; i++) {
    var p = projectiles[i];
    if (!p.alive) continue;
    var target = null;
    for (var j=0; j<enemies.length; j++) {
      if (enemies[j].id === p.targetId && enemies[j].alive) { target = enemies[j]; break; }
    }
    if (!target) { p.alive = false; continue; }
    var dx = target.x - p.x, dy = target.y - p.y;
    var d = Math.sqrt(dx*dx + dy*dy);
    p.angle = Math.atan2(dy, dx);
    var step = p.speed * dt;
    if (d <= step) {
      target.hp -= p.damage;
      hitEffects.push({x:target.x, y:target.y, alpha:1.0, size:32, timer:0.3});
      p.alive = false;
      if (target.hp <= 0) {
        target.alive = false;
        coins += target.reward;
        coinPopups.push({x:target.x, y:target.y-30, val:'+'+target.reward, alpha:1.0, vy:-40, timer:0.8});
        if (target === bossRef) bossRef = null;
      }
    } else {
      p.x += (dx/d)*step;
      p.y += (dy/d)*step;
    }
  }
  projectiles = projectiles.filter(function(p){ return p.alive; });
}

// ─── Hit Effects ───
function updateHitEffects(dt) {
  for (var i=0; i<hitEffects.length; i++) {
    hitEffects[i].timer -= dt;
    hitEffects[i].alpha = Math.max(0, hitEffects[i].timer / 0.3);
  }
  hitEffects = hitEffects.filter(function(h){ return h.timer > 0; });
}

function updateCoinPopups(dt) {
  for (var i=0; i<coinPopups.length; i++) {
    var p = coinPopups[i];
    p.timer -= dt;
    p.y += p.vy * dt;
    p.alpha = Math.max(0, p.timer / 0.8);
  }
  coinPopups = coinPopups.filter(function(p){ return p.timer > 0; });
}

// ─── Boss alert ───
function checkBossAlert() {
  if (bossRef && !bossAlerted && bossRef.alive) {
    bossAlerted = true;
    bossAlertTimer = 1.8;
  }
}

// ─── CTA ───
function openCTA() {
  if (typeof mraid !== 'undefined') {
    mraid.open(CTA_URL);
  } else {
    window.open(CTA_URL, '_blank');
  }
}

// ─── Update ───
function update(dt) {
  fingerAnim += dt;
  ctaPulse   += dt;

  if (gameState === 'LOADING' || gameState === 'CTA') return;

  if (gameState === 'RESULT') {
    resultTimer -= dt;
    if (resultTimer <= 0 && !ctaTriggered) {
      ctaTriggered = true;
      gameState = 'CTA';
    }
    return;
  }

  gameTimer += dt;
  if (gameTimer >= 30 && !ctaTriggered) {
    ctaTriggered = true;
    gameState = 'CTA';
    return;
  }

  if (insufficientFlash > 0) insufficientFlash -= dt;
  if (postWaveHintTimer > 0) postWaveHintTimer -= dt;
  if (bossAlertTimer > 0)    bossAlertTimer -= dt;

  if (gameState === 'TUTORIAL') return;

  updateWave(dt);
  updateEnemies(dt);
  updateTowers(dt);
  updateProjectiles(dt);
  updateHitEffects(dt);
  updateCoinPopups(dt);
  checkBossAlert();
}

// ─── Render helpers ───
function drawEnemyPath() {
  ctx.save();
  ctx.strokeStyle = 'rgba(139,90,43,0.55)';
  ctx.lineWidth = 22;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.beginPath();
  ctx.moveTo(WAYPOINTS[0].x, WAYPOINTS[0].y);
  for (var i=1; i<WAYPOINTS.length; i++) ctx.lineTo(WAYPOINTS[i].x, WAYPOINTS[i].y);
  ctx.stroke();
  // inner bright stripe
  ctx.strokeStyle = 'rgba(200,150,80,0.25)';
  ctx.lineWidth = 10;
  ctx.beginPath();
  ctx.moveTo(WAYPOINTS[0].x, WAYPOINTS[0].y);
  for (var j=1; j<WAYPOINTS.length; j++) ctx.lineTo(WAYPOINTS[j].x, WAYPOINTS[j].y);
  ctx.stroke();
  ctx.restore();
}

function drawSlots() {
  for (var i=0; i<slots.length; i++) {
    var sl = slots[i];
    var tw = null;
    for (var ti=0; ti<towers.length; ti++) {
      if (towers[ti].slotId === sl.id) { tw = towers[ti]; break; }
    }
    if (tw) {
      // Shadow
      var shImg = ASSETS.shadow;
      if (shImg.complete) {
        ctx.save();
        ctx.globalAlpha = 0.3;
        ctx.drawImage(shImg, sl.x-24, sl.y+14, 48, 14);
        ctx.restore();
      }
      // Tower sprite
      var sz = TOWER_STATS[tw.level].size;
      var tImg = ASSETS.tower;
      if (tImg.complete) {
        ctx.drawImage(tImg, sl.x-sz/2, sl.y-sz/2 - 6, sz, sz);
      } else {
        ctx.fillStyle = '#4488CC';
        ctx.fillRect(sl.x-sz/2, sl.y-sz/2-6, sz, sz);
      }
      // Level badge
      var lvColor = tw.level===3 ? '#FFD700' : tw.level===2 ? '#88DDFF' : '#FFFFFF';
      ctx.save();
      ctx.font = 'bold 13px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.strokeStyle = '#000000';
      ctx.lineWidth = 3;
      ctx.strokeText('Lv'+tw.level, sl.x, sl.y + sz/2 + 4);
      ctx.fillStyle = lvColor;
      ctx.fillText('Lv'+tw.level, sl.x, sl.y + sz/2 + 4);
      ctx.restore();
      // Range ring on hover (always show faintly)
      ctx.save();
      ctx.strokeStyle = 'rgba(255,255,255,0.08)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(sl.x, sl.y, tw.range, 0, Math.PI*2);
      ctx.stroke();
      ctx.restore();
    } else {
      // Empty slot - dashed circle
      ctx.save();
      ctx.strokeStyle = 'rgba(255,255,255,0.45)';
      ctx.lineWidth = 2;
      ctx.setLineDash([6,5]);
      ctx.beginPath();
      ctx.arc(sl.x, sl.y, SLOT_RADIUS, 0, Math.PI*2);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = 'rgba(255,255,255,0.55)';
      ctx.font = 'bold 30px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('+', sl.x, sl.y);
      // Cost hint
      ctx.font = '11px Arial';
      ctx.fillStyle = '#FFD700';
      ctx.fillText('50', sl.x, sl.y + SLOT_RADIUS + 12);
      ctx.restore();
    }
  }
}

function drawEnemies() {
  for (var i=0; i<enemies.length; i++) {
    var e = enemies[i];
    if (!e.alive) continue;
    var r = e.size / 2;

    // Shadow
    var shImg2 = ASSETS.shadow;
    if (shImg2.complete) {
      ctx.save();
      ctx.globalAlpha = 0.2;
      ctx.drawImage(shImg2, e.x-r, e.y+r-4, r*2, r*0.5);
      ctx.restore();
    }

    // Enemy sprite with circular clip
    var sprKey = e.type === 'boss' ? 'enemyBoss' : 'enemyNormal';
    var img = ASSETS[sprKey];
    ctx.save();
    ctx.beginPath();
    ctx.arc(e.x, e.y, r, 0, Math.PI*2);
    ctx.clip();
    if (img && img.complete) {
      ctx.drawImage(img, e.x-r, e.y-r, r*2, r*2);
    } else {
      ctx.fillStyle = e.type==='boss' ? '#FF6600' : e.type==='fast' ? '#FF00CC' : '#CC3333';
      ctx.fill();
    }
    ctx.restore();

    // Boss glow ring
    if (e.type === 'boss') {
      ctx.save();
      ctx.strokeStyle = 'rgba(255,120,0,0.85)';
      ctx.lineWidth = 3;
      ctx.shadowColor = '#FF8800';
      ctx.shadowBlur = 14;
      ctx.beginPath();
      ctx.arc(e.x, e.y, r+3, 0, Math.PI*2);
      ctx.stroke();
      ctx.restore();
    }

    // Fast enemy blue tint ring
    if (e.type === 'fast') {
      ctx.save();
      ctx.strokeStyle = 'rgba(0,200,255,0.6)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(e.x, e.y, r+2, 0, Math.PI*2);
      ctx.stroke();
      ctx.restore();
    }

    // HP bar
    var barW = e.type==='boss' ? 64 : 40;
    var barH = 6;
    var barX = e.x - barW/2;
    var barY = e.y - r - 13;
    var hpRatio = Math.max(0, e.hp / e.maxHp);
    var hpBgImg = ASSETS.hpBar;
    ctx.save();
    if (hpBgImg && hpBgImg.complete) {
      ctx.drawImage(hpBgImg, barX, barY, barW, barH);
    } else {
      ctx.fillStyle = '#333333';
      ctx.fillRect(barX, barY, barW, barH);
    }
    var hpColor = hpRatio > 0.5 ? '#44DD44' : hpRatio > 0.25 ? '#FFBB00' : '#FF3333';
    ctx.fillStyle = hpColor;
    ctx.fillRect(barX, barY, barW*hpRatio, barH);
    ctx.restore();
  }
}

function drawProjectiles() {
  for (var i=0; i<projectiles.length; i++) {
    var p = projectiles[i];
    if (!p.alive) continue;
    var aImg = ASSETS.arrow;
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.angle);
    if (aImg && aImg.complete) {
      ctx.drawImage(aImg, -10, -4, 20, 8);
    } else {
      ctx.fillStyle = '#FFEE44';
      ctx.fillRect(-10, -3, 20, 6);
    }
    ctx.restore();
  }
}

function drawHitEffects() {
  for (var i=0; i<hitEffects.length; i++) {
    var h = hitEffects[i];
    var hImg = ASSETS.hitEffect;
    ctx.save();
    ctx.globalAlpha = h.alpha;
    if (hImg && hImg.complete) {
      ctx.drawImage(hImg, h.x-h.size/2, h.y-h.size/2, h.size, h.size);
    } else {
      ctx.fillStyle = '#FFFF00';
      ctx.beginPath();
      ctx.arc(h.x, h.y, 10*h.alpha, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
  }
}

function drawCoinPopups() {
  for (var i=0; i<coinPopups.length; i++) {
    var cp = coinPopups[i];
    ctx.save();
    ctx.globalAlpha = cp.alpha;
    ctx.font = 'bold 16px Arial';
    ctx.fillStyle = '#FFD700';
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 2;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.strokeText(cp.val, cp.x, cp.y);
    ctx.fillText(cp.val, cp.x, cp.y);
    ctx.restore();
  }
}

function drawHUD() {
  // Bottom bar
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.78)';
  ctx.fillRect(0, 820, 540, 140);
  ctx.restore();

  // Coin icon
  var coinImg = ASSETS.coin;
  if (coinImg && coinImg.complete) {
    ctx.drawImage(coinImg, 14, 834, 34, 34);
  } else {
    ctx.save();
    ctx.fillStyle = '#FFD700';
    ctx.beginPath();
    ctx.arc(31, 851, 14, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
  ctx.save();
  ctx.font = 'bold 24px Arial';
  ctx.fillStyle = '#FFD700';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillText(coins, 56, 851);
  ctx.restore();

  // PLACE TOWER button
  var canAfford = coins >= 50;
  var btnX=170, btnY=832, btnW=190, btnH=62;
  ctx.save();
  ctx.globalAlpha = canAfford ? 1.0 : 0.42;
  var bImg = ASSETS.button;
  if (bImg && bImg.complete) {
    ctx.drawImage(bImg, btnX, btnY, btnW, btnH);
  } else {
    ctx.fillStyle = canAfford ? '#2E7D32' : '#555555';
    roundRect(ctx, btnX, btnY, btnW, btnH, 10);
    ctx.fill();
  }
  ctx.fillStyle = '#FFFFFF';
  ctx.font = 'bold 15px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('PLACE TOWER', btnX+btnW/2, btnY+btnH/2-9);
  ctx.font = '13px Arial';
  ctx.fillStyle = '#FFD700';
  ctx.fillText('[Cost: 50]', btnX+btnW/2, btnY+btnH/2+11);
  ctx.globalAlpha = 1.0;
  ctx.restore();

  // Insufficient coins flash
  if (insufficientFlash > 0) {
    ctx.save();
    ctx.globalAlpha = Math.min(1, insufficientFlash);
    ctx.fillStyle = '#FF4444';
    ctx.font = 'bold 15px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('NOT ENOUGH COINS!', 270, 808);
    ctx.restore();
  }

  // Wave indicator
  var wNum = Math.min(currentWave + 1, 3);
  ctx.save();
  ctx.font = 'bold 18px Arial';
  ctx.fillStyle = '#FFFFFF';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';
  ctx.fillText('WAVE ' + wNum + '/3', 526, 851);
  ctx.restore();

  // Turret icon decoration
  var turImg = ASSETS.turretIcon;
  if (turImg && turImg.complete) {
    ctx.drawImage(turImg, 484, 868, 40, 40);
  }

  // Timer (top right)
  var timeLeft = Math.max(0, 30 - Math.floor(gameTimer));
  ctx.save();
  ctx.font = 'bold 18px Arial';
  ctx.fillStyle = timeLeft <= 5 ? '#FF4444' : '#FFFFFF';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'top';
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 2;
  ctx.strokeText(timeLeft + 's', 524, 18);
  ctx.fillText(timeLeft + 's', 524, 18);
  ctx.restore();

  // Base HP hearts (top left)
  for (var hi=0; hi<3; hi++) {
    var hx = 18 + hi*30;
    var active = hi < baseHp;
    ctx.save();
    ctx.font = '26px Arial';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    ctx.globalAlpha = active ? 1.0 : 0.25;
    ctx.fillText('♥', hx, 14);
    ctx.restore();
  }
}

function drawWall() {
  var wImg = ASSETS.wall;
  if (wImg && wImg.complete) {
    ctx.drawImage(wImg, 492, 488, 50, 100);
  }
}

function drawBossHPBar() {
  if (!bossRef || !bossRef.alive) return;
  var bw=300, bh=22;
  var bx=(DW-bw)/2, by=66;
  var ratio = Math.max(0, bossRef.hp / bossRef.maxHp);
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  roundRect(ctx, bx-3, by-3, bw+6, bh+6, 6);
  ctx.fill();
  ctx.fillStyle = ratio > 0.5 ? '#FF4400' : ratio > 0.25 ? '#FF8800' : '#FF0000';
  roundRect(ctx, bx, by, bw*ratio, bh, 5);
  ctx.fill();
  ctx.fillStyle = '#FFFFFF';
  ctx.font = 'bold 13px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('BOSS  ' + Math.ceil(Math.max(0,bossRef.hp)) + ' / ' + bossRef.maxHp, bx+bw/2, by+bh/2);
  ctx.restore();
}

function drawTutorial() {
  // Dim everything slightly
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.fillRect(0, 0, DW, DH);
  ctx.restore();

  // Highlight slot 1
  var sl = slots[0];
  ctx.save();
  ctx.strokeStyle = 'rgba(255,220,0,0.9)';
  ctx.lineWidth = 3;
  ctx.shadowColor = '#FFD700';
  ctx.shadowBlur = 16;
  ctx.beginPath();
  ctx.arc(sl.x, sl.y, SLOT_RADIUS+6, 0, Math.PI*2);
  ctx.stroke();
  ctx.restore();

  // Hint text
  ctx.save();
  ctx.font = 'bold 28px Arial';
  ctx.fillStyle = '#FFD700';
  ctx.strokeStyle = '#000000';
  ctx.lineWidth = 4;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.strokeText('TAP TO PLACE TOWER!', 270, 160);
  ctx.fillText('TAP TO PLACE TOWER!', 270, 160);
  ctx.restore();

  // Animated finger
  var bounce = Math.sin(fingerAnim * 4.0) * 12;
  ctx.save();
  ctx.font = '40px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('\u261D', sl.x + 4, sl.y - 60 + bounce);
  ctx.restore();
}

function drawPostWaveHint() {
  if (postWaveHintTimer <= 0) return;
  var a = Math.min(1.0, postWaveHintTimer);
  ctx.save();
  ctx.globalAlpha = a;
  ctx.font = 'bold 24px Arial';
  ctx.fillStyle = '#00FFAA';
  ctx.strokeStyle = '#000000';
  ctx.lineWidth = 3;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.strokeText(postWaveHint, 270, 130);
  ctx.fillText(postWaveHint, 270, 130);
  ctx.restore();
}

function drawBossAlert() {
  if (bossAlertTimer <= 0) return;
  var a = Math.min(1.0, bossAlertTimer);
  ctx.save();
  ctx.globalAlpha = a * 0.5;
  ctx.fillStyle = '#AA0000';
  ctx.fillRect(0, 0, DW, DH);
  ctx.globalAlpha = a;
  ctx.font = 'bold 48px Arial';
  ctx.fillStyle = '#FF4400';
  ctx.strokeStyle = '#000000';
  ctx.lineWidth = 5;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.strokeText('BOSS INCOMING!', 270, 400);
  ctx.fillText('BOSS INCOMING!', 270, 400);
  ctx.restore();
}

function drawResult() {
  ctx.save();
  ctx.fillStyle = victoryFlag ? 'rgba(0,20,0,0.80)' : 'rgba(40,0,0,0.80)';
  ctx.fillRect(0, 0, DW, DH);

  if (victoryFlag) {
    // 3 stars
    for (var si=0; si<3; si++) {
      var sx = 135 + si*135;
      var sy = 380;
      var sb = Math.sin(fingerAnim*3 + si*1.2) * 10;
      ctx.font = '52px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = '#FFD700';
      ctx.fillText('\u2605', sx, sy+sb);
    }
    ctx.font = 'bold 58px Arial';
    ctx.fillStyle = '#FFD700';
    ctx.strokeStyle = '#000000';
    ctx.lineWidth = 5;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.strokeText('VICTORY!', 270, 470);
    ctx.fillText('VICTORY!', 270, 470);
  } else {
    ctx.font = 'bold 54px Arial';
    ctx.fillStyle = '#AAAAAA';
    ctx.strokeStyle = '#000000';
    ctx.lineWidth = 5;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.strokeText('DEFEAT...', 270, 470);
    ctx.fillText('DEFEAT...', 270, 470);
  }
  ctx.restore();
}

function drawCTA() {
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.90)';
  ctx.fillRect(0, 0, DW, DH);

  // Game icon area (wall asset as decoration)
  var wImg2 = ASSETS.wall;
  if (wImg2 && wImg2.complete) {
    ctx.save();
    ctx.globalAlpha = 0.5;
    ctx.drawImage(wImg2, 195, 370, 150, 200);
    ctx.restore();
  }

  // Title
  ctx.font = 'bold 32px Arial';
  ctx.fillStyle = '#FFD700';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 3;
  ctx.strokeText('CAN YOU DEFEND', 270, 520);
  ctx.fillText('CAN YOU DEFEND', 270, 520);
  ctx.strokeText('THE BASE?', 270, 560);
  ctx.fillText('THE BASE?', 270, 560);

  // Subtitle
  ctx.font = '18px Arial';
  ctx.fillStyle = '#FFFFFF';
  ctx.lineWidth = 2;
  ctx.strokeText('Download now and play the full game!', 270, 608);
  ctx.fillText('Download now and play the full game!', 270, 608);

  // Pulsing button
  var pulse = 0.92 + Math.sin(ctaPulse * 3.0) * 0.08;
  var bw2=300, bh2=70;
  var bpx = (DW - bw2*pulse)/2;
  var bpy = 620 - (bh2*pulse - bh2)/2;

  ctx.save();
  ctx.shadowColor = '#FF6B00';
  ctx.shadowBlur = ctaBtnHover ? 35 : 18;
  var bImg2 = ASSETS.button;
  if (bImg2 && bImg2.complete) {
    ctx.drawImage(bImg2, bpx, bpy, bw2*pulse, bh2*pulse);
  } else {
    ctx.fillStyle = ctaBtnHover ? '#FF8C00' : '#FF6B00';
    roundRect(ctx, bpx, bpy, bw2*pulse, bh2*pulse, 12);
    ctx.fill();
  }
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#FFFFFF';
  ctx.font = 'bold 26px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.lineWidth = 0;
  ctx.fillText('INSTALL NOW', DW/2, bpy + bh2*pulse/2);
  ctx.restore();
  ctx.restore();
}

function drawLoading() {
  ctx.save();
  ctx.fillStyle = '#0a0e1a';
  ctx.fillRect(0, 0, DW, DH);
  var lp = (Math.sin(fingerAnim*4)+1)/2;
  ctx.font = 'bold 26px Arial';
  ctx.fillStyle = 'rgba(255,215,0,' + (0.5 + lp*0.5) + ')';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('LOADING...', 270, 480);
  ctx.restore();
}

// ─── Render ───
function render() {
  if (gameState === 'LOADING') { drawLoading(); return; }

  // Background
  var bgImg = ASSETS.bg;
  if (bgImg && bgImg.complete) {
    ctx.drawImage(bgImg, 0, 0, DW, DH);
  } else {
    ctx.fillStyle = '#1a3a2a';
    ctx.fillRect(0, 0, DW, DH);
  }

  drawEnemyPath();
  drawWall();
  drawSlots();
  drawEnemies();
  drawProjectiles();
  drawHitEffects();
  drawCoinPopups();
  drawHUD();
  drawBossHPBar();

  if (gameState === 'TUTORIAL') drawTutorial();
  drawPostWaveHint();
  drawBossAlert();

  if (gameState === 'RESULT') drawResult();

  if (gameState === 'CTA') {
    // Show last game state under CTA
    drawCTA();
  }
}

// ─── Game Loop ───
function gameLoop(ts) {
  var dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;
  update(dt);
  render();
  requestAnimationFrame(gameLoop);
}

// ─── Init ───
function init() {
  gameState = 'TUTORIAL';
  coins = 100; baseHp = 3; gameTimer = 0;
  currentWave = 0; victoryFlag = false;
  enemyIdCounter = 0; projIdCounter = 0;
  enemies = []; projectiles = []; hitEffects = [];
  towers = []; coinPopups = [];
  slots = SLOT_DEFS.map(function(s){ return {id:s.id, x:s.x, y:s.y, occupied:false}; });
  waveActive = false; ctaTriggered = false;
  bossRef = null; bossAlerted = false; bossAlertTimer = 0;
  insufficientFlash = 0; postWaveHintTimer = 0;
  fingerAnim = 0; ctaPulse = 0;
}

loadAssets(function() {
  init();
  requestAnimationFrame(function(ts) {
    lastTime = ts;
    requestAnimationFrame(gameLoop);
  });
});

})();
</script>
</body>
</html>
