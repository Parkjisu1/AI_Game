## =============================================================
## 게임 플로우 상세
## =============================================================

game_flow_detail:

  phase_0_title:
    duration: "2s"
    state: "title"
    ui:
      - text: "ARMY CLASH"
        style: "bold 32px, #ffd700, center"
        pos: "270, 400"
      - text: "Drag troops to battle!"
        style: "22px, white, center"
        pos: "270, 450"
      - hand_icon:
          animation: "드래그 모션 (카드→전장)"
          pos: "270, 600"
    auto_advance: true
    advance_trigger: "2s elapsed OR any tap"

  phase_1_wave1:
    wave_id: 1
    name: "Tutorial Wave"
    duration_target: "10s"
    player_start_gold: 30
    gold_per_kill: 10
    unlocked_units: ["swordsman"]
    enemy_waves:
      - type: "soldier"
        count: 3
        spawn_interval: 2.0
    enemy_base_hp: 100
    tutorial_hint:
      text: "DRAG TROOP CARD HERE!"
      show_duration: "5s"
      hand_animation: "카드에서 전장으로 드래그"
    guaranteed_win: true
    wave_clear_ui:
      - text: "WAVE 1 CLEAR!"
        color: "#ffd700"
        animation: "scale-in"

  phase_2_wave2:
    wave_id: 2
    name: "Archer Unlocked!"
    duration_target: "12s"
    bonus_gold: 20
    unlocked_units: ["swordsman", "archer"]
    enemy_waves:
      - type: "soldier"
        count: 4
        spawn_interval: 1.5
      - type: "elite"
        count: 1
        spawn_delay: 4.0
    enemy_base_hp: 150
    new_unit_hint:
      text: "NEW! ARCHER UNLOCKED!"
      unit: "archer"
      show_duration: "3s"
    fail_bait: true
    note: "정예병 등장으로 긴장감 유발. 궁수 활용 필요"

  phase_3_wave3:
    wave_id: 3
    name: "Boss Battle!"
    duration_target: "15s"
    bonus_gold: 30
    unlocked_units: ["swordsman", "archer"]
    enemy_waves:
      - type: "soldier"
        count: 3
        spawn_interval: 1.0
      - type: "elite"
        count: 2
        spawn_delay: 3.0
        spawn_interval: 2.0
      - type: "boss"
        count: 1
        spawn_delay: 6.0
    enemy_base_hp: 200
    fail_bait: true
    note: "보스 HP 300 + 잡몹 파상공세로 아슬아슬한 전투"

  phase_4_result:
    state: "result"
    duration: "2s"
    victory_ui:
      - text: "VICTORY!"
        style: "bold 40px, #ffd700"
        animation: "scale-in + shake"
      - stars: 3
        animation: "순차 팝인"
    defeat_ui:
      - text: "DEFEATED!"
        style: "bold 36px, #ff4444"
      - text: "Can you conquer the kingdom?"
        style: "20px, white"
    auto_advance: "2s → CTA"

  phase_5_cta:
    state: "cta"
    ui:
      overlay: "rgba(0,0,0,0.85)"
      title: "BUILD YOUR ARMY!"
      subtitle: "Recruit heroes & conquer kingdoms!"
      button:
        text: "INSTALL NOW"
        color: "#ffd700"
        bg: "#cc0000"
        size: "220x60"
        pos: "270, 700"
        animation: "pulse loop"

## =============================================================
## HUD 규격
## =============================================================

hud_spec:
  gold_display:
    pos: "left top (20, 20)"
    icon: "Coin.png"
    format: "{n}"
    style: "bold 18px, #ffd700"
  wave_indicator:
    pos: "center top (270, 20)"
    format: "WAVE {n} / 3"
    style: "bold 18px, white"
  player_base_hp:
    pos: "left (20, battlefield_top - 10)"
    label: "YOUR BASE"
    bar_width: 100
    fill_color: "#00cc44"
  enemy_base_hp:
    pos: "right (520, battlefield_top - 10)"
    label: "ENEMY BASE"
    bar_width: 100
    fill_color: "#ff4444"
  timer_bar:
    pos: "top full width (0, 45)"
    height: 4
    color: "#ff6600"
  troop_cards:
    pos: "bottom panel (0, 850~960)"
    bg: "rgba(0,0,0,0.75)"
    cards:
      - unit: "swordsman"
        icon: "NPC_Summon_001_D.png"
        cost_text: "10"
        cost_color: "#ffd700"
      - unit: "archer"
        icon: "TowerA.png"
        cost_text: "20"
        cost_color: "#ffd700"
        locked_until: "wave2"

