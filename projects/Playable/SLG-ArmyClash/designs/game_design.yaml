## =============================================================
## Layer 1: 게임 기획서 (game_design.yaml)
## Project  : SLG-ArmyClash
## Platform : playable (HTML5 광고)
## Generated: 2026-02-23
## =============================================================

game_overview:
  title: "Army Clash: Kingdom War"
  genre: "SLG"
  sub_genre:
    - "ArmyDeploy"
    - "AutoBattle"
  platform: "playable"
  target_user: "midcore"
  session_length: "45s"
  one_liner: "부대를 드래그 배치하여 적 성을 함락시키는 SLG 자동 전투"
  references:
    - "Last War: Survival (부대 배치 SLG)"
    - "Top War: Battle Game (머지+전투)"
    - "Art of War: Legions (자동 전투)"

core_experience:
  main_fun: "부대 카드를 드래그해 전장에 배치하면 병사들이 자동 행군하여 전투하는 쾌감"
  emotion_goal: "전략적 배치 → 자동 전투 관전 → 적 성 함락 카타르시스 → 보스전 긴장감"
  core_verbs:
    - "드래그(부대 배치)"
    - "관전(자동 전투)"
    - "선택(부대 종류)"
    - "함락(적 성 파괴)"

core_loop:
  main_loop:
    description: "부대 카드 드래그 → 전장 배치 → 자동 행군 → 적과 교전 → 적 성 공격"
    flow:
      - "화면 하단 부대 카드 확인"
      - "카드를 전장 영역으로 드래그"
      - "배치된 부대가 적 방향으로 자동 행군"
      - "적 부대와 조우 시 자동 교전"
      - "적 전멸 후 적 성 공격"
      - "적 성 HP 0 → 웨이브 클리어"
    duration: "10~15s per wave"
  deploy_loop:
    description: "코인 획득 → 부대 카드 구매 → 배치 반복"
    flow:
      - "적 처치 시 코인 획득"
      - "코인으로 부대 카드 구매"
      - "전장에 배치"
  long_term_loop:
    description: "3웨이브 → 빅토리 → CTA (Install Now)"
    flow:
      - "Wave 1 (튜토리얼, 보병만)"
      - "Wave 2 (궁수 해금, 적 다양화)"
      - "Wave 3 (보스, 강력한 적 파상공세)"
      - "VICTORY 또는 패배 → CTA"

session_structure:
  start_condition: "화면 탭 또는 첫 드래그"
  progress_type: "realtime"
  end_conditions:
    - "all_waves_clear: Wave 3 적 성 함락"
    - "player_base_destroyed: 아군 성 HP 0"
    - "timer_expired: 45초 경과"
  result_handling: "클리어 시 VICTORY 연출 후 CTA / 실패 시 즉시 CTA"

monetization:
  main_bm: "f2p"
  revenue_sources:
    - "플레이어블 광고 → 게임 설치 유도"

## =============================================================
## Playable 광고 전용 규격
## =============================================================

playable_spec:
  duration: "45s"
  levels: 3
  fail_trigger: "wave3_boss"
  cta_text: "INSTALL NOW"
  cta_trigger:
    - "all_levels_clear"
    - "player_base_destroyed"
    - "timer_expired"
  target_networks:
    - google_ads
    - facebook
    - ironsource
  max_file_size: "5MB"
  asset_mode: "provided"
  tech_stack: "canvas"

## =============================================================
