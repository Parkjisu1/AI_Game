    fail_bait: true
    note: "정예병 등장으로 긴장감. 궁수 없으면 아슬아슬"

  - id: 3
    name: "Boss Battle!"
    difficulty: "hard"
    duration_target: "15s"
    bonus_gold: 30
    unlocked_units: ["swordsman", "archer"]
    enemy_spawns:
      - type: "soldier"
        count: 3
        hp: 50
        atk: 10
        speed: 50
        spawn_interval: 1.0
      - type: "elite"
        count: 2
        hp: 80
        atk: 15
        speed: 40
        spawn_delay: 3.0
