metadata:
  nodeId: "ArmyClashPlayable"
  version: "1.0.0"
  phase: 0
  role: "Controller"
  platform: "playable"
  output_file: "playable.html"

dependencies:
  internal: []
  external: []
  note: "단일 HTML 파일, 외부 라이브러리 없음. 순수 Canvas API + Base64 인라인 에셋."

contract:
  provides:
    - "playable_game_loop: requestAnimationFrame 기반 게임 루프"
    - "drag_deploy: 부대 카드 드래그 → 전장 배치"
    - "auto_battle: 배치된 유닛 자동 행군 + 교전"
    - "wave_state: {currentWave, totalWaves, enemiesRemaining, baseHp}"
    - "economy: {gold, unitCosts, goldPerKill}"
    - "cta_trigger: Install Now 버튼 클릭 이벤트"
  requires: []

tags:
  layer: "Game"
  genre: "Playable"
  role: "Controller"
  system: "ArmyClashPlayable"
  majorFunctions:
    - "FlowControl"
    - "StateControl"
    - "ResponseTrigger"
  minorFunctions:
    - "Iterate"
    - "Calculate"
    - "Assign"
    - "Notify"
    - "Spawn"
    - "Despawn"

