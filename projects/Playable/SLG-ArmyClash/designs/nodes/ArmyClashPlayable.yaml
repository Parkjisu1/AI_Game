    name: "Tutorial: Deploy Troops!"
    difficulty: "easy"
    duration_target: "10s"
    player_start_gold: 30
    gold_per_kill: 10
    unlocked_units: ["swordsman"]
    enemy_spawns:
      - type: "soldier"
        count: 3
        hp: 40
        atk: 8
        speed: 45
        spawn_interval: 2.0
    enemy_base_hp: 100
    player_base_hp: 200
    win_condition: "enemy_base_hp <= 0"
    fail_condition: "player_base_hp <= 0"
    tutorial_hint: "DRAG TROOP → BATTLEFIELD!"
    guaranteed_win: true
    note: "보병 3마리만 배치하면 쉽게 적 성 함락"

  - id: 2
    name: "Archer Unlocked!"
    difficulty: "medium"
    duration_target: "12s"
    bonus_gold: 20
    unlocked_units: ["swordsman", "archer"]
    enemy_spawns:
      - type: "soldier"
        count: 4
        hp: 50
        atk: 10
        speed: 45
        spawn_interval: 1.5
      - type: "elite"
        count: 1
        hp: 80
        atk: 15
        speed: 35
