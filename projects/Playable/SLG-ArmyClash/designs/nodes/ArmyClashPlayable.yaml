## =============================================================
## 로직 플로우 (구현 참고용 의사코드)
## =============================================================

logicFlow:
  - step: 1
    tag: "FlowControl"
    action: "requestAnimationFrame 루프. dt = (ts - lastTime) / 1000."
    next: 2

  - step: 2
    tag: "StateControl"
    action: "state 분기: loading/title/wave_intro/playing/wave_clear/result/cta"
    next: 3

  - step: 3
    tag: "ResponseTrigger"
    action: |
      InputHandler:
      - touchstart/mousedown: 카드 영역 히트 테스트 → 드래그 시작
      - touchmove/mousemove: 드래그 중이면 고스트 유닛 표시
      - touchend/mouseup: 전장 영역이면 유닛 스폰, 아니면 취소
    next: 4

  - step: 4
    tag: "Validate"
    action: "배치 검증: gold >= unitCost AND 배치 위치가 전장 영역 내"
    next: 5

  - step: 5
    tag: "Spawn"
    action: |
      유닛 생성:
      - playerUnits.push({type, x, y, hp, maxHp, atk, speed, range, attackType})
      - gold -= unitCost
      - 배치 사운드 재생
    next: 6

  - step: 6
    tag: "Iterate"
    action: |
      아군 유닛 업데이트 (매 프레임):
      - 적 유닛 범위 내 탐색
      - 적 없으면 → 우측으로 행군 (x += speed * dt)
      - 적 있으면 → 공격 (attackCooldown 체크)
      - 적 기지 도달 시 → 기지 공격
    next: 7

  - step: 7
    tag: "Iterate"
    action: |
      적 유닛 업데이트 (매 프레임):
      - 아군 유닛 범위 내 탐색
      - 아군 없으면 → 좌측으로 행군 (x -= speed * dt)
      - 아군 있으면 → 공격
      - 아군 기지 도달 시 → 기지 공격
    next: 8

  - step: 8
    tag: "Calculate"
    action: |
      전투 계산:
      - 근접: distance < melee_range → target.hp -= atk * dt
      - 원거리: distance < shoot_range → 투사체 생성
      - 투사체: 이동 → 충돌 시 target.hp -= atk
    next: 9

  - step: 9
    tag: "Despawn"
    action: |
      사망 처리:
      - hp <= 0인 유닛 제거
      - 적 사망 시: gold += goldPerKill, 파티클 이펙트
    next: 10

  - step: 10
    tag: "ConditionCheck"
    action: |
      승리/패배 조건 확인:
      - enemy_base_hp <= 0 → wave_clear
      - player_base_hp <= 0 → defeat → cta
      - timer >= maxTime → timeout → cta
    next: 11

  - step: 11
    tag: "StateControl"
    action: |
      웨이브 전환:
      - wave < 3: 다음 웨이브 진입 (wave_intro)
      - wave == 3: result → cta
    next: 12

  - step: 12
    tag: "Notify"
    action: "CTA 표시: MRAID 대응 + window.open 폴백"

## =============================================================
## 코드 힌트
## =============================================================

codeHints:
  patterns:
    - "requestAnimationFrame 루프: let lastTime=0; function loop(ts){ dt=(ts-lastTime)/1000; lastTime=ts; update(dt); render(); requestAnimationFrame(loop); }"
    - "드래그 앤 드롭: touchstart에서 카드 히트 체크, touchmove에서 고스트 위치 업데이트, touchend에서 배치 확정"
    - "유닛 자동 전투: 매 프레임 가장 가까운 적 탐색 → range 내면 공격, 아니면 이동"
    - "사이드뷰 레인: y좌표로 3개 레인 구분, 같은 레인의 유닛끼리만 교전"
    - "MRAID 대응: typeof mraid !== 'undefined' ? mraid.open(url) : window.open(url)"
    - "Canvas 스케일: canvas.width=540; scale=Math.min(window.innerWidth/540, window.innerHeight/960)"
    - "Base64 에셋 로드: new Image(); img.onload=resolve; img.src='data:image/png;base64,...'"
    - "적 스폰 타이머: waveTimer += dt; if(waveTimer >= nextSpawnTime) spawnEnemy()"
  avoidPatterns:
    - "외부 이미지 URL 사용"
    - "CDN 라이브러리 로드"
    - "setInterval 사용"
    - "localStorage / sessionStorage"
    - "동적 DOM 생성 (Canvas 단독 렌더링)"
    - "레인 무시하고 모든 유닛 교차 전투 (성능 이슈)"
  sizeOptimization:
    - "에셋 PNG를 64x64 이하로 리사이즈 후 Base64"
    - "변수명 축약은 하지 않음 (가독성 우선)"
    - "파티클 풀 150개 사전 할당"
    - "불필요한 주석 최소화"
