## =============================================================
## 게임 플로우 (FSM 상태 시퀀스)
## =============================================================

game_flow:
  - step: 1
    state: "loading"
    description: "에셋 로드 (Base64 디코딩). 프로그레스바 표시."
    auto_advance: "all_assets_loaded"

  - step: 2
    state: "title"
    duration: "2s"
    description: "ARMY CLASH 타이틀 + Drag troops to battle! 힌트 + 드래그 모션 손 아이콘"
    auto_advance: "2s OR first_touch"

  - step: 3
    state: "wave_intro"
    wave: 1
    duration: "1s"
    description: "WAVE 1 텍스트 표시 + 전장 초기화"
    auto_advance: "1s"

  - step: 4
    state: "playing"
    wave: 1
    description: "보병 카드만 활성화. 튜토리얼 힌트 표시. 적 보병 3마리 순차 스폰."
    auto_advance: "enemy_base_destroyed OR player_base_destroyed"

  - step: 5
    state: "wave_clear"
    duration: "1.5s"
    description: "WAVE 1 CLEAR! 연출. 골드 보너스."
    auto_advance: "1.5s"

  - step: 6
    state: "wave_intro"
    wave: 2
    duration: "1.5s"
    description: "WAVE 2 + NEW UNIT: ARCHER! 해금 연출"
    auto_advance: "1.5s"

  - step: 7
    state: "playing"
    wave: 2
    description: "보병+궁수 카드 활성화. 적 보병4+정예1. 궁수 활용 유도."
    auto_advance: "enemy_base_destroyed OR player_base_destroyed"

  - step: 8
    state: "wave_clear"
    duration: "1.5s"
    description: "WAVE 2 CLEAR! 연출. 골드 보너스."
    auto_advance: "1.5s"

  - step: 9
    state: "wave_intro"
    wave: 3
    duration: "1s"
    description: "WAVE 3 - BOSS BATTLE! 보스 등장 연출"
    auto_advance: "1s"

  - step: 10
    state: "playing"
    wave: 3
    description: "최종 웨이브. 보병3+정예2+보스1. 파상공세."
    auto_advance: "enemy_base_destroyed OR player_base_destroyed"

  - step: 11
    state: "result"
    duration: "2s"
    description: "승리: VICTORY! + 별3개 / 패배: DEFEATED! 연출"
    auto_advance: "2s → cta"

  - step: 12
    state: "cta"
    description: "블러 오버레이 + BUILD YOUR ARMY! + INSTALL NOW 버튼 pulse"
    auto_advance: "none (user interaction)"

