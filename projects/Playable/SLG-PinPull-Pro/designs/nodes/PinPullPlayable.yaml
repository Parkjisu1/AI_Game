metadata:
  nodeId: "PinPullPlayable"
  version: "1.0.0"
  phase: 0
  role: "Controller"
  platform: "playable"

playable_config:
  canvas_size: { width: 540, height: 960 }
  tech_stack: "canvas"
  asset_mode: "provided"
  max_file_size: "2MB"

assets:
  mode: "provided"
  source_dir: "C:/Users/user/Desktop/Compressed"
  base64_file: "E:/AI/projects/SLG-PinPull-Pro/assets/base64_assets.txt"
  items:
    - name: "map_bg"
      file: "Map_2048.png"
      usage: "Background map for all levels"
    - name: "hero"
      file: "NPC_Summon_001_D.png"
      usage: "Hero character to be saved"
    - name: "enemy"
      file: "MOB_Cactus01_red_D.png"
      usage: "Regular enemy"
    - name: "boss"
      file: "MOB_Boss_Cactus_Crown_D.png"
      usage: "Boss enemy (level 3)"
    - name: "tower"
      file: "TowerA.png"
      usage: "Decorative tower"
    - name: "wall"
      file: "WallA.png"
      usage: "Wall/barrier blocks"
    - name: "arrow"
      file: "Arrow.png"
      usage: "Projectile decoration"
    - name: "coin"
      file: "Coin.png"
      usage: "Collectible coin"
    - name: "button"
      file: "Button.png"
      usage: "UI button background"
    - name: "star"
      file: "Effect_Star_1.png"
      usage: "Star particle effect"
    - name: "shadow"
      file: "Shadow.png"
      usage: "Character shadow"

levels:
  - id: 1
    name: "Tutorial"
    difficulty: "easy"
    guaranteed_win: true
    tutorial_hint: "PULL THE PIN!"
    layout:
      description: "Simple vertical layout - hero at bottom, lava reservoir above blocked by 1 pin, enemies on the other side of the pin"
      pins:
        - id: "pin1"
          position: { x: 270, y: 420 }
          orientation: "horizontal"
          drag_direction: "right"
      hero:
        position: { x: 270, y: 700 }
        state: "trapped"
      enemies:
        - type: "regular"
          position: { x: 270, y: 280 }
      lava:
        reservoir: { x: 160, y: 300, width: 100, height: 120 }
        flow_path: "down_right_to_enemies"
      walls:
        - { x: 130, y: 380, width: 280, height: 20 }
        - { x: 130, y: 250, width: 20, height: 150 }
        - { x: 390, y: 250, width: 20, height: 150 }
    win_condition: "enemies_eliminated"
    fail_condition: "hero_touched_by_lava"
    rewards: ["3_stars", "coins_50"]

  - id: 2
    name: "Challenge"
    difficulty: "medium"
    fail_bait: false
    layout:
      description: "Two pins - pulling wrong one first sends lava to hero. Correct order: pin2 first (blocks lava from hero), then pin1 (releases lava to enemies)"
      pins:
        - id: "pin1"
          position: { x: 200, y: 380 }
          orientation: "horizontal"
          drag_direction: "left"
          wrong_first: true
          consequence: "lava_flows_to_hero"
        - id: "pin2"
          position: { x: 340, y: 500 }
          orientation: "horizontal"
          drag_direction: "right"
          correct_first: true
          consequence: "blocks_hero_path"
      hero:
        position: { x: 340, y: 700 }
        state: "trapped"
      enemies:
        - type: "regular"
          position: { x: 150, y: 280 }
        - type: "regular"
          position: { x: 280, y: 250 }
      lava:
        reservoir: { x: 180, y: 250, width: 120, height: 100 }
        flow_path: "branches_based_on_pin_order"
      walls:
        - { x: 130, y: 350, width: 280, height: 20 }
        - { x: 130, y: 470, width: 280, height: 20 }
    win_condition: "enemies_eliminated_hero_safe"
    fail_condition: "hero_touched_by_lava"
    retry_allowed: true
    rewards: ["3_stars", "coins_100"]

  - id: 3
    name: "Impossible Trap"
    difficulty: "hard"
    fail_bait: true
    layout:
      description: "Three pins with complex routing. Looks solvable but very tricky. Most players fail. Boss enemy present."
      pins:
        - id: "pin1"
          position: { x: 160, y: 340 }
          orientation: "horizontal"
          drag_direction: "left"
        - id: "pin2"
          position: { x: 340, y: 420 }
          orientation: "vertical"
          drag_direction: "down"
        - id: "pin3"
          position: { x: 270, y: 530 }
          orientation: "horizontal"
          drag_direction: "right"
      hero:
        position: { x: 340, y: 720 }
        state: "trapped"
      enemies:
        - type: "regular"
          position: { x: 150, y: 200 }
        - type: "regular"
          position: { x: 300, y: 220 }
        - type: "boss"
          position: { x: 230, y: 160 }
      lava:
        reservoir: { x: 140, y: 200, width: 140, height: 130 }
        flow_path: "complex_multi_branch"
      walls:
        - { x: 100, y: 300, width: 340, height: 20 }
        - { x: 100, y: 400, width: 200, height: 20 }
        - { x: 300, y: 400, width: 140, height: 20 }
        - { x: 100, y: 500, width: 340, height: 20 }
    win_condition: "all_enemies_eliminated"
    fail_condition: "hero_touched_by_lava"
    fail_message: "YOU NEED MORE POWER!"
    rewards: ["3_stars", "coins_200"]

sound_design:
  engine: "webaudio_procedural"
  sounds:
    - name: "pinPull"
      type: "frequency_sweep"
      params: { start: 800, end: 200, duration: 0.3, wave: "sawtooth" }
    - name: "lavaFlow"
      type: "rumble"
      params: { freq: 100, duration: 1.0, wave: "sine", noise: true }
    - name: "enemyDeath"
      type: "explosion"
      params: { noise_duration: 0.2, tone: 200, wave: "square" }
    - name: "heroSave"
      type: "arpeggio"
      params: { notes: [523, 659, 784], duration: 0.5, wave: "sine" }
    - name: "coinCollect"
      type: "ding"
      params: { freq: 1200, duration: 0.1, wave: "sine" }
    - name: "buttonClick"
      type: "click"
      params: { freq: 600, duration: 0.05, wave: "square" }
    - name: "shake"
      type: "rumble"
      params: { freq: 150, duration: 0.2, wave: "sine" }
    - name: "fail"
      type: "descend"
      params: { start: 400, end: 100, duration: 0.5, wave: "sawtooth" }
    - name: "levelClear"
      type: "fanfare"
      params: { notes: [523, 659, 784, 1047], duration: 0.8, wave: "sine" }

vfx_design:
  particle_pool_size: 200
  effects:
    - name: "explosion"
      count: 12
      pattern: "radial"
      colors: ["#FF4400", "#FF8800", "#FFCC00"]
      lifetime: 0.6
      size_range: [4, 12]
      trigger: "enemy_death"
    - name: "lava_drip"
      count: 3
      pattern: "stream"
      colors: ["#FF2200", "#FF6600"]
      lifetime: 0.8
      size_range: [3, 8]
      trigger: "lava_flow"
    - name: "coin_burst"
      count: 6
      pattern: "fountain"
      colors: ["#FFD700", "#FFA500"]
      lifetime: 0.5
      size_range: [4, 8]
      trigger: "coin_collect"
    - name: "star_shower"
      count: 20
      pattern: "random_area"
      colors: ["#FFD700", "#FFFFFF", "#FF69B4"]
      lifetime: 1.0
      size_range: [3, 10]
      trigger: "level_clear"

screen_shake:
  presets:
    - name: "explosion"
      intensity: 8
      duration: 300
    - name: "hero_hit"
      intensity: 12
      duration: 400
    - name: "boss_appear"
      intensity: 6
      duration: 500

cta_config:
  trigger_conditions:
    - "fail_any_level"
    - "all_levels_clear"
  title: "CAN YOU SOLVE IT?"
  subtitle: "Download now and prove your skills!"
  button_text: "INSTALL NOW"
  button_url: "https://play.google.com/store"
  ios_url: "https://apps.apple.com"
  animation:
    entrance: "easeOutElastic"
    button_pulse: true
    backdrop_fade: 0.7

game_flow:
  - step: 1
    state: "loading"
    duration: "0.5s"
    description: "Load assets, init audio context"
  - step: 2
    state: "title"
    duration: "auto"
    description: "Game logo + TAP TO START"
  - step: 3
    state: "level_intro"
    duration: "0.8s"
    description: "Level number + slide in animation"
  - step: 4
    state: "tutorial"
    duration: "level1_only"
    description: "Animated hand showing drag direction"
  - step: 5
    state: "playing"
    description: "Interactive pin pulling gameplay"
  - step: 6
    state: "level_result"
    duration: "1.5s"
    description: "Stars + coins + GREAT!/TRY AGAIN"
  - step: 7
    state: "cta"
    description: "CTA overlay with animated INSTALL button"
