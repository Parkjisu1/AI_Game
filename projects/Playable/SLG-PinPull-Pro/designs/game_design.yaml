game_overview:
  title: "SLG Pin Pull Pro"
  genre: "SLG"
  sub_genre: ["puzzle", "pin_pull"]
  platform: "playable"
  target_user: "casual-midcore"
  session_length: "25s"
  one_liner: "Pull pins to save the hero from lava and enemies - Last War/Top War style"
  references: ["Last War", "Top War", "Hero Wars", "Evony"]

core_experience:
  main_fun: "Pin pulling puzzle with immediate physics feedback"
  emotion_goal: "Satisfaction from solving + urgency from danger"
  core_verbs: ["pull", "solve", "save"]

playable_spec:
  duration: "25s"
  levels: 3
  fail_trigger: "level3"
  cta_text: "INSTALL NOW"
  cta_trigger:
    - "fail_any_level"
    - "all_levels_clear"
    - "timer_expired"
  target_networks:
    - facebook
    - ironsource
    - applovin
    - google
  max_file_size: "2MB"
  asset_mode: "provided"
  tech_stack: "canvas"

session_structure:
  start_condition: "tap_to_start"
  progress_type: "manual"
  end_conditions:
    - "all_levels_clear"
    - "fail_trigger"
    - "timer_expired"
  result_handling: "cta_overlay"

production_quality:
  sound_engine: "webaudio_procedural"
  tween_engine: "custom_lightweight"
  particle_system: "object_pool_200"
  screen_shake: true
  dpr_handling: true
  mraid_2_complete: true
  cta_animation: "elastic_pulse"
