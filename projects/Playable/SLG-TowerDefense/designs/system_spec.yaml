## =============================================================
## Layer 2: 시스템 명세서 (system_spec.yaml)
## Project  : SLG-TowerDefense
## Platform : playable (HTML5 단일 파일)
## Generated: 2026-02-22
## =============================================================

platform: playable
note: >
  Playable 광고는 단일 HTML 파일로 구성되므로
  Unity처럼 다수 시스템을 분리하지 않습니다.
  단일 GameController 안에 컴포넌트로 구조화합니다.

system_list:
  Core: []
  Domain: []
  Game:
    - "TowerDefensePlayable"

systems:
  - nodeId: "TowerDefensePlayable"
    layer: "Game"
    genre: "Playable"
    role: "Controller"
    purpose: >
      Tower Defense Hero 플레이어블 광고의 전체 게임 로직 제어.
      조이스틱 입력, 영웅 이동/공격, 적 AI, 웨이브 관리, 업그레이드 선택,
      CTA 트리거를 단일 HTML 파일 내에서 처리한다.
    mechanic: "hero_control_with_waves"

    components:
      - name: "CanvasRenderer"
        description: >
          HTML5 Canvas 2D Context 기반 렌더링.
          배경(풀밭+성벽), HUD, 영웅, 적, 발사체, 이펙트, UI 오버레이를
          매 프레임 클리어 후 레이어 순서대로 다시 그린다.
        responsibilities:
          - "배경 레이어 렌더링 (풀밭 그라디언트 + 성벽 블록)"
          - "게임 오브젝트 렌더링 (hero, enemies, projectiles)"
          - "HUD 렌더링 (HP바, 웨이브 표시, 잔여 적 카운트, 타이머)"
          - "UI 오버레이 렌더링 (업그레이드 카드, Victory, CTA)"
          - "Canvas 크기 자동 조정 (window resize)"

      - name: "InputHandler"
        description: >
          가상 조이스틱 입력 처리. 터치 + 마우스 이벤트 모두 지원.
          업그레이드 카드 탭, CTA 버튼 클릭도 담당.
        responsibilities:
          - "touchstart/touchmove/touchend 이벤트 수신"
          - "mousedown/mousemove/mouseup 이벤트 수신"
          - "조이스틱 knob 위치 계산 (deadzone 처리)"
          - "joystick direction vector 정규화 (magnitude 0~1)"
          - "업그레이드 카드 영역 hit-test"
          - "CTA 버튼 영역 hit-test"

      - name: "HeroController"
        description: >
          플레이어 영웅의 이동, 자동공격, 스탯 관리.
        responsibilities:
          - "조이스틱 입력 기반 위치 업데이트 (dt 기반)"
          - "화면 경계 Clamp"
          - "자동공격 타겟 탐색 (range 내 가장 가까운 적)"
          - "공격 쿨다운 관리"
          - "발사체 생성 (ProjectilePool에 요청)"
          - "스핀 어택 (업그레이드 선택 시 활성화, 전방위 발사)"
          - "HP 관리 (적 공격 수신 시 감소)"
          - "사망 처리 → GameState.hero_dead 전환"
        states:
          - idle
          - moving
          - attacking
          - dead

      - name: "EnemyManager"
        description: >
          웨이브별 적 스폰, 이동, 영웅 추적, 공격 처리.
        responsibilities:
          - "웨이브 데이터 기반 적 순차 스폰"
          - "모든 적 업데이트 (이동, 공격, HP 체크)"
          - "영웅 방향으로 이동 (직선 추적)"
          - "영웅과 충돌 시 공격 (영웅 HP 감소)"
          - "HP <= 0 시 적 제거 + 파티클 이펙트"
          - "모든 적 처치 시 WaveManager에 클리어 통보"

      - name: "WaveManager"
        description: >
          3웨이브 진행 관리. 웨이브 시작/클리어/업그레이드 전환.
        responsibilities:
          - "현재 웨이브 번호 추적"
          - "EnemyManager에 웨이브 데이터 전달"
          - "클리어 감지 → 업그레이드 선택 화면 전환"
          - "업그레이드 선택 완료 → 다음 웨이브 시작"
          - "Wave 3 클리어 → Victory 전환"
        wave_data:
          wave1:
            enemies: [{type: "orc", count: 3, hp: 30, atk: 5, speed: 40}]
            spawn_interval: 1.0
            guaranteed_win: true
          wave2:
            enemies:
              - {type: "orc",    count: 3, hp: 50, atk: 8, speed: 40}
              - {type: "zombie", count: 2, hp: 30, atk: 6, speed: 70}
            spawn_interval: 0.8
            fail_bait: true
          wave3:
            enemies:
              - {type: "boss",   count: 1, hp: 200, atk: 15, speed: 25, spawn_time: 0}
              - {type: "orc",    count: 2, hp: 40,  atk: 6,  speed: 45, spawn_time: 2}
              - {type: "zombie", count: 2, hp: 25,  atk: 5,  speed: 75, spawn_time: 4}
            fail_bait: true

      - name: "UpgradeSystem"
        description: >
          웨이브 사이 업그레이드 카드 표시 및 적용.
        responsibilities:
          - "업그레이드 카드 2장 렌더링"
          - "탭 입력 감지 후 선택된 업그레이드 적용"
          - "ATK_UP: hero.atk *= 1.5"
          - "HP_UP: hero.hp += 30, hero.maxHp += 30"
          - "SKILL: hero.spinAttack = true"
          - "SPEED: hero.moveSpeed *= 1.4"
          - "적용 완료 후 WaveManager에 통보"
        upgrade_sets:
          between_wave1_wave2: ["ATK_UP", "HP_UP"]
          between_wave2_wave3: ["SKILL",  "SPEED"]

      - name: "ProjectilePool"
        description: >
          발사체 오브젝트 재사용 풀. GC 방지를 위한 경량 풀.
        responsibilities:
          - "발사체 배열 관리 (최대 20개)"
          - "get(): 비활성 발사체 반환 또는 신규 생성"
          - "매 프레임 발사체 위치 업데이트"
          - "적과 충돌 감지 (원형 충돌)"
          - "화면 밖 이탈 시 비활성화"

      - name: "ParticleSystem"
        description: >
          적 사망 파티클, 영웅 공격 이펙트 경량 연출.
        responsibilities:
          - "적 처치 시 파티클 스폰 (색상: 적 종류별)"
          - "업그레이드 선택 시 골드 반짝임"
          - "Victory 시 별 파티클"
          - "파티클 수명 관리 (alpha 감소 후 제거)"

      - name: "CTAManager"
        description: >
          CTA 오버레이 트리거 및 렌더링.
        responsibilities:
          - "트리거 조건 모니터링 (all_clear / hero_dead / timer_expired)"
          - "CTA 오버레이 렌더링 (블러 bg + 타이틀 + 버튼)"
          - "Install 버튼 클릭 감지"
          - "window.open() 또는 mraid.open() 호출"
          - "버튼 pulse 애니메이션"
        triggers:
          - condition: "all_waves_clear"
            delay: "2s after VICTORY"
          - condition: "hero_dead"
            delay: "1s"
          - condition: "timer >= 30s"
            delay: "0s"

      - name: "GameStateManager"
        description: >
          전체 게임 상태 FSM 관리.
        responsibilities:
          - "상태 전환: title → tutorial → wave → upgrade → wave → ... → victory → cta"
          - "각 상태별 update/render 루틴 분기"
          - "타이머 관리 (requestAnimationFrame 기반 dt)"
          - "fail 감지 → cta 즉시 전환"
        states:
          - title
          - tutorial
          - wave_playing
          - upgrade_select
          - victory
          - cta

    relations:
      internal_flow:
        - "GameStateManager → WaveManager (웨이브 시작 명령)"
        - "WaveManager → EnemyManager (적 스폰 명령)"
        - "InputHandler → HeroController (방향 벡터 전달)"
        - "HeroController → ProjectilePool (발사체 요청)"
        - "ProjectilePool → EnemyManager (충돌 처리)"
        - "EnemyManager → WaveManager (클리어 통보)"
        - "WaveManager → UpgradeSystem (업그레이드 화면 요청)"
        - "UpgradeSystem → HeroController (스탯 적용)"
        - "UpgradeSystem → WaveManager (선택 완료 통보)"
        - "HeroController → CTAManager (사망 신호)"
        - "WaveManager → GameStateManager (상태 전환 요청)"
        - "GameStateManager → CTAManager (Victory/Fail 신호)"
        - "GameStateManager → CanvasRenderer (현재 상태 전달)"
      uses: []
      usedBy: []
      publishes:
        - "game_state_changed"
        - "wave_cleared"
        - "hero_dead"
        - "all_waves_cleared"
      subscribes: []
