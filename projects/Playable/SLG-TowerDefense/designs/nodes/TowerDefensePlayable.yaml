## =============================================================
## Layer 3: AI 기획서 노드 (TowerDefensePlayable.yaml)
## Project  : SLG-TowerDefense
## Platform : playable (HTML5 단일 파일)
## Generated: 2026-02-22
## =============================================================

metadata:
  nodeId: "TowerDefensePlayable"
  version: "1.0.0"
  phase: 0
  role: "Controller"
  platform: "playable"
  output_file: "playable.html"

dependencies:
  internal: []
  external: []
  note: "단일 HTML 파일, 외부 라이브러리 없음. 순수 Canvas API 사용."

contract:
  provides:
    - "playable_game_loop: requestAnimationFrame 기반 게임 루프"
    - "joystick_input: 가상 조이스틱 방향 벡터 (dx, dy)"
    - "hero_state: {x, y, hp, maxHp, atk, moveSpeed, spinAttack}"
    - "wave_state: {currentWave, totalWaves, enemiesRemaining}"
    - "cta_trigger: Install Now 버튼 클릭 이벤트"
  requires: []

tags:
  layer: "Game"
  genre: "Playable"
  role: "Controller"
  system: "TowerDefensePlayable"
  majorFunctions:
    - "FlowControl"
    - "StateControl"
    - "ResponseTrigger"
  minorFunctions:
    - "Iterate"
    - "Calculate"
    - "Assign"
    - "Notify"
    - "Spawn"
    - "Despawn"

## =============================================================
## Playable 광고 규격
## =============================================================

playable_config:
  canvas_size:
    width: 540
    height: 960
  tech_stack: "canvas"
  asset_mode: "code_only"
  max_file_size: "2MB"
  target_networks: ["facebook", "ironsource", "applovin"]

## =============================================================
## 레벨 정의
## =============================================================

levels:
  - id: 1
    name: "Tutorial Wave"
    difficulty: "easy"
    duration_target: "5s"
    objects:
      - entity: "orc"
        count: 3
        hp: 30
        atk: 5
        speed: 40
        spawn_interval: 1.0
    win_condition: "all 3 orcs defeated"
    fail_condition: "hero hp <= 0"
    tutorial_hint: "DRAG TO MOVE!"
    guaranteed_win: true
    note: "첫 웨이브는 영웅 ATK 15로 쉽게 클리어 가능"

  - id: 2
    name: "Challenge Wave"
    difficulty: "medium"
    duration_target: "8s"
    objects:
      - entity: "orc"
        count: 3
        hp: 50
        atk: 8
        speed: 40
        spawn_interval: 0.8
      - entity: "zombie"
        count: 2
        hp: 30
        atk: 6
        speed: 70
        spawn_interval: 0.8
    win_condition: "all 5 enemies defeated"
    fail_condition: "hero hp <= 0"
    fail_bait: true
    note: "좀비 빠른 속도로 긴장감. 업그레이드 없으면 아슬아슬"

  - id: 3
    name: "Boss Wave"
    difficulty: "hard"
    duration_target: "10s"
    objects:
      - entity: "boss"
        count: 1
        hp: 200
        atk: 15
        speed: 25
        spawn_time: 0
      - entity: "orc"
        count: 2
        hp: 40
        atk: 6
        speed: 45
        spawn_time: 2.0
      - entity: "zombie"
        count: 2
        hp: 25
        atk: 5
        speed: 75
        spawn_time: 4.0
    win_condition: "boss defeated"
    fail_condition: "hero hp <= 0"
    fail_bait: true
    note: "보스 HP 200으로 충분히 어렵게. ATK UP 선택 시 클리어 가능"

## =============================================================
## CTA 설정
## =============================================================

cta_config:
  trigger_conditions:
    - "all_waves_clear"
    - "hero_dead"
    - "timer >= 30"
  title: "CAN YOU SURVIVE ALL WAVES?"
  subtitle: "Build your fortress & command your hero!"
  button_text: "INSTALL NOW"
  button_url: "https://example.com"
  button_color: "#ffd700"
  button_bg: "#cc0000"
  overlay_bg: "rgba(0, 0, 0, 0.85)"

## =============================================================
## 에셋 정의 (code_only)
## =============================================================

assets:
  mode: "code_only"
  items: []
  drawing_specs:
    hero:
      type: "circle"
      radius: 20
      fill: "#3a6ebf"
      stroke: "#ffd700"
      stroke_width: 3
      label: "H"
      label_color: "white"
      label_font: "bold 12px Arial"
    orc:
      type: "circle"
      radius: 16
      fill: "#5a8a3a"
      stroke: "#2a5a1a"
      stroke_width: 2
      label: "ORC"
      label_color: "white"
      label_font: "10px Arial"
    zombie:
      type: "circle"
      radius: 14
      fill: "#cc4444"
      stroke: "#880000"
      stroke_width: 2
      label: "Z"
      label_color: "white"
      label_font: "10px Arial"
    boss:
      type: "circle"
      radius: 30
      fill: "#8b0000"
      stroke: "#ff6600"
      stroke_width: 4
      label: "BOSS"
      label_color: "#ff6600"
      label_font: "bold 11px Arial"
      glow: "rgba(255,100,0,0.3) blur 10px"
    projectile:
      type: "circle"
      radius: 5
      fill: "#ffff00"
      glow: "rgba(255,255,0,0.6)"
    background:
      type: "gradient_fill"
      base_color: "#4a7c3f"
      detail_patches: "#3d6b34"
      patch_count: 20
    wall:
      type: "rect_array"
      y_range: [80, 120]
      block_width: 50
      block_height: 40
      fill: "#8b7355"
      stroke: "#5a4a2a"
      torch_positions: [60, 480]
      torch_color: "#ff8c00"
    joystick_base:
      type: "circle"
      radius: 60
      fill: "rgba(255,255,255,0.15)"
      stroke: "rgba(255,255,255,0.4)"
    joystick_knob:
      type: "circle"
      radius: 28
      fill: "rgba(255,255,255,0.6)"

## =============================================================
## 게임 플로우 (FSM 상태 시퀀스)
## =============================================================

game_flow:
  - step: 1
    state: "title"
    duration: "2s"
    description: "타이틀 텍스트 + Drag to Move 힌트 + 손 아이콘 바운스"
    auto_advance: "2s OR first_touch"

  - step: 2
    state: "wave_playing"
    wave: 1
    description: "Wave 1 시작. 튜토리얼 힌트 3초 표시. 오크 3마리 순차 스폰."
    auto_advance: "all_enemies_defeated"

  - step: 3
    state: "upgrade_select"
    description: "WAVE 1 CLEAR 연출 후 업그레이드 카드 2장 표시. 탭 선택 대기."
    cards: ["ATK_UP", "HP_UP"]
    auto_advance: "card_selected"

  - step: 4
    state: "wave_playing"
    wave: 2
    description: "Wave 2. 오크 3 + 좀비 2 교차 스폰. 좀비 빠른 속도로 긴장감."
    auto_advance: "all_enemies_defeated"

  - step: 5
    state: "upgrade_select"
    description: "WAVE 2 CLEAR 연출 후 업그레이드 카드 2장 표시."
    cards: ["SKILL", "SPEED"]
    auto_advance: "card_selected"

  - step: 6
    state: "wave_playing"
    wave: 3
    description: "Wave 3. 보스 즉시 스폰, 오크/좀비 순차 지원. 보스 HP 200으로 충분히 위협적."
    auto_advance: "boss_defeated"

  - step: 7
    state: "victory"
    duration: "2s"
    description: "VICTORY! 텍스트 scale-in, 별 3개 팝인, Download 문구"
    auto_advance: "2s → cta"

  - step: 8
    state: "cta"
    description: "블러 오버레이 + 타이틀 + INSTALL NOW 버튼 pulse 애니메이션"
    auto_advance: "none (user interaction)"

## =============================================================
## 로직 플로우 (구현 참고용 의사코드 흐름)
## =============================================================

logicFlow:
  - step: 1
    tag: "FlowControl"
    action: "requestAnimationFrame 루프 시작. dt 계산."
    next: 2

  - step: 2
    tag: "StateControl"
    action: "GameStateManager.currentState 분기. 각 상태별 update/render 호출."
    next: 3

  - step: 3
    tag: "ResponseTrigger"
    action: "InputHandler: touchstart/mousedown 이벤트 → joystick 활성화. 터치 위치 - 조이스틱 베이스 위치 = 방향 벡터 계산."
    next: 4

  - step: 4
    tag: "Calculate"
    action: "방향 벡터 정규화. magnitude > deadzone(10)이면 유효 입력으로 판단."
    next: 5

  - step: 5
    tag: "Assign"
    action: "HeroController.position += direction * moveSpeed * dt. 화면 경계 clamp."
    next: 6

  - step: 6
    tag: "Find"
    action: "HeroController: 모든 적 중 거리 < autoAttackRange인 가장 가까운 적 탐색."
    next: 7

  - step: 7
    tag: "Calculate"
    action: "attackCooldown -= dt. cooldown <= 0이면 발사체 생성."
    next: 8

  - step: 8
    tag: "Spawn"
    action: "ProjectilePool.get() → 발사체 위치=영웅위치, 방향=적 방향, speed=300. spinAttack이면 8방향 발사."
    next: 9

  - step: 9
    tag: "Iterate"
    action: "모든 발사체 위치 업데이트. 각 발사체-적 원형 충돌 검사."
    next: 10

  - step: 10
    tag: "ValueModification"
    action: "충돌 시: enemy.hp -= hero.atk. hp <= 0이면 enemy 제거."
    next: 11

  - step: 11
    tag: "Despawn"
    action: "hp <= 0인 적: enemies 배열에서 제거. ParticleSystem에 파티클 스폰 요청."
    next: 12

  - step: 12
    tag: "Iterate"
    action: "모든 적 이동. 영웅 방향 직선 이동. 영웅과 거리 < (heroRadius + enemyRadius)이면 충돌."
    next: 13

  - step: 13
    tag: "ValueModification"
    action: "영웅-적 충돌 시: hero.hp -= enemy.atk * dt (지속 피해). hero.hp <= 0 → hero_dead 이벤트."
    next: 14

  - step: 14
    tag: "Aggregate"
    action: "WaveManager: enemies.length === 0 확인. true이면 wave_cleared 이벤트 발생."
    next: 15

  - step: 15
    tag: "StateControl"
    action: "wave_cleared: currentWave < 3이면 upgrade_select 상태로 전환. currentWave === 3이면 victory 상태로 전환."
    next: 16

  - step: 16
    tag: "Assign"
    action: "UpgradeSystem: 선택된 카드에 따라 hero 스탯 직접 수정."
    next: 17

  - step: 17
    tag: "Notify"
    action: "CTAManager: all_waves_cleared, hero_dead, timer >= 30s 중 하나 감지 시 cta 상태 전환."
    next: 18

  - step: 18
    tag: "ResponseTrigger"
    action: "CTA 버튼 클릭 감지 → window.open(cta_url, '_blank') 호출."
    next: 2

## =============================================================
## 코드 힌트
## =============================================================

codeHints:
  patterns:
    - "requestAnimationFrame 루프: let lastTime=0; function loop(ts){ dt=(ts-lastTime)/1000; lastTime=ts; update(dt); render(); requestAnimationFrame(loop); }"
    - "가상 조이스틱: touchstart에서 base 위치 기록, touchmove에서 knob offset 계산"
    - "원형 충돌: dx=ax-bx; dy=ay-by; dist=Math.sqrt(dx*dx+dy*dy); collide = dist < ra+rb"
    - "발사체 풀: projectiles 배열에 {active, x, y, dx, dy} 객체. active=false인 것 재사용"
    - "Canvas 그라디언트 배경: createLinearGradient 또는 fillStyle 컬러 다수 rect로 표현"
    - "MRAID 대응: typeof mraid !== 'undefined' ? mraid.open(url) : window.open(url)"
    - "Canvas 스케일: canvas.width=540; scale=window.innerWidth/540; ctx.scale(scale,scale)"
    - "성벽 렌더링: for(let i=0;i<11;i++){ ctx.fillRect(i*50, 80, 45, 40); }"
  avoidPatterns:
    - "외부 이미지 URL 사용 (new Image().src = 'http://...')"
    - "CDN 라이브러리 로드 (<script src='https://...'> 금지)"
    - "setInterval 사용 (requestAnimationFrame으로 대체)"
    - "document.querySelector로 동적 DOM 생성 (Canvas 단독 렌더링)"
    - "localStorage / sessionStorage 사용 (광고 환경 제한)"

## =============================================================
## 참조 패턴
## =============================================================

referencePatterns:
  - source: "Archero (모바일 게임)"
    pattern: "가상 조이스틱 드래그 → 영웅 이동 + 멈추면 자동공격"
  - source: "Playable Ad Best Practice"
    pattern: "Wave 1은 반드시 클리어 → 업그레이드 선택 → Wave 2 긴장감 → CTA"
  - source: "HTML5 Playable Standard"
    pattern: "단일 HTML 파일, 인라인 CSS/JS, 외부 리소스 없음"
