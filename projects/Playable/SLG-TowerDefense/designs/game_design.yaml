## =============================================================
## Layer 1: 게임 기획서 (game_design.yaml)
## Project  : SLG-TowerDefense
## Platform : playable (HTML5 광고)
## Generated: 2026-02-22
## =============================================================

game_overview:
  title: "Tower Defense Hero"
  genre: "SLG"
  sub_genre:
    - "TowerDefense"
    - "ActionRPG"
  platform: "playable"
  target_user: "midcore"
  session_length: "30s"
  one_liner: "조이스틱으로 영웅을 조작해 밀려오는 오크와 좀비 웨이브를 격파하라"
  references:
    - "Whiteout Survival (SLG 비주얼)"
    - "Archero (히어로 오토어택)"
    - "Call of Dragons (판타지 SLG)"

core_experience:
  main_fun: "조이스틱 드래그로 영웅을 움직이며 자동 공격으로 적을 쓸어버리는 쾌감"
  emotion_goal: "점점 강해지는 느낌 (업그레이드 선택) + 아슬아슬한 보스전 + 최종 승리 카타르시스"
  core_verbs:
    - "드래그(이동)"
    - "클리어(웨이브 격파)"
    - "선택(업그레이드)"
    - "생존(HP 관리)"

core_loop:
  main_loop:
    description: "조이스틱 드래그 → 영웅 이동 → 근접 적 자동공격 → 적 처치 → 웨이브 클리어"
    flow:
      - "조이스틱 드래그 입력"
      - "영웅 이동"
      - "사정거리 내 적 자동 감지"
      - "자동 공격 발사"
      - "적 HP 감소 → 처치"
      - "웨이브 내 전체 적 처치 → 클리어"
    duration: "5~8s per wave"
  upgrade_loop:
    description: "웨이브 클리어 후 2개 업그레이드 카드 제시 → 1개 선택 → 다음 웨이브 진입"
    flow:
      - "Wave Clear 연출 (0.5s)"
      - "업그레이드 카드 2장 표시"
      - "플레이어 탭 선택"
      - "업그레이드 적용 연출"
      - "다음 웨이브 시작"
  long_term_loop:
    description: "3웨이브 → 빅토리 → CTA (Install Now)"
    flow:
      - "Wave 1 (쉬움, 튜토리얼)"
      - "업그레이드 선택 1 (ATK UP / HP UP)"
      - "Wave 2 (중간, 2종 적)"
      - "업그레이드 선택 2 (SKILL / SPEED)"
      - "Wave 3 (보스 + 잡몹)"
      - "VICTORY 연출"
      - "CTA 오버레이"

session_structure:
  start_condition: "화면 탭 또는 조이스틱 드래그 첫 입력"
  progress_type: "realtime"
  end_conditions:
    - "all_waves_clear: Wave 3 보스 처치"
    - "hero_dead: 영웅 HP 0 (fail)"
    - "timer_expired: 30초 경과"
  result_handling: "클리어 시 VICTORY 연출 후 CTA / 실패 시 즉시 CTA"

monetization:
  main_bm: "f2p"
  revenue_sources:
    - "플레이어블 광고 → 게임 설치 유도"

## =============================================================
## Playable 광고 전용 규격
## =============================================================

playable_spec:
  duration: "30s"
  levels: 3
  fail_trigger: "wave3_boss"           # 보스전에서 의도적 어려움 유도
  cta_text: "INSTALL NOW"
  cta_trigger:
    - "all_levels_clear"
    - "hero_dead"
    - "timer_expired"
  target_networks:
    - facebook
    - ironsource
    - applovin
  max_file_size: "2MB"
  asset_mode: "code_only"
  tech_stack: "canvas"

## =============================================================
## 비주얼 스타일 정의
## =============================================================

visual_style:
  theme: "중세 판타지 SLG"
  view: "탑다운 (top-down)"
  color_palette:
    background_grass: "#4a7c3f"
    background_wall: "#8b7355"
    hero_armor: "#3a6ebf"
    hero_accent: "#ffd700"
    enemy_orc: "#5a8a3a"
    enemy_zombie: "#cc4444"
    boss: "#8b0000"
    ui_panel: "rgba(0,0,0,0.7)"
    ui_accent: "#ffd700"
    hp_bar_hero: "#00cc44"
    hp_bar_enemy: "#ff4444"
  canvas_size:
    width: 540
    height: 960

hero:
  shape: "circle (r=20)"
  color: "#3a6ebf"
  outline: "#ffd700"
  attack_projectile:
    shape: "circle (r=5)"
    color: "#ffff00"
  auto_attack_range: 150
  auto_attack_interval: 0.5s

enemies:
  orc:
    shape: "circle (r=16)"
    color: "#5a8a3a"
    outline: "#2a5a1a"
    label: "ORC"
    speed: "slow"
  zombie:
    shape: "circle (r=14)"
    color: "#cc4444"
    outline: "#880000"
    label: "DEAD"
    speed: "fast"
  boss:
    shape: "circle (r=30)"
    color: "#8b0000"
    outline: "#ff6600"
    label: "BOSS"
    speed: "slow"

environment:
  background:
    - "풀밭 타일 (#4a7c3f 베이스 + #3d6b34 어두운 패치)"
    - "성벽 세그먼트 (캔버스 상단 y=80~120, 직사각형 블록)"
    - "토치 이펙트 (성벽 양끝, 주황 원형 glow)"
  hero_spawn: "화면 하단 중앙 (270, 800)"
  enemy_spawn: "화면 상단 (랜덤 x, y=-20)"

## =============================================================
## 게임 플로우 상세
## =============================================================

game_flow_detail:

  phase_0_title:
    duration: "2s"
    state: "title"
    ui:
      - text: "TOWER DEFENSE HERO"
        style: "bold 28px, #ffd700, center"
        pos: "270, 420"
      - text: "Drag to Move!"
        style: "22px, white, center"
        pos: "270, 470"
      - hand_icon:
          animation: "위아래 바운스"
          pos: "270, 530"
    auto_advance: true
    advance_trigger: "2s elapsed OR any tap"

  phase_1_wave1:
    wave_id: 1
    name: "Tutorial Wave"
    duration_target: "5s"
    enemies:
      - type: "orc"
        count: 3
        spawn_interval: 1.0s
        hp: 30
        atk: 5
        speed: 40
    hero_stats:
      hp: 100
      atk: 15
      atk_speed: 2.0  # 초당 2발
      move_speed: 120
    tutorial_hint:
      text: "DRAG TO MOVE!"
      show_duration: "3s"
    guaranteed_win: true
    wave_clear_ui:
      - text: "WAVE 1 CLEAR!"
        color: "#ffd700"
        animation: "scale-in"

  phase_1_upgrade1:
    state: "upgrade_select"
    duration: "manual"
    options:
      - id: "atk_up"
        label: "ATK UP"
        description: "+50% Attack"
        icon_color: "#ff6600"
        effect: "hero.atk *= 1.5"
      - id: "hp_up"
        label: "HP UP"
        description: "+30 Max HP"
        icon_color: "#00cc44"
        effect: "hero.hp += 30; hero.maxHp += 30"
    ui:
      title: "CHOOSE UPGRADE"
      card_style: "rounded rect, rgba(0,0,0,0.8) bg, gold border"
    fail_bait: false

  phase_2_wave2:
    wave_id: 2
    name: "Challenge Wave"
    duration_target: "8s"
    enemies:
      - type: "orc"
        count: 3
        hp: 50
        atk: 8
        speed: 40
      - type: "zombie"
        count: 2
        hp: 30
        atk: 6
        speed: 70
    spawn_pattern: "alternating orc/zombie from top"
    fail_bait: true
    note: "적 5마리 + 좀비 빠른 속도로 긴장감 유발"

  phase_2_upgrade2:
    state: "upgrade_select"
    duration: "manual"
    options:
      - id: "skill"
        label: "SKILL"
        description: "Spin Attack!"
        icon_color: "#9933ff"
        effect: "hero.spinAttack = true (주변 전방위 공격)"
      - id: "speed"
        label: "SPEED UP"
        description: "+40% Move Speed"
        icon_color: "#33ccff"
        effect: "hero.moveSpeed *= 1.4"

  phase_3_wave3:
    wave_id: 3
    name: "Boss Wave"
    duration_target: "10s"
    enemies:
      - type: "boss"
        count: 1
        hp: 200
        atk: 15
        speed: 25
        spawn_time: 0s
      - type: "orc"
        count: 2
        hp: 40
        atk: 6
        speed: 45
        spawn_time: 2s
      - type: "zombie"
        count: 2
        hp: 25
        atk: 5
        speed: 75
        spawn_time: 4s
    fail_bait: true
    note: "보스 HP 200으로 설정, 마지막 판은 아슬아슬하게 설계"

  phase_4_victory:
    state: "victory"
    duration: "2s"
    ui:
      - text: "VICTORY!"
        style: "bold 40px, #ffd700"
        animation: "scale-in + shake"
        pos: "270, 380"
      - stars: 3
        animation: "순차 팝인"
      - text: "Download the full game!"
        style: "18px, white"
        pos: "270, 520"
    auto_advance: "2s → CTA"

  phase_5_cta:
    state: "cta"
    ui:
      overlay: "rgba(0,0,0,0.85)"
      title: "CAN YOU SURVIVE ALL WAVES?"
      subtitle: "Build your fortress & command your hero!"
      button:
        text: "INSTALL NOW"
        color: "#ffd700"
        bg: "#cc0000"
        size: "200x60"
        pos: "270, 700"
        animation: "pulse loop"

## =============================================================
## 조이스틱 UI 규격
## =============================================================

joystick_spec:
  position: "화면 하단 좌측 (100, 820)"
  base:
    radius: 60
    color: "rgba(255,255,255,0.15)"
    outline: "rgba(255,255,255,0.4)"
  knob:
    radius: 28
    color: "rgba(255,255,255,0.6)"
  dead_zone: 10
  max_distance: 50
  touch_follow: true  # 터치 위치로 베이스 이동

## =============================================================
## HUD 규격
## =============================================================

hud_spec:
  hero_hp_bar:
    pos: "20, 20 (width: 180, height: 14)"
    bg_color: "#440000"
    fill_color: "#00cc44"
    label: "HP"
  wave_indicator:
    pos: "center top (270, 30)"
    format: "WAVE {n} / 3"
    style: "bold 18px, white"
  enemy_count:
    pos: "right top (500, 30)"
    format: "{n} LEFT"
    style: "16px, #ffcc00"
  timer_bar:
    pos: "top full width (0, 55)"
    height: 4
    color: "#ff6600"
    direction: "left to right depletion"
