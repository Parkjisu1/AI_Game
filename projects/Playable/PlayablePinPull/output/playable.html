<script>
(function(){
"use strict";

// ─── Canvas Setup ───
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 540, H = 960;
canvas.width = W;
canvas.height = H;

function resizeCanvas(){
  const s = Math.min(window.innerWidth/W, window.innerHeight/H);
  canvas.style.width = (W*s)+'px';
  canvas.style.height = (H*s)+'px';
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ─── Colors ───
const C = {
  bg1:'#16213e', bg2:'#0f3460', wall:'#2c3e6b', wallStroke:'#4a6fa5',
  pin:'#e94560', pinHandle:'#c23152', pinHighlight:'#ff6b81',
  gold:'#FFD700', goldDark:'#DAA520', goldShine:'#FFFACD',
  lava:'#FF4444', lavaDark:'#CC0000', lavaGlow:'#FF6666',
  water:'#4FC3F7', waterDark:'#0288D1',
  hero:'#FFE0B2', heroDark:'#FFB74D',
  text:'#FFFFFF', success:'#4CAF50', fail:'#FF5252',
  tutorialHand:'#FFFFFF'
};

// ─── Game State ───
let state = 'title'; // title, tutorial, playing, win, fail, cta
let currentLevel = 0;
let balls = [];
let pins = [];
let walls = [];
let hero = null;
let particles = [];
let timer = 0;
let tutorialTimer = 0;
let transitionTimer = 0;
let dragPin = null;
let dragStartX = 0;
let levelCompleteDelay = 0;
let failCount = 0;
let titleTimer = 0;
let shakeTimer = 0;
let shakeIntensity = 0;

// ─── Level Definitions ───
const levels = [
  // Level 1: Simple - pull pin, gold falls to hero
  {
    walls: [
      {x:120, y:200, w:300, h:20},  // top
      {x:120, y:200, w:20, h:320},  // left
      {x:400, y:200, w:20, h:320},  // right
      // divider with pin gap
      {x:120, y:380, w:80, h:20},   // left divider
      {x:340, y:380, w:80, h:20},   // right divider
      // bottom chamber
      {x:120, y:380, w:20, h:200},  // left bottom
      {x:400, y:380, w:20, h:200},  // right bottom
      {x:120, y:560, w:300, h:20},  // bottom
    ],
    pins: [
      {x:200, y:380, w:140, h:18, dir:'right', pulled:false}
    ],
    balls: [
      {x:220, y:280, r:18, type:'gold'},
      {x:270, y:260, r:18, type:'gold'},
      {x:320, y:280, r:18, type:'gold'},
      {x:270, y:300, r:18, type:'gold'},
      {x:245, y:320, r:18, type:'gold'},
      {x:295, y:320, r:18, type:'gold'},
    ],
    hero: {x:270, y:520, r:25},
    tutorial: true
  },
  // Level 2: Two pins - order matters
  {
    walls: [
      // top chamber (lava)
      {x:120, y:140, w:300, h:20},
      {x:120, y:140, w:20, h:160},
      {x:400, y:140, w:20, h:160},
      // divider 1
      {x:120, y:280, w:80, h:20},
      {x:340, y:280, w:80, h:20},
      // mid chamber (gold)
      {x:120, y:280, w:20, h:160},
      {x:400, y:280, w:20, h:160},
      // divider 2
      {x:120, y:420, w:80, h:20},
      {x:340, y:420, w:80, h:20},
      // bottom chamber (hero)
      {x:120, y:420, w:20, h:180},
      {x:400, y:420, w:20, h:180},
      {x:120, y:580, w:300, h:20},
    ],
    pins: [
      {x:200, y:280, w:140, h:18, dir:'right', pulled:false, label:'1'},
      {x:200, y:420, w:140, h:18, dir:'right', pulled:false, label:'2'}
    ],
    balls: [
      {x:220, y:200, r:16, type:'lava'},
      {x:270, y:180, r:16, type:'lava'},
      {x:320, y:200, r:16, type:'lava'},
      {x:270, y:220, r:16, type:'lava'},
      {x:220, y:360, r:16, type:'gold'},
      {x:270, y:340, r:16, type:'gold'},
      {x:320, y:360, r:16, type:'gold'},
      {x:270, y:380, r:16, type:'gold'},
      {x:245, y:390, r:16, type:'gold'},
      {x:295, y:390, r:16, type:'gold'},
    ],
    hero: {x:270, y:540, r:25},
    tutorial: false
  },
  // Level 3: Tricky - designed to bait wrong choice
  {
    walls: [
      // left chamber (lava)
      {x:40, y:160, w:200, h:20},
      {x:40, y:160, w:20, h:280},
      {x:220, y:160, w:20, h:200},
      // left divider
      {x:40, y:340, w:60, h:20},
      {x:160, y:340, w:80, h:20},
      // left bottom
      {x:40, y:340, w:20, h:180},
      {x:220, y:340, w:20, h:180},
      {x:40, y:500, w:200, h:20},
      // right chamber (gold)
      {x:280, y:160, w:200, h:20},
      {x:280, y:160, w:20, h:200},
      {x:460, y:160, w:20, h:280},
      // right divider
      {x:280, y:340, w:80, h:20},
      {x:420, y:340, w:60, h:20},
      // right bottom
      {x:280, y:340, w:20, h:180},
      {x:460, y:340, w:20, h:180},
      {x:280, y:500, w:200, h:20},
      // center bottom funnel
      {x:160, y:500, w:20, h:120},
      {x:320, y:500, w:20, h:120},
      {x:160, y:600, w:200, h:20},
    ],
    pins: [
      {x:100, y:340, w:60, h:18, dir:'right', pulled:false, label:'A'},
      {x:360, y:340, w:60, h:18, dir:'right', pulled:false, label:'B'}
    ],
    balls: [
      // Left = looks like gold but is mixed with lava
      {x:100, y:240, r:15, type:'gold'},
      {x:140, y:220, r:15, type:'lava'},
      {x:80, y:260, r:15, type:'lava'},
      {x:160, y:260, r:15, type:'lava'},
      {x:120, y:280, r:15, type:'gold'},
      {x:160, y:290, r:15, type:'lava'},
      // Right = gold
      {x:360, y:240, r:15, type:'gold'},
      {x:400, y:220, r:15, type:'gold'},
      {x:340, y:260, r:15, type:'gold'},
      {x:420, y:260, r:15, type:'gold'},
      {x:380, y:280, r:15, type:'gold'},
      {x:340, y:290, r:15, type:'gold'},
    ],
    hero: {x:250, y:560, r:25},
    tutorial: false
  }
];

// ─── Ball Physics ───
class Ball {
  constructor(x, y, r, type){
    this.x = x; this.y = y; this.r = r;
    this.vx = 0; this.vy = 0;
    this.type = type; // 'gold', 'lava', 'water'
    this.active = true;
    this.collected = false;
    this.opacity = 1;
  }
  update(dt){
    if(!this.active) return;
    this.vy += 600 * dt; // gravity
    this.vx *= 0.98;
    this.vy *= 0.99;
    this.x += this.vx * dt;
    this.y += this.vy * dt;
    // wall collision
    for(const w of walls){
      this.collideWall(w);
    }
    // pin collision
    for(const p of pins){
      if(!p.pulled) this.collideWall(p);
    }
    // ball-ball collision
    for(const b of balls){
      if(b === this || !b.active) continue;
      this.collideBall(b);
    }
    // bounds
    if(this.x - this.r < 0){ this.x = this.r; this.vx *= -0.5; }
    if(this.x + this.r > W){ this.x = W - this.r; this.vx *= -0.5; }
    if(this.y + this.r > H + 50){ this.active = false; }
  }
  collideWall(w){
    const cx = Math.max(w.x, Math.min(this.x, w.x + w.w));
    const cy = Math.max(w.y, Math.min(this.y, w.y + w.h));
    const dx = this.x - cx, dy = this.y - cy;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if(dist < this.r && dist > 0){
      const nx = dx/dist, ny = dy/dist;
      this.x = cx + nx * this.r;
      this.y = cy + ny * this.r;
      const dot = this.vx*nx + this.vy*ny;
      this.vx -= 1.5 * dot * nx;
      this.vy -= 1.5 * dot * ny;
      this.vx *= 0.7;
      this.vy *= 0.7;
    }
  }
  collideBall(b){
    const dx = b.x - this.x, dy = b.y - this.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const minD = this.r + b.r;
    if(dist < minD && dist > 0){
      const nx = dx/dist, ny = dy/dist;
      const overlap = minD - dist;
      this.x -= nx * overlap * 0.5;
      this.y -= ny * overlap * 0.5;
      b.x += nx * overlap * 0.5;
      b.y += ny * overlap * 0.5;
      const dvx = this.vx - b.vx, dvy = this.vy - b.vy;
      const dvn = dvx*nx + dvy*ny;
      if(dvn > 0){
        this.vx -= dvn * nx * 0.5;
        this.vy -= dvn * ny * 0.5;
        b.vx += dvn * nx * 0.5;
        b.vy += dvn * ny * 0.5;
      }
    }
  }
  draw(){
    if(!this.active) return;
    ctx.save();
    ctx.globalAlpha = this.opacity;
    const g = ctx.createRadialGradient(this.x-this.r*0.3, this.y-this.r*0.3, this.r*0.1, this.x, this.y, this.r);
    if(this.type === 'gold'){
      g.addColorStop(0, C.goldShine);
      g.addColorStop(0.6, C.gold);
      g.addColorStop(1, C.goldDark);
    } else if(this.type === 'lava'){
      g.addColorStop(0, C.lavaGlow);
      g.addColorStop(0.6, C.lava);
      g.addColorStop(1, C.lavaDark);
    } else {
      g.addColorStop(0, '#81D4FA');
      g.addColorStop(0.6, C.water);
      g.addColorStop(1, C.waterDark);
    }
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
    ctx.fill();
    // shine
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.beginPath();
    ctx.arc(this.x - this.r*0.25, this.y - this.r*0.25, this.r*0.3, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
}

// ─── Particle System ───
class Particle {
  constructor(x, y, color, size){
    this.x = x; this.y = y;
    this.vx = (Math.random()-0.5)*200;
    this.vy = (Math.random()-0.5)*200 - 100;
    this.life = 1;
    this.decay = 1 + Math.random()*1.5;
    this.color = color;
    this.size = size || 3+Math.random()*4;
  }
  update(dt){
    this.vy += 300*dt;
    this.x += this.vx*dt;
    this.y += this.vy*dt;
    this.life -= this.decay*dt;
  }
  draw(){
    if(this.life <= 0) return;
    ctx.globalAlpha = this.life;
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size*this.life, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

function spawnParticles(x, y, color, count){
  for(let i=0;i<count;i++) particles.push(new Particle(x,y,color));
}

// ─── Level Loading ───
function loadLevel(idx){
  const lv = levels[idx];
  walls = lv.walls.map(w => ({...w}));
  pins = lv.pins.map(p => ({...p, pullProgress:0, shaking:false}));
  balls = lv.balls.map(b => new Ball(b.x, b.y, b.r, b.type));
  hero = {...lv.hero, happy:false, dead:false, goldCount:0, lavaCount:0, bounceT:0};
  particles = [];
  state = lv.tutorial ? 'tutorial' : 'playing';
  tutorialTimer = 0;
  levelCompleteDelay = 0;
  dragPin = null;
  shakeTimer = 0;
}

// ─── Input Handling ───
function getPos(e){
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width, scaleY = H / rect.height;
  const t = e.touches ? e.touches[0] : e;
  return { x:(t.clientX - rect.left)*scaleX, y:(t.clientY - rect.top)*scaleY };
}

canvas.addEventListener('mousedown', onDown);
canvas.addEventListener('mousemove', onMove);
canvas.addEventListener('mouseup', onUp);
canvas.addEventListener('touchstart', e=>{e.preventDefault();onDown(e);},{passive:false});
canvas.addEventListener('touchmove', e=>{e.preventDefault();onMove(e);},{passive:false});
canvas.addEventListener('touchend', e=>{e.preventDefault();onUp(e);},{passive:false});

function onDown(e){
  if(state === 'title'){
    state = 'playing';
    loadLevel(0);
    return;
  }
  if(state !== 'playing' && state !== 'tutorial') return;
  if(state === 'tutorial') state = 'playing';
  const p = getPos(e);
  for(const pin of pins){
    if(pin.pulled) continue;
    const margin = 25;
    if(p.x >= pin.x - margin && p.x <= pin.x + pin.w + margin &&
       p.y >= pin.y - margin && p.y <= pin.y + pin.h + margin){
      dragPin = pin;
      dragStartX = p.x;
      pin.shaking = false;
      break;
    }
  }
}

function onMove(e){
  if(!dragPin) return;
  const p = getPos(e);
  const dx = p.x - dragStartX;
  const dir = dragPin.dir === 'right' ? 1 : -1;
  dragPin.pullProgress = Math.max(0, Math.min(1, (dx * dir) / dragPin.w));
}

function onUp(e){
  if(!dragPin) return;
  if(dragPin.pullProgress > 0.6){
    dragPin.pulled = true;
    dragPin.pullProgress = 1;
    // pull sound effect via particles
    spawnParticles(dragPin.x + dragPin.w/2, dragPin.y + dragPin.h/2, C.pin, 12);
  } else {
    dragPin.pullProgress = 0;
  }
  dragPin = null;
}

// CTA
document.getElementById('retry-btn').addEventListener('click', ()=>{
  document.getElementById('cta-overlay').classList.remove('show');
  if(failCount >= 2){
    // After 2 fails, always show CTA
    showCTA("SOLVE MORE PUZZLES!", "This one's tricky... get the full game!");
    failCount = 0;
    return;
  }
  loadLevel(currentLevel);
});

function showCTA(title, subtitle){
  document.getElementById('cta-title').textContent = title || "CAN YOU SOLVE IT?";
  document.getElementById('cta-subtitle').textContent = subtitle || "Download now and prove your skills!";
  document.getElementById('cta-overlay').classList.add('show');
  state = 'cta';
}

// ─── Hero Collision Check ───
function checkHeroCollision(){
  if(!hero || hero.dead || hero.happy) return;
  for(const b of balls){
    if(!b.active || b.collected) continue;
    const dx = b.x - hero.x, dy = b.y - hero.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if(dist < hero.r + b.r){
      b.collected = true;
      b.active = false;
      if(b.type === 'lava'){
        hero.lavaCount++;
        hero.dead = true;
        shakeTimer = 0.3;
        shakeIntensity = 8;
        spawnParticles(hero.x, hero.y, C.lava, 30);
        spawnParticles(hero.x, hero.y, '#FF8800', 20);
        setTimeout(()=>{
          failCount++;
          if(currentLevel >= 2 || failCount >= 2){
            showCTA("OH NO! 😱", "Can you save the hero? Download to try!");
          } else {
            state = 'fail';
          }
        }, 800);
      } else {
        hero.goldCount++;
        spawnParticles(b.x, b.y, C.gold, 8);
      }
    }
  }
  // Check win condition
  const totalGold = balls.filter(b => b.type === 'gold').length;
  const collectedGold = balls.filter(b => b.type === 'gold' && b.collected).length;
  const activeBalls = balls.filter(b => b.active && !b.collected).length;
  if(!hero.dead && collectedGold > 0 && (collectedGold >= totalGold || activeBalls === 0)){
    if(!hero.happy){
      hero.happy = true;
      spawnParticles(hero.x, hero.y - 20, C.gold, 25);
      spawnParticles(hero.x, hero.y - 20, '#FFF', 15);
      levelCompleteDelay = 0;
    }
  }
}

// ─── Drawing Functions ───
function drawBg(){
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0, C.bg1);
  g.addColorStop(1, C.bg2);
  ctx.fillStyle = g;
  ctx.fillRect(0,0,W,H);
  // subtle grid
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  for(let x=0;x<W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
}

function drawWalls(){
  for(const w of walls){
    const g = ctx.createLinearGradient(w.x, w.y, w.x+w.w, w.y+w.h);
    g.addColorStop(0, C.wall);
    g.addColorStop(1, '#1e2d50');
    ctx.fillStyle = g;
    ctx.fillRect(w.x, w.y, w.w, w.h);
    ctx.strokeStyle = C.wallStroke;
    ctx.lineWidth = 1.5;
    ctx.strokeRect(w.x, w.y, w.w, w.h);
  }
}

function drawPins(){
  for(const pin of pins){
    if(pin.pulled) continue;
    const progress = pin.pullProgress || 0;
    const dir = pin.dir === 'right' ? 1 : -1;
    const offsetX = progress * pin.w * dir;

    ctx.save();
    if(pin.shaking){
      ctx.translate(Math.sin(timer*40)*3, 0);
    }
    // pin body
    const px = pin.x + offsetX;
    const g = ctx.createLinearGradient(px, pin.y, px, pin.y+pin.h);
    g.addColorStop(0, C.pinHighlight);
    g.addColorStop(0.5, C.pin);
    g.addColorStop(1, C.pinHandle);
    ctx.fillStyle = g;
    roundRect(px, pin.y, pin.w*(1-progress*0.1), pin.h, 4);
    ctx.fill();
    // handle circle
    const handleX = pin.dir === 'right' ? px + pin.w*(1-progress*0.1) : px;
    ctx.fillStyle = C.pinHandle;
    ctx.beginPath();
    ctx.arc(handleX, pin.y + pin.h/2, 14, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = C.pinHighlight;
    ctx.beginPath();
    ctx.arc(handleX, pin.y + pin.h/2, 10, 0, Math.PI*2);
    ctx.fill();
    // ring on handle
    ctx.strokeStyle = C.pinHandle;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(handleX, pin.y + pin.h/2, 7, 0, Math.PI*2);
    ctx.stroke();
    // label
    if(pin.label){
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 14px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(pin.label, px + pin.w*0.5*(1-progress*0.1), pin.y + pin.h/2);
    }
    ctx.restore();
  }
}

function drawHero(){
  if(!hero) return;
  const hx = hero.x, hy = hero.y, hr = hero.r;
  hero.bounceT += 0.05;
  const bounce = hero.happy ? Math.sin(hero.bounceT*4)*5 : Math.sin(hero.bounceT)*2;

  ctx.save();
  ctx.translate(0, bounce);
  // body
  const g = ctx.createRadialGradient(hx-5, hy-5, 2, hx, hy, hr);
  g.addColorStop(0, '#FFCC80');
  g.addColorStop(1, C.heroDark);
  ctx.fillStyle = hero.dead ? '#888' : g;
  ctx.beginPath();
  ctx.arc(hx, hy, hr, 0, Math.PI*2);
  ctx.fill();
  ctx.strokeStyle = hero.dead ? '#555' : '#E65100';
  ctx.lineWidth = 2;
  ctx.stroke();
  // eyes
  const eyeY = hy - 5;
  if(hero.dead){
    // X eyes
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 3;
    [-8, 8].forEach(ox=>{
      ctx.beginPath();ctx.moveTo(hx+ox-4,eyeY-4);ctx.lineTo(hx+ox+4,eyeY+4);ctx.stroke();
      ctx.beginPath();ctx.moveTo(hx+ox+4,eyeY-4);ctx.lineTo(hx+ox-4,eyeY+4);ctx.stroke();
    });
  } else {
    ctx.fillStyle = '#333';
    ctx.beginPath();ctx.arc(hx-8, eyeY, hero.happy?3:4, 0, Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(hx+8, eyeY, hero.happy?3:4, 0, Math.PI*2);ctx.fill();
    // eye shine
    ctx.fillStyle = '#fff';
    ctx.beginPath();ctx.arc(hx-7, eyeY-1, 1.5, 0, Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(hx+9, eyeY-1, 1.5, 0, Math.PI*2);ctx.fill();
  }
  // mouth
  if(hero.dead){
    ctx.strokeStyle = '#333'; ctx.lineWidth = 2;
    ctx.beginPath();ctx.arc(hx, hy+12, 6, Math.PI, 0);ctx.stroke();
  } else if(hero.happy){
    ctx.fillStyle = '#E65100';
    ctx.beginPath();ctx.arc(hx, hy+6, 8, 0, Math.PI);ctx.fill();
    ctx.fillStyle = '#FFF';
    ctx.fillRect(hx-6, hy+6, 12, 4);
  } else {
    ctx.strokeStyle = '#E65100'; ctx.lineWidth = 2;
    ctx.beginPath();ctx.arc(hx, hy+8, 5, 0.1, Math.PI-0.1);ctx.stroke();
  }
  // crown if winning
  if(hero.happy && hero.goldCount > 0){
    ctx.fillStyle = C.gold;
    ctx.beginPath();
    ctx.moveTo(hx-15, hy-hr-2);
    ctx.lineTo(hx-12, hy-hr-16);
    ctx.lineTo(hx-5, hy-hr-6);
    ctx.lineTo(hx, hy-hr-20);
    ctx.lineTo(hx+5, hy-hr-6);
    ctx.lineTo(hx+12, hy-hr-16);
    ctx.lineTo(hx+15, hy-hr-2);
    ctx.closePath();ctx.fill();
    ctx.strokeStyle = C.goldDark;ctx.lineWidth=1.5;ctx.stroke();
  }
  ctx.restore();
}

function drawTutorial(){
  if(state !== 'tutorial' && state !== 'playing') return;
  if(state === 'playing' && !levels[currentLevel].tutorial) return;
  if(state === 'playing' && pins.some(p=>p.pulled)) return;

  tutorialTimer += 0.016;
  const t = tutorialTimer % 2;
  if(!pins.length) return;
  const pin = pins[0];
  const startX = pin.x + pin.w + 20;
  const startY = pin.y + pin.h/2;
  const endX = pin.x + pin.w + 120;

  const progress = t < 1 ? Math.min(1, t/0.6) : Math.max(0, 1-(t-1)/0.4);
  const hx = startX + (endX - startX) * easeInOut(progress);
  const hy = startY;

  ctx.save();
  ctx.globalAlpha = 0.7 + Math.sin(tutorialTimer*3)*0.3;
  // hand icon
  ctx.fillStyle = C.tutorialHand;
  ctx.beginPath();
  ctx.arc(hx, hy, 16, 0, Math.PI*2);
  ctx.fill();
  // finger
  ctx.fillRect(hx-4, hy-25, 8, 25);
  ctx.beginPath();ctx.arc(hx, hy-25, 4, 0, Math.PI*2);ctx.fill();
  // arrow
  ctx.strokeStyle = '#FFD700';
  ctx.lineWidth = 3;
  ctx.setLineDash([8,4]);
  ctx.beginPath();
  ctx.moveTo(startX, startY);
  ctx.lineTo(endX, startY);
  ctx.stroke();
  ctx.setLineDash([]);
  // arrowhead
  ctx.fillStyle = '#FFD700';
  ctx.beginPath();
  ctx.moveTo(endX+10, startY);
  ctx.lineTo(endX-5, startY-8);
  ctx.lineTo(endX-5, startY+8);
  ctx.closePath();ctx.fill();
  // text
  ctx.font = 'bold 22px Arial';
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center';
  ctx.shadowColor = '#000';
  ctx.shadowBlur = 10;
  ctx.fillText('PULL THE PIN! →', W/2, pin.y - 40);
  ctx.shadowBlur = 0;
  ctx.restore();
}

function drawUI(){
  // level indicator
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 28px Arial';
  ctx.textAlign = 'center';
  ctx.fillText(`LEVEL ${currentLevel+1}`, W/2, 50);
  // progress dots
  for(let i=0;i<levels.length;i++){
    const dx = W/2 + (i-1)*30;
    ctx.fillStyle = i < currentLevel ? C.success : (i === currentLevel ? C.gold : '#444');
    ctx.beginPath();
    ctx.arc(dx, 80, i===currentLevel?8:6, 0, Math.PI*2);
    ctx.fill();
    if(i === currentLevel){
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.stroke();
    }
  }
}

function drawWinOverlay(){
  if(state !== 'win') return;
  ctx.save();
  ctx.globalAlpha = Math.min(1, transitionTimer*2);
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillRect(0,0,W,H);
  const scale = 0.5 + Math.min(1, transitionTimer*3)*0.5;
  ctx.translate(W/2, H/2-50);
  ctx.scale(scale, scale);
  ctx.font = 'bold 48px Arial';
  ctx.fillStyle = C.gold;
  ctx.textAlign = 'center';
  ctx.shadowColor = C.goldDark;
  ctx.shadowBlur = 20;
  ctx.fillText('CLEAR! ⭐', 0, 0);
  ctx.shadowBlur = 0;
  ctx.font = '24px Arial';
  ctx.fillStyle = '#fff';
  ctx.fillText(`+${hero.goldCount} Gold`, 0, 50);
  ctx.restore();
}

function drawFailOverlay(){
  if(state !== 'fail') return;
  ctx.save();
  ctx.globalAlpha = Math.min(1, transitionTimer*2);
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0,0,W,H);
  ctx.font = 'bold 42px Arial';
  ctx.fillStyle = C.fail;
  ctx.textAlign = 'center';
  ctx.shadowColor = '#000';
  ctx.shadowBlur = 15;
  ctx.fillText('FAILED!', W/2, H/2-30);
  ctx.shadowBlur = 0;
  ctx.font = '22px Arial';
  ctx.fillStyle = '#fff';
  ctx.fillText('Tap to retry', W/2, H/2+20);
  ctx.restore();
}

function drawTitle(){
  titleTimer += 0.016;
  drawBg();
  // big pin illustration
  ctx.save();
  ctx.translate(W/2, H/2 - 80);
  ctx.rotate(Math.sin(titleTimer*2)*0.05);
  // pin body
  const g = ctx.createLinearGradient(-60, -10, 60, 10);
  g.addColorStop(0, C.pinHighlight);
  g.addColorStop(0.5, C.pin);
  g.addColorStop(1, C.pinHandle);
  ctx.fillStyle = g;
  roundRect(-60, -12, 120, 24, 6);
  ctx.fill();
  // handle
  ctx.fillStyle = C.pinHandle;
  ctx.beginPath();ctx.arc(60, 0, 20, 0, Math.PI*2);ctx.fill();
  ctx.fillStyle = C.pinHighlight;
  ctx.beginPath();ctx.arc(60, 0, 14, 0, Math.PI*2);ctx.fill();
  ctx.restore();

  // title text
  const s = 1 + Math.sin(titleTimer*3)*0.03;
  ctx.save();
  ctx.translate(W/2, H/2 + 60);
  ctx.scale(s,s);
  ctx.font = 'bold 52px "Arial Black", Arial';
  ctx.fillStyle = C.gold;
  ctx.textAlign = 'center';
  ctx.shadowColor = 'rgba(255,215,0,0.3)';
  ctx.shadowBlur = 30;
  ctx.fillText('PIN PULL', 0, 0);
  ctx.shadowBlur = 0;
  ctx.font = '20px Arial';
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.fillText('PUZZLE', 0, 35);
  ctx.restore();

  // tap to start
  ctx.globalAlpha = 0.5 + Math.sin(titleTimer*4)*0.5;
  ctx.font = '22px Arial';
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center';
  ctx.fillText('TAP TO START', W/2, H/2 + 180);
  ctx.globalAlpha = 1;

  // gold balls decoration
  for(let i=0;i<5;i++){
    const bx = W*0.2 + i*(W*0.6/4);
    const by = H/2 + 250 + Math.sin(titleTimer*2+i)*15;
    const gr = ctx.createRadialGradient(bx-3,by-3,2,bx,by,15);
    gr.addColorStop(0, C.goldShine);
    gr.addColorStop(0.6, C.gold);
    gr.addColorStop(1, C.goldDark);
    ctx.fillStyle = gr;
    ctx.beginPath();ctx.arc(bx, by, 15, 0, Math.PI*2);ctx.fill();
  }
}

// ─── Helpers ───
function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}
function easeInOut(t){return t<0.5?2*t*t:(1-Math.pow(-2*t+2,2)/2);}

// ─── Main Loop ───
let lastTime = 0;
function gameLoop(timestamp){
  const dt = Math.min(0.033, (timestamp - lastTime)/1000);
  lastTime = timestamp;
  timer += dt;

  ctx.save();
  // screen shake
  if(shakeTimer > 0){
    shakeTimer -= dt;
    const sx = (Math.random()-0.5)*shakeIntensity*2;
    const sy = (Math.random()-0.5)*shakeIntensity*2;
    ctx.translate(sx, sy);
    shakeIntensity *= 0.95;
  }

  if(state === 'title'){
    drawTitle();
  } else {
    drawBg();
    drawWalls();
    drawPins();
    // update balls
    if(state === 'playing' || state === 'win' || state === 'fail'){
      for(const b of balls) b.update(dt);
      checkHeroCollision();
    }
    for(const b of balls) b.draw();
    drawHero();
    // particles
    particles = particles.filter(p=>p.life > 0);
    for(const p of particles){p.update(dt);p.draw();}
    drawUI();
    drawTutorial();

    // win/fail transitions
    if(state === 'win'){
      transitionTimer += dt;
      drawWinOverlay();
      if(transitionTimer > 2){
        currentLevel++;
        if(currentLevel >= levels.length){
          showCTA("YOU'RE A GENIUS! 🧠", "More puzzles waiting for you!");
        } else {
          loadLevel(currentLevel);
        }
      }
    }
    if(state === 'fail'){
      transitionTimer += dt;
      drawFailOverlay();
    }
    if(hero && hero.happy && state === 'playing'){
      levelCompleteDelay += dt;
      if(levelCompleteDelay > 0.8){
        state = 'win';
        transitionTimer = 0;
      }
    }
  }
  ctx.restore();

  requestAnimationFrame(gameLoop);
}

// fail retry on tap
canvas.addEventListener('click', ()=>{
  if(state === 'fail'){
    loadLevel(currentLevel);
  }
});

// ─── Start ───
requestAnimationFrame(gameLoop);

})();
</script>
