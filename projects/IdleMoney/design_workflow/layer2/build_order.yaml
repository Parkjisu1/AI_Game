    - step: 5
      nodes: [ShopManager, QuestManager, AchievementManager, AttendanceManager, RouletteManager, WorldMapManager, TutorialManager]
      reason: "Gacha + Challenge + Dungeon 완료 후."
    - step: 6
      nodes: [NotificationController, PiggyBankManager]
      reason: "대부분의 Domain 완료 후 집계."

