---
project: IdleMoney
genre: Idle
platform: unity
version: "1.0.0"
description: >
  IdleMoney 시스템 명세서. 역설계 기반 89건 DB에서 도출된
  54개 시스템의 Layer/Role 분류, 책임, 상태, 행동, 관계를 정의.
---

# ============================================================
# Layer 2: 시스템 명세서 (system_spec.yaml)
# ============================================================

system_list:
  Core:
    - Singleton
    - EventManager
    - ObjectPool
    - DataTableManager
    - ResourceManager

  Domain:
    - CurrencyManager
    - SaveLoadManager
    - SoundManager
    - LocalizationManager
    - AnalyticsManager
    - ProductionLineManager
    - MachineController
    - SlotController
    - TransporterController
    - SupplyMachineController
    - ManagerCharacterController
    - ProductController
    - FactoryManager
    - RebirthManager
    - ChallengeManager
    - DungeonManager
    - GachaManager
    - ShopManager
    - IAPManager
    - ADManager
    - QuestManager
    - AchievementManager
    - LabManager
    - MachineTuningManager
    - BoostEventManager
    - OfflineRewardCalculator
    - AttendanceManager
    - RouletteManager
    - TutorialManager
    - NotificationController
    - WorldMapManager
    - CollectionManager
    - PiggyBankManager

  Game:
    - MainHUDPage
    - FactoryInfoPopup
    - ShopPage
    - GachaResultPopup
    - MachineInfoPage
    - ManagerPage
    - LabPage
    - AchievementPage
    - WorldMapPage
    - DungeonPage
    - ChallengePage
    - OfflineRewardPopup
    - DailyRewardPopup
    - QuestPopup
    - OptionPopup
    - AlertPopup

# ============================================================
# 시스템 상세 명세
# ============================================================

systems:

  # ----------------------------------------------------------
  # Phase 0: Core Layer
  # ----------------------------------------------------------

  - nodeId: Singleton
    layer: Core
    genre: Generic
    role: Helper
    purpose: >
      DontDestroyOnLoad 싱글톤 패턴 베이스 클래스.
      모든 Manager 계열 클래스의 공통 부모.
    responsibilities:
      - 싱글톤 인스턴스 생성 및 중복 방지
      - DontDestroyOnLoad 적용
      - 제네릭 타입 파라미터로 타입 안전성 보장
    states: []
    behaviors:
      - trigger: "첫 번째 Instance 접근"
        action: "새 GameObject 생성 후 AddComponent, DontDestroyOnLoad 등록"
        result: "싱글톤 인스턴스 반환"
      - trigger: "두 번째 이후 Instance 접근"
        action: "기존 인스턴스 반환"
        result: "중복 생성 방지"
    relations:
      uses: []
      usedBy:
        - EventManager
        - ObjectPool
        - DataTableManager
        - ResourceManager
        - CurrencyManager
        - SaveLoadManager
        - SoundManager
        - LocalizationManager
        - AnalyticsManager
        - ProductionLineManager
        - FactoryManager
        - RebirthManager
        - ChallengeManager
        - DungeonManager
        - GachaManager
        - ShopManager
        - IAPManager
        - ADManager
        - QuestManager
        - AchievementManager
        - LabManager
        - MachineTuningManager
        - BoostEventManager
        - AttendanceManager
        - RouletteManager
        - TutorialManager
        - WorldMapManager
        - CollectionManager
        - PiggyBankManager
      publishes: []
      subscribes: []

  - nodeId: EventManager
    layer: Core
    genre: Generic
    role: Manager
    purpose: >
      전역 메시지/이벤트 발행-구독 시스템.
      시스템 간 직접 의존 없이 메시지로 통신.
    responsibilities:
      - 이벤트 타입별 핸들러 딕셔너리 관리
      - Subscribe/Unsubscribe 등록
      - SendMessage로 전체 구독자에게 이벤트 전파
      - 메모리 누수 방지를 위한 구독 해제 보장
    states: []
    behaviors:
      - trigger: "Subscribe(eventType, handler) 호출"
        action: "이벤트 타입의 핸들러 리스트에 추가"
        result: "이후 해당 이벤트 수신 가능"
      - trigger: "SendMessage(eventType, data) 호출"
        action: "해당 타입 구독자 전체에 data 전달"
        result: "모든 구독자 콜백 실행"
      - trigger: "Unsubscribe(eventType, handler) 호출"
        action: "핸들러 리스트에서 제거"
        result: "이후 이벤트 미수신"
    relations:
      uses:
        - Singleton
      usedBy:
        - "모든 Domain/Game Layer 시스템"
      publishes: []
      subscribes: []

  - nodeId: ObjectPool
    layer: Core
    genre: Generic
    role: Pool
    purpose: >
      오브젝트 풀링 시스템. Product, Transporter 등 반복 생성/소멸 오브젝트 관리.
      GC 부하 최소화.
    responsibilities:
      - 오브젝트 타입별 풀 생성 및 유지
      - Spawn(prefab) → 비활성 오브젝트 반환 또는 신규 생성
      - Despawn(obj) → 비활성화 후 풀 반환
      - 최대 풀 크기 제한
    states:
      - Idle
      - Spawning
      - Despawning
    behaviors:
      - trigger: "Spawn(prefab) 호출"
        action: "풀에서 비활성 오브젝트 검색, 없으면 Instantiate"
        result: "활성화된 오브젝트 반환"
      - trigger: "Despawn(obj) 호출"
        action: "오브젝트 비활성화 후 풀에 반환"
        result: "메모리 재사용 가능 상태"
    relations:
      uses:
        - Singleton
      usedBy:
        - ProductionLineManager
        - ProductController
        - TransporterController
      publishes: []
      subscribes: []

  - nodeId: DataTableManager
    layer: Core
    genre: Generic
    role: Manager
    purpose: >
      JSON 테이블 로드/캐시/조회 시스템. 42개 데이터 테이블을 메모리에 캐시하여
      전체 시스템에 공급.
    responsibilities:
      - 시작 시 42개 테이블 전량 로드 및 파싱
      - 테이블별 Dictionary 캐시 유지
      - 테이블 ID 기반 O(1) 조회 제공
      - 테이블 변경 시 캐시 갱신
    states:
      - Loading
      - Ready
    behaviors:
      - trigger: "게임 시작 (Awake)"
        action: "Resources 폴더에서 JSON 파일 42개 로드, 파싱, 캐시 저장"
        result: "전체 테이블 Ready 상태"
      - trigger: "GetTableData<T>(tableId, key) 호출"
        action: "캐시 Dictionary에서 O(1) 조회"
        result: "타입 T 데이터 반환"
    relations:
      uses:
        - Singleton
      usedBy:
        - ProductionLineManager
        - FactoryManager
        - RebirthManager
        - ChallengeManager
        - DungeonManager
        - GachaManager
        - ShopManager
        - IAPManager
        - QuestManager
        - AchievementManager
        - LabManager
        - MachineTuningManager
        - BoostEventManager
        - AttendanceManager
        - RouletteManager
        - WorldMapManager
        - OfflineRewardCalculator
      publishes: []
      subscribes: []

  - nodeId: ResourceManager
    layer: Core
    genre: Generic
    role: Manager
    purpose: >
      프리팹/스프라이트 로드 및 캐시 시스템. Resources.Load 래핑,
      반복 로드 비용 최소화.
    responsibilities:
      - 프리팹 경로 → Prefab 캐시 딕셔너리 관리
      - 스프라이트 경로 → Sprite 캐시 딕셔너리 관리
      - 비동기 로드 지원 (Addressables 대비 Resources 폴백)
      - 캐시 미스 시 Resources.Load 실행
    states:
      - Ready
    behaviors:
      - trigger: "GetPrefab(path) 호출"
        action: "캐시 조회 → 미스 시 Resources.Load → 캐시 저장"
        result: "GameObject 반환"
      - trigger: "GetSprite(path) 호출"
        action: "캐시 조회 → 미스 시 Resources.Load"
        result: "Sprite 반환"
    relations:
      uses:
        - Singleton
      usedBy:
        - ObjectPool
        - ProductionLineManager
        - GachaManager
        - MainHUDPage
        - ShopPage
        - MachineInfoPage
        - ManagerPage
        - CollectionManager
      publishes: []
      subscribes: []

  # ----------------------------------------------------------
  # Phase 1: Base Domain
  # ----------------------------------------------------------

  - nodeId: CurrencyManager
    layer: Domain
    genre: Idle
    role: Manager
    purpose: >
      5종 재화 관리 시스템. Money(Double)/Diamond/Gold/Material/ADSkip 재화의
      증가, 감소, 조회, 저장 일원화.
    responsibilities:
      - 5종 재화 현재 값 메모리 관리
      - 재화 증감 시 유효성 검증 (음수 방지)
      - 재화 변경 이벤트 발행
      - SaveLoadManager를 통한 영속성 보장
    states:
      - Ready
    behaviors:
      - trigger: "AddMoney(amount) 호출"
        action: "Money += amount, 변경 이벤트 발행"
        result: "재화 증가, UI 갱신 트리거"
      - trigger: "SpendDiamond(amount) 호출"
        action: "Diamond >= amount 검증 → Diamond -= amount → 이벤트 발행"
        result: "재화 감소 또는 실패 반환"
      - trigger: "GetMoney() 호출"
        action: "현재 Money 값 반환"
        result: "Double 타입 현재 재화량"
    relations:
      uses:
        - Singleton
        - EventManager
        - SaveLoadManager
      usedBy:
        - ProductionLineManager
        - FactoryManager
        - SlotController
        - SupplyMachineController
        - GachaManager
        - ShopManager
        - IAPManager
        - QuestManager
        - AchievementManager
        - LabManager
        - MachineTuningManager
        - AttendanceManager
        - RouletteManager
        - RebirthManager
        - OfflineRewardCalculator
        - PiggyBankManager
      publishes:
        - OnMoneyChanged
        - OnDiamondChanged
        - OnGoldChanged
        - OnMaterialChanged
        - OnADSkipChanged
      subscribes: []

  - nodeId: SaveLoadManager
    layer: Domain
    genre: Generic
    role: Manager
    purpose: >
      MessagePack 직렬화 기반 세이브/로드 시스템.
      로컬 저장 + 클라우드 동기화, 데이터 마이그레이션 지원.
    responsibilities:
      - UserInfo 전체를 MessagePack 바이너리로 직렬화/역직렬화
      - 로컬 파일 시스템 저장/로드
      - 클라우드 저장/로드 (쿨다운 제한: ~3초)
      - 튜토리얼 중 클라우드 접근 차단
      - 구버전 데이터 마이그레이션 (FixV1_03_1, Convert1_05)
    states:
      - Idle
      - Saving
      - Loading
      - CloudSyncing
    behaviors:
      - trigger: "Save() 호출"
        action: "UserInfo 직렬화 → 로컬 파일 쓰기 → 클라우드 쿨다운 체크 후 업로드"
        result: "데이터 영속화 완료"
      - trigger: "Load() 호출"
        action: "로컬 파일 읽기 → 역직렬화 → 마이그레이션 체크"
        result: "UserInfo 복원"
      - trigger: "CloudLoad() 호출"
        action: "클라우드에서 데이터 다운로드 → 로컬보다 최신인지 비교 → 갱신"
        result: "최신 데이터 적용"
    relations:
      uses:
        - Singleton
      usedBy:
        - CurrencyManager
        - ProductionLineManager
        - FactoryManager
        - RebirthManager
        - QuestManager
        - AchievementManager
        - LabManager
        - MachineTuningManager
        - AttendanceManager
        - WorldMapManager
        - CollectionManager
        - TutorialManager
      publishes:
        - OnSaveCompleted
        - OnLoadCompleted
      subscribes: []

  - nodeId: SoundManager
    layer: Domain
    genre: Generic
    role: Manager
    purpose: >
      BGM 1채널 + SFX 다중채널 AudioSource 관리.
      PlayerPrefs 기반 설정 저장.
    responsibilities:
      - BGM AudioSource 1개 관리 (루프 재생)
      - SFX AudioSource 풀 관리 (다중 동시 재생)
      - BGM On/Off, SFX On/Off 설정 저장/복원
      - 씬 전환 시 BGM 자동 전환
    states:
      - BGMPlaying
      - BGMOff
      - SFXOn
      - SFXOff
    behaviors:
      - trigger: "PlayBGM(clipId) 호출"
        action: "현재 BGM 정지 → 새 클립 로드 → 루프 재생"
        result: "BGM 전환 완료"
      - trigger: "PlaySFX(sfxId) 호출"
        action: "SFX On 상태 확인 → 사용 가능한 AudioSource로 원샷 재생"
        result: "효과음 재생"
      - trigger: "ToggleBGM() 호출"
        action: "BGM 상태 토글, PlayerPrefs 저장"
        result: "BGM 상태 변경 및 영속화"
    relations:
      uses:
        - Singleton
      usedBy:
        - MainHUDPage
        - OptionPopup
        - MachineController
        - ProductController
      publishes: []
      subscribes: []

  - nodeId: LocalizationManager
    layer: Domain
    genre: Generic
    role: Manager
    purpose: >
      4개국어(KO/EN/JA/ZH) 텍스트 관리. 897개 텍스트 키.
      런타임 언어 전환 지원.
    responsibilities:
      - LanguageTable JSON 로드 및 캐시
      - 언어 ID별 텍스트 딕셔너리 유지
      - GetText(key) → 현재 언어 텍스트 반환
      - 언어 변경 이벤트 발행 (UI 전체 갱신)
    states:
      - Ready
    behaviors:
      - trigger: "ChangeLanguage(languageId) 호출"
        action: "선택 언어 딕셔너리 활성화, OnLanguageChanged 발행"
        result: "전체 UI 텍스트 갱신"
      - trigger: "GetText(key) 호출"
        action: "현재 언어 딕셔너리에서 key 조회"
        result: "번역된 문자열 반환"
    relations:
      uses:
        - Singleton
        - DataTableManager
        - SaveLoadManager
      usedBy:
        - "모든 Game Layer UI 시스템"
      publishes:
        - OnLanguageChanged
      subscribes: []

  - nodeId: AnalyticsManager
    layer: Domain
    genre: Generic
    role: Manager
    purpose: >
      Firebase Analytics 이벤트 로깅 시스템.
      핵심 게임 행동 추적, KPI 데이터 수집.
    responsibilities:
      - Firebase Analytics SDK 초기화
      - 이벤트명 + 파라미터 딕셔너리 형태로 Firebase 전송
      - 에디터/빌드 환경 분기 (#if !UNITY_EDITOR)
      - 공통 파라미터 자동 첨부 (fac_relv, fac_lv 등)
    states:
      - Initializing
      - Ready
      - SimulationMode
    behaviors:
      - trigger: "LogEvent(eventName, params) 호출"
        action: "공통 파라미터 병합 → Firebase.LogEvent 전송"
        result: "이벤트 전송 완료"
      - trigger: "에디터 환경 실행"
        action: "Debug.Log로 시뮬레이션 출력"
        result: "빌드 에러 방지"
    relations:
      uses:
        - Singleton
      usedBy:
        - GachaManager
        - ShopManager
        - IAPManager
        - QuestManager
        - AttendanceManager
        - CollectionManager
        - OfflineRewardCalculator
      publishes: []
      subscribes: []

  # ----------------------------------------------------------
  # Phase 2: Domain Systems
  # ----------------------------------------------------------

  - nodeId: ProductionLineManager
    layer: Domain
    genre: Idle
    role: Manager
    purpose: >
      4개 생산라인 총괄 관리. 라인당 5슬롯 + 3운송차 + 1공급기 구성.
      수익 계산 공식 적용 및 이익 지급.
    responsibilities:
      - 4개 ProductionLine 인스턴스 초기화 및 관리
      - 라인별 활성화/비활성화 제어
      - 수익 계산 공식 적용 (productTableProfit × 부스트 × 버프 배율)
      - 라인 해금 조건 체크 (팩토리 레벨 기반)
      - 챌린지/던전 모드 전환 시 라인 상태 변경
    states:
      - NormalMode
      - ChallengeMode
      - DungeonMode
    behaviors:
      - trigger: "라인 수익 완료 이벤트"
        action: "수익 공식 계산 → CurrencyManager.AddMoney 호출"
        result: "재화 증가"
      - trigger: "라인 해금 조건 달성"
        action: "새 ProductionLine 활성화, UI 갱신"
        result: "라인 추가"
      - trigger: "챌린지 모드 시작"
        action: "모든 라인을 ChallengeMode로 전환"
        result: "특수 공급 모드 적용"
    relations:
      uses:
        - Singleton
        - EventManager
        - CurrencyManager
        - DataTableManager
        - ObjectPool
        - SaveLoadManager
        - BoostEventManager
        - LabManager
      usedBy:
        - FactoryManager
        - ChallengeManager
        - DungeonManager
        - OfflineRewardCalculator
        - MainHUDPage
      publishes:
        - OnLineUnlocked
        - OnProfitGenerated
      subscribes:
        - OnBoostActivated
        - OnLabBuffChanged
        - OnRebirthCompleted

  - nodeId: MachineController
    layer: Domain
    genre: Idle
    role: Controller
    purpose: >
      개별 머신 제어. 타격, 에너지(duration), 등급, 튜닝 레벨 관리.
      슬롯에 장착되어 제품 자동 타격 수행.
    responsibilities:
      - 머신 데이터(ID, Grade, TuningLevel, Duration) 관리
      - speed 간격으로 제품 자동 타격
      - Duration 소진 시 Tired 상태 전환
      - ManagerCharacterController의 Fix 이벤트 수신 후 에너지 회복
    states:
      - Idle
      - Attacking
      - Tired
      - Repairing
    behaviors:
      - trigger: "제품이 슬롯 사정거리 진입"
        action: "speed 타이머 시작, 타격 애니메이션 실행, 제품 HP 감소"
        result: "제품 단계 진행"
      - trigger: "duration <= 0"
        action: "Tired 상태로 전환, 타격 중단"
        result: "매니저 수리 대기"
      - trigger: "ManagerFix 이벤트 수신"
        action: "duration 회복, Attacking 상태로 복귀"
        result: "자동 타격 재개"
    relations:
      uses:
        - EventManager
        - DataTableManager
      usedBy:
        - SlotController
        - ManagerCharacterController
        - MachineTuningManager
      publishes:
        - OnMachineTired
        - OnMachineRepaired
      subscribes:
        - OnManagerFix

  - nodeId: SlotController
    layer: Domain
    genre: Idle
    role: Controller
    purpose: >
      생산라인 슬롯 제어. 슬롯 레벨업, 머신 장착/해제, 해금 관리.
    responsibilities:
      - 슬롯 레벨 및 레벨업 비용 관리
      - 머신 장착/해제 처리
      - 슬롯 해금 조건 확인 (팩토리 레벨 기반)
      - 슬롯 레벨에 따른 머신 파워 보너스 계산
    states:
      - Locked
      - Empty
      - Occupied
    behaviors:
      - trigger: "LevelUp() 호출"
        action: "비용 확인 → CurrencyManager.SpendMoney → 레벨 증가 → 파워 재계산"
        result: "슬롯 레벨업, 머신 파워 증가"
      - trigger: "MountMachine(machineId) 호출"
        action: "빈 슬롯 확인 → 머신 데이터 로드 → MachineController 생성"
        result: "머신 장착 완료"
    relations:
      uses:
        - CurrencyManager
        - DataTableManager
        - MachineController
      usedBy:
        - ProductionLineManager
        - MachineInfoPage
      publishes:
        - OnSlotLevelUp
        - OnMachineMounted
        - OnMachineUnmounted
      subscribes: []

  - nodeId: TransporterController
    layer: Domain
    genre: Idle
    role: Controller
    purpose: >
      운송차 6단계 상태머신 제어. 완성 제품 수집 → 배달 → 수익 처리.
    responsibilities:
      - 6단계 상태 머신 관리 (HideWaiting → MoveToLoad → Waiting → Loading → FullLoading → Transporting)
      - 완성 제품 픽업 및 슬롯 관리 (3슬롯)
      - 목적지 도착 시 수익 콜백 호출
      - 운송 속도 및 경로 계산
    states:
      - HideWaiting
      - MoveToLoad
      - Waiting
      - Loading
      - FullLoading
      - Transporting
    behaviors:
      - trigger: "완성 제품 감지"
        action: "MoveToLoad 상태로 전환, 픽업 위치 이동"
        result: "제품 수집 시작"
      - trigger: "모든 슬롯 적재 완료"
        action: "FullLoading → Transporting 전환, 목적지로 이동"
        result: "배달 시작"
      - trigger: "목적지 도착"
        action: "profitCallback 호출, 슬롯 초기화, HideWaiting으로 복귀"
        result: "수익 지급, 재사용 준비"
    relations:
      uses:
        - ObjectPool
        - EventManager
        - ProductionLineManager
      usedBy:
        - ProductionLineManager
      publishes:
        - OnProfitDelivered
      subscribes:
        - OnProductComplete

  - nodeId: SupplyMachineController
    layer: Domain
    genre: Idle
    role: Controller
    purpose: >
      공급기 레벨업, 부스트 관리. 제품 생산 속도와 양을 결정하는 핵심 컨트롤러.
    responsibilities:
      - 공급 간격(supplyTime), 공급량(supplyAmount) 계산
      - 머니 보너스 배율(moneyBonus) 관리
      - 레벨업 시 비용 소비 및 스탯 증가
      - 부스트 활성화 시 일시적 속도 증가
      - 팩토리 레벨 기반 해금 체크
    states:
      - Locked
      - Normal
      - Boosted
    behaviors:
      - trigger: "LevelUp() 호출"
        action: "비용 확인 → 레벨 증가 → supplyAmount/supplyTime 재계산"
        result: "공급 성능 향상"
      - trigger: "ActivateBoost() 호출"
        action: "Boosted 상태 전환, 타이머 시작"
        result: "공급 속도 일시 증가"
      - trigger: "부스트 타이머 만료"
        action: "Normal 상태 복귀"
        result: "부스트 종료"
    relations:
      uses:
        - CurrencyManager
        - DataTableManager
        - EventManager
      usedBy:
        - ProductionLineManager
        - BoostEventManager
        - FactoryInfoPopup
      publishes:
        - OnSupplyBoostActivated
        - OnSupplyBoostExpired
      subscribes:
        - OnBoostEventTriggered

  - nodeId: ManagerCharacterController
    layer: Domain
    genre: Idle
    role: Controller
    purpose: >
      매니저 캐릭터 AI. Idle→Move→Fix→Tired→Sleep→Wakeup 6단계 상태머신.
      에너지 소진된 머신을 자동 수리.
    responsibilities:
      - 6단계 상태머신 실행 (Idle/Move/Fix/Tired/Sleep/Wakeup)
      - Tired 머신 스캔 및 우선순위 선택
      - 수리 속도(fixSpeed)로 머신 Duration 회복
      - 스태미나(stamina) 소모 및 회복 관리
      - 수면(Sleep) 후 완전 회복
    states:
      - Idle
      - Move
      - Fix
      - Tired
      - Sleep
      - Wakeup
    behaviors:
      - trigger: "OnMachineTired 이벤트 수신"
        action: "타깃 머신 선정, Move 상태로 전환"
        result: "수리 이동 시작"
      - trigger: "머신 위치 도달"
        action: "Fix 상태 전환, fixSpeed로 duration 회복, stamina 소모"
        result: "머신 수리 중"
      - trigger: "stamina <= 0"
        action: "Tired → Sleep 전환, 스태미나 완전 회복 타이머"
        result: "매니저 수면 시작"
    relations:
      uses:
        - EventManager
        - MachineController
      usedBy:
        - ProductionLineManager
        - ManagerPage
      publishes:
        - OnManagerFixStart
        - OnManagerFixComplete
        - OnManagerSleep
        - OnManagerWakeup
      subscribes:
        - OnMachineTired
        - OnRebirthCompleted

  - nodeId: ProductController
    layer: Domain
    genre: Idle
    role: Controller
    purpose: >
      제품 6단계 진행 관리. HP 관리, 단계별 진행, 완성 시 Transporter로 전달.
    responsibilities:
      - 제품 MaxStepNum=6 단계 진행 관리
      - 단계별 HP 감소 처리 (머신 타격 수신)
      - HP <= 0 시 다음 단계로 전환
      - 최종 단계 완료 시 Transporter에 수집 신호 발행
      - ObjectPool 반환 (완성 후 비활성화)
    states:
      - Step1
      - Step2
      - Step3
      - Step4
      - Step5
      - Step6
      - Complete
    behaviors:
      - trigger: "머신 타격 이벤트"
        action: "HP -= damage, HP <= 0 이면 NextStep 전환"
        result: "제품 진행"
      - trigger: "Step6 완료"
        action: "OnProductComplete 이벤트 발행, 비활성화 대기"
        result: "Transporter 픽업 신호"
    relations:
      uses:
        - ObjectPool
        - EventManager
      usedBy:
        - SupplyMachineController
        - TransporterController
      publishes:
        - OnProductComplete
        - OnProductStepChanged
      subscribes: []

  - nodeId: FactoryManager
    layer: Domain
    genre: Idle
    role: Manager
    purpose: >
      팩토리 레벨업, 슬롯 해금, 생산라인 해금 총괄.
      1600레벨까지의 진행 관리.
    responsibilities:
      - 팩토리 레벨 및 레벨업 비용 관리 (1600행 테이블)
      - 마일스톤 레벨 도달 시 기능 해금 처리
      - 슬롯/공급기/매니저 버튼 해금 조건 체크
      - 레드닷 트리거 (Money >= NextLevelCost)
      - 팩토리별 독립 데이터 관리 (dicFactories)
    states:
      - NormalMode
      - MaxLevel
    behaviors:
      - trigger: "LevelUp() 호출"
        action: "비용 확인 → 레벨 증가 → 마일스톤 체크 → 기능 해금"
        result: "팩토리 레벨업"
      - trigger: "마일스톤 레벨 달성"
        action: "해당 기능(공급기/매니저/월드 등) 해금 이벤트 발행"
        result: "새 기능 활성화"
    relations:
      uses:
        - Singleton
        - CurrencyManager
        - DataTableManager
        - SaveLoadManager
        - ProductionLineManager
      usedBy:
        - RebirthManager
        - NotificationController
        - FactoryInfoPopup
        - MainHUDPage
      publishes:
        - OnFactoryLevelUp
        - OnFeatureUnlocked
        - OnFactoryUpgradeAvailable
      subscribes:
        - OnMoneyChanged

  - nodeId: RebirthManager
    layer: Domain
    genre: Idle
    role: Manager
    purpose: >
      프레스티지 시스템. 월드 해금, SellOff 처리, 리버스 카운트 관리.
    responsibilities:
      - 총 12회 리버스 사이클 관리
      - SellOff 실행 (팩토리 리셋, 리버스 카운트 증가)
      - 리버스별 보상 지급 (FactoryRebirthRewardTable)
      - 새 월드 해금 처리
      - 리버스 기반 콘텐츠 게이트 해금 (연구소, 던전, 매니저)
    states:
      - WaitingForChallenge
      - ProcessingRebirth
      - Complete
    behaviors:
      - trigger: "챌린지 성공 이벤트 수신"
        action: "SellOff 실행 → 리버스 카운트 증가 → 보상 지급 → 월드 해금"
        result: "프레스티지 완료"
      - trigger: "리버스 카운트 변경"
        action: "게이트 조건 체크, 연구소/던전/매니저 해금 여부 갱신"
        result: "콘텐츠 해금 이벤트 발행"
    relations:
      uses:
        - Singleton
        - CurrencyManager
        - DataTableManager
        - SaveLoadManager
        - FactoryManager
        - WorldMapManager
      usedBy:
        - ChallengeManager
        - DungeonManager
        - LabManager
        - ManagerCharacterController
      publishes:
        - OnRebirthCompleted
        - OnWorldUnlocked
        - OnContentGateUnlocked
      subscribes:
        - OnChallengeSuccess

  - nodeId: ChallengeManager
    layer: Domain
    genre: Idle
    role: Manager
    purpose: >
      팩토리 챌린지 모드 관리. 제한 시간 내 목표 금액 달성 목표.
      성공 시 RebirthManager를 통해 프레스티지 실행.
    responsibilities:
      - 챌린지 조건 확인 (팩토리 레벨 >= RebirthConditionFactoryLevel)
      - 챌린지 초기화 (목표 금액, 시간 제한, 해머 파워 설정)
      - 실시간 수익 추적
      - 성공/실패 판정 및 결과 처리
      - 재도전 비용 관리 (다이아 누적 증가)
    states:
      - Idle
      - Ready
      - Playing
      - Success
      - Failed
    behaviors:
      - trigger: "StartChallenge() 호출"
        action: "목표 설정 → 라인 ChallengeMode 전환 → 타이머 시작"
        result: "챌린지 플레이 시작"
      - trigger: "currentMoney >= TargetMoneyAmount"
        action: "Success 상태, OnChallengeSuccess 발행"
        result: "프레스티지 트리거"
      - trigger: "타이머 만료"
        action: "Failed 상태, 재도전 옵션 제시"
        result: "챌린지 실패 처리"
    relations:
      uses:
        - Singleton
        - EventManager
        - CurrencyManager
        - DataTableManager
        - ProductionLineManager
        - ADManager
      usedBy:
        - RebirthManager
        - ChallengePage
      publishes:
        - OnChallengeStart
        - OnChallengeSuccess
        - OnChallengeFailed
      subscribes:
        - OnProfitGenerated

  - nodeId: DungeonManager
    layer: Domain
    genre: Idle
    role: Manager
    purpose: >
      코인 던전 모드 관리. 제한 시간 내 목표 제품 파괴 수 달성.
      66개 레벨, 특수 레벨 스케일 변경.
    responsibilities:
      - 66개 던전 레벨 데이터 관리
      - 던전 진입 조건 확인 (리버스 카운트 기반)
      - 던전 초기화 (목표, 시간, HP 설정)
      - 실시간 파괴 카운터 추적
      - 특수 레벨 처리 (제품 스케일 변경)
      - 재도전 비용 관리
    states:
      - Idle
      - Ready
      - Playing
      - Success
      - Failed
    behaviors:
      - trigger: "EnterDungeon(level) 호출"
        action: "레벨 데이터 로드 → 라인 DungeonMode 전환 → 타이머 시작"
        result: "던전 플레이 시작"
      - trigger: "파괴 카운터 >= TargetProductBreakAmount"
        action: "Success 상태, 보상 지급"
        result: "던전 클리어"
      - trigger: "특수 레벨 (IsSpecialLevel=1)"
        action: "제품 스케일 SPECIAL_DUNGEON_SCALE_FACTOR 적용"
        result: "특수 레벨 연출"
    relations:
      uses:
        - Singleton
        - EventManager
        - CurrencyManager
        - DataTableManager
        - ProductionLineManager
        - RebirthManager
        - ADManager
      usedBy:
        - DungeonPage
      publishes:
        - OnDungeonStart
        - OnDungeonSuccess
        - OnDungeonFailed
      subscribes:
        - OnProductComplete
        - OnRebirthCompleted

  - nodeId: GachaManager
    layer: Domain
    genre: Idle
    role: Manager
    purpose: >
      7종 가챠 박스 실행. 등급 확률 계산, 보장 드롭, 중복→EXP 변환 처리.
    responsibilities:
      - 7종 박스 타입별 확률 테이블 관리
      - 첫 2회 보장 드롭 로직
      - 등급 결정 (General~SuperLegend 누적 확률)
      - 신규/중복 머신 판정 (NewMachineSelectChance)
      - 중복 시 MachineTuningManager에 EXP 전달
      - 부산물 재료(Material) 지급
      - Analytics 이벤트 로깅
    states:
      - Idle
      - Rolling
    behaviors:
      - trigger: "ExecuteGacha(boxType) 호출"
        action: "비용 차감 → 보장 체크 → 등급 결정 → 머신 선택 → 결과 처리"
        result: "머신 획득 또는 EXP 전환"
      - trigger: "중복 머신 획득"
        action: "MachineTuningManager.AddEXP 호출"
        result: "튜닝 EXP 추가"
    relations:
      uses:
        - Singleton
        - CurrencyManager
        - DataTableManager
        - MachineTuningManager
        - CollectionManager
        - AnalyticsManager
        - ADManager
      usedBy:
        - ShopManager
        - ShopPage
        - GachaResultPopup
      publishes:
        - OnGachaComplete
        - OnNewMachineAcquired
      subscribes: []

  - nodeId: ShopManager
    layer: Domain
    genre: Idle
    role: Manager
    purpose: >
      상점 UI 제어. Diamond/Package/Etc/LoopyCoin 4탭 상점 데이터 관리.
    responsibilities:
      - 상점 탭별 상품 목록 데이터 공급
      - 구매 버튼 활성화 조건 관리
      - IAPManager 구매 요청 중계
      - 상점 열기/닫기 이벤트 처리
      - Analytics 상점 진입 이벤트 로깅
    states:
      - Closed
      - Open
    behaviors:
      - trigger: "OpenShop(tabId) 호출"
        action: "탭별 상품 데이터 로드 → UI 갱신"
        result: "상점 표시"
      - trigger: "PurchaseItem(itemId) 호출"
        action: "재화 타입 확인 → IAPManager 또는 CurrencyManager 라우팅"
        result: "구매 처리"
    relations:
      uses:
        - Singleton
        - CurrencyManager
        - DataTableManager
        - IAPManager
        - GachaManager
        - AnalyticsManager
      usedBy:
        - ShopPage
      publishes:
        - OnShopPurchaseComplete
      subscribes:
        - OnIAPSuccess

  - nodeId: IAPManager
    layer: Domain
    genre: Generic
    role: Manager
    purpose: >
      Unity Purchasing 5.0 IAP 통합. 영수증 검증 및 보상 지급.
    responsibilities:
      - IStoreListener 구현 (초기화/구매/실패 콜백)
      - 플랫폼별 PID 관리 (Android/iOS)
      - 영수증 검증 (UnityEngine.Purchasing.Security)
      - 구매 성공 시 보상 지급 (InAppPuchaseSuccessMsg)
      - 피기뱅크 특수 PID 처리
    states:
      - Initializing
      - Ready
      - Processing
    behaviors:
      - trigger: "Purchase(productId) 호출"
        action: "AllPlugins.Purchase(PID) → 플랫폼 결제 트리거"
        result: "결제 창 표시"
      - trigger: "onPurchaseSuccess 콜백"
        action: "영수증 검증 → 보상 조회 → CurrencyManager 지급"
        result: "보상 지급 완료"
      - trigger: "onPurchaseFailed 콜백"
        action: "실패 원인 로깅, UI 복원"
        result: "구매 취소 처리"
    relations:
      uses:
        - Singleton
        - CurrencyManager
        - DataTableManager
        - AnalyticsManager
      usedBy:
        - ShopManager
        - PiggyBankManager
      publishes:
        - OnIAPSuccess
        - OnIAPFailed
      subscribes: []

  - nodeId: ADManager
    layer: Domain
    genre: Generic
    role: Manager
    purpose: >
      리워드 광고 관리. 빈도 제한(세션 최대 10회), 쿨다운 제어.
    responsibilities:
      - 세션 광고 시청 횟수 추적
      - 쿨다운 타이머 관리 (LastShowADBannerTime 등)
      - 광고 사용 가능 여부 반환 (IsAdAvailable)
      - 광고 완료 콜백 → 보상 지급 라우팅
      - 패키지 RemoveAD 효과 적용
    states:
      - Available
      - OnCooldown
      - Playing
      - SessionLimitReached
    behaviors:
      - trigger: "ShowRewardAd(rewardType) 호출"
        action: "가용성 확인 → 광고 로드/재생 → 완료 콜백 대기"
        result: "광고 재생"
      - trigger: "광고 완료 콜백"
        action: "시청 횟수 증가, 쿨다운 타이머 시작, 보상 지급"
        result: "보상 지급 완료"
    relations:
      uses:
        - Singleton
        - EventManager
      usedBy:
        - ChallengeManager
        - DungeonManager
        - OfflineRewardCalculator
        - AttendanceManager
        - BoostEventManager
        - GachaManager
        - RouletteManager
      publishes:
        - OnAdCompleted
        - OnAdFailed
      subscribes: []

  - nodeId: QuestManager
    layer: Domain
    genre: Idle
    role: Manager
    purpose: >
      퀘스트 생성/추적/보상 시스템. 3종 타입 퀘스트 병렬 수행.
    responsibilities:
      - 3종 퀘스트 슬롯 관리 (MaxQuestNum)
      - 퀘스트 생성 (productID, neededCount, rewardAmount)
      - 제품 생산 카운터 실시간 추적
      - 완료 판정 및 보상 지급
