      - 이벤트 라이프사이클 관리 (Register→StartCoolTime→StartEvent→FinishEvent→Restart)
    states:
      - Cooldown
      - Available
      - Active
      - Expired
    behaviors:
      - trigger: "쿨다운 타이머 만료"
        action: "팩토리 레벨 게이트 확인 → 이벤트 팝업 표시"
        result: "부스트 이벤트 제안"
      - trigger: "사용자 광고 수락"
        action: "ADManager.ShowRewardAd → 완료 시 부스트 활성화"
        result: "부스트 효과 적용"
      - trigger: "부스트 지속 타이머 만료"
        action: "부스트 제거, Cooldown 재시작"
        result: "부스트 종료"
    relations:
