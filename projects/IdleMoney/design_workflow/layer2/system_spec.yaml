  - nodeId: MachineTuningManager
    layer: Domain
    genre: Idle
    role: Manager
    purpose: >
      머신 EXP 관리, 튜닝 레벨업, 재료 소비 처리.
    responsibilities:
      - 머신별 누적 EXP 관리
      - EXP += 요청 처리 (탭/중복 가챠)
      - 레벨업 조건 체크 (accumulatedEXP >= RequiredExpByGrade)
      - 재료(Material) 소비 처리
      - 튜닝 레벨에 따른 파워 재계산 트리거
    states:
      - Idle
    behaviors:
      - trigger: "AddEXP(machineId, amount) 호출"
        action: "EXP 누적 → 레벨업 조건 체크 → 조건 충족 시 레벨업 실행"
        result: "EXP 증가, 필요 시 레벨업"
      - trigger: "TuningLevelUp(machineId) 호출"
        action: "재료 소비 → 튜닝 레벨 증가 → MachineController 파워 재계산"
        result: "머신 파워 증가"
    relations:
      uses:
        - Singleton
        - CurrencyManager
        - DataTableManager
        - SaveLoadManager
      usedBy:
        - GachaManager
        - MachineController
        - MachineInfoPage
      publishes:
        - OnTuningLevelUp
      subscribes: []

