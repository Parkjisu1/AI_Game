  lab_buff_types: 5
  achievement_categories: 14
  achievement_tiers: 15
  daily_check_cycle: 7

# ============================================================
# 수익 공식
# ============================================================

revenue_formula:
  base: "productTableProfit"
  multipliers:
    - "credit (Credit 재화 보너스)"
    - "boosts (광고/패키지 부스트)"
    - "labBuffs (연구소 영구 버프)"
    - "moneyBoostFactor (머니 부스트 계수)"
  formula: "productTableProfit × (1 + credit + boosts + labBuffs) × moneyBoostFactor"
