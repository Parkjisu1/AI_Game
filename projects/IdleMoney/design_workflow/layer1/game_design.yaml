game_overview:
  title: "Idle Money (아이들 머니)"
  genre: "Idle"
  sub_genre:
    - "Clicker"
    - "Factory"
    - "Prestige"
  platform: "unity"
  target_platform:
    - "Android"
    - "iOS"
  developer: "Studio"
  target_user: "casual~midcore"
  session_length: "3~10min"
  one_liner: "공장에 머신을 배치하고 제품을 생산/판매하여 돈을 벌고, 리버스(프레스티지)를 통해 새 월드를 해금하는 아이들 클리커 게임"
  references:
    - "Adventure Capitalist"
    - "Idle Miner Tycoon"
    - "Factory Inc"

# ============================================================
# 핵심 경험
# ============================================================

core_experience:
  main_fun: "성장 곡선의 카타르시스 - 기하급수적 수입 증가 + 프레스티지 리셋 후 더 빠른 성장"
  emotion_goal: "내가 만든 공장이 자동으로 돈을 벌어준다 → 효율 최적화의 만족감"
  core_verbs:
    - "Tap (탭 공격)"
    - "Upgrade (업그레이드)"
    - "Collect (수집)"
    - "Prestige (프레스티지 리버스)"

# ============================================================
# 코어 루프
# ============================================================

core_loop:
  main_loop:
    description: "공장 생산 사이클 - 공급 → 타격 → 운송 → 수익 → 업그레이드"
    duration: "30초~2분"
    flow:
      - "공급기(ProductSupplyer)가 supplyTime 간격으로 supplyAmount개 제품 생성"
      - "머신이 제품을 탭/자동 타격 → 6단계(MaxStepNum=6) 진행"
      - "운송차(Transporter, 라인당 3대 × 3슬롯)가 완성 제품 수집"
      - "수익 계산: productTableProfit × (1 + credit + boosts + labBuffs) × moneyBoostFactor"
      - "수익으로 팩토리/슬롯/머신 업그레이드 → 생산 속도/수익 증가"
      - "루프 반복"

  daily_loop:
    description: "일일 접속 보상 및 콘텐츠 소비 사이클"
    flow:
      - "앱 실행 → 오프라인 보상 팝업 수령 (시간 기반, 연구소 버프 적용)"
      - "일일 출석 보상 확인 (7일 사이클: Diamond/Material/Box 등)"
      - "퀘스트 수행 (3종 타입: 머니/교체/다이아 보상)"
      - "던전 도전 (시간 제한 내 목표 제품 파괴)"
      - "광고 시청 부스트 활성화 (파워/머니/공급 부스트)"
      - "가챠 돌리기 (머신 수집, 7종 박스)"
      - "팩토리 업그레이드 후 오프라인 전환"

  long_term_loop:
    description: "월드 확장 및 컬렉션 완성 사이클"
    flow:
      - "팩토리 레벨업 (1~1600 레벨 곡선)"
      - "리버스(프레스티지) 챌린지 달성 → 새 월드 해금 (총 12 월드)"
      - "머신 컬렉션 완성 (37종, 5등급: General~SuperLegend)"
      - "머신 튜닝 (EXP 누적 → 등급별 레벨업)"
      - "연구소 해금 (리버스 N회 후) → 영구 버프 강화 (12 아이템, 5종 버프)"
      - "업적 달성 (14 카테고리 × 15 티어)"
      - "새 월드에서 더 빠른 속도로 성장 반복"

# ============================================================
# 세션 구조
# ============================================================

session_structure:
  start_condition: "앱 실행 → 오프라인 보상 팝업 → 메인 화면(팩토리 뷰)"
  progress_type: "auto"
  progress_detail:
    - "자동(auto): 생산 라인이 자동으로 동작 (머신 자동 타격, 운송차 자동 수집)"
    - "수동(manual): 플레이어 직접 탭 공격 → 생산 속도 가속"
  end_conditions:
    - "자연 이탈 (강제 종료 없음)"
    - "오프라인 타이머 자동 시작"
  result_handling: "오프라인 경과 시간 기반 수익 계산, 다음 접속 시 팝업으로 보상 지급"

