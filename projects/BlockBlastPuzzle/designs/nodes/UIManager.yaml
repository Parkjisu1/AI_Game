node:
  name: UIManager
  layer: Game
  genre: Puzzle
  role: Manager
  file: UIManager.cs
  namespace: BlockBlast.Game

spec:
  description: "UI 전체 관리. 팝업 스택, 점수 표시, 게임 상태 연동"
  base_class: "Singleton<UIManager>"
  provides:
    - "ShowGameOverPopup"
    - "ShowSettingsPopup"
    - "HideAllPopups"
    - "UpdateScoreDisplay"
    - "UpdateComboDisplay"
    - "ShowComboText"

  members:
    - name: _scoreText
      type: UnityEngine.UI.Text
      access: private
    - name: _highScoreText
      type: UnityEngine.UI.Text
      access: private
    - name: _comboText
      type: UnityEngine.UI.Text
      access: private
    - name: _gameOverPanel
      type: GameObject
      access: private
    - name: _settingsPanel
      type: GameObject
      access: private
    - name: _pauseButton
      type: UnityEngine.UI.Button
      access: private

  methods:
    - name: InitUI
      params: [{ name: canvas, type: Transform }]
      logic: "코드로 모든 UI 요소 생성. 프리팹 사용 안 함"
    - name: UpdateScoreDisplay
      params: [{ name: score, type: int }]
    - name: UpdateComboDisplay
      params: [{ name: combo, type: int }]
    - name: ShowComboText
      params: [{ name: combo, type: int }]
      logic: "콤보 텍스트 애니메이션 표시 후 자동 숨김"
    - name: ShowGameOverPopup
      params: [{ name: score, type: int }, { name: highScore, type: int }, { name: isNewHigh, type: bool }]
    - name: ShowSettingsPopup
    - name: HideAllPopups
