node:
  name: BlockVisual
  layer: Game
  genre: Puzzle
  role: Controller
  file: BlockVisual.cs
  namespace: BlockBlast.Game

spec:
  description: "드래그 가능한 블록 비주얼. 여러 셀 SpriteRenderer로 구성"
  provides:
    - "Setup"
    - "SetDragging"
    - "SnapBack"
  requires:
    - "BlockData"
    - "SpriteFactory"

  members:
    - name: _shape
      type: BlockShape
      access: private
    - name: _color
      type: Color
      access: private
    - name: _colorIndex
      type: int
      access: private
    - name: _cellObjects
      type: "List<GameObject>"
      access: private
    - name: _originalPosition
      type: Vector3
      access: private

  properties:
    - name: Shape
      type: BlockShape
      getter: true
    - name: ColorIndex
      type: int
      getter: true

  methods:
    - name: Setup
      params: [{ name: shape, type: BlockShape }, { name: colorIndex, type: int }]
      logic: |
        모양의 각 셀에 대해:
          new GameObject → SpriteRenderer 추가
          SpriteFactory.CreateRoundedSprite로 스프라이트 생성
          부모에 연결
    - name: SetDragging
      params: [{ name: dragging, type: bool }]
      logic: "스케일 변경 (후보 크기 ↔ 실제 크기)"
    - name: SnapBack
      logic: "원래 위치로 부드럽게 복귀 (코루틴)"
    - name: DestroySelf
      logic: "모든 셀 오브젝트 제거 후 자신 제거"
