node:
  name: CellVisual
  layer: Game
  genre: Puzzle
  role: Controller
  file: CellVisual.cs
  namespace: BlockBlast.Game

spec:
  description: "보드 개별 셀의 비주얼. SpriteRenderer로 색상/상태 표현"
  provides:
    - "SetOccupied"
    - "SetEmpty"
    - "SetPreview"
    - "PlayClearAnimation"

  members:
    - name: _renderer
      type: SpriteRenderer
      access: private
    - name: _isOccupied
      type: bool
      access: private
    - name: _occupiedColor
      type: Color
      access: private
    - name: _gridPosition
      type: Vector2Int
      access: private

  constants:
    - { name: EMPTY_COLOR, value: "new Color(0.15f, 0.15f, 0.2f, 1f)" }
    - { name: PREVIEW_VALID_COLOR, value: "new Color(1f, 1f, 1f, 0.3f)" }
    - { name: PREVIEW_INVALID_COLOR, value: "new Color(1f, 0.3f, 0.3f, 0.3f)" }

  methods:
    - name: Init
      params: [{ name: gridPos, type: Vector2Int }, { name: sprite, type: Sprite }]
      logic: "SpriteRenderer 설정, 빈 셀 색상"
    - name: SetOccupied
      params: [{ name: color, type: Color }]
      logic: "점유 색상 설정"
    - name: SetEmpty
      logic: "빈 셀 색상으로 복원"
    - name: SetPreview
      params: [{ name: valid, type: bool }]
      logic: "배치 미리보기 색상 (유효/무효)"
    - name: ClearPreview
      logic: "미리보기 해제 → 원래 상태 복원"
    - name: PlayClearAnimation
      logic: "클리어 시 스케일 + 페이드 애니메이션 (코루틴)"
