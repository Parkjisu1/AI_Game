node:
  name: EventManager
  layer: Core
  genre: Generic
  role: Manager
  file: EventManager.cs
  namespace: BlockBlast.Core

spec:
  description: "Action 기반 이벤트 발행/구독 시스템"
  base_class: "Singleton<EventManager>"
  provides:
    - "Subscribe"
    - "Unsubscribe"
    - "Publish"

  members:
    - name: _events
      type: "Dictionary<string, Delegate>"
      access: private

  methods:
    - name: Subscribe<T>
      params: [{ name: eventName, type: string }, { name: callback, type: "Action<T>" }]
      logic: "이벤트 이름으로 콜백 등록"

    - name: Unsubscribe<T>
      params: [{ name: eventName, type: string }, { name: callback, type: "Action<T>" }]
      logic: "이벤트 이름으로 콜백 해제"

    - name: Publish<T>
      params: [{ name: eventName, type: string }, { name: data, type: T }]
      logic: "이벤트 발행, 등록된 콜백 호출"

  events:
    - "OnScoreChanged(int)"
    - "OnComboChanged(int)"
    - "OnLineClear(int)"
    - "OnBlockPlaced()"
    - "OnGameOver(int)"
    - "OnGameStart()"
    - "OnGamePause(bool)"
