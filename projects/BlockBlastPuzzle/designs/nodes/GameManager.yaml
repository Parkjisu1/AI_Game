node:
  name: GameManager
  layer: Game
  genre: Puzzle
  role: Manager
  file: GameManager.cs
  namespace: BlockBlast.Game

spec:
  description: "게임 전체 흐름 제어. 시작→플레이→게임오버 사이클"
  base_class: "Singleton<GameManager>"
  provides:
    - "StartGame"
    - "PauseGame"
    - "ResumeGame"
    - "GameOver"
    - "RestartGame"
    - "ContinueWithAdReward"
  requires:
    - "GameBoard"
    - "BlockSpawner"
    - "ScoreCalculator"
    - "GameOverDetector"
    - "UIManager"
    - "EventManager"
    - "SaveManager"

  enums:
    - name: GameState
      values: [Ready, Playing, Paused, GameOver]

  members:
    - name: _state
      type: GameState
      access: private
    - name: _score
      type: int
      access: private
    - name: _gamesPlayedSinceAd
      type: int
      access: private

  methods:
    - name: StartGame
      logic: |
        보드 초기화
        점수 초기화
        첫 후보 블록 3개 생성
        상태 → Playing
    - name: OnBlockPlaced
      logic: |
        배치 점수 계산 및 추가
        줄 클리어 체크 → 클리어 점수 추가
        게임오버 체크
        새 후보 필요 시 생성
    - name: GameOver
      logic: |
        상태 → GameOver
        최고점수 갱신
        게임오버 팝업 표시
        광고 빈도 체크 → 인터스티셜 표시
        Firebase 이벤트 로깅
    - name: ContinueWithAdReward
      logic: |
        보드 하단 3줄 클리어
        상태 → Playing
        게임오버 체크 재실행
    - name: RestartGame
      logic: "ClearBoard → StartGame"
    - name: PauseGame
      logic: "상태 → Paused, TimeScale=0"
    - name: ResumeGame
      logic: "상태 → Playing, TimeScale=1"
