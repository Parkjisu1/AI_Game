node:
  name: GameOverPopup
  layer: Game
  genre: Puzzle
  role: Handler
  file: GameOverPopup.cs
  namespace: BlockBlast.Game

spec:
  description: "게임오버 팝업. 점수, 최고점수, 재시작, 광고 연장"
  provides:
    - "Show"
    - "Hide"
    - "OnRestart"
    - "OnContinueWithAd"
    - "OnMainMenu"

  methods:
    - name: CreateUI
      params: [{ name: parent, type: Transform }]
      logic: |
        코드로 게임오버 팝업 생성:
          - 반투명 배경
          - "GAME OVER" 타이틀
          - 점수 텍스트
          - "NEW HIGH SCORE!" 텍스트 (조건부)
          - "Continue (Ad)" 버튼 → 리워드 광고
          - "Restart" 버튼 → 재시작
          - "Main Menu" 버튼 → 메인 메뉴
    - name: Show
      params: [{ name: score, type: int }, { name: highScore, type: int }, { name: isNewHigh, type: bool }]
    - name: Hide
    - name: OnContinueWithAd
      logic: |
        #if GOOGLE_MOBILE_ADS로 광고 표시
        광고 완료 시 GameManager.ContinueWithAdReward
    - name: OnRestart
      logic: "GameManager.RestartGame"
    - name: OnMainMenu
      logic: "SceneManager.LoadScene(Main)"
