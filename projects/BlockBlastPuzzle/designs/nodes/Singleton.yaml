node:
  name: Singleton
  layer: Core
  genre: Generic
  role: Helper
  file: Singleton.cs
  namespace: BlockBlast.Core

spec:
  description: "MonoBehaviour 기반 제네릭 싱글톤"
  type_params: ["T : MonoBehaviour"]
  provides:
    - "Instance<T>"
    - "DontDestroyOnLoad"

  members:
    - name: _instance
      type: "T"
      access: private static
    - name: Instance
      type: "T"
      access: public static
      getter: true

  methods:
    - name: Awake
      access: protected virtual
      logic: |
        if (_instance != null && _instance != this)
          Destroy(gameObject)
        else
          _instance = this as T
          DontDestroyOnLoad(gameObject)
