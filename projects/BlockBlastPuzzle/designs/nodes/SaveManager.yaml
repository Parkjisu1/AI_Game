node:
  name: SaveManager
  layer: Core
  genre: Generic
  role: Manager
  file: SaveManager.cs
  namespace: BlockBlast.Core

spec:
  description: "PlayerPrefs 래핑, JSON 직렬화 지원"
  base_class: "Singleton<SaveManager>"
  provides:
    - "SaveInt"
    - "LoadInt"
    - "SaveString"
    - "LoadString"
    - "HasKey"
    - "DeleteKey"

  constants:
    - name: KEY_HIGH_SCORE
      value: '"HighScore"'
    - name: KEY_SOUND_ON
      value: '"SoundOn"'
    - name: KEY_VIBRATION_ON
      value: '"VibrationOn"'
    - name: KEY_GAMES_PLAYED
      value: '"GamesPlayed"'

  methods:
    - name: SaveInt
      params: [{ name: key, type: string }, { name: value, type: int }]
    - name: LoadInt
      params: [{ name: key, type: string }, { name: defaultValue, type: int }]
      returns: int
    - name: SaveString
      params: [{ name: key, type: string }, { name: value, type: string }]
    - name: LoadString
      params: [{ name: key, type: string }, { name: defaultValue, type: string }]
      returns: string
    - name: GetHighScore
      returns: int
    - name: SetHighScore
      params: [{ name: score, type: int }]
