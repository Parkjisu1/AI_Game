node:
  name: EffectManager
  layer: Game
  genre: Puzzle
  role: Manager
  file: EffectManager.cs
  namespace: BlockBlast.Game

spec:
  description: "시각 이펙트 관리. 줄 클리어, 콤보, 배치 효과"
  base_class: "Singleton<EffectManager>"
  provides:
    - "PlayLineClearEffect"
    - "PlayComboEffect"
    - "PlayPlaceEffect"
    - "PlayScorePopup"

  methods:
    - name: PlayLineClearEffect
      params: [{ name: positions, type: "List<Vector3>" }]
      logic: "클리어된 셀 위치에 파티클/스케일 이펙트"
    - name: PlayComboEffect
      params: [{ name: combo, type: int }, { name: position, type: Vector3 }]
      logic: "콤보 숫자 텍스트 팝업 + 크기 증가"
    - name: PlayPlaceEffect
      params: [{ name: position, type: Vector3 }]
      logic: "블록 배치 시 작은 펄스 이펙트"
    - name: PlayScorePopup
      params: [{ name: score, type: int }, { name: position, type: Vector3 }]
      logic: "점수 텍스트가 위로 떠올랐다가 사라짐"
