node:
  name: SettingsPopup
  layer: Game
  genre: Puzzle
  role: Handler
  file: SettingsPopup.cs
  namespace: BlockBlast.Game

spec:
  description: "설정 팝업. 사운드/진동 토글"
  provides:
    - "Show"
    - "Hide"
    - "ToggleSound"
    - "ToggleVibration"

  methods:
    - name: CreateUI
      params: [{ name: parent, type: Transform }]
      logic: |
        코드로 팝업 UI 생성:
          - 반투명 배경 (터치하면 닫기)
          - 팝업 패널 (중앙)
          - "Settings" 타이틀
          - Sound 토글 버튼
          - Vibration 토글 버튼
          - Close 버튼
    - name: Show
      logic: "팝업 활성화"
    - name: Hide
      logic: "팝업 비활성화"
    - name: ToggleSound
      logic: "SaveManager로 사운드 설정 저장/로드"
    - name: ToggleVibration
      logic: "SaveManager로 진동 설정 저장/로드"
