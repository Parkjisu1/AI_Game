# ============================================================
# Block Blast Puzzle - System Specification
# ============================================================

systems:
  # ─── Core Layer ───
  core:
    - name: Singleton
      layer: Core
      genre: Generic
      description: "MonoBehaviour 기반 싱글톤 베이스 클래스"
      provides: ["Instance<T>", "DontDestroyOnLoad"]

    - name: EventManager
      layer: Core
      genre: Generic
      description: "글로벌 이벤트 발행/구독 시스템"
      provides: ["Subscribe", "Unsubscribe", "Publish"]

    - name: AudioManager
      layer: Core
      genre: Generic
      description: "사운드 효과 및 BGM 재생 관리"
      provides: ["PlaySFX", "PlayBGM", "SetVolume", "ToggleMute"]

    - name: SaveManager
      layer: Core
      genre: Generic
      description: "PlayerPrefs 기반 데이터 저장/로드"
      provides: ["Save<T>", "Load<T>", "DeleteKey", "HasKey"]

    - name: ObjectPool
      layer: Core
      genre: Generic
      description: "제네릭 오브젝트 풀링"
      provides: ["Get", "Return", "Prewarm"]

  # ─── Domain Layer ───
  domain:
    - name: GameBoard
      layer: Domain
      genre: Puzzle
      role: Manager
      description: "8x8 퍼즐 보드 관리, 셀 상태 추적"
      provides: ["PlaceBlock", "CanPlaceBlock", "CheckLines", "ClearLines", "GetCellState"]
      requires: ["BlockData", "CellVisual"]

    - name: BlockData
      layer: Domain
      genre: Puzzle
      role: Config
      description: "블록 모양 정의 데이터"
      provides: ["GetShape", "GetCells", "GetColor"]

    - name: BlockSpawner
      layer: Domain
      genre: Puzzle
      role: Factory
      description: "후보 블록 3개 생성 및 관리"
      provides: ["SpawnCandidates", "RemoveCandidate", "HasValidPlacement"]
      requires: ["BlockData", "BlockVisual"]

    - name: BlockDragHandler
      layer: Domain
      genre: Puzzle
      role: Handler
      description: "블록 드래그 앤 드롭 입력 처리"
      provides: ["OnDragStart", "OnDrag", "OnDragEnd", "SnapToGrid"]
      requires: ["GameBoard", "BlockVisual"]

    - name: LineClearProcessor
      layer: Domain
      genre: Puzzle
      role: Processor
      description: "완성된 줄 감지 및 클리어 처리"
      provides: ["FindCompleteLines", "ClearLines", "AnimateClear"]
      requires: ["GameBoard", "CellVisual", "ScoreCalculator"]

    - name: ScoreCalculator
      layer: Domain
      genre: Puzzle
      role: Calculator
      description: "점수 계산 (기본, 콤보, 멀티라인)"
      provides: ["CalculateScore", "GetComboMultiplier", "ResetCombo"]

    - name: ComboTracker
      layer: Domain
      genre: Puzzle
      role: Observer
      description: "연속 콤보 추적 및 배율 관리"
      provides: ["OnLineClear", "GetCurrentCombo", "ResetCombo"]

    - name: GameOverDetector
      layer: Domain
      genre: Puzzle
      role: Validator
      description: "게임오버 조건 판정"
      provides: ["CheckGameOver", "IsPlacementPossible"]
      requires: ["GameBoard", "BlockSpawner"]

  # ─── Game Layer ───
  game:
    - name: GameManager
      layer: Game
      genre: Puzzle
      role: Manager
      description: "게임 전체 흐름 제어 (시작, 진행, 게임오버)"
      provides: ["StartGame", "PauseGame", "ResumeGame", "GameOver", "RestartGame"]
      requires: ["GameBoard", "BlockSpawner", "ScoreCalculator", "GameOverDetector"]

    - name: UIManager
      layer: Game
      genre: Puzzle
      role: Manager
      description: "UI 상태 관리 및 팝업 제어"
      provides: ["ShowPopup", "HidePopup", "UpdateScore", "UpdateCombo"]
      requires: ["GameManager"]

    - name: CellVisual
      layer: Game
      genre: Puzzle
      role: Controller
      description: "개별 셀의 비주얼 표현 (색상, 애니메이션)"
      provides: ["SetColor", "PlayClearAnimation", "SetHighlight", "SetPreview"]

    - name: BlockVisual
      layer: Game
      genre: Puzzle
      role: Controller
      description: "드래그 가능한 블록 비주얼"
      provides: ["Setup", "SetDragging", "SnapBack", "Destroy"]
      requires: ["BlockData"]

    - name: ScoreDisplay
      layer: Game
      genre: Puzzle
      role: Controller
      description: "점수 및 콤보 UI 표시"
      provides: ["UpdateScore", "ShowCombo", "AnimateScore"]

    - name: GameOverPopup
      layer: Game
      genre: Puzzle
      role: Handler
      description: "게임오버 팝업 (점수, 재시작, 광고연장)"
      provides: ["Show", "Hide", "OnRestart", "OnContinueWithAd"]
      requires: ["GameManager", "UIManager"]

    - name: MainMenuController
      layer: Game
      genre: Puzzle
      role: Controller
      description: "메인 메뉴 UI 제어"
      provides: ["OnPlayButton", "OnSettingsButton", "ShowHighScore"]

    - name: SettingsPopup
      layer: Game
      genre: Puzzle
      role: Handler
      description: "설정 팝업 (사운드, 진동)"
      provides: ["Show", "Hide", "ToggleSound", "ToggleVibration"]

    - name: TitleController
      layer: Game
      genre: Puzzle
      role: Controller
      description: "타이틀 씬 로딩 및 전환"
      provides: ["StartLoading", "TransitionToMain"]

    - name: SpriteFactory
      layer: Game
      genre: Puzzle
      role: Factory
      description: "코드로 스프라이트 생성 (프리팹 없음)"
      provides: ["CreateSquareSprite", "CreateRoundedSprite", "CreateCircleSprite", "GetColorFromPalette"]

    - name: EffectManager
      layer: Game
      genre: Puzzle
      role: Manager
      description: "클리어 이펙트, 콤보 이펙트 등 시각 효과"
      provides: ["PlayClearEffect", "PlayComboEffect", "PlayPlaceEffect"]

build_order:
  phase_1_core:
    - Singleton
    - EventManager
    - AudioManager
    - SaveManager
    - ObjectPool
  phase_2_domain:
    - BlockData
    - ScoreCalculator
    - ComboTracker
    - GameBoard
    - LineClearProcessor
    - BlockSpawner
    - BlockDragHandler
    - GameOverDetector
  phase_3_game:
    - SpriteFactory
    - CellVisual
    - BlockVisual
    - EffectManager
    - ScoreDisplay
    - UIManager
    - GameManager
    - GameOverPopup
    - SettingsPopup
    - MainMenuController
    - TitleController

dependencies:
  GameManager:
    - GameBoard
    - BlockSpawner
    - ScoreCalculator
    - GameOverDetector
    - UIManager
    - EventManager
    - SaveManager
  GameBoard:
    - CellVisual
    - SpriteFactory
    - EventManager
  BlockSpawner:
    - BlockData
    - BlockVisual
    - SpriteFactory
  BlockDragHandler:
    - GameBoard
    - BlockVisual
    - GameManager
  LineClearProcessor:
    - GameBoard
    - ScoreCalculator
    - ComboTracker
    - EffectManager
    - EventManager
  GameOverDetector:
    - GameBoard
    - BlockSpawner
  UIManager:
    - ScoreDisplay
    - GameOverPopup
    - SettingsPopup
  GameOverPopup:
    - GameManager
    - UIManager
