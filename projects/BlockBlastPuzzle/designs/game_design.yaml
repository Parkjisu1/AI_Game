# ============================================================
# Block Blast Puzzle - Game Design Document
# Genre: Puzzle | Platform: Mobile (Unity)
# ============================================================

game:
  title: "Block Blast Puzzle"
  genre: Puzzle
  platform: Mobile
  orientation: Portrait
  resolution: 1080x1920

concept:
  summary: |
    8x8 그리드 위에 다양한 모양의 블록을 배치하여
    가로줄 또는 세로줄을 완성해 지우는 전략 퍼즐 게임.
    테트리스와 블록 퍼즐의 결합형.
  core_loop:
    - 3개의 블록 후보 중 하나를 선택
    - 8x8 보드 위에 드래그하여 배치
    - 완성된 줄(가로/세로) 자동 클리어
    - 콤보로 추가 점수 획득
    - 블록 배치 불가 시 게임오버

board:
  type: grid
  width: 8
  height: 8
  cell_size: 1.0
  origin: bottom_left

blocks:
  shapes:
    # 1x 블록
    - name: "Single"
      cells: [[0,0]]
      weight: 5
    # 2x 블록
    - name: "H2"
      cells: [[0,0],[1,0]]
      weight: 8
    - name: "V2"
      cells: [[0,0],[0,1]]
      weight: 8
    # 3x 블록
    - name: "H3"
      cells: [[0,0],[1,0],[2,0]]
      weight: 10
    - name: "V3"
      cells: [[0,0],[0,1],[0,2]]
      weight: 10
    # L 블록
    - name: "L2x2"
      cells: [[0,0],[1,0],[0,1]]
      weight: 12
    - name: "L2x2_R"
      cells: [[0,0],[1,0],[1,1]]
      weight: 12
    # 2x2 정사각형
    - name: "Square2"
      cells: [[0,0],[1,0],[0,1],[1,1]]
      weight: 10
    # T 블록
    - name: "T3"
      cells: [[0,0],[1,0],[2,0],[1,1]]
      weight: 8
    # 4x 블록
    - name: "H4"
      cells: [[0,0],[1,0],[2,0],[3,0]]
      weight: 6
    - name: "V4"
      cells: [[0,0],[0,1],[0,2],[0,3]]
      weight: 6
    # L 3x2
    - name: "L3x2"
      cells: [[0,0],[1,0],[2,0],[0,1]]
      weight: 7
    - name: "L3x2_R"
      cells: [[0,0],[1,0],[2,0],[2,1]]
      weight: 7
    # 3x3 정사각형
    - name: "Square3"
      cells: [[0,0],[1,0],[2,0],[0,1],[1,1],[2,1],[0,2],[1,2],[2,2]]
      weight: 3
    # 5x 블록
    - name: "H5"
      cells: [[0,0],[1,0],[2,0],[3,0],[4,0]]
      weight: 3
    - name: "V5"
      cells: [[0,0],[0,1],[0,2],[0,3],[0,4]]
      weight: 3
    # Z 블록
    - name: "Z3"
      cells: [[0,0],[1,0],[1,1],[2,1]]
      weight: 6
    - name: "S3"
      cells: [[1,0],[2,0],[0,1],[1,1]]
      weight: 6

  candidate_count: 3
  color_palette:
    - name: "Red"
      hex: "#FF4444"
    - name: "Blue"
      hex: "#4488FF"
    - name: "Green"
      hex: "#44DD44"
    - name: "Yellow"
      hex: "#FFCC00"
    - name: "Purple"
      hex: "#BB44FF"
    - name: "Orange"
      hex: "#FF8800"
    - name: "Cyan"
      hex: "#00CCCC"

scoring:
  base_per_cell: 10
  line_clear_bonus: 100
  combo_multiplier:
    description: "연속 줄 클리어 시 보너스 배율"
    values:
      1: 1.0
      2: 1.5
      3: 2.0
      4: 3.0
      5_plus: 4.0
  multi_line_bonus:
    description: "한 번 배치로 여러 줄 동시 클리어"
    values:
      2_lines: 300
      3_lines: 600
      4_lines: 1000
      5_plus: 2000

game_over:
  condition: "3개의 후보 블록 중 어느 것도 보드에 배치할 수 없을 때"
  flow:
    - 게임오버 판정
    - 최종 점수 표시
    - 최고 점수 갱신 확인
    - 광고 시청으로 1회 연장 옵션 (보드 3줄 클리어)
    - 재시작 또는 메인 메뉴

features:
  high_score:
    storage: PlayerPrefs
    key: "HighScore"
  daily_challenge:
    description: "매일 새로운 시작 보드 배치로 도전"
    reward: "추가 점수 보너스"
  settings:
    sound: toggle
    vibration: toggle
    language: ["ko", "en"]

monetization:
  ads:
    banner:
      position: bottom
      show_during: gameplay
    interstitial:
      trigger: "게임오버 시"
      frequency: "매 3회 게임오버마다"
    rewarded:
      trigger: "게임오버 시 연장"
      reward: "보드 하단 3줄 클리어 후 계속"
  iap:
    products:
      - id: "remove_ads"
        type: non_consumable
        price_tier: 1
        description: "광고 제거"
      - id: "undo_pack_5"
        type: consumable
        price_tier: 1
        description: "되돌리기 5회"

scenes:
  - name: Title
    file: Title.unity
    purpose: "로딩 화면, 스플래시"
  - name: Main
    file: Main.unity
    purpose: "메인 메뉴, 설정, 최고 점수"
  - name: GameScene
    file: GameScene.unity
    purpose: "게임 플레이"
