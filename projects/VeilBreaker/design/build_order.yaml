platform: unity
project: VeilBreaker

phases:
  - phase: 0
    name: "Core Foundation"
    description: "의존성 없는 기반 Core 시스템. Main Coder 단독 구현 후 _ARCHITECTURE.md 생성"
    assignee: "main-coder"
    nodes:
      - nodeId: "Singleton"
        layer: "Core"
        genre: "Generic"
        role: "Helper"
        priority: 1
        depends_on: []
        output: "output/Singleton.cs"
      - nodeId: "EventManager"
        layer: "Core"
        genre: "Generic"
        role: "Manager"
        priority: 2
        depends_on: ["Singleton"]
        output: "output/EventManager.cs"
      - nodeId: "ObjectPool"
        layer: "Core"
        genre: "Generic"
        role: "Pool"
        priority: 3
        depends_on: ["Singleton"]
        output: "output/ObjectPool.cs"
      - nodeId: "GameConstants"
        layer: "Core"
        genre: "Generic"
        role: "Config"
        priority: 4
        depends_on: []
        output: "output/GameConstants.cs"
      - nodeId: "Util"
        layer: "Core"
        genre: "Generic"
        role: "Helper"
        priority: 5
        depends_on: []
        output: "output/Util.cs"
    deliverable: "_ARCHITECTURE.md (코딩 패턴, 네임스페이스, 코드 컨벤션 정의)"

  - phase: 1
    name: "Domain Foundation"
    description: "Core에만 의존하는 기반 Domain. Main + Sub Coder 병렬 구현"
    parallel: true
    nodes:
      - nodeId: "SaveManager"
        layer: "Domain"
        genre: "Idle"
        role: "Manager"
        priority: 1
        depends_on: ["Singleton", "GameConstants"]
        output: "output/SaveManager.cs"
        assignee: "main-coder"
        complexity: "high"
        note: "로컬 저장 전략 설계 (암호화 포함)"
      - nodeId: "DataManager"
        layer: "Domain"
        genre: "Idle"
        role: "Manager"
        priority: 2
        depends_on: ["Singleton", "SaveManager", "GameConstants"]
        output: "output/DataManager.cs"
        assignee: "main-coder"
        complexity: "high"
        note: "차트 이원 구조 설계 핵심"
      - nodeId: "ResourceContainer"
        layer: "Domain"
        genre: "Generic"
        role: "Provider"
        priority: 3
        depends_on: ["Singleton"]
        output: "output/ResourceContainer.cs"
        assignee: "sub-coder-1"
        complexity: "medium"
      - nodeId: "CurrencyManager"
        layer: "Domain"
        genre: "Idle"
        role: "Manager"
        priority: 4
        depends_on: ["Singleton", "DataManager", "EventManager", "SaveManager"]
        output: "output/CurrencyManager.cs"
        assignee: "sub-coder-2"
        complexity: "medium"
      - nodeId: "GameConstants"
        layer: "Core"
        genre: "Generic"
        role: "Config"
        priority: 0
        depends_on: []
        output: "output/GameConstants.cs"
        note: "Phase 0에서 이미 생성됨 - 여기서는 참조만"

  - phase: 2
    name: "Upper Domain"
    description: "Domain에 의존하는 상위 시스템. Main + Sub Coder 병렬 구현"
    parallel: true
    nodes:
      - nodeId: "CharacterManager"
        layer: "Domain"
        genre: "Idle"
        role: "Manager"
        priority: 1
        depends_on: ["Singleton", "DataManager", "CurrencyManager", "EventManager", "SaveManager"]
        output: "output/CharacterManager.cs"
        assignee: "main-coder"
        complexity: "high"
        note: "영웅 스탯 계산 핵심 로직"
      - nodeId: "StageManager"
        layer: "Domain"
        genre: "Idle"
        role: "Manager"
        priority: 2
        depends_on: ["Singleton", "DataManager", "CurrencyManager", "EventManager", "SaveManager"]
        output: "output/StageManager.cs"
        assignee: "sub-coder-1"
        complexity: "medium"
      - nodeId: "DamageCalculator"
        layer: "Domain"
        genre: "Idle"
        role: "Calculator"
        priority: 3
        depends_on: ["DataManager", "GameConstants"]
        output: "output/DamageCalculator.cs"
        assignee: "sub-coder-2"
        complexity: "medium"
      - nodeId: "SkillManager"
        layer: "Domain"
        genre: "Idle"
        role: "Manager"
        priority: 4
        depends_on: ["Singleton", "DataManager", "CurrencyManager", "EventManager"]
        output: "output/SkillManager.cs"
        assignee: "sub-coder-1"
        complexity: "medium"
      - nodeId: "InventoryManager"
        layer: "Domain"
        genre: "Idle"
        role: "Manager"
        priority: 5
        depends_on: ["Singleton", "DataManager", "CurrencyManager", "EventManager", "SaveManager"]
        output: "output/InventoryManager.cs"
        assignee: "sub-coder-2"
        complexity: "medium"
      - nodeId: "EquipmentManager"
        layer: "Domain"
        genre: "Idle"
        role: "Manager"
        priority: 6
        depends_on: ["Singleton", "DataManager", "CurrencyManager", "InventoryManager", "EventManager", "SaveManager"]
        output: "output/EquipmentManager.cs"
        assignee: "main-coder"
        complexity: "high"
      - nodeId: "GachaManager"
        layer: "Domain"
        genre: "Idle"
        role: "Manager"
        priority: 7
        depends_on: ["Singleton", "DataManager", "CurrencyManager", "EventManager", "SaveManager", "Util"]
        output: "output/GachaManager.cs"
        assignee: "sub-coder-1"
        complexity: "medium"
      - nodeId: "QuestManager"
        layer: "Domain"
        genre: "Idle"
        role: "Manager"
        priority: 8
        depends_on: ["Singleton", "DataManager", "CurrencyManager", "EventManager", "SaveManager"]
        output: "output/QuestManager.cs"
        assignee: "sub-coder-2"
        complexity: "medium"
      - nodeId: "OfflineProgressManager"
        layer: "Domain"
        genre: "Idle"
        role: "Manager"
        priority: 9
        depends_on: ["Singleton", "DataManager", "CurrencyManager", "EventManager", "SaveManager"]
        output: "output/OfflineProgressManager.cs"
        assignee: "sub-coder-1"
        complexity: "medium"
      - nodeId: "EnemySpawner"
        layer: "Domain"
        genre: "Idle"
        role: "Manager"
        priority: 10
        depends_on: ["DataManager", "ObjectPool", "EventManager"]
        output: "output/EnemySpawner.cs"
        assignee: "sub-coder-2"
        complexity: "medium"
      - nodeId: "CharacterBattle"
        layer: "Domain"
        genre: "Idle"
        role: "Controller"
        priority: 11
        depends_on: ["DataManager", "SkillManager", "DamageCalculator", "ObjectPool", "EventManager"]
        output: "output/CharacterBattle.cs"
        assignee: "main-coder"
        complexity: "high"
        note: "자동 전투 AI 핵심"
      - nodeId: "BattleManager"
        layer: "Domain"
        genre: "Idle"
        role: "Manager"
        priority: 12
        depends_on: ["Singleton", "DataManager", "EnemySpawner", "CharacterBattle", "DamageCalculator", "ObjectPool", "EventManager"]
        output: "output/BattleManager.cs"
        assignee: "main-coder"
        complexity: "high"
        note: "partial class: BattleManager_Wave, BattleManager_Boss, BattleManager_Reward"
      - nodeId: "TowerManager"
        layer: "Domain"
        genre: "Idle"
        role: "Manager"
        priority: 13
        depends_on: ["Singleton", "DataManager", "BattleManager", "CurrencyManager", "EventManager", "SaveManager"]
        output: "output/TowerManager.cs"
        assignee: "sub-coder-1"
        complexity: "medium"
      - nodeId: "DungeonManager"
        layer: "Domain"
        genre: "Idle"
        role: "Manager"
        priority: 14
        depends_on: ["Singleton", "DataManager", "BattleManager", "CurrencyManager", "EventManager", "SaveManager"]
        output: "output/DungeonManager.cs"
        assignee: "sub-coder-2"
        complexity: "medium"

  - phase: 3
    name: "Game Layer (UI + SDK)"
    description: "UI 시스템, 페이지/팝업, 에디터 스크립트, SDK. Main + Sub Coder 병렬"
    parallel: true
    nodes:
      - nodeId: "UISystem"
        layer: "Game"
        genre: "Idle"
        role: "Manager"
        priority: 1
        depends_on: ["Singleton", "ResourceContainer", "EventManager"]
        output: "output/UISystem.cs"
        assignee: "main-coder"
        complexity: "high"
        note: "모든 UI의 베이스. 가장 먼저 완료해야 다른 UI 가능"
      - nodeId: "GameManager"
        layer: "Game"
        genre: "Generic"
        role: "Manager"
        priority: 2
        depends_on: ["Singleton", "SaveManager", "OfflineProgressManager", "UISystem", "EventManager"]
        output: "output/GameManager.cs"
        assignee: "main-coder"
        complexity: "high"
      - nodeId: "TitleManager"
        layer: "Game"
        genre: "Generic"
        role: "Manager"
        priority: 3
        depends_on: ["SaveManager", "DataManager", "GameManager", "UISystem"]
        output: "output/TitleManager.cs"
        assignee: "sub-coder-1"
        complexity: "medium"
      - nodeId: "HUD"
        layer: "Game"
        genre: "Idle"
        role: "UX"
        priority: 4
        depends_on: ["EventManager", "BattleManager", "StageManager"]
        output: "output/HUD.cs"
        assignee: "sub-coder-2"
        complexity: "medium"
      - nodeId: "PageLobby"
        layer: "Game"
        genre: "Idle"
        role: "UX"
        priority: 5
        depends_on: ["UISystem", "StageManager", "CurrencyManager", "EventManager"]
        output: "output/PageLobby.cs"
        assignee: "sub-coder-1"
        complexity: "medium"
      - nodeId: "PageBattle"
        layer: "Game"
        genre: "Idle"
        role: "UX"
        priority: 6
        depends_on: ["UISystem", "BattleManager", "EventManager"]
        output: "output/PageBattle.cs"
        assignee: "sub-coder-2"
        complexity: "medium"
      - nodeId: "PopupCharacter"
        layer: "Game"
        genre: "Idle"
        role: "UX"
        priority: 7
        depends_on: ["UISystem", "CharacterManager", "CurrencyManager", "EventManager"]
        output: "output/PopupCharacter.cs"
        assignee: "sub-coder-1"
        complexity: "medium"
      - nodeId: "PopupEquipment"
        layer: "Game"
        genre: "Idle"
        role: "UX"
        priority: 8
        depends_on: ["UISystem", "EquipmentManager", "CurrencyManager", "EventManager"]
        output: "output/PopupEquipment.cs"
        assignee: "sub-coder-2"
        complexity: "medium"
      - nodeId: "PopupSkill"
        layer: "Game"
        genre: "Idle"
        role: "UX"
        priority: 9
        depends_on: ["UISystem", "SkillManager", "CurrencyManager"]
        output: "output/PopupSkill.cs"
        assignee: "sub-coder-1"
        complexity: "low"
      - nodeId: "PopupGacha"
        layer: "Game"
        genre: "Idle"
        role: "UX"
        priority: 10
        depends_on: ["UISystem", "GachaManager", "CurrencyManager", "EventManager"]
        output: "output/PopupGacha.cs"
        assignee: "sub-coder-2"
        complexity: "medium"
      - nodeId: "PopupQuest"
        layer: "Game"
        genre: "Idle"
        role: "UX"
        priority: 11
        depends_on: ["UISystem", "QuestManager", "EventManager"]
        output: "output/PopupQuest.cs"
        assignee: "sub-coder-1"
        complexity: "low"
      - nodeId: "PopupShop"
        layer: "Game"
        genre: "Idle"
        role: "UX"
        priority: 12
        depends_on: ["UISystem", "CurrencyManager", "IAPManager", "AdMobManager", "EventManager"]
        output: "output/PopupShop.cs"
        assignee: "sub-coder-2"
        complexity: "medium"
      - nodeId: "PopupSettings"
        layer: "Game"
        genre: "Generic"
        role: "UX"
        priority: 13
        depends_on: ["UISystem", "SaveManager"]
        output: "output/PopupSettings.cs"
        assignee: "sub-coder-1"
        complexity: "low"
      - nodeId: "PopupTower"
        layer: "Game"
        genre: "Idle"
        role: "UX"
        priority: 14
        depends_on: ["UISystem", "TowerManager", "EventManager"]
        output: "output/PopupTower.cs"
        assignee: "sub-coder-2"
        complexity: "low"
      - nodeId: "PopupDungeon"
        layer: "Game"
        genre: "Idle"
        role: "UX"
        priority: 15
        depends_on: ["UISystem", "DungeonManager", "EventManager"]
        output: "output/PopupDungeon.cs"
        assignee: "sub-coder-1"
        complexity: "low"
      - nodeId: "PopupOfflineReward"
        layer: "Game"
        genre: "Idle"
        role: "UX"
        priority: 16
        depends_on: ["UISystem", "OfflineProgressManager", "AdMobManager", "EventManager"]
        output: "output/PopupOfflineReward.cs"
        assignee: "sub-coder-2"
        complexity: "low"
      - nodeId: "PopupInventory"
        layer: "Game"
        genre: "Idle"
        role: "UX"
        priority: 17
        depends_on: ["UISystem", "InventoryManager"]
        output: "output/PopupInventory.cs"
        assignee: "sub-coder-1"
        complexity: "low"
      - nodeId: "PopupResult"
        layer: "Game"
        genre: "Idle"
        role: "UX"
        priority: 18
        depends_on: ["UISystem", "StageManager", "EventManager"]
        output: "output/PopupResult.cs"
        assignee: "sub-coder-2"
        complexity: "low"
      - nodeId: "FirebaseManager"
        layer: "Game"
        genre: "Generic"
        role: "Manager"
        priority: 19
        depends_on: ["Singleton"]
        output: "output/SDK/FirebaseManager.cs"
        assignee: "sub-coder-1"
        complexity: "medium"
        note: "조건부 컴파일 FIREBASE_ANALYTICS"
      - nodeId: "AdMobManager"
        layer: "Game"
        genre: "Generic"
        role: "Manager"
        priority: 20
        depends_on: ["Singleton", "EventManager"]
        output: "output/SDK/AdMobManager.cs"
        assignee: "sub-coder-2"
        complexity: "medium"
        note: "조건부 컴파일 GOOGLE_MOBILE_ADS"
      - nodeId: "IAPManager"
        layer: "Game"
        genre: "Generic"
        role: "Manager"
        priority: 21
        depends_on: ["Singleton", "EventManager"]
        output: "output/SDK/IAPManager.cs"
        assignee: "sub-coder-1"
        complexity: "medium"
        note: "조건부 컴파일 UNITY_IAP"
      - nodeId: "SceneSetup"
        layer: "Game"
        genre: "Generic"
        role: "Helper"
        priority: 22
        depends_on: []
        output: "output/Editor/SceneSetup.cs"
        assignee: "sub-coder-2"
        complexity: "low"
      - nodeId: "SceneBuilder"
        layer: "Game"
        genre: "Generic"
        role: "Builder"
        priority: 23
        depends_on: []
        output: "output/Editor/SceneBuilder.cs"
        assignee: "sub-coder-1"
        complexity: "low"
        note: "InitializeOnLoad + EditorPrefs 중복 방지 패턴 필수"

# 검증 순서 (Validator 담당)
validation:
  strategy: "Phase 완료 시 즉시 검증"
  phases:
    - phase: 0
      check: "Singleton 패턴 정확성, 네임스페이스 통일"
    - phase: 1
      check: "저장/로드 사이클, 차트 데이터 파싱"
    - phase: 2
      check: "이벤트 흐름, 전투 로직, 데미지 계산식"
    - phase: 3
      check: "UI 라이프사이클, SerializeField 사용 여부, SDK 조건부 컴파일"

# 총계
summary:
  total_nodes: 46
  phase_0_nodes: 5
  phase_1_nodes: 4
  phase_2_nodes: 14
  phase_3_nodes: 23
  main_coder_nodes: 11
  sub_coder_1_nodes: 12
  sub_coder_2_nodes: 12
  parallel_phases: [2, 3]
