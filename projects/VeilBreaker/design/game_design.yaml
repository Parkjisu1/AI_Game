game_overview:
  title: "VeilBreaker"
  genre: "Idle"
  sub_genre:
    - "RPG"
    - "Action"
  platform: "unity"
  target_user: "midcore"
  session_length: "3~5min"
  one_liner: "영웅들이 자동으로 전투하며 차원의 장막을 돌파하는 방치형 액션 RPG"
  references:
    - "AshAndVeil: 801 .cs 파일, TheBackend BaaS 기반 Idle RPG"
    - "Singleton<T>: Resources.Load 기반 lazy initialization 패턴"
    - "BattleManager: partial class 분할 구조"
    - "DataManager: Chart/User 이원 구조"

core_experience:
  main_fun: "영웅 수집과 자동전투 관전, 스테이지 클리어 성장감"
  emotion_goal: "강함과 수집의 성취감, 오프라인 복귀 시 보상 기대감"
  core_verbs:
    - "수집하다 (영웅, 장비)"
    - "강화하다 (레벨, 스킬, 장비)"
    - "돌파하다 (스테이지, 던전, 탑)"
    - "보상받다 (오프라인, 퀘스트)"
    - "관전하다 (자동 전투)"

core_loop:
  main_loop:
    description: "자동 전투 → 스테이지 클리어 → 보상 획득 → 영웅/장비 강화 → 다음 스테이지"
    flow:
      - "전투 씬 진입 (자동 시작)"
      - "영웅 자동 전투 (적 처치, 보스)"
      - "스테이지 클리어 (Gold/경험치 획득)"
      - "로비 복귀 (강화/관리)"
      - "영웅 레벨업 / 장비 장착 / 스킬 업그레이드"
      - "다음 스테이지 도전"
    duration: "3~5min per session"
  daily_loop:
    description: "일일 퀘스트 완료 + 던전 입장 + 탑 도전"
    flow:
      - "오프라인 보상 수령"
      - "일일 퀘스트 체크 및 달성"
      - "던전 1~3회 입장"
      - "무한탑 도전"
      - "가챠 (뽑기)"
      - "광고 보상 획득"
  long_term_loop:
    description: "전설 영웅 수집 + 최고 스테이지 돌파 + 업적 달성"
    flow:
      - "챕터 보스 클리어"
      - "영웅 등급 상승 (별 강화)"
      - "전설 장비 세트 완성"
      - "무한탑 랭크 달성"
      - "컬렉션/도감 완성"

session_structure:
  start_condition: "앱 실행 시 오프라인 보상 팝업 → 메인 로비"
  progress_type: "auto"
  end_conditions:
    - "스테이지 클리어 (다음 스테이지 자동 진행)"
    - "영웅 전멸 (리트라이 또는 로비 복귀)"
    - "사용자 수동 종료"
    - "10분 이상 진행 시 자동 로비 복귀 권유"
  result_handling: "클리어 시 보상 팝업 → 자동 다음 스테이지 / 실패 시 결과 팝업 → 강화 유도"

world_setting:
  background: >
    세계를 감싼 'Veil(차원의 장막)'이 균열을 일으키며 이계 몬스터들이 침략.
    고대 영웅들이 각성하여 Veil의 근원을 향해 차원을 돌파하는 여정.
  factions:
    - name: "각성 영웅단"
      desc: "플레이어가 수집하는 영웅 그룹, 4개 속성 (화/수/목/전)"
    - name: "Veil 군단"
      desc: "적 몬스터 세력, 챕터마다 변형"
    - name: "차원 수호자"
      desc: "던전/탑 보스급 특수 적"
  veil_layers:
    - "Veil Layer 1~10: 입문 챕터"
    - "Veil Layer 11~30: 중급 챕터"
    - "Veil Layer 31+: 고급 무한 챕터"

hero_system:
  grades:
    - grade: "N"
      stars: 1
      color: "grey"
    - grade: "R"
      stars: 2
      color: "green"
    - grade: "SR"
      stars: 3
      color: "blue"
    - grade: "SSR"
      stars: 4
      color: "purple"
    - grade: "Legend"
      stars: 5
      color: "gold"
  attributes:
    - "Fire (화)"
    - "Water (수)"
    - "Wood (목)"
    - "Steel (전)"
  roles:
    - "Warrior (전사): 전방 물리 딜러"
    - "Mage (마법사): 후방 마법 딜러"
    - "Healer (힐러): 체력 회복"
    - "Tank (탱커): 피해 흡수"
  upgrade_paths:
    - "레벨업 (Gold + 경험치 재료)"
    - "별 강화 (중복 영웅 또는 SoulStone)"
    - "스킬 업그레이드 (SkillStone)"
    - "장비 장착 (6슬롯)"

equipment_system:
  slots:
    - "Weapon"
    - "Armor"
    - "Helmet"
    - "Gloves"
    - "Boots"
    - "Accessory"
  grades:
    - "Common → Uncommon → Rare → Epic → Legendary"
  upgrade:
    - "강화 +1~+15 (Gold + 강화석)"
    - "합성: 동급 3개 → 상위 1개"
    - "분해: 장비 → 강화 재료"

currency_system:
  currencies:
    - id: "Gold"
      desc: "기본 재화, 전투 보상"
      earn: "전투 클리어, 오프라인, 퀘스트"
      spend: "레벨업, 장비 강화"
    - id: "Gem"
      desc: "프리미엄 재화"
      earn: "IAP, 퀘스트 보상, 업적"
      spend: "가챠, 상점, 에너지 충전"
    - id: "SoulStone"
      desc: "영웅 별 강화 재료"
      earn: "가챠 잉여, 던전"
      spend: "영웅 별 강화"
    - id: "SkillStone"
      desc: "스킬 업그레이드 재료"
      earn: "스테이지 보상, 퀘스트"
      spend: "스킬 레벨업"
    - id: "DungeonKey"
      desc: "던전 입장권"
      earn: "일일 지급, IAP"
      spend: "던전 입장"

stage_system:
  structure:
    - "챕터 (1~N): 10스테이지씩 구성"
    - "일반 스테이지: 웨이브 3회 + 미니보스"
    - "챕터 보스 스테이지: 대형 보스"
  difficulty:
    - "Normal → Hard → Hell (챕터 클리어 후 해금)"
  rewards:
    - "Gold (클리어 보상)"
    - "경험치 재료"
    - "장비 드롭 (확률)"
    - "별 3개 클리어 보너스"

gacha_system:
  banners:
    - "일반 배너: 영웅 + 장비 혼합"
    - "영웅 픽업 배너: 특정 SSR 확률 증가"
    - "장비 배너: 장비 전용"
  rates:
    N: "40%"
    R: "35%"
    SR: "20%"
    SSR: "4.5%"
    Legend: "0.5%"
  pity:
    soft_pity: 80
    hard_pity: 100
    guaranteed_ssr: true

content_system:
  tower:
    name: "무한탑 (Veil Tower)"
    desc: "100층 반복 무한 도전, 층마다 난이도 증가"
    reward: "탑 코인 → 전용 상점"
  dungeon:
    types:
      - "골드 던전: 대량 Gold 획득"
      - "경험치 던전: 경험치 재료 대량 획득"
      - "보스 레이드: 고급 장비 드롭"
    entry: "DungeonKey 소모, 1일 3회"
  offline:
    max_time: "12시간"
    rewards: "Gold + 경험치 재료"
    boost: "광고 시청 시 2배"

monetization:
  main_bm: "f2p"
  revenue_sources:
    - type: "IAP"
      items:
        - "스타터 패키지 (Gem 500 + 영웅 SR)"
        - "월정액 패스 (일일 Gem 50 × 30일)"
        - "배틀패스 (시즌 보상)"
        - "대용량 Gem 팩 (6단계)"
    - type: "광고"
      items:
        - "오프라인 보상 2배 (리워드 광고)"
        - "무료 가챠 1회 (일일 1회)"
        - "에너지 충전 (인터스티셜)"
  ad_networks:
    - "AdMob"
    - "IronSource"
    - "AppLovin"
