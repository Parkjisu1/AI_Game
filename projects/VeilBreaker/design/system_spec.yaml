system_list:
  Core:
    - Singleton
    - EventManager
    - ObjectPool
    - GameConstants
    - Util
  Domain:
    - SaveManager
    - DataManager
    - CurrencyManager
    - CharacterManager
    - StageManager
    - ResourceContainer
    - BattleManager
    - EquipmentManager
    - SkillManager
    - GachaManager
    - QuestManager
    - InventoryManager
    - OfflineProgressManager
    - TowerManager
    - DungeonManager
    - CharacterBattle
    - EnemySpawner
    - DamageCalculator
  Game:
    - UISystem
    - HUD
    - PageLobby
    - PageBattle
    - PopupCharacter
    - PopupEquipment
    - PopupSkill
    - PopupGacha
    - PopupQuest
    - PopupShop
    - PopupSettings
    - PopupTower
    - PopupDungeon
    - PopupOfflineReward
    - PopupInventory
    - PopupResult
    - TitleManager
    - GameManager
    - SceneSetup
    - SceneBuilder
    - FirebaseManager
    - AdMobManager
    - IAPManager

# 이벤트 통신 목록
event_bus:
  events:
    - id: "OnStageStart"
      publisher: "StageManager"
      subscribers: ["BattleManager", "HUD", "PageBattle"]
    - id: "OnStageComplete"
      publisher: "BattleManager"
      subscribers: ["StageManager", "CurrencyManager", "QuestManager", "PopupResult"]
    - id: "OnStageFail"
      publisher: "BattleManager"
      subscribers: ["StageManager", "PopupResult"]
    - id: "OnHeroDie"
      publisher: "CharacterBattle"
      subscribers: ["BattleManager", "HUD"]
    - id: "OnEnemyDie"
      publisher: "CharacterBattle"
      subscribers: ["BattleManager", "QuestManager", "CurrencyManager"]
    - id: "OnCurrencyChanged"
      publisher: "CurrencyManager"
      subscribers: ["HUD", "PopupShop", "PopupGacha"]
    - id: "OnCharacterLevelUp"
      publisher: "CharacterManager"
      subscribers: ["PopupCharacter", "HUD"]
    - id: "OnEquipmentChanged"
      publisher: "EquipmentManager"
      subscribers: ["CharacterManager", "PopupEquipment", "PopupCharacter"]
    - id: "OnQuestProgress"
      publisher: "QuestManager"
      subscribers: ["PopupQuest", "HUD"]
    - id: "OnQuestComplete"
      publisher: "QuestManager"
      subscribers: ["CurrencyManager", "PopupQuest"]
    - id: "OnGachaResult"
      publisher: "GachaManager"
      subscribers: ["CharacterManager", "EquipmentManager", "InventoryManager"]
    - id: "OnDataLoaded"
      publisher: "DataManager"
      subscribers: ["CharacterManager", "StageManager", "CurrencyManager", "QuestManager"]
    - id: "OnGameSaved"
      publisher: "SaveManager"
      subscribers: ["DataManager"]
    - id: "OnOfflineRewardCalculated"
      publisher: "OfflineProgressManager"
      subscribers: ["PopupOfflineReward"]
    - id: "OnBossSpawn"
      publisher: "EnemySpawner"
      subscribers: ["BattleManager", "HUD"]
    - id: "OnSkillActivated"
      publisher: "CharacterBattle"
      subscribers: ["BattleManager", "HUD"]
    - id: "OnTowerFloorComplete"
      publisher: "TowerManager"
      subscribers: ["PopupTower", "QuestManager"]
    - id: "OnDungeonComplete"
      publisher: "DungeonManager"
      subscribers: ["CurrencyManager", "InventoryManager", "QuestManager"]
    - id: "OnAdWatched"
      publisher: "AdMobManager"
      subscribers: ["CurrencyManager", "OfflineProgressManager"]
    - id: "OnIAPPurchased"
      publisher: "IAPManager"
      subscribers: ["CurrencyManager", "InventoryManager"]

# 데이터 구조 정의
data_structures:
  chart_data:
    description: "차트(테이블) 데이터 - Resources JSON 또는 ScriptableObject"
    tables:
      - id: "HeroTable"
        fields: ["heroId", "name", "grade", "attribute", "role", "baseAtk", "baseDef", "baseHp", "growthAtk", "growthDef", "growthHp", "skillIds"]
      - id: "SkillTable"
        fields: ["skillId", "name", "description", "type", "cooldown", "damage", "effect", "targetType"]
      - id: "StageTable"
        fields: ["stageId", "chapter", "stageNum", "enemyIds", "enemyCount", "bossId", "goldReward", "expReward", "difficulty"]
      - id: "EnemyTable"
        fields: ["enemyId", "name", "hp", "atk", "def", "moveSpeed", "attackRange", "attackSpeed", "dropItems"]
      - id: "EquipmentTable"
        fields: ["equipId", "name", "slot", "grade", "baseAtk", "baseDef", "baseHp", "skills"]
      - id: "GachaTable"
        fields: ["bannerId", "name", "type", "rates", "pity", "pool"]
      - id: "QuestTable"
        fields: ["questId", "type", "title", "description", "condition", "targetCount", "rewards"]
      - id: "DungeonTable"
        fields: ["dungeonId", "name", "type", "difficulty", "energyCost", "rewards"]
      - id: "TowerTable"
        fields: ["floor", "enemyIds", "enemyMultiplier", "rewards"]
      - id: "ShopTable"
        fields: ["itemId", "name", "type", "price", "currency", "amount"]
      - id: "UpgradeTable"
        fields: ["level", "goldCost", "expRequired", "statMultiplier"]
      - id: "OfflineTable"
        fields: ["stageId", "goldPerSec", "expPerSec", "maxDuration"]
  user_data:
    description: "유저 데이터 - PlayerPrefs + JSON 파일 (SaveManager)"
    structures:
      - id: "UserInfo"
        fields: ["userId", "nickname", "level", "exp", "createdAt", "lastLoginAt"]
      - id: "UserCurrency"
        fields: ["gold", "gem", "soulStone", "skillStone", "dungeonKey"]
      - id: "UserHeroes"
        fields: ["heroId", "level", "stars", "exp", "equippedItems", "skills"]
      - id: "UserEquipment"
        fields: ["instanceId", "equipId", "level", "ownerId"]
      - id: "UserStage"
        fields: ["currentChapter", "currentStage", "maxClearedStage", "difficulty", "stars"]
      - id: "UserQuest"
        fields: ["questId", "progress", "isComplete", "isClaimed", "refreshedAt"]
      - id: "UserTower"
        fields: ["maxFloor", "currentFloor", "lastAttemptAt"]
      - id: "UserDungeon"
        fields: ["dungeonId", "remainEntries", "lastResetAt", "bestRecord"]
      - id: "UserSettings"
        fields: ["soundOn", "bgmOn", "notificationOn", "language"]
      - id: "UserOffline"
        fields: ["lastLoginTime", "pendingGold", "pendingExp"]
      - id: "UserGacha"
        fields: ["bannerId", "pityCount", "totalPulls", "isSoftPity"]
      - id: "UserInventory"
        fields: ["itemId", "count"]

systems:
  # ============================================================
  # CORE LAYER
  # ============================================================
  - nodeId: "Singleton"
    layer: "Core"
    genre: "Generic"
    role: "Helper"
    purpose: "제네릭 싱글톤 베이스 클래스 (MonoBehaviour 상속)"
    responsibilities:
      - "T 타입 인스턴스 단일 보장"
      - "DontDestroyOnLoad 처리"
      - "Instance null 체크 및 자동 생성"
    states: []
    behaviors:
      - trigger: "Instance 최초 접근"
        action: "FindObjectOfType<T> 또는 Resources.Load로 Prefab 로드"
        result: "싱글톤 인스턴스 생성 및 등록"
      - trigger: "씬 전환"
        action: "DontDestroyOnLoad 유지"
        result: "인스턴스 유지"
    relations:
      uses: []
      usedBy: ["EventManager", "ObjectPool", "SaveManager", "DataManager", "CurrencyManager", "CharacterManager", "StageManager", "BattleManager", "GachaManager", "QuestManager", "InventoryManager", "OfflineProgressManager", "TowerManager", "DungeonManager", "UISystem", "GameManager", "TitleManager"]
      publishes: []
      subscribes: []

  - nodeId: "EventManager"
    layer: "Core"
    genre: "Generic"
    role: "Manager"
    purpose: "string 키 기반 글로벌 이벤트 버스 (Observer 패턴)"
    responsibilities:
      - "이벤트 구독/해제 (Subscribe/Unsubscribe)"
      - "이벤트 발행 (Publish)"
      - "리스너 딕셔너리 관리"
      - "메모리 누수 방지 (씬 전환 시 클린업)"
    states: []
    behaviors:
      - trigger: "Subscribe(eventKey, callback)"
        action: "Dictionary<string, Action> 에 콜백 등록"
        result: "이벤트 구독 완료"
      - trigger: "Publish(eventKey, data)"
        action: "등록된 모든 콜백 호출"
        result: "이벤트 전파"
      - trigger: "씬 전환"
        action: "등록된 이벤트 클린업 (씬 종속 리스너 해제)"
        result: "메모리 누수 방지"
    relations:
      uses: ["Singleton"]
      usedBy: ["모든 Manager"]
      publishes: []
      subscribes: []

  - nodeId: "ObjectPool"
    layer: "Core"
    genre: "Generic"
    role: "Pool"
    purpose: "제네릭 오브젝트 풀 (GC 최적화)"
    responsibilities:
      - "GameObject 풀 초기화 (Prefab 기반)"
      - "오브젝트 Spawn/Despawn"
      - "풀 크기 자동 확장"
      - "태그 기반 다중 풀 관리"
    states:
      - "Idle (초기화 전)"
      - "Ready (초기화 완료)"
    behaviors:
      - trigger: "Init(prefab, tag, size)"
        action: "Prefab 기반 풀 초기화"
        result: "오브젝트 풀 준비 완료"
      - trigger: "Spawn(tag, position)"
        action: "비활성 오브젝트 활성화 또는 새 생성"
        result: "오브젝트 반환"
      - trigger: "Despawn(obj)"
        action: "오브젝트 비활성화 후 풀 반환"
        result: "재사용 가능 상태"
    relations:
      uses: ["Singleton"]
      usedBy: ["EnemySpawner", "CharacterBattle", "BattleManager"]
      publishes: []
      subscribes: []

  - nodeId: "GameConstants"
    layer: "Core"
    genre: "Generic"
    role: "Config"
    purpose: "게임 전역 상수 정의 (static class)"
    responsibilities:
      - "저장 키 상수 (PlayerPrefs keys)"
      - "게임 수치 상수 (최대 레벨, 최대 별 등)"
      - "씬 이름 상수"
      - "이벤트 키 상수"
    states: []
    behaviors: []
    relations:
      uses: []
      usedBy: ["모든 Manager", "모든 UI"]
      publishes: []
      subscribes: []

  - nodeId: "Util"
    layer: "Core"
    genre: "Generic"
    role: "Helper"
    purpose: "확장 메서드 및 유틸리티 함수 모음 (static class)"
    responsibilities:
      - "숫자 포맷 (1.2K, 1.5M 변환)"
      - "시간 포맷 (HH:MM:SS)"
      - "색상 유틸리티"
      - "난수 생성 (확률 가중치)"
      - "씬 전환 헬퍼"
    states: []
    behaviors:
      - trigger: "FormatNumber(value)"
        action: "K/M/B 단위 변환"
        result: "포맷된 문자열 반환"
      - trigger: "WeightedRandom(weights)"
        action: "가중치 기반 인덱스 선택"
        result: "선택된 인덱스"
    relations:
      uses: []
      usedBy: ["모든 Manager", "모든 UI"]
      publishes: []
      subscribes: []

  # ============================================================
  # DOMAIN LAYER - Phase 1 (Foundation)
  # ============================================================
  - nodeId: "SaveManager"
    layer: "Domain"
    genre: "Idle"
    role: "Manager"
    purpose: "로컬 JSON 저장/로드 (PlayerPrefs + 파일)"
    responsibilities:
      - "UserData JSON 직렬화/역직렬화"
      - "PlayerPrefs 기반 경량 저장"
      - "자동 저장 (일정 주기)"
      - "첫 실행 감지 및 초기 데이터 생성"
      - "저장 파일 암호화 (선택)"
    states:
      - "Uninitialized"
      - "Loading"
      - "Ready"
      - "Saving"
    behaviors:
      - trigger: "Init()"
        action: "저장 파일 존재 여부 확인, 없으면 기본 데이터 생성"
        result: "SaveManager 준비 완료, OnDataLoaded 이벤트 발행"
      - trigger: "Save()"
        action: "UserData 전체 JSON 직렬화 후 파일 저장"
        result: "OnGameSaved 이벤트 발행"
      - trigger: "Load()"
        action: "파일 읽기 후 역직렬화"
        result: "UserData 반환"
      - trigger: "AutoSave (30초마다)"
        action: "Save() 자동 호출"
        result: "데이터 보존"
    relations:
      uses: ["Singleton", "GameConstants"]
      usedBy: ["DataManager"]
      publishes: ["OnDataLoaded", "OnGameSaved"]
      subscribes: []

  - nodeId: "DataManager"
    layer: "Domain"
    genre: "Idle"
    role: "Manager"
    purpose: "차트 데이터 + 유저 데이터 중앙 관리"
    responsibilities:
      - "차트 데이터 로드 (Resources JSON)"
      - "유저 데이터 참조 (SaveManager 연동)"
      - "데이터 쿼리 API 제공"
      - "HeroTable, StageTable 등 80종 차트 캐싱"
    states:
      - "Uninitialized"
      - "Loading"
      - "Ready"
    behaviors:
      - trigger: "Init()"
        action: "Resources에서 모든 차트 JSON 로드 후 파싱"
        result: "차트 데이터 캐시 완료"
      - trigger: "GetHeroData(heroId)"
        action: "캐시된 HeroTable에서 조회"
        result: "HeroData 반환"
      - trigger: "GetStageData(stageId)"
        action: "캐시된 StageTable에서 조회"
        result: "StageData 반환"
      - trigger: "OnDataLoaded 수신"
        action: "UserData 동기화"
        result: "최신 유저 데이터 반영"
    relations:
      uses: ["Singleton", "SaveManager", "GameConstants"]
      usedBy: ["CharacterManager", "StageManager", "CurrencyManager", "BattleManager", "GachaManager", "QuestManager", "EquipmentManager", "TowerManager", "DungeonManager"]
      publishes: []
      subscribes: ["OnDataLoaded", "OnGameSaved"]

  - nodeId: "CurrencyManager"
    layer: "Domain"
    genre: "Idle"
    role: "Manager"
    purpose: "Gold/Gem/SoulStone 등 다중 재화 관리"
    responsibilities:
      - "재화 획득/소비"
      - "재화 잔액 검증"
      - "재화 변경 이벤트 발행"
      - "광고 보상 처리"
    states: []
    behaviors:
      - trigger: "AddCurrency(type, amount)"
        action: "해당 재화 잔액 증가 후 저장"
        result: "OnCurrencyChanged 이벤트 발행"
      - trigger: "SpendCurrency(type, amount)"
        action: "잔액 검증 후 차감"
        result: "성공/실패 반환, OnCurrencyChanged 이벤트"
      - trigger: "HasEnough(type, amount)"
        action: "잔액 >= amount 체크"
        result: "bool 반환"
      - trigger: "OnAdWatched 수신"
        action: "광고 보상 재화 지급"
        result: "OnCurrencyChanged 이벤트"
      - trigger: "OnIAPPurchased 수신"
        action: "IAP 재화 지급"
        result: "OnCurrencyChanged 이벤트"
    relations:
      uses: ["Singleton", "DataManager", "EventManager", "SaveManager"]
      usedBy: ["CharacterManager", "EquipmentManager", "SkillManager", "GachaManager", "UISystem", "HUD"]
      publishes: ["OnCurrencyChanged"]
      subscribes: ["OnStageComplete", "OnAdWatched", "OnIAPPurchased", "OnQuestComplete", "OnEnemyDie", "OnDungeonComplete"]

  - nodeId: "CharacterManager"
    layer: "Domain"
    genre: "Idle"
    role: "Manager"
    purpose: "영웅 수집, 레벨업, 등급 관리"
    responsibilities:
      - "보유 영웅 목록 관리"
      - "영웅 레벨업 (Gold + 경험치 재료 소모)"
      - "별 강화 (SoulStone 소모)"
      - "전투 영웅 편성 (최대 5명)"
      - "영웅 스탯 계산 (장비 포함)"
    states: []
    behaviors:
      - trigger: "LevelUpHero(heroId)"
        action: "CurrencyManager로 Gold 소모, 레벨 증가, 스탯 재계산"
        result: "OnCharacterLevelUp 이벤트 발행"
      - trigger: "StarUpHero(heroId)"
        action: "SoulStone 소모 후 별 1개 증가"
        result: "영웅 등급 상승"
      - trigger: "SetFormation(heroIds)"
        action: "전투 편성 5인 저장"
        result: "BattleManager에 편성 정보 제공"
      - trigger: "GetHeroStats(heroId)"
        action: "기본 스탯 + 장비 스탯 + 스킬 스탯 합산"
        result: "최종 스탯 반환"
      - trigger: "OnGachaResult 수신"
        action: "신규 영웅 추가 또는 SoulStone 변환"
        result: "영웅 목록 갱신"
      - trigger: "OnEquipmentChanged 수신"
        action: "해당 영웅 스탯 재계산"
        result: "OnCharacterLevelUp 이벤트"
    relations:
      uses: ["Singleton", "DataManager", "CurrencyManager", "EventManager", "SaveManager"]
      usedBy: ["BattleManager", "PopupCharacter", "PageLobby"]
      publishes: ["OnCharacterLevelUp"]
      subscribes: ["OnGachaResult", "OnEquipmentChanged", "OnDataLoaded"]

  - nodeId: "StageManager"
    layer: "Domain"
    genre: "Idle"
    role: "Manager"
    purpose: "스테이지 진행, 챕터, 난이도 관리"
    responsibilities:
      - "현재 스테이지 상태 관리"
      - "스테이지 진행 및 완료 처리"
      - "챕터 해금 관리"
      - "별 3개 클리어 기록"
      - "스테이지 보상 분배"
    states:
      - "Idle"
      - "InProgress"
      - "Complete"
      - "Failed"
    behaviors:
      - trigger: "StartStage(stageId)"
        action: "스테이지 데이터 로드, BattleManager 초기화"
        result: "OnStageStart 이벤트 발행"
      - trigger: "OnStageComplete 수신"
        action: "보상 계산, 다음 스테이지 해금, 저장"
        result: "클리어 기록 갱신"
      - trigger: "OnStageFail 수신"
        action: "실패 처리, 리트라이 또는 로비 이동"
        result: "상태 Idle 복귀"
    relations:
      uses: ["Singleton", "DataManager", "CurrencyManager", "EventManager", "SaveManager"]
      usedBy: ["BattleManager", "PageLobby", "PageBattle", "HUD"]
      publishes: ["OnStageStart", "OnStageFail"]
      subscribes: ["OnStageComplete"]

  - nodeId: "ResourceContainer"
    layer: "Domain"
    genre: "Generic"
    role: "Provider"
    purpose: "Resources 폴더 에셋 로드 유틸리티"
    responsibilities:
      - "Prefab 로드 캐싱"
      - "Sprite 로드 캐싱"
      - "JSON 파일 로드"
      - "비동기 로드 지원"
    states: []
    behaviors:
      - trigger: "LoadPrefab<T>(path)"
        action: "Resources.Load 후 캐시 저장"
        result: "Prefab 반환"
      - trigger: "LoadSprite(path)"
        action: "Resources.Load<Sprite> 후 캐시"
        result: "Sprite 반환"
      - trigger: "LoadJson(path)"
        action: "Resources.Load<TextAsset> 후 text 반환"
        result: "JSON 문자열 반환"
    relations:
      uses: ["Singleton"]
      usedBy: ["DataManager", "UISystem", "CharacterManager"]
      publishes: []
      subscribes: []

  # ============================================================
  # DOMAIN LAYER - Phase 2 (Upper)
  # ============================================================
  - nodeId: "BattleManager"
    layer: "Domain"
    genre: "Idle"
    role: "Manager"
    purpose: "자동 전투, 적 스폰, 피해 계산, 보스전 총괄"
    responsibilities:
      - "전투 초기화 및 시작"
      - "웨이브 진행 관리"
      - "보스 전투 관리"
      - "전투 결과 처리 (클리어/실패)"
      - "전투 속도 배율 관리 (1x/2x)"
      - "partial class로 분할 (BattleManager_Wave, BattleManager_Boss, BattleManager_Reward)"
    states:
      - "Idle"
      - "Preparing"
      - "WaveInProgress"
      - "BossPhase"
      - "Complete"
      - "Failed"
    behaviors:
      - trigger: "OnStageStart 수신"
