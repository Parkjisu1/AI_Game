metadata:
  nodeId: "SaveManager"
  version: "1.0.0"
  phase: 1
  role: "Manager"

dependencies:
  internal:
    - "Singleton"
    - "GameConstants"
  external:
    - "UnityEngine"
    - "System.IO"
    - "Newtonsoft.Json"

contract:
  provides:
    - "void Init()"
    - "void Save()"
    - "T Load<T>(string key) where T : new()"
    - "void DeleteAll()"
    - "bool IsFirstPlay()"
  requires:
    - "Singleton"
    - "GameConstants"

tags:
  layer: "Domain"
  genre: "Idle"
  role: "Manager"
  system: "Data"
  majorFunctions:
    - "DataSync"
    - "StateControl"
  minorFunctions:
    - "Assign"
    - "Validate"

logicFlow:
  - step: 1
    tag: "StateControl"
    action: "Init: 저장 경로 설정 (Application.persistentDataPath)"
    next: 2
  - step: 2
    tag: "ConditionCheck"
    action: "저장 파일 존재 여부 확인"
    next: 3
  - step: 3
    tag: "Assign"
    action: "없으면: 기본 UserData 생성 후 Save() / 있으면: Load() 실행"
    next: 4
  - step: 4
    tag: "Notify"
    action: "EventManager.Publish(OnDataLoaded)"
    next: null
  - step: 5
    tag: "DataSync"
    action: "Save: UserData 전체 JSON 직렬화 (JsonUtility 또는 Newtonsoft)"
    next: 6
  - step: 6
    tag: "Assign"
    action: "File.WriteAllText(savePath, json)"
    next: 7
  - step: 7
    tag: "Notify"
    action: "EventManager.Publish(OnGameSaved)"
    next: null

referencePatterns:
  - source: "CLAUDE.md"
    pattern: "BackendManager 8단계 상태머신 → SaveManager Init/Load/Save 3단계 단순화"
  - source: "CLAUDE.md"
    pattern: "서버 저장 → 로컬 JSON 전환 (PlayerPrefs + 파일)"

codeHints:
  patterns:
    - "public class SaveManager : Singleton<SaveManager>"
    - "private string _savePath => Path.Combine(Application.persistentDataPath, \"save.json\")"
    - "JSON 직렬화: JsonUtility.ToJson / JsonUtility.FromJson (또는 Newtonsoft.Json)"
    - "AutoSave: StartCoroutine(AutoSaveRoutine()) - WaitForSeconds(GameConstants.Battle.AutoSaveInterval)"
    - "IsFirstPlay: !File.Exists(_savePath)"
    - "PlayerPrefs는 경량 설정(사운드 ON/OFF 등)에만 사용, 유저 데이터는 파일 저장"
  avoidPatterns:
    - "PlayerPrefs에 대용량 JSON 직접 저장 금지"
    - "Save() 동기 파일 IO는 메인 스레드에서만 (Threading 불필요)"
    - "암호화 필요 시 AES 간단 래핑 사용 (Unity용 자체 구현)"
