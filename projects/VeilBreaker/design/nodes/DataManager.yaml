metadata:
  nodeId: "DataManager"
  version: "1.0.0"
  phase: 1
  role: "Manager"

dependencies:
  internal:
    - "Singleton"
    - "SaveManager"
    - "GameConstants"
  external:
    - "UnityEngine"
    - "System.Collections.Generic"
    - "Newtonsoft.Json"

contract:
  provides:
    - "void Init()"
    - "HeroData GetHeroData(string heroId)"
    - "StageData GetStageData(string stageId)"
    - "EnemyData GetEnemyData(string enemyId)"
    - "EquipmentData GetEquipmentData(string equipId)"
    - "SkillData GetSkillData(string skillId)"
    - "GachaData GetGachaData(string bannerId)"
    - "QuestData GetQuestData(string questId)"
    - "DungeonData GetDungeonData(string dungeonId)"
    - "TowerData GetTowerData(int floor)"
    - "UserInfo GetUserInfo()"
    - "UserCurrency GetUserCurrency()"
    - "UserHeroData GetUserHeroData(string heroId)"
    - "UserStageData GetUserStageData()"
    - "void UpdateUserInfo(UserInfo info)"
    - "void UpdateUserCurrency(UserCurrency currency)"
  requires:
    - "Singleton"
    - "SaveManager"

tags:
  layer: "Domain"
  genre: "Idle"
  role: "Manager"
  system: "Data"
  majorFunctions:
    - "DataSync"
    - "StateControl"
  minorFunctions:
    - "Find"
    - "Assign"

logicFlow:
  - step: 1
    tag: "StateControl"
    action: "Init: 상태 Loading으로 전환"
    next: 2
  - step: 2
    tag: "Assign"
    action: "Resources.Load<TextAsset> 로 HeroTable.json 파싱 → _heroCache 딕셔너리 구성"
    next: 3
  - step: 3
    tag: "Iterate"
    action: "나머지 차트 JSON (StageTable, EnemyTable, EquipmentTable 등) 순차 파싱"
    next: 4
  - step: 4
    tag: "DataSync"
    action: "SaveManager.Load<UserInfo>() 로 유저 데이터 동기화"
    next: 5
  - step: 5
    tag: "StateControl"
    action: "상태 Ready로 전환"
    next: null
  - step: 6
    tag: "Find"
    action: "GetHeroData(heroId): _heroCache[heroId] 조회"
    next: null

referencePatterns:
  - source: "CLAUDE.md"
    pattern: "DataManager: Chart(80종) + User(36종) 이원 구조 참조"
  - source: "db/base/generic/Core"
    pattern: "TableBase - SetData, ITableBase 패턴"

codeHints:
  patterns:
    - "public class DataManager : Singleton<DataManager>"
    - "private Dictionary<string, HeroData> _heroCache = new()"
    - "private Dictionary<string, StageData> _stageCache = new()"
    - "차트 데이터: Resources/Data/{TableName}.json 경로 규칙"
    - "GetHeroData: _heroCache.TryGetValue(heroId, out var data) ? data : null"
    - "UpdateUserInfo: 내부 캐시 갱신 후 SaveManager.Save()"
    - "데이터 모델: [Serializable] public class HeroData { public string heroId; ... }"
  avoidPatterns:
    - "차트 데이터를 매번 Resources.Load하지 말고 Init 시 1회만 캐싱"
    - "유저 데이터와 차트 데이터를 같은 딕셔너리에 혼합 금지"
