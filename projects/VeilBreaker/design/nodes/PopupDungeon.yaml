metadata:
  nodeId: "PopupDungeon"
  version: "1.0.0"
  phase: 3
  role: "UX"

dependencies:
  internal:
    - "UISystem"
    - "DungeonManager"
    - "EventManager"
  external:
    - "UnityEngine"
    - "UnityEngine.UI"
    - "TMPro"

contract:
  provides:
    - "void Open(object data)"
    - "void Close()"
  requires:
    - "UISystem"
    - "DungeonManager"

tags:
  layer: "Game"
  genre: "Idle"
  role: "UX"
  system: "UI"
  majorFunctions:
    - "DataSync"
    - "ResponseTrigger"
  minorFunctions:
    - "Assign"

logicFlow:
  - step: 1
    tag: "Assign"
    action: "Open: DungeonManager.GetAvailableDungeons() 목록 표시, 잔여 횟수 표시"
    next: null
  - step: 2
    tag: "ResponseTrigger"
    action: "입장 버튼: DungeonManager.EnterDungeon(dungeonId)"
    next: null
  - step: 3
    tag: "ResponseTrigger"
    action: "OnDungeonComplete: 잔여 횟수 갱신"
    next: null

referencePatterns:
  - source: "CLAUDE.md"
    pattern: "PopupDungeon - 던전 선택 팝업"

codeHints:
  patterns:
    - "public class PopupDungeon : PopupBase"
    - "[SerializeField] private DungeonItemUI[] _dungeonItems"
    - "[SerializeField] private TextMeshProUGUI _dungeonKeyText"
    - "DungeonItemUI: [SerializeField] TextMeshProUGUI _nameText, _remainText, Button _enterButton"
  avoidPatterns:
    - "잔여 횟수 0 시 입장 버튼 비활성화 처리 필수"
