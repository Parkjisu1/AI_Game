metadata:
  nodeId: "CharacterManager"
  version: "1.0.0"
  phase: 2
  role: "Manager"

dependencies:
  internal:
    - "Singleton"
    - "DataManager"
    - "CurrencyManager"
    - "EventManager"
    - "SaveManager"
    - "GameConstants"
  external:
    - "System.Collections.Generic"

contract:
  provides:
    - "List<UserHeroData> GetOwnedHeroes()"
    - "UserHeroData GetHeroData(string heroId)"
    - "bool LevelUpHero(string heroId)"
    - "bool StarUpHero(string heroId)"
    - "void SetFormation(List<string> heroIds)"
    - "List<string> GetFormation()"
    - "HeroStats GetFinalStats(string heroId)"
    - "bool AddHero(string heroId)"
  requires:
    - "Singleton"
    - "DataManager"
    - "CurrencyManager"
    - "EventManager"

tags:
  layer: "Domain"
  genre: "Idle"
  role: "Manager"
  system: "Character"
  majorFunctions:
    - "StateControl"
    - "ValueModification"
    - "ConditionCheck"
  minorFunctions:
    - "Calculate"
    - "Assign"
    - "Validate"

logicFlow:
  - step: 1
    tag: "Assign"
    action: "Init: DataManager에서 UserHeroes 로드, 편성 목록 로드"
    next: null
  - step: 2
    tag: "Validate"
    action: "LevelUpHero: 최대 레벨(100) 체크"
    next: 3
  - step: 3
    tag: "ConditionCheck"
    action: "CurrencyManager.SpendCurrency(Gold, cost) 성공 여부 확인"
    next: 4
  - step: 4
    tag: "Assign"
    action: "hero.level += 1, exp 갱신"
    next: 5
  - step: 5
    tag: "Calculate"
    action: "GetFinalStats 재계산 (기본 스탯 * 레벨 배율 + 장비 스탯)"
    next: 6
  - step: 6
    tag: "Notify"
    action: "EventManager.Publish(OnCharacterLevelUp, heroId)"
    next: null
  - step: 7
    tag: "Calculate"
    action: "GetFinalStats: baseAtk + 레벨 성장 + 장비 ATK 합산"
    next: null

referencePatterns:
  - source: "CLAUDE.md"
    pattern: "CharacterManager - 영웅 수집, 레벨업, 등급 관리"
  - source: "CLAUDE.md"
    pattern: "AshAndVeil: 영웅 별 강화 = 중복 영웅 or SoulStone"

codeHints:
  patterns:
    - "public class CharacterManager : Singleton<CharacterManager>"
    - "private List<UserHeroData> _ownedHeroes = new()"
    - "private List<string> _formation = new() { Capacity = 5 }"
    - "LevelUpCost: UpgradeTable에서 현재 레벨의 goldCost 조회"
    - "GetFinalStats: HeroStats = baseStat + (baseStat * growthRate * (level-1)) + equipmentStats"
    - "AddHero: 이미 보유 시 SoulStone N개로 변환"
  avoidPatterns:
    - "영웅 스탯을 직접 필드에 캐싱하지 말고 GetFinalStats 메서드로 계산"
    - "SetFormation: heroIds.Count > 5이면 예외 처리"
