metadata:
  nodeId: "PopupTower"
  version: "1.0.0"
  phase: 3
  role: "UX"

dependencies:
  internal:
    - "UISystem"
    - "TowerManager"
    - "EventManager"
  external:
    - "UnityEngine"
    - "UnityEngine.UI"
    - "TMPro"

contract:
  provides:
    - "void Open(object data)"
    - "void Close()"
  requires:
    - "UISystem"
    - "TowerManager"

tags:
  layer: "Game"
  genre: "Idle"
  role: "UX"
  system: "UI"
  majorFunctions:
    - "DataSync"
    - "ResponseTrigger"
  minorFunctions:
    - "Assign"

logicFlow:
  - step: 1
    tag: "Assign"
    action: "Open: TowerManager.GetMaxFloor() 조회, 현재/최고층 표시"
    next: null
  - step: 2
    tag: "ResponseTrigger"
    action: "도전 버튼: TowerManager.StartTower(nextFloor)"
    next: null
  - step: 3
    tag: "ResponseTrigger"
    action: "OnTowerFloorComplete: 층 정보 갱신"
    next: null

referencePatterns:
  - source: "CLAUDE.md"
    pattern: "PopupTower - 무한탑 도전 팝업"

codeHints:
  patterns:
    - "public class PopupTower : PopupBase"
    - "[SerializeField] private TextMeshProUGUI _maxFloorText"
    - "[SerializeField] private TextMeshProUGUI _nextFloorText"
    - "[SerializeField] private Button _challengeButton"
    - "[SerializeField] private Transform _rewardPreviewContent"
  avoidPatterns:
    - "전투 시작 후 팝업 즉시 닫기 필수 (화면 겹침 방지)"
