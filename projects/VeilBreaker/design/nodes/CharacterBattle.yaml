metadata:
  nodeId: "CharacterBattle"
  version: "1.0.0"
  phase: 2
  role: "Controller"

dependencies:
  internal:
    - "DataManager"
    - "SkillManager"
    - "DamageCalculator"
    - "ObjectPool"
    - "EventManager"
    - "GameConstants"
  external:
    - "UnityEngine"
    - "System.Collections"

contract:
  provides:
    - "void Init(string heroId, HeroStats stats)"
    - "void TakeDamage(int amount)"
    - "int GetCurrentHp()"
    - "bool IsAlive()"
    - "void SetTarget(EnemyController target)"
    - "void Die()"
  requires:
    - "DataManager"
    - "SkillManager"
    - "DamageCalculator"
    - "EventManager"

tags:
  layer: "Domain"
  genre: "Idle"
  role: "Controller"
  system: "Battle"
  majorFunctions:
    - "StateControl"
    - "ResponseTrigger"
    - "FlowControl"
  minorFunctions:
    - "Calculate"
    - "Spawn"
    - "Notify"

logicFlow:
  - step: 1
    tag: "StateControl"
    action: "Update: 현재 상태 (Idle/Moving/Attacking/Dead) 기반 분기"
    next: 2
  - step: 2
    tag: "Find"
    action: "FindNearestEnemy: 살아있는 적 중 가장 가까운 것 탐색"
    next: 3
  - step: 3
    tag: "ConditionCheck"
    action: "target != null && distance <= attackRange이면 Attacking / else Moving"
    next: 4
  - step: 4
    tag: "Calculate"
    action: "Attacking: attackTimer >= attackSpeed이면 DoAttack()"
    next: 5
  - step: 5
    tag: "Assign"
    action: "DamageCalculator.Calculate(stats, target.stats) → target.TakeDamage(result.amount)"
    next: 6
  - step: 6
    tag: "ConditionCheck"
    action: "SkillManager.CanActivate(heroId, skillId)이면 UseSkill()"
    next: null
  - step: 7
    tag: "ResponseTrigger"
    action: "TakeDamage: currentHp -= amount, hp <= 0이면 Die()"
    next: 8
  - step: 8
    tag: "Notify"
    action: "Die: EventManager.Publish(OnHeroDie, heroId)"
    next: null

referencePatterns:
  - source: "db/base/idle/Core"
    pattern: "UXEffectManager - PlayHitImpact, PlayKnockback 패턴"

codeHints:
  patterns:
    - "public class CharacterBattle : MonoBehaviour"
    - "[SerializeField] private Animator _animator"
    - "private BattleState _state = BattleState.Idle"
    - "private float _attackTimer"
    - "Update: _attackTimer += Time.deltaTime"
    - "FindNearestEnemy: BattleManager.GetAliveEnemies() 목록에서 Vector3.Distance 비교"
    - "스킬 발동: StartCoroutine(UseSkillRoutine(skillData))"
    - "히트 이펙트: ObjectPool.Spawn('HitEffect', hitPosition)"
  avoidPatterns:
    - "Find/FindObjectOfType 사용 금지"
    - "EnemyController 직접 참조 대신 interface ITargetable 사용 권장"
    - "애니메이션 제어: SetTrigger/SetBool만 사용, Animator 직접 수정 금지"
