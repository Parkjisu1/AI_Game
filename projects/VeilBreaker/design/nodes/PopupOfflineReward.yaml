metadata:
  nodeId: "PopupOfflineReward"
  version: "1.0.0"
  phase: 3
  role: "UX"

dependencies:
  internal:
    - "UISystem"
    - "OfflineProgressManager"
    - "AdMobManager"
    - "EventManager"
  external:
    - "UnityEngine"
    - "UnityEngine.UI"
    - "TMPro"

contract:
  provides:
    - "void Open(object data)"
    - "void Close()"
  requires:
    - "UISystem"
    - "OfflineProgressManager"
    - "AdMobManager"

tags:
  layer: "Game"
  genre: "Idle"
  role: "UX"
  system: "UI"
  majorFunctions:
    - "DataSync"
    - "ResponseTrigger"
    - "ResourceTransfer"
  minorFunctions:
    - "Assign"

logicFlow:
  - step: 1
    tag: "ResponseTrigger"
    action: "OnOfflineRewardCalculated 수신: 팝업 자동 열기, 보상 정보 표시"
    next: null
  - step: 2
    tag: "ResponseTrigger"
    action: "일반 수령 버튼: OfflineProgressManager.ClaimReward(false)"
    next: null
  - step: 3
    tag: "ResponseTrigger"
    action: "광고 2배 버튼: AdMobManager.ShowRewardedAd(onComplete: ClaimWithAd)"
    next: null
  - step: 4
    tag: "Assign"
    action: "ClaimWithAd: OfflineProgressManager.ClaimReward(true)"
    next: null

referencePatterns:
  - source: "CLAUDE.md"
    pattern: "PopupOfflineReward - 오프라인 보상 팝업"

codeHints:
  patterns:
    - "public class PopupOfflineReward : PopupBase"
    - "[SerializeField] private TextMeshProUGUI _offlineHoursText"
    - "[SerializeField] private TextMeshProUGUI _goldRewardText"
    - "[SerializeField] private TextMeshProUGUI _expRewardText"
    - "[SerializeField] private Button _claimButton"
    - "[SerializeField] private Button _adClaimButton"
    - "OnOfflineRewardCalculated: data를 OfflineRewardResult로 캐스팅하여 UI 갱신"
  avoidPatterns:
    - "광고 시청 실패 시 일반 보상으로 자동 전환 처리 필수"
