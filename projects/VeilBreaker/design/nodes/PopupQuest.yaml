metadata:
  nodeId: "PopupQuest"
  version: "1.0.0"
  phase: 3
  role: "UX"

dependencies:
  internal:
    - "UISystem"
    - "QuestManager"
    - "EventManager"
  external:
    - "UnityEngine"
    - "UnityEngine.UI"
    - "TMPro"

contract:
  provides:
    - "void Open(object data)"
    - "void Close()"
    - "void RefreshQuestList(string questId)"
  requires:
    - "UISystem"
    - "QuestManager"

tags:
  layer: "Game"
  genre: "Idle"
  role: "UX"
  system: "UI"
  majorFunctions:
    - "DataSync"
    - "ResponseTrigger"
  minorFunctions:
    - "Assign"

logicFlow:
  - step: 1
    tag: "Assign"
    action: "Open: 탭(일일/주간/업적) 초기화, 기본 탭 로드"
    next: null
  - step: 2
    tag: "ResponseTrigger"
    action: "탭 버튼: 해당 탭 퀘스트 목록 표시"
    next: null
  - step: 3
    tag: "ResponseTrigger"
    action: "보상 수령: QuestManager.ClaimReward(questId)"
    next: null
  - step: 4
    tag: "ResponseTrigger"
    action: "OnQuestProgress / OnQuestComplete 수신: 해당 퀘스트 UI 갱신"
    next: null

referencePatterns:
  - source: "CLAUDE.md"
    pattern: "PopupQuest - 퀘스트 팝업"

codeHints:
  patterns:
    - "public class PopupQuest : PopupBase"
    - "[SerializeField] private Toggle[] _tabToggles (일일/주간/업적)"
    - "[SerializeField] private Transform _questListContent"
    - "[SerializeField] private GameObject _questItemPrefab"
  avoidPatterns:
    - "퀘스트 UI 아이템을 매번 Destroy/Instantiate 금지 → ObjectPool 활용"
