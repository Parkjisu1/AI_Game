metadata:
  nodeId: "ObjectPool"
  version: "1.0.0"
  phase: 0
  role: "Pool"

dependencies:
  internal:
    - "Singleton"
  external:
    - "UnityEngine"
    - "System.Collections.Generic"

contract:
  provides:
    - "void Init(string tag, GameObject prefab, int size)"
    - "GameObject Spawn(string tag, Vector3 position, Quaternion rotation)"
    - "void Despawn(GameObject obj)"
    - "int GetAvailableCount(string tag)"
  requires:
    - "Singleton"

tags:
  layer: "Core"
  genre: "Generic"
  role: "Pool"
  system: "ObjectPool"
  majorFunctions:
    - "StateControl"
    - "ResourceTransfer"
  minorFunctions:
    - "Spawn"
    - "Despawn"
    - "Find"

logicFlow:
  - step: 1
    tag: "Assign"
    action: "Init: Dictionary<string, Queue<GameObject>> _pools에 tag 등록"
    next: 2
  - step: 2
    tag: "Spawn"
    action: "size만큼 Prefab 인스턴스 생성 후 비활성화, Queue에 추가"
    next: null
  - step: 3
    tag: "Find"
    action: "Spawn: _pools[tag] Queue에서 비활성 오브젝트 Dequeue"
    next: 4
  - step: 4
    tag: "ConditionCheck"
    action: "Queue 비어있으면 새 인스턴스 생성 (동적 확장)"
    next: 5
  - step: 5
    tag: "Assign"
    action: "position, rotation 설정 후 SetActive(true)"
    next: null
  - step: 6
    tag: "Despawn"
    action: "Despawn: SetActive(false), Queue에 Enqueue"
    next: null

referencePatterns:
  - source: "db/base/generic/Core"
    pattern: "ObjectPool - tag 기반 SpawnFromPool, ReturnToPool 패턴"
  - source: "db/base/generic/Core"
    pattern: "Pool<T> - 제네릭 풀 GetObject/ReturnObjectToPool"

codeHints:
  patterns:
    - "public class ObjectPool : Singleton<ObjectPool>"
    - "private Dictionary<string, Queue<GameObject>> _pools = new()"
    - "private Dictionary<string, GameObject> _prefabs = new()"
    - "Spawn 시 Queue.Count == 0이면 Instantiate로 동적 확장"
    - "풀 오브젝트에 PoolTag 컴포넌트 부착하여 Despawn 시 자동 반환"
  avoidPatterns:
    - "Destroy 대신 반드시 Despawn 사용"
    - "같은 tag로 중복 Init 금지 (이미 존재하면 skip)"
