metadata:
  nodeId: "BattleManager"
  version: "1.0.0"
  phase: 2
  role: "Manager"

dependencies:
  internal:
    - "Singleton"
    - "DataManager"
    - "EnemySpawner"
    - "CharacterBattle"
    - "DamageCalculator"
    - "ObjectPool"
    - "EventManager"
    - "GameConstants"
  external:
    - "UnityEngine"
    - "System.Collections"

contract:
  provides:
    - "void InitBattle(StageData stageData, List<string> heroIds)"
    - "void SetSpeed(float multiplier)"
    - "void PauseBattle()"
    - "void ResumeBattle()"
    - "BattleState GetState()"
    - "List<CharacterBattle> GetAliveHeroes()"
    - "List<EnemyController> GetAliveEnemies()"
  requires:
    - "Singleton"
    - "DataManager"
    - "EnemySpawner"
    - "CharacterBattle"
    - "DamageCalculator"
    - "ObjectPool"
    - "EventManager"

tags:
  layer: "Domain"
  genre: "Idle"
  role: "Manager"
  system: "Battle"
  majorFunctions:
    - "FlowControl"
    - "StateControl"
    - "ResponseTrigger"
  minorFunctions:
    - "Spawn"
    - "Iterate"
    - "Notify"

logicFlow:
  - step: 1
    tag: "StateControl"
    action: "OnStageStart 수신: 상태 Preparing으로 전환"
    next: 2
  - step: 2
    tag: "Spawn"
    action: "영웅 5인 CharacterBattle 인스턴스 배치 (편성 기반)"
    next: 3
  - step: 3
    tag: "StateControl"
    action: "상태 WaveInProgress로 전환, EnemySpawner.StartWave(wave1)"
    next: null
  - step: 4
    tag: "ResponseTrigger"
    action: "OnEnemyDie: 살아있는 적 수 체크"
    next: 5
  - step: 5
    tag: "ConditionCheck"
    action: "적 전멸 시 웨이브 카운터 증가, 마지막 웨이브면 보스 스폰"
    next: null
  - step: 6
    tag: "ResponseTrigger"
    action: "OnHeroDie: 살아있는 영웅 수 체크"
    next: 7
  - step: 7
    tag: "ConditionCheck"
    action: "전원 사망 시 OnStageFail 이벤트 발행"
    next: null
  - step: 8
    tag: "Notify"
    action: "보스 처치 시 OnStageComplete 이벤트 발행"
    next: null

referencePatterns:
  - source: "CLAUDE.md"
    pattern: "BattleManager: partial class 분할 (콘텐츠별) - BattleManager_Wave, BattleManager_Boss, BattleManager_Reward"

codeHints:
  patterns:
    - "public partial class BattleManager : Singleton<BattleManager>"
    - "BattleManager_Wave.cs: 웨이브 로직 partial"
    - "BattleManager_Boss.cs: 보스 전투 partial"
    - "BattleManager_Reward.cs: 보상 계산 partial"
    - "SetSpeed(float): Time.timeScale = multiplier (1f/2f/4f)"
    - "IEnumerator StartWaveSequence(): WaitForSeconds 웨이브 간 딜레이"
    - "private int _currentWave, _totalWaves, _aliveEnemyCount, _aliveHeroCount"
  avoidPatterns:
    - "단일 파일에 전체 전투 로직 작성 금지 → partial class 분할 필수"
    - "Time.timeScale을 BattleManager 외부에서 직접 수정 금지"
