metadata:
  nodeId: "PopupGacha"
  version: "1.0.0"
  phase: 3
  role: "UX"

dependencies:
  internal:
    - "UISystem"
    - "GachaManager"
    - "CurrencyManager"
    - "EventManager"
  external:
    - "UnityEngine"
    - "UnityEngine.UI"
    - "TMPro"
    - "System.Collections"

contract:
  provides:
    - "void Open(object data)"
    - "void Close()"
    - "void ShowGachaResult(List<GachaItem> results)"
  requires:
    - "UISystem"
    - "GachaManager"
    - "CurrencyManager"

tags:
  layer: "Game"
  genre: "Idle"
  role: "UX"
  system: "UI"
  majorFunctions:
    - "ResponseTrigger"
    - "StateControl"
  minorFunctions:
    - "Spawn"
    - "Notify"

logicFlow:
  - step: 1
    tag: "Assign"
    action: "Open: 배너 목록 표시, 현재 천장 카운터 표시"
    next: null
  - step: 2
    tag: "ResponseTrigger"
    action: "단발 버튼: GachaManager.Pull(bannerId, 1) → ShowGachaResult()"
    next: null
  - step: 3
    tag: "ResponseTrigger"
    action: "10연 버튼: GachaManager.Pull(bannerId, 10) → ShowGachaResult()"
    next: null
  - step: 4
    tag: "Spawn"
    action: "ShowGachaResult: 카드 플립 애니메이션 코루틴으로 순차 표시"
    next: null

referencePatterns:
  - source: "CLAUDE.md"
    pattern: "PopupGacha - 뽑기 팝업"

codeHints:
  patterns:
    - "public class PopupGacha : PopupBase"
    - "[SerializeField] private Transform _resultContainer"
    - "[SerializeField] private GameObject _gachaCardPrefab"
    - "[SerializeField] private TextMeshProUGUI _pityText"
    - "[SerializeField] private Button _singlePullButton"
    - "[SerializeField] private Button _tenPullButton"
    - "IEnumerator ShowResultAnimation(List<GachaItem> items): foreach → WaitForSeconds(0.15f)"
    - "카드 등급별 배경색 변경 (N=grey, R=green, SR=blue, SSR=purple, Legend=gold)"
  avoidPatterns:
    - "뽑기 결과를 한 번에 모두 표시하지 말고 순차 연출"
    - "뽑기 중 버튼 비활성화 필수 (중복 입력 방지)"
