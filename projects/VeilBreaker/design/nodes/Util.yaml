metadata:
  nodeId: "Util"
  version: "1.0.0"
  phase: 0
  role: "Helper"

dependencies:
  internal: []
  external:
    - "UnityEngine"
    - "System"
    - "System.Collections.Generic"

contract:
  provides:
    - "static string FormatNumber(double value)"
    - "static string FormatTime(float seconds)"
    - "static int WeightedRandom(List<int> weights)"
    - "static T GetOrCreate<T>(this Dictionary<string, T> dict, string key) where T : new()"
    - "static void LoadScene(string sceneName)"
    - "static bool IsChanceSuccess(float percent)"
  requires: []

tags:
  layer: "Core"
  genre: "Generic"
  role: "Helper"
  system: "Util"
  majorFunctions:
    - "ValueModification"
    - "ConditionCheck"
  minorFunctions:
    - "Calculate"
    - "Find"

logicFlow:
  - step: 1
    tag: "Calculate"
    action: "FormatNumber: value >= 1B → 'B' / >= 1M → 'M' / >= 1K → 'K' / else 정수"
    next: null
  - step: 2
    tag: "Calculate"
    action: "WeightedRandom: 누적합 배열 생성 후 Random.Range(0, total)로 인덱스 선택"
    next: null
  - step: 3
    tag: "ConditionCheck"
    action: "IsChanceSuccess: Random.Range(0f, 100f) < percent"
    next: null

referencePatterns:
  - source: "db/base/generic/Core"
    pattern: "GameUtill - setCommaNumber, setStringBuilder 패턴"
  - source: "db/base/generic/Core"
    pattern: "PlyAdsKitUtils - 화면 유틸, IsPointerOverUI 패턴"

codeHints:
  patterns:
    - "public static class Util"
    - "public static string FormatNumber(double v) { if (v >= 1_000_000_000) return $\"{v/1_000_000_000:F1}B\"; if (v >= 1_000_000) return $\"{v/1_000_000:F1}M\"; if (v >= 1_000) return $\"{v/1_000:F1}K\"; return v.ToString(\"N0\"); }"
    - "확장 메서드는 static class 내 static 메서드 + this 파라미터"
    - "WeightedRandom: int total = weights.Sum(); int rand = Random.Range(0, total); for loop로 누적합 초과 시 인덱스 반환"
  avoidPatterns:
    - "UnityEngine.Random과 System.Random 혼용 금지 (UnityEngine.Random 사용)"
    - "FormatNumber에서 string.Format 대신 보간 문자열 사용"
