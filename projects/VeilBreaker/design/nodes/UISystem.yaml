metadata:
  nodeId: "UISystem"
  version: "1.0.0"
  phase: 3
  role: "Manager"

dependencies:
  internal:
    - "Singleton"
    - "ResourceContainer"
    - "EventManager"
    - "GameConstants"
  external:
    - "UnityEngine"
    - "System.Collections.Generic"

contract:
  provides:
    - "void OpenPopup<T>() where T : PopupBase"
    - "void OpenPopup<T>(object data) where T : PopupBase"
    - "void ClosePopup()"
    - "void CloseAllPopups()"
    - "void OpenPage<T>() where T : PageBase"
    - "T GetCurrentPopup<T>() where T : PopupBase"
  requires:
    - "Singleton"
    - "ResourceContainer"

tags:
  layer: "Game"
  genre: "Idle"
  role: "Manager"
  system: "UI"
  majorFunctions:
    - "FlowControl"
    - "StateControl"
  minorFunctions:
    - "Spawn"
    - "Despawn"
    - "Find"

logicFlow:
  - step: 1
    tag: "Find"
    action: "OpenPopup<T>: T 타입명으로 Resources 경로 결정 (Resources/UI/Popups/T)"
    next: 2
  - step: 2
    tag: "Spawn"
    action: "ResourceContainer.LoadPrefab<T>(path) → Instantiate, Canvas 하위에 배치"
    next: 3
  - step: 3
    tag: "Assign"
    action: "_popupStack.Push(popup), popup.Open(data)"
    next: null
  - step: 4
    tag: "Despawn"
    action: "ClosePopup: _popupStack.Pop().Close(), Destroy or Deactivate"
    next: null
  - step: 5
    tag: "StateControl"
    action: "OpenPage<T>: 현재 Page 비활성화, 신규 Page 활성화"
    next: null
  - step: 6
    tag: "ResponseTrigger"
    action: "Android Back: ClosePopup() 자동 호출"
    next: null

referencePatterns:
  - source: "CLAUDE.md"
    pattern: "UISystem: 리소스 기반 팝업 로딩"
  - source: "CLAUDE.md"
    pattern: "[SerializeField] 기반 Inspector 연결 (코드에서 UI 동적 생성 금지)"

codeHints:
  patterns:
    - "public class UISystem : Singleton<UISystem>"
    - "private Stack<PopupBase> _popupStack = new()"
    - "private PageBase _currentPage"
    - "OpenPopup<T>: Resources/UI/Popups/{typeof(T).Name} 경로"
    - "CloseAllPopups: while (_popupStack.Count > 0) ClosePopup()"
    - "void Update() { if (Input.GetKeyDown(KeyCode.Escape) && _popupStack.Count > 0) ClosePopup(); }"
    - "abstract class PopupBase : MonoBehaviour { public virtual void Open(object data) {} public virtual void Close() {} }"
    - "abstract class PageBase : MonoBehaviour { public virtual void Show() {} public virtual void Hide() {} }"
  avoidPatterns:
    - "new GameObject + AddComponent 로 UI 동적 생성 금지"
    - "Find/FindObjectOfType로 UI 참조 금지"
    - "팝업 직접 Destroy 금지 → UISystem.ClosePopup() 경유"
