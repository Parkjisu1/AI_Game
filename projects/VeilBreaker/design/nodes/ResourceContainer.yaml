metadata:
  nodeId: "ResourceContainer"
  version: "1.0.0"
  phase: 1
  role: "Provider"

dependencies:
  internal:
    - "Singleton"
  external:
    - "UnityEngine"
    - "System.Collections.Generic"

contract:
  provides:
    - "T LoadPrefab<T>(string path) where T : Object"
    - "Sprite LoadSprite(string path)"
    - "string LoadJson(string path)"
    - "void PreloadAll(string[] paths)"
  requires:
    - "Singleton"

tags:
  layer: "Domain"
  genre: "Generic"
  role: "Provider"
  system: "Data"
  majorFunctions:
    - "ResourceTransfer"
    - "StateControl"
  minorFunctions:
    - "Find"
    - "Assign"

logicFlow:
  - step: 1
    tag: "Find"
    action: "LoadPrefab: 캐시 딕셔너리에 path 존재 여부 확인"
    next: 2
  - step: 2
    tag: "ConditionCheck"
    action: "캐시 있으면 즉시 반환 / 없으면 Resources.Load"
    next: 3
  - step: 3
    tag: "Assign"
    action: "로드 결과 캐시에 저장"
    next: null

referencePatterns:
  - source: "CLAUDE.md"
    pattern: "UISystem: 리소스 기반 팝업 로딩"

codeHints:
  patterns:
    - "public class ResourceContainer : Singleton<ResourceContainer>"
    - "private Dictionary<string, Object> _cache = new()"
    - "T LoadPrefab<T>(string path) { if (_cache.TryGetValue(path, out var obj)) return obj as T; var loaded = Resources.Load<T>(path); _cache[path] = loaded; return loaded; }"
    - "LoadJson: Resources.Load<TextAsset>(path)?.text"
  avoidPatterns:
    - "Resources.Load를 매번 직접 호출 금지 → ResourceContainer 경유 필수"
    - "Addressables 미사용 (Resources 폴더 기반 유지)"
