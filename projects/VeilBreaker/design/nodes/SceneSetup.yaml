metadata:
  nodeId: "SceneSetup"
  version: "1.0.0"
  phase: 3
  role: "Helper"

dependencies:
  internal: []
  external:
    - "UnityEngine"
    - "UnityEditor"
    - "UnityEditor.SceneManagement"
    - "UnityEngine.SceneManagement"

contract:
  provides:
    - "static void CreateAllScenes()"
    - "static void SetupTitleScene()"
    - "static void SetupMainScene()"
    - "static void SetupGameScene()"
    - "static void AddScenesToBuildSettings()"
  requires: []

tags:
  layer: "Game"
  genre: "Generic"
  role: "Helper"
  system: "Editor"
  majorFunctions:
    - "FlowControl"
    - "StateControl"
  minorFunctions:
    - "Spawn"
    - "Assign"

logicFlow:
  - step: 1
    tag: "Assign"
    action: "MenuItem 실행: CreateAllScenes()"
    next: 2
  - step: 2
    tag: "Spawn"
    action: "Title/Main/GameScene.unity 파일 생성"
    next: 3
  - step: 3
    tag: "Assign"
    action: "각 씬에 Camera, Canvas, EventSystem 기본 구성 배치"
    next: 4
  - step: 4
    tag: "Assign"
    action: "Canvas 설정: Screen Space Overlay, CanvasScaler Scale With Screen Size 1080x1920"
    next: 5
  - step: 5
    tag: "Assign"
    action: "Build Settings에 3개 씬 등록"
    next: null

referencePatterns:
  - source: "CLAUDE.md"
    pattern: "씬 구성 규칙: Title.unity / Main.unity / GameScene.unity"
  - source: "CLAUDE.md"
    pattern: "씬 빌더 패턴: MenuItem + 씬 생성 + Build Settings 등록"

codeHints:
  patterns:
    - "using UnityEditor;"
    - "[MenuItem('VeilBreaker/Setup Scenes')]"
    - "public static class SceneSetup"
    - "EditorSceneManager.NewScene(NewSceneSetup.EmptyScene, NewSceneMode.Single)"
    - "Canvas 생성: new GameObject('Canvas', typeof(Canvas), typeof(CanvasScaler), typeof(GraphicRaycaster))"
    - "CanvasScaler: uiScaleMode = ScaleWithScreenSize, referenceResolution = new Vector2(1080, 1920)"
    - "EditorSceneManager.SaveScene(scene, 'Assets/Scenes/{name}.unity')"
    - "Build Settings 등록: EditorBuildSettings.scenes = new EditorBuildSettingsScene[] {...}"
  avoidPatterns:
    - "Editor 스크립트를 Assets/Scripts/에 배치 금지 → Assets/Editor/"
    - "씬 생성 시 Editor API 없이 파일 직접 생성 금지"
