metadata:
  nodeId: "TowerManager"
  version: "1.0.0"
  phase: 2
  role: "Manager"

dependencies:
  internal:
    - "Singleton"
    - "DataManager"
    - "BattleManager"
    - "CurrencyManager"
    - "EventManager"
    - "SaveManager"
  external: []

contract:
  provides:
    - "void StartTower(int floor)"
    - "int GetMaxFloor()"
    - "int GetCurrentFloor()"
    - "TowerFloorData GetFloorData(int floor)"
    - "bool CanAttempt()"
  requires:
    - "Singleton"
    - "DataManager"
    - "BattleManager"
    - "EventManager"

tags:
  layer: "Domain"
  genre: "Idle"
  role: "Manager"
  system: "Tower"
  majorFunctions:
    - "FlowControl"
    - "StateControl"
    - "ValueModification"
  minorFunctions:
    - "Calculate"
    - "Assign"
    - "Notify"

logicFlow:
  - step: 1
    tag: "Validate"
    action: "StartTower: floor <= maxFloor + 1 체크 (순차 도전)"
    next: 2
  - step: 2
    tag: "Calculate"
    action: "층 적 스탯 = baseStats * (1 + floor * 0.05f) 배율 적용"
    next: 3
  - step: 3
    tag: "StateControl"
    action: "BattleManager.InitBattle(modifiedStageData)"
    next: null
  - step: 4
    tag: "ResponseTrigger"
    action: "OnStageComplete 수신: maxFloor 갱신, 탑 코인 보상"
    next: 5
  - step: 5
    tag: "Notify"
    action: "EventManager.Publish(OnTowerFloorComplete, floor)"
    next: null

referencePatterns:
  - source: "CLAUDE.md"
    pattern: "TowerManager - 무한탑 (Veil Tower), 100층 반복"

codeHints:
  patterns:
    - "public class TowerManager : Singleton<TowerManager>"
    - "private int _maxFloor, _currentFloor"
    - "층별 적 스탯 배율: floor 1~100 기본, 101~200 1.5배, 이후 반복 가중"
    - "탑 코인(TowerCoin) 보상: CurrencyManager.AddCurrency(TowerCoin, floor/10)"
    - "CanAttempt: 하루 3회 제한 (dailyAttempts < 3)"
  avoidPatterns:
    - "TowerManager가 전투를 직접 처리 금지 → BattleManager 위임"
    - "층 건너뛰기 불가 → floor > maxFloor + 1이면 예외"
