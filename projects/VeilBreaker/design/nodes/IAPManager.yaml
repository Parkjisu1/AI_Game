metadata:
  nodeId: "IAPManager"
  version: "1.0.0"
  phase: 3
  role: "Manager"

dependencies:
  internal:
    - "Singleton"
    - "EventManager"
    - "GameConstants"
  external:
    - "UnityEngine"
    - "#if UNITY_IAP: UnityEngine.Purchasing"
    - "#if UNITY_IAP: UnityEngine.Purchasing.Security"

contract:
  provides:
    - "void Init()"
    - "void Purchase(string productId)"
    - "bool IsInitialized()"
    - "string GetLocalizedPrice(string productId)"
  requires:
    - "Singleton"
    - "EventManager"

tags:
  layer: "Game"
  genre: "Generic"
  role: "Manager"
  system: "SDK"
  majorFunctions:
    - "ResourceTransfer"
    - "StateControl"
    - "ConditionCheck"
  minorFunctions:
    - "Validate"
    - "Notify"

logicFlow:
  - step: 1
    tag: "StateControl"
    action: "#if: ConfigurationBuilder로 상품 목록 등록, UnityPurchasing.Initialize()"
    next: null
  - step: 2
    tag: "ResponseTrigger"
    action: "Purchase(productId): 구매 요청"
    next: 3
  - step: 3
    tag: "Validate"
    action: "ProcessPurchase: 영수증 로컬 검증 (CrossPlatformValidator)"
    next: 4
  - step: 4
    tag: "Notify"
    action: "EventManager.Publish(OnIAPPurchased, productId)"
    next: null

referencePatterns:
  - source: "CLAUDE.md"
    pattern: "IAPManager - Unity IAP, 조건부 컴파일 UNITY_IAP, 로컬 영수증 검증"

codeHints:
  patterns:
    - |
      #if UNITY_IAP
      using UnityEngine.Purchasing;
      using UnityEngine.Purchasing.Security;
      #endif

      public class IAPManager : Singleton<IAPManager>
      #if UNITY_IAP
          , IStoreListener
      #endif
      {
      #if UNITY_IAP
          private IStoreController _controller;
          private IExtensionProvider _extensions;

          public void Init()
          {
              var builder = ConfigurationBuilder.Instance(StandardPurchasingModule.Instance());
              builder.AddProduct("gem_pack_small", ProductType.Consumable);
              builder.AddProduct("gem_pack_medium", ProductType.Consumable);
              builder.AddProduct("gem_pack_large", ProductType.Consumable);
              builder.AddProduct("monthly_pass", ProductType.Subscription);
              UnityPurchasing.Initialize(this, builder);
          }

          public PurchaseProcessingResult ProcessPurchase(PurchaseEventArgs args)
          {
              EventManager.Publish(GameConstants.Events.OnIAPPurchased, args.purchasedProduct.definition.id);
              return PurchaseProcessingResult.Complete;
          }
      #else
          public void Init() => Debug.Log("[IAP Sim] Initialized");
          public void Purchase(string productId)
          {
              Debug.Log($"[IAP Sim] Purchased: {productId}");
              EventManager.Publish(GameConstants.Events.OnIAPPurchased, productId);
          }
      #endif
      }
    - "상품 ID를 GameConstants 또는 별도 Config에 정의"
    - "영수증 검증: CrossPlatformValidator + GooglePlayTangle/AppleTangle"
  avoidPatterns:
    - "using 문을 #if 블록 밖에 배치 금지"
    - "서버 영수증 검증 없이 로컬만 사용 (로컬 전용 게임이므로 로컬 검증만)"
