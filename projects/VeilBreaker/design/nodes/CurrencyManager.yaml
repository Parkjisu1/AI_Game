metadata:
  nodeId: "CurrencyManager"
  version: "1.0.0"
  phase: 1
  role: "Manager"

dependencies:
  internal:
    - "Singleton"
    - "DataManager"
    - "EventManager"
    - "SaveManager"
    - "GameConstants"
  external:
    - "System"

contract:
  provides:
    - "void AddCurrency(CurrencyType type, long amount)"
    - "bool SpendCurrency(CurrencyType type, long amount)"
    - "bool HasEnough(CurrencyType type, long amount)"
    - "long GetBalance(CurrencyType type)"
  requires:
    - "Singleton"
    - "DataManager"
    - "EventManager"

tags:
  layer: "Domain"
  genre: "Idle"
  role: "Manager"
  system: "Currency"
  majorFunctions:
    - "ValueModification"
    - "ConditionCheck"
    - "ResourceTransfer"
  minorFunctions:
    - "Validate"
    - "Notify"

logicFlow:
  - step: 1
    tag: "Assign"
    action: "Init: DataManager에서 UserCurrency 로드"
    next: null
  - step: 2
    tag: "Validate"
    action: "AddCurrency: amount > 0 체크"
    next: 3
  - step: 3
    tag: "Assign"
    action: "해당 재화 잔액 += amount"
    next: 4
  - step: 4
    tag: "DataSync"
    action: "SaveManager.Save() 호출"
    next: 5
  - step: 5
    tag: "Notify"
    action: "EventManager.Publish(OnCurrencyChanged, {type, balance})"
    next: null
  - step: 6
    tag: "ConditionCheck"
    action: "SpendCurrency: HasEnough 체크"
    next: 7
  - step: 7
    tag: "Assign"
    action: "잔액 -= amount, Save, Publish(OnCurrencyChanged)"
    next: null

referencePatterns:
  - source: "CLAUDE.md"
    pattern: "CurrencyManager - Gold/Gem/SoulStone 등 다중 재화 관리"

codeHints:
  patterns:
    - "public enum CurrencyType { Gold, Gem, SoulStone, SkillStone, DungeonKey }"
    - "public class CurrencyManager : Singleton<CurrencyManager>"
    - "private Dictionary<CurrencyType, long> _balances = new()"
    - "SpendCurrency: if (!HasEnough(type, amount)) return false; _balances[type] -= amount; ..."
    - "OnCurrencyChanged 이벤트 데이터: new { type, balance } 또는 별도 struct"
  avoidPatterns:
    - "재화 검증 없이 직접 잔액 수정 금지 (반드시 SpendCurrency 사용)"
    - "음수 잔액 허용 금지"
