metadata:
  nodeId: "EquipmentManager"
  version: "1.0.0"
  phase: 2
  role: "Manager"

dependencies:
  internal:
    - "Singleton"
    - "DataManager"
    - "CurrencyManager"
    - "InventoryManager"
    - "EventManager"
    - "SaveManager"
  external:
    - "System.Collections.Generic"

contract:
  provides:
    - "List<UserEquipData> GetAllEquipments()"
    - "List<UserEquipData> GetEquipmentsForSlot(EquipSlot slot)"
    - "bool EnhanceEquipment(string instanceId)"
    - "bool MergeEquipments(List<string> instanceIds)"
    - "void DecomposeEquipment(string instanceId)"
    - "bool EquipToHero(string instanceId, string heroId, EquipSlot slot)"
    - "void UnequipFromHero(string heroId, EquipSlot slot)"
    - "List<UserEquipData> GetHeroEquipments(string heroId)"
  requires:
    - "Singleton"
    - "DataManager"
    - "CurrencyManager"
    - "InventoryManager"
    - "EventManager"

tags:
  layer: "Domain"
  genre: "Idle"
  role: "Manager"
  system: "Equipment"
  majorFunctions:
    - "ValueModification"
    - "ResourceTransfer"
    - "StateControl"
  minorFunctions:
    - "Validate"
    - "Calculate"
    - "Notify"

logicFlow:
  - step: 1
    tag: "Validate"
    action: "EnhanceEquipment: 최대 강화 레벨(15) 체크, Gold/강화석 잔액 체크"
    next: 2
  - step: 2
    tag: "Assign"
    action: "CurrencyManager.SpendCurrency 호출"
    next: 3
  - step: 3
    tag: "Calculate"
    action: "강화 레벨 +1, 장비 스탯 재계산"
    next: 4
  - step: 4
    tag: "Notify"
    action: "EventManager.Publish(OnEquipmentChanged)"
    next: null
  - step: 5
    tag: "Validate"
    action: "MergeEquipments: instanceIds.Count == 3, 동일 등급 체크"
    next: 6
  - step: 6
    tag: "Assign"
    action: "3개 제거, 상위 등급 장비 1개 생성"
    next: 7
  - step: 7
    tag: "Notify"
    action: "EventManager.Publish(OnEquipmentChanged)"
    next: null

referencePatterns:
  - source: "CLAUDE.md"
    pattern: "EquipmentManager - 장비 획득, 강화, 합성, 분해"

codeHints:
  patterns:
    - "public class EquipmentManager : Singleton<EquipmentManager>"
    - "private List<UserEquipData> _equipments = new()"
    - "instanceId: System.Guid.NewGuid().ToString() 로 고유 ID 생성"
    - "EquipToHero: 같은 슬롯 기존 장비 자동 해제 후 장착"
    - "DecomposeEquipment: InventoryManager.AddItem('EnhanceMaterial', amount)"
  avoidPatterns:
    - "장비 강화 비용을 하드코딩 금지 → UpgradeTable 참조"
    - "MergeEquipments: 3개 미만 또는 등급 불일치 시 false 반환"
