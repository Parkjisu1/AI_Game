metadata:
  nodeId: "PopupShop"
  version: "1.0.0"
  phase: 3
  role: "UX"

dependencies:
  internal:
    - "UISystem"
    - "CurrencyManager"
    - "IAPManager"
    - "AdMobManager"
    - "EventManager"
  external:
    - "UnityEngine"
    - "UnityEngine.UI"
    - "TMPro"

contract:
  provides:
    - "void Open(object data)"
    - "void Close()"
  requires:
    - "UISystem"
    - "CurrencyManager"
    - "IAPManager"
    - "AdMobManager"

tags:
  layer: "Game"
  genre: "Idle"
  role: "UX"
  system: "UI"
  majorFunctions:
    - "ResourceTransfer"
    - "ResponseTrigger"
  minorFunctions:
    - "Assign"
    - "Notify"

logicFlow:
  - step: 1
    tag: "Assign"
    action: "Open: 상점 탭 (재화/IAP/광고) 초기화, 상품 목록 로드"
    next: null
  - step: 2
    tag: "ResponseTrigger"
    action: "IAP 구매 버튼: IAPManager.Purchase(productId)"
    next: null
  - step: 3
    tag: "ResponseTrigger"
    action: "광고 보상 버튼: AdMobManager.ShowRewardedAd()"
    next: null
  - step: 4
    tag: "ResponseTrigger"
    action: "OnCurrencyChanged: 재화 표시 갱신"
    next: null

referencePatterns:
  - source: "CLAUDE.md"
    pattern: "PopupShop - 상점 팝업 (Gem/IAP/광고)"

codeHints:
  patterns:
    - "public class PopupShop : PopupBase"
    - "[SerializeField] private Toggle[] _tabToggles"
    - "[SerializeField] private Transform _shopItemContent"
    - "[SerializeField] private Button _adRewardButton"
    - "[SerializeField] private TextMeshProUGUI _goldText"
    - "[SerializeField] private TextMeshProUGUI _gemText"
  avoidPatterns:
    - "IAP 상품 ID를 하드코딩 금지 → ShopTable 참조"
