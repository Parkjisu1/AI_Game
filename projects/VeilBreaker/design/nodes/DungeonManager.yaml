metadata:
  nodeId: "DungeonManager"
  version: "1.0.0"
  phase: 2
  role: "Manager"

dependencies:
  internal:
    - "Singleton"
    - "DataManager"
    - "BattleManager"
    - "CurrencyManager"
    - "EventManager"
    - "SaveManager"
  external:
    - "System"

contract:
  provides:
    - "bool EnterDungeon(string dungeonId)"
    - "int GetRemainingEntries(string dungeonId)"
    - "List<DungeonData> GetAvailableDungeons()"
    - "void ResetDailyEntries()"
  requires:
    - "Singleton"
    - "DataManager"
    - "BattleManager"
    - "CurrencyManager"
    - "EventManager"

tags:
  layer: "Domain"
  genre: "Idle"
  role: "Manager"
  system: "Dungeon"
  majorFunctions:
    - "FlowControl"
    - "ConditionCheck"
    - "ResourceTransfer"
  minorFunctions:
    - "Validate"
    - "Assign"
    - "Notify"

logicFlow:
  - step: 1
    tag: "Validate"
    action: "EnterDungeon: GetRemainingEntries > 0 체크"
    next: 2
  - step: 2
    tag: "Assign"
    action: "CurrencyManager.SpendCurrency(DungeonKey, 1)"
    next: 3
  - step: 3
    tag: "Assign"
    action: "remainEntries[dungeonId] -= 1"
    next: 4
  - step: 4
    tag: "StateControl"
    action: "BattleManager.InitBattle(dungeonStageData)"
    next: null
  - step: 5
    tag: "ResponseTrigger"
    action: "OnStageComplete 수신: 던전 보상 계산"
    next: 6
  - step: 6
    tag: "Assign"
    action: "InventoryManager/CurrencyManager로 보상 지급"
    next: 7
  - step: 7
    tag: "Notify"
    action: "EventManager.Publish(OnDungeonComplete)"
    next: null

referencePatterns:
  - source: "CLAUDE.md"
    pattern: "DungeonManager - 골드/경험치/보스 레이드 던전, 1일 3회"

codeHints:
  patterns:
    - "public class DungeonManager : Singleton<DungeonManager>"
    - "private Dictionary<string, int> _remainEntries = new()"
    - "private DateTime _lastResetDate"
    - "ResetDailyEntries: 자정 체크 후 각 던전 3회 복구"
    - "던전 타입별 보상: Gold → CurrencyManager / Equipment → InventoryManager"
  avoidPatterns:
    - "던전 전투 로직을 DungeonManager에 포함 금지 → BattleManager 위임"
    - "입장 횟수 체크 없이 EnterDungeon 호출 허용 금지"
