metadata:
  nodeId: "TitleManager"
  version: "1.0.0"
  phase: 3
  role: "Manager"

dependencies:
  internal:
    - "SaveManager"
    - "DataManager"
    - "GameManager"
    - "UISystem"
    - "GameConstants"
  external:
    - "UnityEngine"
    - "System.Collections"

contract:
  provides:
    - "IEnumerator InitializeGame()"
    - "void UpdateLoadingProgress(float progress)"
  requires:
    - "SaveManager"
    - "DataManager"

tags:
  layer: "Game"
  genre: "Generic"
  role: "Manager"
  system: "Scene"
  majorFunctions:
    - "FlowControl"
    - "StateControl"
  minorFunctions:
    - "Assign"
    - "Notify"

logicFlow:
  - step: 1
    tag: "StateControl"
    action: "Start: StartCoroutine(InitializeGame())"
    next: 2
  - step: 2
    tag: "Assign"
    action: "Singleton.Init() 순서대로: EventManager → ObjectPool (progress 10%)"
    next: 3
  - step: 3
    tag: "Assign"
    action: "SaveManager.Init() (progress 30%)"
    next: 4
  - step: 4
    tag: "Assign"
    action: "DataManager.Init() - 차트 로드 (progress 70%)"
    next: 5
  - step: 5
    tag: "Assign"
    action: "나머지 Domain Manager 초기화 (progress 90%)"
    next: 6
  - step: 6
    tag: "Notify"
    action: "로딩 바 100% → YieldToFrame → GameManager.ChangeScene(Main)"
    next: null

referencePatterns:
  - source: "CLAUDE.md"
    pattern: "TitleManager - 타이틀 씬 로딩 매니저"

codeHints:
  patterns:
    - "public class TitleManager : MonoBehaviour"
    - "[SerializeField] private Slider _loadingBar"
    - "[SerializeField] private TextMeshProUGUI _loadingText"
    - "IEnumerator InitializeGame(): yield return null 사이사이 프레임 양보"
    - "진행 단계: EventManager(10%) → SaveManager(30%) → DataManager(70%) → Others(90%) → Done(100%)"
  avoidPatterns:
    - "모든 Init을 한 프레임에 완료하면 로딩 바 멈춤 → yield return null 분산"
    - "DontDestroyOnLoad 씬에서 중복 초기화 방지"
