metadata:
  nodeId: "OfflineProgressManager"
  version: "1.0.0"
  phase: 2
  role: "Manager"

dependencies:
  internal:
    - "Singleton"
    - "DataManager"
    - "CurrencyManager"
    - "EventManager"
    - "SaveManager"
    - "GameConstants"
  external:
    - "System"

contract:
  provides:
    - "void CalculateOfflineReward()"
    - "void ClaimReward(bool withAd)"
    - "OfflineRewardResult GetPendingReward()"
  requires:
    - "Singleton"
    - "DataManager"
    - "CurrencyManager"
    - "EventManager"

tags:
  layer: "Domain"
  genre: "Idle"
  role: "Manager"
  system: "Offline"
  majorFunctions:
    - "ValueModification"
    - "ConditionCheck"
    - "ResourceTransfer"
  minorFunctions:
    - "Calculate"
    - "Validate"
    - "Notify"

logicFlow:
  - step: 1
    tag: "Calculate"
    action: "CalculateOfflineReward: offlineSeconds = (DateTime.Now - lastLoginTime).TotalSeconds"
    next: 2
  - step: 2
    tag: "Validate"
    action: "offlineSeconds = min(offlineSeconds, MaxOfflineHours * 3600)"
    next: 3
  - step: 3
    tag: "Calculate"
    action: "pendingGold = goldPerSec * offlineSeconds (현재 스테이지 기반)"
    next: 4
  - step: 4
    tag: "Calculate"
    action: "pendingExp = expPerSec * offlineSeconds"
    next: 5
  - step: 5
    tag: "Notify"
    action: "EventManager.Publish(OnOfflineRewardCalculated, result)"
    next: null
  - step: 6
    tag: "ConditionCheck"
    action: "ClaimReward: withAd이면 goldPerSec *= 2"
    next: 7
  - step: 7
    tag: "Assign"
    action: "CurrencyManager.AddCurrency(Gold, amount)"
    next: 8
  - step: 8
    tag: "Assign"
    action: "lastLoginTime = DateTime.Now, SaveManager 저장"
    next: null

referencePatterns:
  - source: "CLAUDE.md"
    pattern: "OfflineProgressManager - 오프라인 보상 계산, 최대 12시간, 광고 2배"

codeHints:
  patterns:
    - "public class OfflineProgressManager : Singleton<OfflineProgressManager>"
    - "lastLoginTime: SaveManager에서 UnixTimestamp로 저장/로드"
    - "goldPerSec: OfflineTable[currentStage].goldPerSec"
    - "OfflineRewardResult: { long gold; long exp; float hours; }"
    - "앱 포커스 복귀(OnApplicationFocus) 시 GameManager가 CalculateOfflineReward 호출"
  avoidPatterns:
    - "DateTime.Now 대신 UnixTimestamp long 사용 (직렬화 용이)"
    - "최대 시간 제한 없이 계산하면 과도한 보상 발생"
