metadata:
  nodeId: "PopupInventory"
  version: "1.0.0"
  phase: 3
  role: "UX"

dependencies:
  internal:
    - "UISystem"
    - "InventoryManager"
  external:
    - "UnityEngine"
    - "UnityEngine.UI"
    - "TMPro"

contract:
  provides:
    - "void Open(object data)"
    - "void Close()"
    - "void RefreshItemList()"
  requires:
    - "UISystem"
    - "InventoryManager"

tags:
  layer: "Game"
  genre: "Idle"
  role: "UX"
  system: "UI"
  majorFunctions:
    - "DataSync"
    - "ResponseTrigger"
  minorFunctions:
    - "Find"
    - "Assign"

logicFlow:
  - step: 1
    tag: "Find"
    action: "Open: InventoryManager.GetItems() 조회, 아이템 목록 표시"
    next: null
  - step: 2
    tag: "ResponseTrigger"
    action: "필터 버튼: InventoryManager.GetItems(filterType) 재조회"
    next: null
  - step: 3
    tag: "ResponseTrigger"
    action: "아이템 사용 버튼: InventoryManager.UseItem(itemId, 1)"
    next: null

referencePatterns:
  - source: "CLAUDE.md"
    pattern: "PopupInventory - 인벤토리 팝업"

codeHints:
  patterns:
    - "public class PopupInventory : PopupBase"
    - "[SerializeField] private ScrollRect _itemScrollView"
    - "[SerializeField] private Transform _itemContent"
    - "[SerializeField] private GameObject _itemPrefab"
    - "[SerializeField] private Toggle[] _filterToggles"
    - "RefreshItemList: Content 자식 모두 반환 후 재스폰 (풀 기반)"
  avoidPatterns:
    - "아이템 목록 전체를 매번 Destroy/Instantiate 금지 → 풀 재활용"
