metadata:
  nodeId: "AdMobManager"
  version: "1.0.0"
  phase: 3
  role: "Manager"

dependencies:
  internal:
    - "Singleton"
    - "EventManager"
    - "GameConstants"
  external:
    - "UnityEngine"
    - "#if GOOGLE_MOBILE_ADS: GoogleMobileAds"
    - "#if GOOGLE_MOBILE_ADS: GoogleMobileAds.Api"

contract:
  provides:
    - "void Init()"
    - "void ShowRewardedAd(System.Action onComplete = null)"
    - "void ShowInterstitialAd()"
    - "bool IsRewardedAdReady()"
  requires:
    - "Singleton"
    - "EventManager"

tags:
  layer: "Game"
  genre: "Generic"
  role: "Manager"
  system: "SDK"
  majorFunctions:
    - "ResponseTrigger"
    - "StateControl"
  minorFunctions:
    - "Notify"
    - "ConditionCheck"

logicFlow:
  - step: 1
    tag: "StateControl"
    action: "#if: MobileAds.Initialize(), 리워드 광고 프리로드"
    next: null
  - step: 2
    tag: "ConditionCheck"
    action: "ShowRewardedAd: IsRewardedAdReady() 체크"
    next: 3
  - step: 3
    tag: "ResponseTrigger"
    action: "#if: 광고 표시, 완료 콜백 / #else: onComplete?.Invoke() 즉시 호출"
    next: 4
  - step: 4
    tag: "Notify"
    action: "EventManager.Publish(OnAdWatched)"
    next: 5
  - step: 5
    tag: "Assign"
    action: "다음 광고 프리로드"
    next: null

referencePatterns:
  - source: "CLAUDE.md"
    pattern: "AdMobManager - 조건부 컴파일 GOOGLE_MOBILE_ADS"
  - source: "CLAUDE.md"
    pattern: "플러그인 충돌: googlemobileads-unity.aar + GoogleMobileAdsPlugin.androidlib 중복 금지"

codeHints:
  patterns:
    - |
      #if GOOGLE_MOBILE_ADS
      using GoogleMobileAds;
      using GoogleMobileAds.Api;
      #endif

      public class AdMobManager : Singleton<AdMobManager>
      {
          private System.Action _onRewardComplete;

      #if GOOGLE_MOBILE_ADS
          private RewardedAd _rewardedAd;
          private const string RewardedAdUnitId = "ca-app-pub-xxxxx/xxxxx";

          public void Init()
          {
              MobileAds.Initialize(initStatus => LoadRewardedAd());
          }

          private void LoadRewardedAd()
          {
              _rewardedAd?.Destroy();
              RewardedAd.Load(RewardedAdUnitId, new AdRequest(), (ad, error) => {
                  if (error != null) return;
                  _rewardedAd = ad;
              });
          }

          public void ShowRewardedAd(System.Action onComplete = null)
          {
              _onRewardComplete = onComplete;
              if (_rewardedAd != null && _rewardedAd.CanShowAd()) {
                  _rewardedAd.Show(reward => {
                      onComplete?.Invoke();
                      EventManager.Publish(GameConstants.Events.OnAdWatched);
                      LoadRewardedAd();
                  });
              }
          }
      #else
          public void Init() => Debug.Log("[AdMob Sim] Initialized");
          public void ShowRewardedAd(System.Action onComplete = null)
          {
              Debug.Log("[AdMob Sim] Reward Ad Completed");
              onComplete?.Invoke();
              EventManager.Publish(GameConstants.Events.OnAdWatched);
          }
      #endif
      }
    - "Ad Unit ID를 GameConstants 또는 별도 Config에 분리"
  avoidPatterns:
    - "using 문을 #if 블록 밖에 배치 금지"
    - "googlemobileads-unity.aar + GoogleMobileAdsPlugin.androidlib 중복 금지"
    - "광고 준비 전 강제 표시 시 크래시 방지 (CanShowAd 체크)"
