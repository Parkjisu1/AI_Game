metadata:
  nodeId: "PopupEquipment"
  version: "1.0.0"
  phase: 3
  role: "UX"

dependencies:
  internal:
    - "UISystem"
    - "EquipmentManager"
    - "CurrencyManager"
    - "EventManager"
  external:
    - "UnityEngine"
    - "UnityEngine.UI"
    - "TMPro"

contract:
  provides:
    - "void Open(object data)"
    - "void Close()"
    - "void RefreshEquipmentList()"
  requires:
    - "UISystem"
    - "EquipmentManager"

tags:
  layer: "Game"
  genre: "Idle"
  role: "UX"
  system: "UI"
  majorFunctions:
    - "DataSync"
    - "ResponseTrigger"
  minorFunctions:
    - "Find"
    - "Assign"

logicFlow:
  - step: 1
    tag: "Find"
    action: "Open: EquipmentManager.GetAllEquipments() 목록 조회"
    next: 2
  - step: 2
    tag: "Assign"
    action: "장비 아이템 UI 프리팹 목록 갱신 (ScrollView)"
    next: null
  - step: 3
    tag: "ResponseTrigger"
    action: "강화 버튼: EquipmentManager.EnhanceEquipment(selectedId)"
    next: null
  - step: 4
    tag: "ResponseTrigger"
    action: "OnEquipmentChanged: RefreshEquipmentList()"
    next: null

referencePatterns:
  - source: "CLAUDE.md"
    pattern: "PopupEquipment - 장비 관리 팝업"

codeHints:
  patterns:
    - "public class PopupEquipment : PopupBase"
    - "[SerializeField] private ScrollRect _equipScrollView"
    - "[SerializeField] private Transform _equipListContent"
    - "[SerializeField] private GameObject _equipItemPrefab"
    - "[SerializeField] private Button _enhanceButton"
    - "[SerializeField] private Button _mergeButton"
    - "[SerializeField] private Button _decomposeButton"
    - "RefreshEquipmentList: Content 하위 자식 제거 후 재생성 또는 풀 재활용"
  avoidPatterns:
    - "장비 UI 아이템을 Instantiate 후 Destroy 반복 금지 → 오브젝트 풀 활용"
