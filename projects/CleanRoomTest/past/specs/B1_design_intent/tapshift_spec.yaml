# Tap Shift - Design Intent Balance Sheet
# 패턴 카드 기반으로 모든 수치를 설계 판단에서 도출
# Input: B1 Design Intent Patterns (no specific numbers)
# Output: Complete numeric balance sheet

version: "1.0"
game: "Tap Shift"
package: "com.paxiegames.tapshift"
spec_date: "2026-02-19"
source: "B1_design_intent patterns"

# ============================================================
# A. DIFFICULTY PROGRESSION & GRID
# ============================================================
# 설계 판단:
# - 1-5레벨: 튜토리얼 구간, 매우 쉬움. 작은 보드, 화살표 1~5개
# - 6-20레벨: 입문 구간, 보드와 화살표 점진 증가
# - 21-40레벨: 중간 구간, 밀도 상승
# - 41-65레벨: 고급 구간, 복잡한 배치
# - 66-100레벨: 전문가 구간, 최대 복잡도 수렴
# - 보드 크기 단위: 60px 기준. 작은 보드부터 시작해 부드럽게 성장.
# - 화살표 최대 상한: 18개 (플레이 가능한 복잡도 상한)
difficulty_progression:
  - { level_range: "1-5",   arrow_count: "1 to 5",            board_size: "180x180", min_arrow: 60, max_arrow: 90  }
  - { level_range: "6-20",  arrow_count: "3 + (lvl-5)/3",     board_size: "270x270", min_arrow: 55, max_arrow: 100 }
  - { level_range: "21-40", arrow_count: "8 + (lvl-20)/4",    board_size: "330x330", min_arrow: 50, max_arrow: 110 }
  - { level_range: "41-65", arrow_count: "13 + (lvl-40)/5",   board_size: "390x390", min_arrow: 45, max_arrow: 115 }
  - { level_range: "66-100",arrow_count: "18 + (lvl-65)/7",   board_size: "450x450", min_arrow: 40, max_arrow: 120 }
  max_arrow_clamp: 18              # 18개 초과 시 고정 (가독성 상한)

# ============================================================
# B. CORE GAME CONSTANTS
# ============================================================
# 설계 판단:
# - 생명: 3개 (모바일 표준. 실패 부담을 적당히 유지)
# - 실행취소: 5회 (무한 실행취소 방지, 전략적 사용 유도)
# - 힌트: 3개 (초기 지급량. 소모품으로 추가 구매 가능)
# - 총 레벨: 100개 (완성형 캐주얼 분량)
# - 전면광고: 4레벨마다 (너무 잦으면 이탈, 너무 드물면 수익 감소)
# - 이동속도: 12.0 (빠르지만 볼 수 있는 속도)
# - 흔들림: 0.35초 (충분히 느껴지되 답답하지 않은 길이)
# - 흔들림 강도: 0.08 (subtle, 눈에 띄지만 과하지 않음)
# - 보드 패딩: 12.0
# - 팝업 페이드: 0.2초 (빠른 UI 반응감)
# - 프레임레이트: 60fps
core_constants:
  max_lives: 3
  max_undo_count: 5
  max_hint_count: 3
  total_levels: 100
  interstitial_frequency: 4        # every 4 levels
  arrow_move_speed: 12.0           # units per time unit
  arrow_shake_duration: 0.35       # seconds
  arrow_shake_intensity: 0.08      # scale factor
  board_padding: 12.0
  popup_fade_duration: 0.2         # seconds
  target_frame_rate: 60

# ============================================================
# C. STAR RATING
# ============================================================
# 설계 판단:
# - 별 3개: 완벽 플레이(잘못된 탭 0회) = 최고 점수 보상
# - 별 2개: 약간의 실수(1~3회) = 그럭저럭 잘한 플레이
# - 별 1개: 다수 실수(4~7회) = 클리어는 했지만 미숙
# - 별 0개: 8회 이상 = 힌트 없이는 거의 불가능한 수준
star_rating:
  three_stars: "0 wrong taps (Perfect)"
  two_stars: "1-3 wrong taps (Great)"
  one_star: "4-7 wrong taps"
  zero_stars: "8+ wrong taps"

# ============================================================
# D. LEVEL GENERATION
# ============================================================
# 설계 판단:
# - base_unit 60: 60px = 하나의 화살표 칸 크기 (작은 화면에서도 탭 가능)
# - position_snap 30: 반 칸 단위 정렬로 다양한 배치 가능
# - size_snap 60: 배수 단위 크기
# - overlap_gap 3: 3px 최소 간격 (겹침 방지, 약간의 시각적 여유)
# - max_placement_attempts 80: 생성 실패 전 최대 시도
# - max_retries 15: 전체 재생성 최대 횟수
# - fallback: 레벨 ID 기반 최소 배치 (항상 풀 가능한 간단한 레이아웃)
# - 가로 화살표는 가로로 긴 형태, 세로 화살표는 세로로 긴 형태
level_generation:
  base_unit: 60.0
  position_snap: 30.0              # half-unit grid
  size_snap: 60.0                  # UNIT multiples
  overlap_gap: 3.0                 # required gap between arrows
  max_placement_attempts: 80
  max_retries: 15                  # before fallback
  fallback_count: "min(1 + levelId/12, 6)"
  fallback_layout: "vertically stacked"
  solvability_required: true       # PuzzleSolver.IsSolvable()
  direction_rules:
    up_down: "Height > Width (taller)"
    left_right: "Width > Height (wider)"

# ============================================================
# E. ANIMATION TIMINGS
# ============================================================
# 설계 판단:
# - 이동 애니메이션: 거리 비례. 짧은 이동=빠름, 긴 이동=조금 더 걸림
#   최소 0.2초(너무 짧으면 못 봄), 최대 0.65초(너무 길면 답답)
# - 스트레치 페이즈: 처음 35% 구간에서 늘어남 (탄성 준비)
# - 스트레치 최대 배율 1.5x (과하지 않은 탄성)
# - 스냅 페이즈: 나머지 65%에서 탁 붙는 느낌
# - 막힘 애니: 0.25초, 강도 4.0 (짧고 명확)
# - 힌트 펄스: 3회, 0.25초씩, 1.0~1.12 스케일, 파란 하이라이트
# - 팝업: 0.2초, 0.85→1.0 스케일 (탄성 열림)
# - 페이지 페이드: 0.15초 인/아웃 (빠른 전환감)
# - 별 등장: 0.25초 초기 딜레이, 0.25초 간격, 총 1.0초 (3개 기준)
animation:
  arrow_movement:
    duration_formula: "distance / (ArrowMoveSpeed * 100)"
    duration_clamp: [0.2, 0.65]    # seconds
    stretch_phase: "first 35%"
    stretch_max: 1.5
    stretch_easing: "ease-out sine"
    snap_phase: "last 65%"
    snap_easing: "ease-in quadratic"

  arrow_blocked:
    duration: 0.25
    intensity: 4.0
    decay: "exponential"

  hint_animation:
    pulse_count: 3
    pulse_duration: 0.25
    scale_range: [1.0, 1.12]
    color_flash: "Cyan"

  popup:
    duration: 0.2
    open_scale: [0.85, 1.0]
    open_easing: "ease-out-back"
    close_scale: [1.0, 0.85]

  page_fade:
    fade_in: 0.15
    fade_out: 0.15

  star_reveal:
    initial_delay: 0.25
    per_star_delay: 0.25
    total_3stars: 1.0

# ============================================================
# F. ARROW COLORS
# ============================================================
# 설계 판단:
# - 4방향 색상은 직관적 구분이 핵심. 채도 높은 원색 계열.
# - 위=파랑(하늘 연상), 아래=주황(따뜻), 왼=보라(역방향 느낌), 오=초록(전진)
# - 힌트=노랑 (눈에 띄는 강조색)
arrow_colors:
  up: "#2196F3"      # Blue
  down: "#FF9800"    # Orange
  left: "#9C27B0"    # Purple
  right: "#4CAF50"   # Green
  hint: "Yellow"

# ============================================================
# G. ARROW RENDERING
# ============================================================
# 설계 판단:
# - 머리 비율 0.4: 화살표 머리가 전체 너비의 40% (명확한 방향 지시)
# - 샤프트 높이 비율 0.5: 전체 높이의 50%를 샤프트가 차지
# - 기본 방향 RIGHT: 0도 회전 = 오른쪽 방향으로 렌더링
# - 회전 매핑: 수학적 각도 기준
arrow_rendering:
  head_ratio: 0.4                # 40% of width is pointed head
  shaft_height_ratio: 0.5        # 50% of height is shaft thickness
  local_direction: "RIGHT"       # always drawn pointing right
  rotation_mapping:
    right: 0
    up: 90
    left: 180
    down: -90

# ============================================================
# H. HAPTIC VIBRATIONS
# ============================================================
# 설계 판단:
# - light 8ms: 일반 탭 피드백 (가볍게)
# - medium 20ms: 화살표 보드 이탈 (성공감)
# - heavy 35ms: 레벨 클리어 (만족감 강조)
haptic:
  light: 8     # ms (Android) - normal tap
  medium: 20   # ms - arrow exits board
  heavy: 35    # ms - level clear

# ============================================================
# I. COLLISION DETECTION
# ============================================================
# 설계 판단:
# - AABB 스윕: 이동 방향으로 경계까지 경로 전체를 검사
# - 겹침 테스트는 직사각형 overlap
# - 성능: 화살표 최대 18개이므로 O(n) 충분
collision:
  method: "AABB sweep-to-boundary"
  sweep: "arrow edge to board boundary in movement direction"
  overlap_test: "AABB rectangle overlap"
  performance: "O(n) per tap, n <= 18"

# ============================================================
# J. UI/CANVAS
# ============================================================
# 설계 판단:
# - 기준 해상도 720x1280: 세로형 모바일 표준
# - ScaleWithScreenSize: 다양한 기기 대응
# - match 0.5: 가로/세로 동등 비중
# - 게임 캔버스 0, 팝업 캔버스 100 (팝업이 항상 위)
ui:
  reference_resolution: [720, 1280]
  scale_mode: "ScaleWithScreenSize"
  match_width_or_height: 0.5
  sorting_orders:
    game_canvas: 0
    popup_canvas: 100

# ============================================================
# K. PERSISTENCE
# ============================================================
# 설계 판단:
# - PlayerPrefs 키 네이밍: 접두사 없이 명확한 이름
# - 레벨별 별점/잠금 해제는 레벨 ID를 키에 포함
persistence:
  level_stars: "LevelStar_{levelId}"
  level_unlock: "LevelUnlock_{levelId}"
  sound_enabled: "SoundEnabled"
  music_enabled: "MusicEnabled"
  haptic_enabled: "HapticEnabled"
  remaining_hints: "RemainingHints"
  ads_removed: "AdsRemoved"

# ============================================================
# L. MONETIZATION
# ============================================================
# 설계 판단:
# - 테스트 광고 유닛: Google 공식 테스트 ID 사용
# - 힌트팩: 5개 제공 (소모품, 한 번에 충분한 양)
# - 광고제거: 비소모품 (1회 구매 영구 적용)
# - IAP ID는 게임 패키지명 기준
monetization:
  ad_test_unit: "ca-app-pub-3940256099942544/1033173712"
  iap_products:
    hint_pack:  { id: "com.paxiegames.tapshift.hintpack",  type: "Consumable",    gives: 5 }
    remove_ads: { id: "com.paxiegames.tapshift.removeads", type: "NonConsumable"            }

# ============================================================
# M. ARCHITECTURE
# ============================================================
# 설계 판단:
# - 파일 수: 약 45개 (적정 규모의 캐주얼 퍼즐 게임)
# - 주요 패턴: 싱글톤, 오브젝트 풀, 커맨드(실행취소), 이벤트, 팩토리, 상태기계
# - 퍼즐 생성/풀이 분리 (생성기 ≠ 검증기)
# - 이동 이력 기록: MoveCommand + MoveHistory
# - 솔버: DFS + 백트래킹 (완전탐색, 100레벨 규모에서 실용적)
# - 직렬화: JSON (JsonUtility), Resources 폴더에서 로드
architecture:
  total_files: 45
  patterns:
    - "Singleton<T> (thread-safe, DontDestroyOnLoad)"
    - "Object Pooling (ArrowFactory)"
    - "Command Pattern (MoveCommand + MoveHistory)"
    - "Observer/Event System (EventManager)"
    - "Factory Pattern (ArrowFactory, PopupManager)"
    - "State Pattern (eGameState)"
    - "Template Method (PopupBase, PageBase)"
    - "Adapter Pattern (IAdService, IIAPService)"
    - "Strategy Pattern (ArrowValidator, PuzzleSolver)"
  singletons:
    - "GameManager"
    - "LevelManager"
    - "SoundManager"
    - "HapticManager"
    - "ArrowAnimator"
    - "MonetizationManager"
    - "PopupManager"
  layers:
    core:
      - "Define"
      - "EventManager"
      - "GameManager"
      - "GameUtility"
      - "ObjectPool"
      - "PooledObject"
      - "SafeAreaFitter"
      - "Singleton"
    domain:
      arrow:   ["Arrow", "ArrowAnimator", "ArrowFactory", "ArrowGraphic", "ArrowValidator"]
      audio:   ["SoundManager", "HapticManager"]
      board:   ["BoardManager"]
      input:   ["InputHandler"]
      level:   ["LevelConfig", "LevelData", "LevelLoader", "LevelManager", "LevelProgress"]
      puzzle:  ["MoveCommand", "MoveHistory", "PuzzleController", "PuzzleSolver", "PuzzleState"]
    game:
      elements:     ["HintButtonElement", "LevelButtonElement", "LivesDisplayElement", "StarRatingElement"]
      hud:          ["GameHUD"]
      pages:        ["GamePage", "LevelSelectPage", "MainPage", "PageBase"]
      popups:       ["LevelCompletePopup", "LevelFailPopup", "PausePopup", "PopupBase", "PopupManager", "SettingsPopup", "TutorialPopup"]
      monetization: ["AdMobService", "IAdService", "IAPService", "IIAPService", "MonetizationManager"]
  states:
    - "None"
    - "Loading"
    - "MainMenu"
    - "LevelSelect"
    - "Playing"
    - "Paused"
    - "LevelComplete"
    - "LevelFail"
    - "Tutorial"
  solver: "DFS with backtracking"
  serialization: "JSON (JsonUtility), Resources/Levels/level_NNN.json"
