# ─────────────────────────────────────────────
# ARCHITECTURE
# ─────────────────────────────────────────────
architecture:
  platform: "Unity (C#)"
  design_patterns:
    - pattern: "Singleton"
      usage: "GameManager, LevelManager, CoinManager, LifeManager, BoosterManager"
    - pattern: "State Machine"
      usage: "GameState (Idle, Selecting, Pouring, Win, Fail, Paused)"
    - pattern: "Command Pattern"
      usage: "PourCommand with undo stack for Undo booster"
    - pattern: "Observer / Event System"
      usage: "OnCoinChanged, OnLifeChanged, OnLevelComplete, OnLevelFail"
    - pattern: "Object Pool"
      usage: "Liquid stream particles, bottle highlight effects"
    - pattern: "Factory"
      usage: "BottleFactory creates bottle GameObjects from LevelData"
    - pattern: "ScriptableObject"
      usage: "LevelData, BoosterConfig, ColorPalette"

  state_management:
    game_states:
      - "Idle"
      - "BottleSelected"
      - "Pouring"
      - "LevelComplete"
      - "LevelFail"
      - "Paused"
    state_transitions:
      Idle_to_BottleSelected: "Tap on non-empty bottle"
      BottleSelected_to_Idle: "Tap selected bottle again (cancel)"
      BottleSelected_to_Pouring: "Tap valid target bottle"
      Pouring_to_Idle: "Pour animation completes, check deadlock"
      Idle_to_LevelComplete: "All bottles satisfy win condition"
      Idle_to_LevelFail: "Deadlock detected after move"

  undo_stack:
    type: "Stack<PourCommand>"
    max_depth: 30
    cleared_on: "Level restart, level complete, shuffle booster use"

  level_data_format: "ScriptableObject / JSON"
  level_data_fields:
    - level_id
    - color_count
    - bottle_count
    - empty_bottle_count
    - bottle_contents
    - blocker_positions
    - par_moves
    - tier

  save_system:
    backend: "PlayerPrefs (local) + optional cloud sync"
    saved_fields:
      - current_level
      - coins
      - lives
      - lives_last_regenerated_timestamp
      - booster_counts
      - level_star_ratings
      - settings

  bottle_data_model:
    class: "BottleData"
    fields:
      - "List<ColorLayer> layers  # index 0 = bottom, index 3 = top"
      - "int capacity = 4"
      - "bool IsEmpty"
      - "bool IsFull"
      - "bool IsSolved  # all same color AND full"
      - "ColorLayer TopLayer"

  color_layer_model:
    class: "ColorLayer"
    fields:
      - "ColorID colorId"
      - "bool isBlocker  # true = question mark layer"

  deadlock_detection:
    algorithm: "After each move, check all (source, target) pairs; if no valid pour exists, trigger LevelFail"
    check_frequency: "After every completed pour animation"

  ui_components:
    gameplay:
      - "CoinDisplay (top-left)"
      - "LevelLabel (top-center)"
      - "SettingsButton (top-right)"
      - "BottleGrid (center)"
      - "BoosterBar (bottom)"
      - "MoveCounter (optional, near level label)"
    main_screen:
      - "CatCharacterScene (animated)"
      - "CauldronAnimation"
      - "PlayButton (center-bottom, shows level number)"
      - "CoinDisplay (top-left)"
      - "LivesDisplay (top-center)"
      - "BottomNavBar (Trophy, Store, Home)"

  scenes:
    - name: "Title"
      purpose: "Splash / loading screen"
      transitions_to: "Main"
    - name: "Main"
      purpose: "Main menu with cat characters and cauldron"
      transitions_to: "GameScene"
    - name: "GameScene"
      purpose: "Active puzzle gameplay"
      transitions_to: "Main (on complete or quit)"
