  economy_balance:
    coin_sink_add_bottle: 900     # observed: 900 coins
    coin_sink_undo_bundle: 200
    coin_sink_shuffle_bundle: 400
    coin_sink_hint_bundle: 300
    avg_coins_per_level: 55       # 3-star: 60 + first clear bonus 50 averaged over replays
    levels_to_afford_add_bottle: 17  # approx 900/55 = 16.4 levels


# ============================================================
# 10. ARCHITECTURE
# ============================================================
architecture:
  design_patterns:
    dependency_injection:
      framework: "manual_DI_container"
      description: "Central DI container instantiates and wires all services at startup. No service locator anti-pattern."
      container_class: "GameContainer"
      registered_services:
        - "ILevelDataProvider"
        - "IDifficultyConfig"
        - "IHintCalculator"
        - "IBlockerRegistry"
        - "IEconomyService"
        - "IBoosterService"
        - "IAnimationController"
        - "ILivesService"
        - "IProgressionService"

    signal_bus:
      description: "Decoupled event system. Emitters do not reference receivers directly."
      signals:
        - "OnPourValidated(source_index, target_index, layers)"
        - "OnPourExecuted(source_index, target_index)"
        - "OnBottleCompleted(bottle_index, color)"
        - "OnLevelCompleted(stars, moves_used, coins_earned)"
        - "OnLevelFailed(fail_reason)"
        - "OnDeadlockDetected()"
        - "OnBlockerUnlocked(bottle_index, blocker_type)"
        - "OnBoosterUsed(booster_id)"
        - "OnCoinBalanceChanged(old_amount, new_amount)"
        - "OnLivesChanged(old_count, new_count)"
        - "OnHintRequested()"
        - "OnHintHighlighted(source_index, target_index)"
        - "OnUndoExecuted(restore_state)"

    state_machine:
      description: "Finite State Machine governs the overall game session lifecycle."
      states:
        - id: "IDLE"
          description: "Waiting for player input, no bottle selected"
          transitions:
            - trigger: "tap_bottle" -> "BOTTLE_SELECTED"

        - id: "BOTTLE_SELECTED"
          description: "Source bottle highlighted, waiting for target selection"
          transitions:
            - trigger: "tap_same_bottle" -> "IDLE"
            - trigger: "tap_valid_target" -> "POURING"
            - trigger: "tap_invalid_target" -> "IDLE"

        - id: "POURING"
          description: "Pour animation playing, input blocked"
          transitions:
            - trigger: "animation_complete AND level_complete" -> "LEVEL_COMPLETE"
            - trigger: "animation_complete AND deadlock" -> "DEADLOCK"
            - trigger: "animation_complete" -> "IDLE"

        - id: "DEADLOCK"
          description: "No valid moves remain, show fail dialog"
          transitions:
            - trigger: "use_booster" -> "IDLE"
            - trigger: "retry" -> "LEVEL_LOADING"
            - trigger: "quit" -> "MAIN_MENU"

        - id: "LEVEL_COMPLETE"
          description: "Level cleared, showing completion screen"
          transitions:
            - trigger: "next_level" -> "LEVEL_LOADING"
            - trigger: "replay" -> "LEVEL_LOADING"

        - id: "LEVEL_LOADING"
          description: "Loading next or same level data"
          transitions:
            - trigger: "load_complete" -> "IDLE"

        - id: "MAIN_MENU"
          description: "Player on main screen"
          transitions:
            - trigger: "play_pressed" -> "LEVEL_LOADING"

    blocker_system:
      pattern: "polymorphic_component"
      interface: "IBlocker"
      methods:
        - "bool CanPourFrom(BottleState bottle)"
        - "bool CanPourInto(BottleState bottle)"
        - "void OnPourAttempt(BottleState bottle, PourContext ctx)"
        - "bool IsUnlocked(BottleState bottle, GameState state)"
        - "void OnUnlocked(BottleState bottle)"
      registry: "BlockerRegistry"
      description: "Each blocker type is an independent class implementing IBlocker. BlockerRegistry maps blocker IDs to instances. New blockers added without modifying existing code."

    pour_validation_separation:
      validator_class: "PourValidator"
      executor_class: "PourExecutor"
      description: "Validation (rule checking) is strictly separated from execution (state mutation). PourValidator returns a PourResult; PourExecutor consumes it."
      pour_result_fields:
        - "bool IsValid"
        - "int LayerCount"
        - "Color Color"
        - "int SourceIndex"
        - "int TargetIndex"
        - "string InvalidReason"

  state_management:
    bottle_state_class: "BottleState"
    fields:
      - "int[] Layers"              # color indices from bottom to top
      - "IBlocker[] BlockerSlots"   # per-layer blockers
      - "bool IsComplete"
      - "int TopLayerIndex"         # cached for O(1) access
      - "int LayerCount"
    game_state_class: "GameState"
    fields:
      - "BottleState[] Bottles"
      - "int MoveCount"
      - "int LevelIndex"
      - "bool IsDeadlock"
      - "Stack<GameState> UndoHistory"  # depth: 30

    immutable_snapshots: true       # UndoHistory stores deep copies for safe revert

  module_separation:
    level_data_provider:
      interface: "ILevelDataProvider"
      responsibility: "Load level layout, color assignments, blocker placements from data files"
      data_format: "JSON"

    difficulty_config:
      interface: "IDifficultyConfig"
      responsibility: "Supply per-tier parameters (color counts, bottle counts, par moves, allowed blockers)"

    hint_calculator:
      interface: "IHintCalculator"
      responsibility: "Score all valid moves and return top recommendation"
      uses_lookahead: true
      lookahead_depth: 3

    deadlock_detector:
      class: "DeadlockDetector"
      responsibility: "Determine if any valid pour exists in current GameState"
      algorithm: "iterate_all_source_target_pairs_check_PourValidator"
      complexity: "O(N^2) where N = bottle count"
      max_bottles: 14               # worst case 14*14 = 196 checks, acceptable

  grid_layout:
    system: "two_row_grid"
    row_0_max_bottles: 7
    row_1_max_bottles: 7
    bottle_spacing_dp: 12
    bottle_width_dp: 52
    bottle_height_dp: 120
    grid_top_margin_dp: 80
    grid_bottom_margin_dp: 20
    centering: "horizontal_center_per_row"
