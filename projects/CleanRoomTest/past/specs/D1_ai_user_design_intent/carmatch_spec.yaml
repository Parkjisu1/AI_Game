        description: "Level clear coin rewards doubled"
        duration_hours: 2           # Observed: ∞ icon with '15m' → short-burst events
        frequency: "daily"
      - name: "Challenge Event"
        description: "Special high-difficulty levels with premium rewards"
        duration_hours: 48
        frequency: "weekly"
    event_countdown_display: true   # Observed: 14h 33m, 2h 33m timers on main screen

  iap_hints:
    # Not directly observed but standard for genre; inferred from observation of coin display and events
    coin_packs:
      - name: "Small Pack"
        coins: 500
        price_usd: 0.99
      - name: "Medium Pack"
        coins: 1200
        price_usd: 1.99
      - name: "Large Pack"
        coins: 3000
        price_usd: 4.99
      - name: "Mega Pack"
        coins: 8000
        price_usd: 9.99
