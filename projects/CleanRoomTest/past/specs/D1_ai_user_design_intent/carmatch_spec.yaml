    free_boosters:
      undo: 3
      shuffle: 1
      magnet: 0
      clear_holder: 0

  coin_earn_rates:
    level_clear_1star: 10
    level_clear_2star: 20
    level_clear_3star: 30
    first_clear_bonus: 50
    daily_login_base: 50             # Day 1 reward
    daily_login_max: 200             # Day 7+ reward
    ad_watch_reward: 100             # Optional rewarded video

  daily_rewards:
