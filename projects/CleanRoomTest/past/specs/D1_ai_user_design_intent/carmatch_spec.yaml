  metagame:
    type: "city_building"
    description: "Main screen shows city with various buildings. Coins and progression unlock new buildings or decorations."
    buildings_visible_at_l70: 4    # Observed: multiple shops/event buildings
    building_event_types: ["sale", "finished", "timed_challenge"]

# ============================================================
# 10. ARCHITECTURE
# ============================================================
architecture:
  design_patterns:
    - pattern: "Singleton"
      usage: "GameManager, LevelManager, CoinManager, LivesManager, AudioManager"
      note: "All singletons extend a generic Singleton<T> base class; DontDestroyOnLoad"

    - pattern: "State Machine"
      usage: "GameStateManager"
      states: ["Idle", "Playing", "Paused", "Win", "Lose", "Transitioning"]
      transitions:
        Idle: ["Playing"]
        Playing: ["Paused", "Win", "Lose"]
        Paused: ["Playing", "Idle"]
        Win: ["Idle"]
        Lose: ["Idle"]
        Transitioning: ["Playing", "Idle"]

    - pattern: "Object Pool"
      usage: "CarPool, ParticlePool"
      initial_pool_size_cars: 64
      initial_pool_size_particles: 20

    - pattern: "Observer / Event Bus"
      usage: "MatchEvent, LevelClearEvent, LifeLostEvent, CoinChangedEvent"
      implementation: "C# Action delegates via static EventBus class"

    - pattern: "Factory"
      usage: "LevelFactory — builds board layout, places cars, obstacles, tunnels from LevelData ScriptableObject"

    - pattern: "Command"
      usage: "TapCommand — encapsulates a single tap action for undo support"
      undo_stack_max_depth: 10

    - pattern: "Strategy"
      usage: "PathfindingStrategy interface — BFS implementation injected into GridManager"

  singletons:
    - GameManager          # Top-level game flow controller
    - LevelManager         # Level data loading, progression tracking
    - GridManager          # Board state, pathfinding, car placement
    - HolderManager        # Holder bar state, match detection
    - CoinManager          # Coin balance, earn/spend transactions
    - LivesManager         # Lives count, regen timer
    - BoosterManager       # Booster counts, use-effect dispatch
    - AudioManager         # SFX + BGM, volume settings
    - UIManager            # Screen transitions, popup management
    - TunnelManager        # Tunnel positions, spawn scheduling
    - EventBus             # Global event broadcast system (static)

  state_management:
    game_states:
      - Idle               # On main menu, no active level
      - Playing            # Active level, accepting input
      - Paused             # Pause menu open
      - Win                # Level cleared, showing result screen
      - Lose               # Holder overflowed, life lost
      - Transitioning      # Loading next level / scene change
    persistence:
      save_system: "PlayerPrefs + JSON file"
      save_fields:
        - "current_level_index"
        - "coin_balance"
        - "lives_count"
        - "lives_last_regen_timestamp"
        - "booster_counts"
        - "star_ratings_per_level[]"
        - "daily_reward_last_claimed_date"
        - "journey_rewards_claimed[]"
      save_trigger: "on_application_pause + on_level_complete"

  grid_system:
    coordinate_system: "2D_int_vector"   # Grid cells addressed as Vector2Int(col, row)
    bfs_implementation:
      queue_type: "System.Collections.Generic.Queue<Vector2Int>"
      visited_set: "HashSet<Vector2Int>"
      early_exit: true      # Stop as soon as exit cell is found
    path_reservation:
      reserved_cells: "HashSet<Vector2Int>"   # Cleared when car reaches holder
      reservation_cleared_on: "car_enter_holder OR car_blocked"

  holder_system:
    internal_structure: "List<CarData> of capacity 7"
    match_check_trigger: "after_each_insert"
    match_algorithm: |
      After insert, count occurrences of each color in holder.
      If any color count >= 3, trigger match for that color:
        remove exactly 3 of that color from holder, play match anim.
      Repeat check after removal (cascade possible).
    cascade_matches: true    # Multiple simultaneous matches resolved sequentially

  camera_settings:
    projection: "Orthographic"
    view_angle_degrees: 55          # Top-down isometric tilt
    rotation_euler: {x: 55, y: 45, z: 0}
    orthographic_size: 5.5          # Fits 6x6 grid comfortably; adjusted per grid stage
    orthographic_size_by_grid:
      "4x4": 4.0
      "5x5": 4.8
      "6x6": 5.5
      "7x7": 6.5
      "8x8": 7.5
    position_offset: {x: 0, y: 8, z: -6}  # World-space camera offset from board center
    background_color_hex: "#87CEEB"         # Sky blue to match city theme

  canvas_settings:
    render_mode: "Screen Space - Overlay"
    canvas_scaler: "Scale With Screen Size"
    reference_resolution: {width: 1080, height: 1920}
    match_mode: 0.5                  # Blend between width and height match

  scene_list:
    - name: "Title"
      purpose: "Logo splash + loading"
      auto_transition_to: "Main"
      auto_transition_delay_s: 2.5
    - name: "Main"
      purpose: "Main menu, city building meta, level select"
    - name: "GameScene"
      purpose: "Active puzzle gameplay"
