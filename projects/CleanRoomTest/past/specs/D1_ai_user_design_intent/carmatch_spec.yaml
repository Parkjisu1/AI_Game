    milestones:
      - level: 10
        reward: {coins: 200}
      - level: 25
        reward: {coins: 300, booster_undo: 2}
      - level: 50
        reward: {coins: 500, booster_shuffle: 1}
      - level: 75
        reward: {coins: 750, booster_magnet: 1}
      - level: 100
        reward: {coins: 1000, booster_clear_holder: 2}
      - level: 150
        reward: {coins: 1500, booster_magnet: 2}
      - level: 200
