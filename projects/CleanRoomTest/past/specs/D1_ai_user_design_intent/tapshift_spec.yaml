# Tap Shift - Game Balance Sheet / Design Specification
# Source: D1 - AI User Observations + Level 1 Design Intent Pattern Card
# Clean Room: No original source code referenced
# Generated: 2026-02-19

game: "Tap Shift"
spec_version: "1.0.0"
spec_type: "D1_ai_user_design_intent"
platform: "Mobile (Android / iOS)"
orientation: "Portrait"
genre: "Arrow Sliding Puzzle"

# ──────────────────────────────────────────────
# CORE MECHANICS
# ──────────────────────────────────────────────
core_mechanics:
  board:
    # Level 14 showed ~20-25 arrows with high complexity on a visible grid.
    # Patterns state boards grow with level; early levels must be much smaller.
    min_grid_size: [4, 4]         # columns x rows  (levels 1-10)
    mid_grid_size: [5, 6]         # columns x rows  (levels 11-30)
    max_grid_size: [6, 8]         # columns x rows  (levels 31-100)
    cell_size_px: 90              # logical pixels per cell (portrait 1080-wide canvas)
    border_padding_px: 40         # board edge inset from screen edge
    receiver_row_height_px: 120   # collector/exit area at board bottom

  arrow_types:
    # Observation confirmed: straight (up/down/left/right), L-bend, U-turn shapes
    count: 6
    types:
      - id: "straight_h"
        label: "Straight Horizontal"
        directions: ["left", "right"]
        aspect_ratio: 2.0         # wider than tall (horizontal arrow)
      - id: "straight_v"
        label: "Straight Vertical"
        directions: ["up", "down"]
        aspect_ratio: 0.5         # taller than wide (vertical arrow)
      - id: "l_bend_cw"
        label: "L-Bend Clockwise"
        directions: ["right_then_down", "left_then_up"]
        aspect_ratio: 1.0
      - id: "l_bend_ccw"
        label: "L-Bend Counter-Clockwise"
        directions: ["right_then_up", "left_then_down"]
        aspect_ratio: 1.0
      - id: "u_turn_h"
        label: "U-Turn Horizontal"
        directions: ["right_then_back_left", "left_then_back_right"]
        aspect_ratio: 1.5
      - id: "u_turn_v"
        label: "U-Turn Vertical"
        directions: ["up_then_back_down", "down_then_back_up"]
        aspect_ratio: 0.67

  colors:
    # Observation listed 8 distinct colors on the board at level 14
    count: 8
    palette:
      - id: "red"
        hex: "#FF3B30"
      - id: "lime"
        hex: "#39FF14"
      - id: "dark_blue"
        hex: "#1A3CFF"
      - id: "cyan"
        hex: "#00CFFF"
      - id: "magenta"
        hex: "#FF2D91"
      - id: "orange"
        hex: "#FF8C00"
      - id: "yellow"
        hex: "#FFE600"
      - id: "light_blue"
        hex: "#8EC5FF"
    background_hex: "#12121A"     # Dark background confirmed by observation

  interaction:
    input_type: "single_tap"      # Pattern card: pure tap, no drag/swipe
    tap_triggers: "immediate_slide"
    blocked_tap_feedback: "shake_animation"
    blocked_tap_haptic: true
    haptic_style: "light_impact"  # Haptic on every tap result
    undo_available: true          # Pattern card explicitly states undo support
    undo_max_steps: 30            # Maximum undo stack depth per level

  collision:
    # Pattern card: collision check must consider the ENTIRE movement path, not just destination
    algorithm: "path_sweep"
    check_method: "ray_cast_along_direction"
    blocking_condition: "any_occupied_cell_in_movement_path"
    blocked_arrow_behavior: "stay_in_place_with_shake"
    # Two arrows can never occupy the same cell
    overlap_allowed: false

  solver:
    # Pattern card: built-in puzzle solvability validator, auto-regenerate if unsolvable
    algorithm: "bfs_backtracking"       # BFS with backtracking to verify at least one solution exists
    max_solve_iterations: 50000         # Cap to prevent infinite loops on complex boards
    unsolvable_action: "regenerate"     # Regenerate board layout if no solution found
    min_solution_steps: 2               # Discard trivially simple boards (fewer than 2 steps)
    max_solution_steps: 60              # Cap solution depth; drives max arrow count ceiling
    solution_path_stored: true          # Store canonical solution for hint system use
    generation_attempts_max: 20         # Max regeneration attempts before fallback to preset

# ──────────────────────────────────────────────
# LIVES SYSTEM
# ──────────────────────────────────────────────
lives_system:
  # Observation: explicitly saw 3 hearts -> 2 hearts after one wrong tap
  max_lives: 3
  starting_lives: 3
  lives_lost_on: "wrong_tap"           # Tapping a blocked/wrong-order arrow
  lives_lost_per_wrong_tap: 1
  level_fail_condition: "lives_reaches_zero"

  regeneration:
    # Standard casual puzzle regen: 1 life per 30 minutes is industry norm
    regen_interval_minutes: 30
    regen_amount_per_interval: 1
    regen_cap: 3                        # Cannot exceed max_lives via regen
    regen_enabled_when_full: false

  continue_options:
    watch_ad_refill: true               # Watch rewarded ad to restore all lives
    coin_refill_cost: 30                # Spend 30 coins to restore all lives immediately
    iap_unlimited_lives_minutes: 60     # Paid: unlimited lives for 60 minutes

  visual:
    icon: "heart"
    full_color_hex: "#FF3B30"
    empty_color_hex: "#333344"
    lost_animation: "shrink_and_fade"
    lost_animation_duration_ms: 300

# ──────────────────────────────────────────────
# LEVEL PROGRESSION
# ──────────────────────────────────────────────
level_progression:
  # Observation estimated 50-100+ levels; pattern card says finite, casual-completable
  total_levels: 100
  level_select_style: "vertical_scroll_path"  # Confirmed by observation
  level_status:
    completed: "green_circle"
    failed: "pink_red_circle_with_skull"      # Directly observed
    locked: "gray_blue_circle"
    current: "highlighted_green"

  difficulty_ranges:
    # Derived from: level 14 had ~20-25 arrows + 8 colors = already "high complexity"
    # Therefore early levels must be much simpler
    tutorial:
      levels: [1, 5]
      grid_size: [4, 4]
      arrow_count_min: 3
      arrow_count_max: 6
      colors_used: 2
      arrow_types_available: 2       # Only straight arrows
      solution_steps_min: 2
      solution_steps_max: 6
      hints_auto_shown: true

    beginner:
      levels: [6, 20]
      grid_size: [4, 5]
      arrow_count_min: 6
      arrow_count_max: 12
      colors_used: 4
      arrow_types_available: 4       # Straight + L-bends
      solution_steps_min: 5
      solution_steps_max: 15
      hints_auto_shown: false

    intermediate:
      levels: [21, 50]
      grid_size: [5, 6]
      arrow_count_min: 12
      arrow_count_max: 20
      colors_used: 6
      arrow_types_available: 6       # All types
      solution_steps_min: 12
      solution_steps_max: 30
      hints_auto_shown: false

    advanced:
      levels: [51, 80]
      grid_size: [5, 7]
      arrow_count_min: 18
      arrow_count_max: 25
      colors_used: 7
      arrow_types_available: 6
      solution_steps_min: 25
      solution_steps_max: 45
      hints_auto_shown: false

    expert:
      levels: [81, 100]
      grid_size: [6, 8]
      arrow_count_min: 22
      arrow_count_max: 35
      colors_used: 8
      arrow_types_available: 6
      solution_steps_min: 40
      solution_steps_max: 60
      hints_auto_shown: false

  difficulty_curve: "smooth_progressive"   # Pattern card: not step-wise, gradual
  interstitial_ad_interval: 3              # Show interstitial every 3 levels completed

# ──────────────────────────────────────────────
# SCORING
# ──────────────────────────────────────────────
scoring:
  # Pattern card: star rating based on wrong-tap count; 0 wrong taps = 3 stars guaranteed
  system: "star_rating"
  max_stars: 3
  star_display: "level_select_circle_overlay"

  star_rating_criteria:
    basis: "wrong_tap_count"    # Primary metric, not time-based
    three_stars:
      wrong_taps_max: 0         # Perfect play: zero mistakes
      label: "Perfect"
    two_stars:
      wrong_taps_max: 2         # Up to 2 wrong taps
      label: "Good"
    one_star:
      wrong_taps_max: 5         # Up to 5 wrong taps (any completion)
      label: "Cleared"
    fail:
      condition: "all_lives_lost"
      label: "Failed"

  coin_rewards:
    three_stars: 15
    two_stars: 10
    one_star: 5
    first_clear_bonus: 10       # One-time bonus on first time clearing a level
    perfect_streak_bonus: 5     # Extra coins for 3 consecutive 3-star completions

  star_collection:
    # Total possible stars across all 100 levels = 300
    milestones:
      - stars: 30
        reward_type: "coins"
        reward_amount: 50
      - stars: 100
        reward_type: "coins"
        reward_amount: 150
      - stars: 200
        reward_type: "hint_booster"
        reward_amount: 5
      - stars: 300
        reward_type: "coins"
        reward_amount: 500

# ──────────────────────────────────────────────
# BOOSTERS
# ──────────────────────────────────────────────
boosters:
  # Observation: 3 booster types confirmed - magnifying glass (1), hand pointer (1), hashtag (infinity)
  slot_count: 3

  types:
    hint:
      id: "hint"
      icon: "magnifying_glass"
      label: "Hint"
      initial_count: 1
      effect: "highlight_next_correct_arrow"
      effect_duration_ms: 2000        # Pulse highlight lasts 2 seconds
      highlight_animation: "pulse_color_overlay"
      highlight_pulse_interval_ms: 500
      # Reveals the single next arrow that should be tapped (from stored solution path)
      reveals_steps: 1
      coin_cost: 20                   # Buy 1 hint for 20 coins
      consumable: true

    auto_step:
      id: "auto_step"
      icon: "hand_pointer"
      label: "Auto Tap"
      initial_count: 1
      effect: "auto_execute_next_correct_tap"
      # Automatically performs one correct tap for the player
      executes_steps: 1
      coin_cost: 30
      consumable: true

    undo:
      id: "undo"
      icon: "hashtag"
      label: "Undo"
      initial_count: -1               # -1 = unlimited (infinity symbol observed)
      effect: "revert_last_tap"
      # Rewinds board state by exactly 1 step; does NOT restore a lost life
      restores_life: false
      coin_cost: 0                    # Free, unlimited use
      consumable: false

  booster_packs_shop:
    # Sold in the in-app shop (cart icon observed)
    hint_pack_small:
      hints: 5
      coin_price: 80
    hint_pack_large:
      hints: 20
      coin_price: 280
    auto_step_pack_small:
      auto_steps: 5
      coin_price: 120
    auto_step_pack_large:
      auto_steps: 20
      coin_price: 400

# ──────────────────────────────────────────────
# ANIMATION
# ──────────────────────────────────────────────
animation:
  # Pattern card describes specific feel: stretch-then-snap elastic motion
  arrow_slide:
    # Arrow stretches along movement direction, then snaps back on arrival
    travel_duration_ms: 180           # Time from tap to arriving at board edge/exit
    easing: "ease_in_quad"            # Accelerates quickly
    stretch_factor: 1.35              # Arrow scales to 1.35x in movement axis at peak
    stretch_peak_time_normalized: 0.3 # Stretch peak at 30% of travel duration
    squash_factor: 0.75               # Squash in perpendicular axis at same peak
    snap_back_duration_ms: 60         # Return to 1.0 scale after reaching destination
    snap_back_easing: "ease_out_bounce"
    exit_flash_duration_ms: 80        # Brief white flash as arrow exits the board

  blocked_tap_shake:
    # Short, sharp shake communicating "not allowed"
    duration_ms: 250
    shake_count: 3                    # 3 oscillations within duration
    shake_magnitude_px: 6             # Peak displacement
    easing: "ease_out"

  hint_pulse:
    loop: true
    pulse_scale_min: 1.0
    pulse_scale_max: 1.12
    pulse_duration_ms: 500            # One full pulse cycle
    color_overlay_hex: "#FFFFFF"
    color_overlay_alpha: 0.35

  star_award:
    # Pattern card: stars appear one at a time for maximum satisfaction
    star_appear_delay_ms: 300         # Delay between each star appearing
    star_scale_start: 0.0
    star_scale_end: 1.0
    star_scale_duration_ms: 200
    star_scale_easing: "ease_out_back"  # Slight overshoot (bounce feel)
    star_color_full_hex: "#FFE600"
    star_color_empty_hex: "#444455"

  popup:
    # Pattern card: popups scale from small -> slightly-overshoot -> settle
    open_scale_start: 0.7
    open_scale_end: 1.0
    open_duration_ms: 220
    open_easing: "ease_out_back"      # Elastic/bounce open
    open_overshoot: 1.08              # Briefly reaches 1.08x scale before settling
    close_duration_ms: 150
    close_easing: "ease_in_quad"
    backdrop_alpha: 0.65

  level_complete:
    confetti_particle_count: 40
    confetti_duration_ms: 1500
    confetti_colors: ["#FF3B30", "#FFE600", "#39FF14", "#00CFFF", "#FF2D91"]
    board_clear_flash_duration_ms: 120

  life_lost:
    heart_shrink_duration_ms: 200
    heart_shake_count: 2
    heart_shake_magnitude_px: 4
    screen_vignette_flash_duration_ms: 300
    screen_vignette_color_hex: "#FF0000"
    screen_vignette_alpha_peak: 0.25

# ──────────────────────────────────────────────
# MONETIZATION
# ──────────────────────────────────────────────
monetization:
  # Observation confirmed: banner ads, interstitial ads, No Ads IAP, in-app shop, gift system

  currencies:
    soft_currency:
      name: "Coins"
      icon: "gold_coin"
      observed_player_amount: 85      # Directly observed in session
      earn_sources:
        - "level_completion_reward"
        - "daily_gift"
        - "star_milestone_reward"
        - "rewarded_ad_watch"
      spend_sources:
        - "hint_booster_purchase"
        - "auto_step_booster_purchase"
        - "revive_lives"

  ads:
    banner:
      provider: "AdMob"
      position: "bottom"
      enabled_by_default: true
      removed_by: "no_ads_iap"

    interstitial:
      provider: "AdMob"
      trigger: "level_complete"
      frequency: "every_3_levels"     # Pattern card: natural intervals
      cooldown_seconds: 60            # Min time between interstitials
      removed_by: "no_ads_iap"

    rewarded:
      provider: "AdMob"
      triggers:
        - action: "restore_all_lives"
          reward_type: "lives"
          reward_amount: 3
        - action: "earn_coins"
          reward_type: "coins"
          reward_amount: 25
        - action: "earn_hint"
          reward_type: "hint_booster"
          reward_amount: 1
      max_rewarded_per_day: 10        # Cap to prevent abuse

  iap_products:
    no_ads:
      product_id: "tapshift.noads"
      price_usd: 2.99
      type: "non_consumable"
      effect: "disable_banner_and_interstitial_permanently"

    coin_pack_small:
      product_id: "tapshift.coins.small"
      price_usd: 0.99
      type: "consumable"
      coins_granted: 150

    coin_pack_medium:
      product_id: "tapshift.coins.medium"
      price_usd: 2.99
      type: "consumable"
      coins_granted: 550
      bonus_label: "+22% bonus"

    coin_pack_large:
      product_id: "tapshift.coins.large"
      price_usd: 6.99
      type: "consumable"
      coins_granted: 1500
      bonus_label: "+43% bonus"

    hint_bundle:
      product_id: "tapshift.hints.bundle"
      price_usd: 1.99
      type: "consumable"
      hints_granted: 30

  daily_gift:
    # Observation confirmed "Claim" gift button in level select
    enabled: true
    reset_interval_hours: 24
    rewards_rotation:
      - day: 1
        reward_type: "coins"
        reward_amount: 20
      - day: 2
        reward_type: "coins"
        reward_amount: 30
      - day: 3
        reward_type: "hint_booster"
        reward_amount: 1
      - day: 4
        reward_type: "coins"
        reward_amount: 40
      - day: 5
        reward_type: "coins"
        reward_amount: 50
      - day: 6
        reward_type: "auto_step_booster"
        reward_amount: 1
      - day: 7
        reward_type: "coins"
        reward_amount: 100

# ──────────────────────────────────────────────
# ARCHITECTURE
# ──────────────────────────────────────────────
architecture:
  design_patterns:
    # Pattern card describes clear separation of generation vs. validation,
    # move history tracking, explicit state management
    singleton:
      - "GameManager"       # Global lifecycle, scene transitions
      - "AudioManager"      # SFX / BGM
      - "CoinManager"       # Soft currency state
      - "BoosterManager"    # Booster inventory
      - "AdManager"         # Ad SDK abstraction
      - "IAPManager"        # IAP SDK abstraction

    state_machine:
      class: "GameStateMachine"
      states:
        - "MainMenu"
        - "LevelSelect"
        - "Playing"
        - "Paused"
        - "LevelComplete"
        - "LevelFailed"
        - "Settings"
      transitions:
        - from: "MainMenu"        to: "LevelSelect"    trigger: "PlayButton"
        - from: "LevelSelect"     to: "Playing"        trigger: "LevelSelected"
        - from: "Playing"         to: "Paused"         trigger: "PauseButton"
        - from: "Paused"          to: "Playing"        trigger: "ResumeButton"
        - from: "Playing"         to: "LevelComplete"  trigger: "AllArrowsCleared"
        - from: "Playing"         to: "LevelFailed"    trigger: "LivesReachZero"
        - from: "LevelFailed"     to: "Playing"        trigger: "ReviveConfirmed"
        - from: "LevelComplete"   to: "LevelSelect"    trigger: "NextLevelOrBack"

    command_pattern:
      class: "MoveCommand"
      purpose: "Encapsulate each arrow tap as a reversible command for undo support"
      fields:
        - "ArrowId: int"
        - "FromCell: Vector2Int"
        - "ToCell: Vector2Int"
        - "Direction: Direction"
      methods:
        - "Execute()"
        - "Undo()"

    object_pool:
      pooled_objects:
        - "ArrowView"           # Reused across level loads
        - "ParticleEffect"      # Confetti, trail particles
        - "FloatingText"        # "+Coins" popup text

    observer_event_bus:
      class: "EventBus"
      events:
        - "OnArrowTapped(arrowId)"
        - "OnArrowSlid(arrowId, path)"
        - "OnArrowBlocked(arrowId)"
        - "OnArrowExited(arrowId)"
        - "OnLiveLost(remainingLives)"
        - "OnLevelCleared(wrongTaps, stars)"
        - "OnLevelFailed()"
        - "OnCoinChanged(newTotal)"
        - "OnBoosterUsed(boosterId)"

  state_management:
    board_state:
      class: "BoardState"
      data:
        - "grid: Dictionary<Vector2Int, ArrowData>"  # Cell -> arrow mapping
        - "exitCells: List<Vector2Int>"               # Board edge exit cells
        - "moveHistory: Stack<MoveCommand>"           # Undo stack
        - "wrongTapCount: int"
        - "remainingLives: int"
      serialization: "JSON"

    persistence:
      save_backend: "PlayerPrefs"       # Simple key-value for mobile
      saved_data:
        - "current_level: int"
        - "coins: int"
        - "hint_count: int"
        - "auto_step_count: int"
        - "level_stars: Dictionary<int,int>"
        - "no_ads_purchased: bool"
        - "last_life_regen_timestamp: long"

  algorithms:
    puzzle_solver:
      algorithm: "BFS_with_backtracking"
      input: "BoardState"
      output: "List<MoveCommand>"       # Ordered solution steps
      used_for:
        - "Solvability validation at level generation time"
        - "Hint system: next step from current board state"
      time_complexity: "O(b^d)"         # b = branching factor (tapable arrows), d = solution depth
      space_complexity: "O(b^d)"        # BFS frontier in memory

    collision_detection:
      algorithm: "path_sweep_ray_cast"
      description: |
        For a tapped arrow moving in direction D from cell C:
        1. Compute the sequence of cells the arrow will traverse.
        2. For each cell in sequence, check if grid[cell] is occupied.
        3. If occupied: mark as blocked, return last free cell before blocker.
        4. If board edge reached: arrow exits board (cleared).
      handles_multi_segment_arrows: true   # L-bends and U-turns check each segment separately

    level_generation:
      algorithm: "solver_first_generation"
      description: |
        1. Place N arrows randomly on empty grid.
        2. Run BFS solver to verify solution exists.
        3. If unsolvable: regenerate up to max_attempts times.
        4. If still unsolvable: load pre-authored fallback level.
        5. Serialize solvable board to LevelData asset.
      pre_authored_fallback_levels: 20      # Handcrafted backup levels per difficulty band

  sdk_abstraction:
    # Pattern card: build must succeed without SDKs installed
    firebase_analytics:
      preprocessor_symbol: "FIREBASE_ANALYTICS"
      events_tracked:
        - "level_start"
        - "level_complete"
        - "level_fail"
        - "booster_used"
        - "iap_purchase"
      simulation_fallback: "Debug.Log"

    admob:
      preprocessor_symbol: "GOOGLE_MOBILE_ADS"
      simulation_fallback: "Debug.Log mock ad callbacks"

    unity_iap:
      preprocessor_symbol: "UNITY_IAP"
      simulation_fallback: "Debug.Log mock purchase success"

  scene_structure:
    scenes:
      - name: "Title"
        purpose: "Splash / loading"
        required_objects:
          - "Main Camera"
          - "Canvas (1080x1920, Scale With Screen Size)"
          - "EventSystem"
          - "TitleManager"
          - "LoadingBar"
        auto_transitions_to: "Main"
        auto_transition_delay_seconds: 2.5

      - name: "Main"
        purpose: "Main menu"
        required_objects:
          - "Main Camera"
          - "Canvas (1080x1920)"
          - "EventSystem"
          - "MainMenuManager"
          - "PlayButton"
          - "SettingsButton"

      - name: "GameScene"
        purpose: "Level select + gameplay"
        required_objects:
          - "Main Camera"
          - "Canvas (1080x1920)"
          - "EventSystem"
          - "Managers (parent GameObject, DontDestroyOnLoad)"
          - "BoardController"
          - "LevelSelectUI"
          - "GameplayUI"
          - "AdBanner"
