# Magic Sort - Pattern Card (Level 1: Design Intent)
# Clean Room: 원본 소스코드 참조 없음, 설계 인사이트만 포함
game: "Magic Sort"
abstraction_level: "design_intent"

patterns:
  core_loop:
    description: |
      물약 색상 정렬 퍼즐.
      여러 병에 섞여 있는 색상 물을 따라 옮겨 각 병을 단색으로 만든다.
      병 하나를 선택하고, 다른 병을 선택하면 위쪽 같은 색 물이 옮겨진다.
      빈 병도 존재하여 임시 버퍼 역할을 한다.
      모든 병이 단색이거나 비어있으면 클리어.
      클래식한 색상 정렬 퍼즐의 모바일 최적화 버전이다.

  difficulty_progression:
    description: |
      초반은 적은 색상과 적은 병으로 시작하여 규칙을 학습시킨다.
      레벨이 오를수록 색상 수와 병 수가 점진적으로 증가한다.
      빈 병의 수는 고정이며, 색상이 많아질수록 상대적 여유가 줄어든다.
      난이도 티어가 존재하여 구간별로 체감 난이도가 달라진다.
      초반 레벨은 수작업 설계, 이후는 절차적 생성으로 무한히 확장된다.
      목표 이동 횟수(파) 시스템으로 효율적 풀이에 보상을 준다.

  input_system:
    description: |
      탭 투 셀렉트 방식 - 첫 번째 탭으로 원본 병 선택, 두 번째 탭으로 대상 병 선택.
      선택된 병은 살짝 들어올려지고 색조가 변해 시각적으로 구분된다.
      같은 병을 다시 탭하면 선택 해제된다.
      유효하지 않은 따르기는 자동으로 차단되어 실수를 방지한다.

  scoring:
    description: |
      별점 시스템은 이동 횟수 기반이다.
      목표 이동 횟수(파) 이하로 클리어하면 최고 별점을 받는다.
      파를 초과할수록 별점이 내려가며, 비율 기반으로 판정한다.
      레벨 클리어 시 코인과 경험치를 보상으로 지급한다.

  special_mechanics:
    description: |
      다양한 블로커(방해 요소)가 퍼즐 위에 겹쳐진다.
      얼음, 카펫, 커튼, 석고 등 물리적 방해 요소가 있다.
      열쇠-상자, 금고 등 조건부 해제 메커니즘이 있다.
      개구리, 오리 등 이동하는 생물 블로커도 존재한다.
      색상 관련 블로커(태그, 담쟁이)는 특정 색과 연동된다.
      부스터 시스템으로 추가 병, 셔플, 되돌리기, 힌트, 색상 제거 등을 제공한다.
      힌트 시스템은 가능한 수를 점수화하여 최적의 다음 수를 추천한다.
      되돌리기는 충분히 깊은 히스토리를 유지하여 자유로운 탐색을 허용한다.

  architecture:
    description: |
      따르기 유효성 검증과 따르기 실행을 분리해야 한다.
      블로커 시스템은 다형성 기반으로 확장 가능하게 설계한다.
      한 병의 완성(단색) 판정과 전체 승리 판정을 구분한다.
      교착 상태(더 이상 유효한 수가 없음) 감지가 필수이다.
      게임 상태를 명확히 관리하고 상태 전환을 체계화한다.
      병 배치는 그리드 기반이며 행당 최대 개수를 제한하여 가독성을 확보한다.
      레벨 데이터 제공, 난이도 설정, 힌트 계산은 각각 독립 모듈로 분리한다.

  animation_feel:
    description: |
      따르기 애니메이션은 들어올리기-이동-기울이기-따르기-돌아오기의 다단계로 구성한다.
      각 단계는 짧고 경쾌하게 처리하여 리듬감을 준다.
      병 완성 시 바운스 효과와 스케일 펀치로 성취감을 표현한다.
      선택된 병은 살짝 위로 올라가며 틴트가 변해 현재 선택 상태를 명확히 한다.
      전체적으로 부드럽지만 빠른 반응성을 유지한다.

  monetization:
    description: |
      이중 재화 시스템(코인, 젬)으로 경제를 운영한다.
      시작 시 적절한 초기 재화를 지급하여 시스템 체험을 유도한다.
      부스터는 초기 무료 제공 후 재화로 구매하는 구조이다.
      레벨 클리어 보상으로 지속적인 재화 유입을 보장한다.
