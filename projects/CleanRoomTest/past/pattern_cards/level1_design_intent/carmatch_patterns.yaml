# Car Match - Pattern Card (Level 1: Design Intent)
# Clean Room: 원본 소스코드 참조 없음, 설계 인사이트만 포함
game: "Car Match"
abstraction_level: "design_intent"

patterns:
  core_loop:
    description: |
      3D 탑뷰 격자 위의 자동차 매칭 퍼즐.
      격자 보드 위에 다양한 종류의 자동차가 배치되어 있다.
      자동차를 탭하면 하단 홀더로 이동하며, 같은 종류가 연속으로 모이면 매칭되어 사라진다.
      홀더가 가득 차기 전에 모든 자동차를 매칭시키면 클리어.
      홀더 용량 관리가 핵심 전략이며, 탭 순서를 신중히 선택해야 한다.

  difficulty_progression:
    description: |
      초반은 작은 격자에 적은 자동차 종류로 시작한다.
      레벨이 오를수록 격자 크기와 자동차 종류가 점진적으로 증가한다.
      일정 레벨부터 장애물(벽, 상자, 잠금, 얼음)이 등장한다.
      더 높은 레벨에서는 터널 시스템이 추가되어 보드 외부에서 자동차가 진입한다.
      레벨 수는 충분히 많아 장기 플레이가 가능하다.

  input_system:
    description: |
      원탭 인터랙션 - 자동차를 탭하면 경로를 찾아 홀더로 이동한다.
      경로가 막혀있으면 이동 불가 피드백을 준다.
      홀더의 자동차를 임시 저장소에 보관했다가 꺼낼 수 있다.
      이동 경로는 직교 방향(상하좌우)만 허용된다.

  scoring:
    description: |
      별점은 수집한 자동차 수 기반으로 판정한다.
      전체 자동차를 기준 이동 수 이내에 처리하면 최고 별점.
      여유 이동 수를 초과할수록 별점이 내려간다.
      별점에 비례하여 코인 보상을 지급한다.

  special_mechanics:
    description: |
      터널 시스템 - 보드 가장자리에서 새로운 자동차가 매칭 후 진입한다.
      터널은 일정 레벨 이후 등장하며 예측 불가 요소를 추가한다.
      임시 저장소로 홀더의 자동차를 잠시 빼놓을 수 있다.
      부스터 시스템 - 되돌리기, 셔플, 강화 되돌리기, 자석(자동 매칭) 등.
      일일 보상 시스템으로 매일 접속 동기를 부여한다.
      여정 보상으로 레벨 마일스톤 달성 시 추가 보상을 지급한다.

  architecture:
    description: |
      격자 기반 보드와 경로 탐색을 분리하여 설계한다.
      매칭 판정(같은 종류 연속 감지)은 독립 모듈로 구현한다.
      홀더(대기열) 관리와 매칭 로직을 분리한다.
      터널 시스템은 레벨 생성 시 포함 여부를 결정하고, 매칭 이벤트에 반응하여 스폰한다.
      장애물 시스템은 다형성으로 여러 유형을 지원한다.
      이동 경로 예약 시스템으로 동시 이동 시 충돌을 방지한다.
      게임 상태(대기, 플레이, 일시정지, 승리, 실패)를 명확히 관리한다.

  animation_feel:
    description: |
      자동차가 홀더로 이동할 때 경로를 따라 부드럽게 미끄러진다.
      매칭 시 펀치 스케일 효과 후 사라지는 연출로 쾌감을 준다.
      터널에서 자동차가 등장할 때 탄성 있는 스케일 애니메이션을 적용한다.
      전체적으로 3D 모델의 회전과 이동이 자연스럽게 보간된다.
      매칭-사라짐-재배치 사이에 적절한 딜레이를 두어 시각적 혼란을 방지한다.

  monetization:
    description: |
      코인 기반 단일 재화 시스템이다.
      시작 시 넉넉한 초기 코인을 제공하여 부스터 체험을 유도한다.
      부스터는 초기 무료 제공 후 코인으로 구매한다.
      일일 보상과 여정 보상으로 지속적인 재화 유입을 보장한다.
      별점에 비례한 레벨 클리어 보상으로 잘하는 플레이어에게 더 많은 보상을 준다.
