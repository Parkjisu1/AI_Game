# Tap Shift - Pattern Card (Level 1: Design Intent)
# Clean Room: 원본 소스코드 참조 없음, 설계 인사이트만 포함
game: "Tap Shift"
abstraction_level: "design_intent"

patterns:
  core_loop:
    description: |
      화살표 방향 기반 슬라이딩 퍼즐.
      보드 위에 다양한 방향의 화살표가 배치되어 있고,
      플레이어가 화살표를 탭하면 해당 방향으로 보드 끝까지 이동한다.
      모든 화살표를 보드 밖으로 밀어내면 레벨 클리어.
      탭 순서가 핵심이며, 잘못된 순서로 탭하면 화살표끼리 막힌다.
      한 수 한 수가 의미 있는 미니멀 퍼즐 경험을 지향한다.

  difficulty_progression:
    description: |
      초반 레벨은 화살표 수가 매우 적고 보드가 작아 직관적으로 풀린다.
      레벨이 올라갈수록 화살표 수가 점진적으로 증가하고 보드도 커진다.
      화살표 수에는 상한선이 있어 과도한 복잡도는 방지한다.
      난이도 곡선은 계단식이 아니라 부드러운 점진형으로 설계되어야 한다.
      레벨 총량은 유한하며, 캐주얼 유저가 완주 가능한 범위로 제한된다.

  input_system:
    description: |
      원탭 인터랙션 - 화살표를 탭하면 즉시 이동이 시작된다.
      드래그나 스와이프 없이 순수 탭만으로 플레이한다.
      이동 불가능한 화살표를 탭하면 흔들림 피드백을 준다.
      촉각 피드백(진동)으로 탭의 결과를 즉각 전달한다.
      실행 취소 기능으로 실수를 되돌릴 수 있다.

  scoring:
    description: |
      별점 시스템으로 퍼포먼스를 평가한다.
      잘못된 탭(막힌 화살표 탭) 횟수가 적을수록 높은 별점을 받는다.
      완벽 플레이(실수 없음)는 최고 별점을 보장한다.
      별점은 레벨 선택 화면에서 진행도와 성취감을 시각화한다.

  special_mechanics:
    description: |
      힌트 시스템이 있어 막혔을 때 다음 수를 안내받을 수 있다.
      힌트는 소모품이며 제한된 횟수만큼 제공된다.
      퍼즐 자동 풀이 검증이 내장되어 모든 생성 퍼즐의 풀이 가능성을 보장한다.
      레벨 생성 시 풀 수 없는 배치가 나오면 자동으로 재생성한다.
      생명(목숨) 시스템으로 연속 실패 시 쉬어가는 리듬을 만든다.

  architecture:
    description: |
      퍼즐 생성과 퍼즐 풀이 검증을 명확히 분리해야 한다.
      이동 이력을 기록하여 되돌리기 기능을 지원한다.
      화살표의 충돌 판정은 이동 경로 전체를 고려해야 한다.
      화살표 방향에 따라 형태(가로/세로 비율)가 달라지는 규칙이 있다.
      레벨 데이터는 사전 생성 후 직렬화하여 저장하고, 런타임에 로드한다.
      게임 상태(메인 메뉴, 플레이 중, 일시정지, 클리어, 실패 등)를 명확히 관리한다.

  animation_feel:
    description: |
      화살표 이동 시 '늘어났다가 탁 붙는' 탄성 애니메이션을 적용한다.
      이동 초반에 화살표가 이동 방향으로 늘어나고, 도착 시 빠르게 원래 형태로 돌아온다.
      막힌 화살표는 짧고 빠른 떨림으로 '안 됨'을 전달한다.
      힌트 대상 화살표는 반복 펄스 애니메이션과 색상 강조로 눈에 띄게 한다.
      팝업은 살짝 작은 상태에서 탄성 있게 튀어나오는 느낌으로 열린다.
      별 획득 연출은 순차적으로 하나씩 등장하며 성취감을 극대화한다.

  monetization:
    description: |
      전면 광고를 일정 레벨 간격마다 자연스럽게 노출한다.
      광고 제거 영구 구매 상품을 제공한다.
      힌트 팩 소모품 구매로 힌트를 충전할 수 있다.
      광고와 IAP 시스템은 SDK 미설치 환경에서도 빌드 가능하도록 추상화한다.
