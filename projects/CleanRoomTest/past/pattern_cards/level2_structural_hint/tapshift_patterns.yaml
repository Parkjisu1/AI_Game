# Tap Shift - Pattern Card (Level 2: Structural Hint)
# Clean Room: 원본 소스코드 참조 없음, 설계 인사이트만 포함
game: "Tap Shift"
abstraction_level: "structural_hint"

patterns:
  core_loop:
    description: |
      화살표 슬라이딩 퍼즐. 방향이 지정된 화살표를 탭하면 보드 경계까지 이동.
      다른 화살표에 막히면 이동 불가. 모든 화살표를 보드 밖으로 밀어내면 클리어.

      구조적 힌트:
      - 화살표 엔티티: 위치(x,y), 크기(w,h), 방향(4방향), 색상
      - 충돌 판정: AABB sweep 방식 - 이동 방향으로 경계까지 스윕하며 겹침 검사
      - 이동 가능 판단: 이동 경로상 다른 화살표와 AABB 겹침이 없으면 이동
      - 퍼즐 성능: 화살표 수가 최대 약 20개 이하로, 탭당 O(n) 충돌 검사면 충분

  difficulty_progression:
    description: |
      약 100개 레벨, 5~6단계의 난이도 구간으로 분할.

      구조적 힌트:
      - 초반 구간: 화살표 1~5개, 보드 약 200px급
      - 중반 구간: 화살표 5~10개, 보드 약 300~400px급
      - 후반 구간: 화살표 10~20개, 보드 약 400~450px급
      - 화살표 수 상한: 약 20개로 클램프
      - 보드 크기와 화살표 수 모두 레벨에 비례하여 증가하되 수식은 구간별 선형
      - 화살표 방향 규칙: 세로로 긴 화살표는 상/하, 가로로 긴 화살표는 좌/우

  input_system:
    description: |
      터치/탭 입력만 사용. 드래그 없음.

      구조적 힌트:
      - InputHandler 전담 클래스로 입력 처리 분리
      - 탭 위치에서 화살표 히트 테스트 → 이동 가능 여부 판정 → 이동 또는 거부 피드백
      - 실행 취소: Command 패턴 기반, 최대 약 10회 되돌리기 가능
      - 햅틱 피드백: light/medium/heavy 3단계, 플랫폼별 진동 시간 차등

  scoring:
    description: |
      잘못된 탭(막힌 화살표 탭) 횟수 기반 별점 시스템.

      구조적 힌트:
      - 3성: 실수 0회 (Perfect)
      - 2성: 실수 1~2회
      - 1성: 실수 3~5회
      - 0성: 실수 6회 이상
      - 별점 저장: PlayerPrefs에 레벨별 키로 저장
      - 유틸리티 클래스에 정적 메서드로 별점 계산 로직 분리

  special_mechanics:
    description: |
      힌트, 생명, 퍼즐 검증 시스템.

      구조적 힌트:
      - 힌트 시스템: 소모품(약 3개 기본), 사용 시 최적의 다음 수를 표시
      - 힌트 애니메이션: 대상 화살표 약 3회 펄스(스케일 확대/축소 + 색상 강조)
      - 생명 시스템: 최대 약 3개, 레벨 실패 시 소모
      - 퍼즐 풀이 검증: DFS + 백트래킹으로 생성된 퍼즐의 풀이 가능성 보장
      - 레벨 생성 실패 시 폴백: 단순 세로 정렬 배치로 최소 난이도 보장
      - 최대 배치 시도 횟수 제한으로 무한 루프 방지

  architecture:
    description: |
      약 50개 파일, 3-Layer 구조.

      구조적 힌트:
      - 디자인 패턴:
        - Singleton<T> (제네릭, DontDestroyOnLoad): 게임 매니저, 레벨 매니저, 사운드, 팝업 등
        - Object Pooling: 화살표 Factory 겸 풀
        - Command 패턴: 이동 커맨드 + 히스토리 스택으로 되돌리기 구현
        - Observer/Event Bus: 중앙 이벤트 매니저로 시스템 간 결합도 최소화
        - Template Method: 팝업/페이지의 공통 열기/닫기 애니메이션을 베이스 클래스에
        - Adapter: 광고/IAP 서비스를 인터페이스로 추상화
        - Strategy: 퍼즐 검증/풀이 알고리즘 교체 가능
      - 상태 관리: enum 기반 게임 상태 (메뉴, 플레이, 일시정지, 클리어, 실패, 튜토리얼 등 약 8~9개 상태)
      - Core 레이어: 싱글톤, 이벤트, 오브젝트 풀, 유틸리티
      - Domain 레이어: 화살표(엔티티+애니메이션+검증), 보드, 입력, 레벨(설정+로드+진행), 퍼즐(커맨드+히스토리+솔버+상태)
      - Game 레이어: UI 요소, HUD, 페이지, 팝업, 수익화

  animation_feel:
    description: |
      탄성 있는 이동 + 떨림 거부 피드백.

      구조적 힌트:
      - 화살표 이동: 이동 거리 기반 duration 계산, 약 0.25~0.7초로 클램프
        - 전반 약 40%: 이동 방향으로 스케일 늘어남 (최대 약 1.6배), ease-out sine
        - 후반 약 60%: 원래 크기로 복귀하며 목표 위치에 착지, ease-in quadratic
      - 막힘 피드백: 약 0.3초간 감쇠 진동 (exponential decay)
      - 힌트 펄스: 약 3회 반복, 약 1.0~1.15 스케일 진동 + 강조색
      - 팝업: 약 0.8→1.0 스케일, ease-out-back(살짝 넘어갔다 돌아오는 느낌), 약 0.25초
      - 페이지 전환: fade in/out 각 약 0.2초
      - 별 연출: 순차 등장, 별당 약 0.3초 간격

  monetization:
    description: |
      광고 + IAP 이중 수익 모델.

      구조적 힌트:
      - 전면 광고: 약 3레벨마다 노출
      - IAP 상품: 힌트 팩(소모품, 약 5개), 광고 제거(비소모품)
      - 서비스 추상화: IAdService, IIAPService 인터페이스로 분리
        → 실제 SDK와 시뮬레이션 구현 교체 가능
      - 수익화 매니저 싱글톤이 두 서비스를 통합 관리
      - 조건부 컴파일(#if)로 SDK 미설치 빌드 지원
