# Car Match - Pattern Card (Level 2: Structural Hint)
# Clean Room: 원본 소스코드 참조 없음, 설계 인사이트만 포함
game: "Car Match"
abstraction_level: "structural_hint"

patterns:
  core_loop:
    description: |
      3D 탑뷰 격자 보드에서 자동차를 수집하여 매칭하는 퍼즐.

      구조적 힌트:
      - 자동차 엔티티: 종류 ID, 격자 위치(col, row), 3D 모델
      - 자동차 종류: 약 6종, 레벨별로 사용하는 종류 수가 다름
      - 매칭 규칙: 홀더에서 같은 종류 약 3개가 연속으로 모이면 매칭 소멸
      - 홀더: 최대 약 7칸, 선입 방식, 가득 차면 실패
      - 승리 조건: 보드 비어있고, 홀더 비어있고, 대기 자동차 없음
      - 실패 조건: 홀더가 가득 차고 매칭 불가능한 상태
      - 경로 탐색: A* 알고리즘 + Manhattan 거리 휴리스틱, 직교 4방향 이동

  difficulty_progression:
    description: |
      약 200개 레벨, 격자 크기 5단계 확장.

      구조적 힌트:
      - 격자 크기 단계:
        - 약 1~10레벨: 4x4
        - 약 11~30레벨: 5x5
        - 약 31~60레벨: 6x5
        - 약 61~100레벨: 6x6
        - 약 101레벨+: 7x6
      - 자동차 세트 수: 약 3 + (레벨/10), 최대 약 8
      - 색상(종류) 수: 약 3 + (레벨/15), 최대 약 8
      - 장애물: 약 10레벨부터 등장, 약 1 + (레벨/20)개, 최대 약 5
      - 터널: 약 20레벨부터 등장, 약 1 + ((레벨-20)/15)개, 최대 약 2

  input_system:
    description: |
      3D 공간에서 탭으로 자동차 선택.

      구조적 힌트:
      - Raycast 기반 3D 히트 테스트로 탭한 자동차 식별
      - 경로 탐색: A* with Manhattan, 4방향 직교 이동만 허용
      - 경로 예약 시스템: 이동 중인 자동차가 점유한 셀은 다른 자동차 경로에서 제외
      - 경로 최적화: 웨이포인트 병합 (방향 변화 없는 연속 셀은 하나로 합침)
      - 직선 경로 폴백: 경로 탐색 실패 시 약 3셀 이내의 직선 경로 시도
      - BFS 기반 도달 가능성 검증을 별도 Validator로 분리

  scoring:
    description: |
      수집 자동차 수 기반 별점 + 코인 보상.

      구조적 힌트:
      - 3성: 총 자동차 수 이하의 탭으로 클리어
      - 2성: 총 자동차 수 + 약 5회 이하
      - 1성: 총 자동차 수 + 약 10회 이하
      - 코인 보상: 별 수 * 약 10코인
      - ScoreCalculator를 별도 클래스로 분리하여 계산 로직 독립

  special_mechanics:
    description: |
      터널 + 장애물 + 저장소 + 부스터 + 보상 시스템.

      구조적 힌트:
      - 터널 시스템:
        - 보드 가장자리(상, 좌, 우 - 하단 제외)에 배치
        - 매칭 성공 후 일정 딜레이로 새 자동차 스폰
        - 약 3대씩 세트 단위로 스폰, 레벨별로 총 스폰량 다름
        - 스폰 애니메이션: OutBack 스케일 + OutQuad 이동
      - 장애물 시스템:
        - 약 5종: 벽, 상자, 잠금, 얼음, 터널
        - Object Pool로 장애물 인스턴스 관리
        - 기본 크기 1x1 셀
      - 임시 저장소:
        - 약 2개, 각 1칸 용량
        - 홀더의 자동차를 잠시 빼놓고 전략적으로 활용
      - 부스터:
        - 약 4종: 되돌리기, 셔플(Fisher-Yates), 강화 되돌리기(홀더에서 제거), 자석(자동 매칭 약 3개)
        - 초기 제공: 각 약 3~5개
        - 이동 히스토리: 최대 약 50단계 기록
      - 일일 보상: 약 7일 주기, 일수별 증가하는 코인 보상
      - 여정 보상: 약 5레벨 간격 마일스톤, 코인 + 부스터 보상, 동적 스케일링

  architecture:
    description: |
      싱글톤 + EventBus + 상태 머신 기반 3D 퍼즐 아키텍처.

      구조적 힌트:
      - 디자인 패턴:
        - Singleton: 영구 (EventBus, DataManager, LevelManager, ObjectPool 등)
        - Singleton: 씬 한정 (BoardManager, HolderController, StageStateHandler 등)
        - Object Pool: 자동차, 장애물 인스턴스 풀링
        - Observer/Pub-Sub: EventBus로 시스템 간 이벤트 전달
        - Factory: 레벨 매니저가 레벨 생성 담당
        - Command: 부스터 프로세서 기반 되돌리기
        - Strategy: A*, BFS 등 경로 탐색 알고리즘 교체 가능
        - Component: MonoBehaviour 기반 게임 오브젝트 구성
      - 상태 관리: enum 기반 약 5개 상태 (Idle, Playing, Paused, Win, Fail)
      - Core 로직 분리:
        - MatchChecker: 홀더에서 연속 동일 타입 약 3개 감지
        - PathFinder: A* + Manhattan 경로 탐색
        - MoveValidator: BFS 도달 가능성 검증
        - ScoreCalculator: 별점/코인 계산
      - 직렬화:
        - 레벨 설정: JSON (Resources 폴더에서 로드)
        - 유저 저장: PlayerPrefs (단일 키에 JSON 직렬화)
      - 카메라: 기본 약 70도 앵글, 격자 크기에 따라 높이/FOV 동적 조정
      - 네임스페이스: 전체를 하나의 네임스페이스로 묶어 관리

  animation_feel:
    description: |
      3D 모델 이동/회전 + 매칭 이펙트.

      구조적 힌트:
      - 자동차 3D 모델: 약 0.4 스케일, 약 0.25 Y 오프셋 (격자 위에 살짝 떠있는 느낌)
      - 이동 속도: 약 5.0 단위/초, 경로 웨이포인트를 따라 이동
      - 홀더 진입 시 회전: 약 180도, 약 0.15초, OutQuad
      - 매칭 연출:
        1. 펀치 스케일: 약 0.15 확대, 약 0.12초
        2. 사라짐: 약 0.18초, InBack 이징
        3. 처리 딜레이: 약 0.4초 (시각적 인지 시간)
        4. 홀더 재배치: 약 0.6초 (빈자리 채우기)
      - 터널 스폰: OutBack 스케일 + OutQuad 이동, 약 0.3초
      - 저장소 이동: 약 0.25초
      - 홀더 풀 체크 딜레이: 약 0.5초 (매칭 완료 후 확인)

  monetization:
    description: |
      코인 단일 재화 + 다층 보상 시스템.

      구조적 힌트:
      - 초기 코인: 약 500
      - 레벨 클리어 보상: 별 수 * 약 10코인
      - 일일 보상: 7일 주기, 약 50~500코인 범위 (일수에 비례 증가)
      - 여정 보상: 약 5레벨 간격, 코인 약 200 + (레벨 * 10) 동적 스케일링
      - 마일스톤 보상에 부스터 포함 (상위 마일스톤에서)
      - 부스터 구매: 코인으로 충전
      - DataManager 싱글톤이 재화/부스터/진행도 통합 저장 관리
