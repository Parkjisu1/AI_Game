# Magic Sort - Pattern Card (Level 2: Structural Hint)
# Clean Room: 원본 소스코드 참조 없음, 설계 인사이트만 포함
game: "Magic Sort"
abstraction_level: "structural_hint"

patterns:
  core_loop:
    description: |
      병 기반 색상 정렬 퍼즐. 병에서 병으로 같은 색 물을 따라 옮기는 메커니즘.

      구조적 힌트:
      - 병 엔티티: 최대 약 4층 높이의 스택 구조, 각 층에 색상 값
      - 색상: 약 13가지 플레이어블 색상 + 특수 색상(무지개 등)
      - 따르기 규칙: 원본 != 대상, 원본에 물 있음, 대상 최상단 색 일치 또는 빈 병
      - 특수 규칙: 이미 단색인 병에서 빈 병으로 따르기 금지 (무의미한 이동 방지)
      - 승리 조건: 모든 병이 단색 꽉참 OR 빈 상태
      - 교착 판정: 유효한 따르기가 없고 승리도 아닌 상태

  difficulty_progression:
    description: |
      3단계 난이도 티어, 빌트인 + 절차적 생성 혼합.

      구조적 힌트:
      - 첫 약 10레벨: 수작업 설계된 빌트인 레벨 (학습 곡선 보장)
      - 이후: 절차적 생성 (최대 약 100회 시도 후 실패 처리)
      - 난이도 티어:
        - Easy (약 1~20레벨): 색상 약 4개, 빈 병 2개
        - Hard (약 21~60레벨): 색상 약 7개, 빈 병 2개
        - Super Hard (약 61레벨+): 색상 약 10개, 빈 병 2개
      - 파(목표 이동 수): 색상 수 * 약 3 + 난이도별 보너스
      - LevelDifficultyService와 LevelDataProvider를 분리하여 난이도 정책과 레벨 데이터 독립

  input_system:
    description: |
      탭-탭 2단계 선택 방식.

      구조적 힌트:
      - SelectionManager 전담 클래스: 현재 선택 병 추적, 선택/해제/전환 처리
      - 선택 피드백: 병이 약 0.3 단위 위로 들려 올라감 + 틴트 색상 변경
      - 유효성 검증: PourValidator가 따르기 가능 여부를 사전 판정
      - 유효하지 않은 대상 선택 시 자동 차단 (이동 실행 안 됨)

  scoring:
    description: |
      이동 횟수 대비 파(par) 기준 별점.

      구조적 힌트:
      - 3성: 이동 수 <= 파
      - 2성: 이동 수 <= 파 * 약 1.5
      - 1성: 그 외
      - 레벨 클리어 보상: 코인 약 50, 경험치 약 10 (고정 금액)
      - 별점 계산 로직은 LevelManager 내부 메서드로 분리

  special_mechanics:
    description: |
      약 18종의 블로커 + 부스터 + 힌트 시스템.

      구조적 힌트:
      - 블로커 시스템:
        - BlockerBase 추상 클래스에서 약 18종 파생
        - 물리적 블로커: 얼음(인접 완성 시 해제), 카펫(따르기로 노출), 커튼(따르기+탭으로 파괴), 석고(HP 약 2)
        - 조건부 블로커: 태그(색상 매칭으로 제거), 금고(약 3회 완성으로 해제), 열쇠-상자 쌍
        - 생물 블로커: 개구리(병 사이 이동), 오리(전용 집으로 포획)
        - 특수 블로커: 토글(매 턴 가시성 전환), 스위치(그룹 연동 토글), 물음표(랜덤 색상)
      - 부스터 시스템:
        - 약 5종: 추가 병, 셔플, 되돌리기, 힌트, 색상 제거
        - 초기 무료 제공: 각 약 1~5개
        - BoosterManager가 재고 및 사용 통합 관리
      - 힌트 시스템:
        - HintCalculator가 가능한 모든 수를 점수화
        - 점수 기준: 병 완성(최고점) > 단색 대상 > 원본 비우기 > 층 수 등
        - 빈 대상 병은 약간의 감점 (불필요한 분산 방지)
      - 되돌리기: LIFO 스택, 최대 약 50단계

  architecture:
    description: |
      DI + Signal + FSM 기반 아키텍처.

      구조적 힌트:
      - 디자인 패턴:
        - Singleton<T>: 저장소, 색상 서비스 등
        - SignalBus (pub/sub): 시스템 간 이벤트 전달 (직접 참조 최소화)
        - StateMachine<T>: 게임 상태 FSM (Playing, Paused, Win, Stuck 등 약 6개)
        - Command 패턴: 되돌리기를 위한 이동 커맨드 기록
        - DI Container: 의존성 주입으로 모듈 간 결합도 관리
        - Object Pool: 병 오브젝트 재활용
        - Strategy: 블로커 동작을 교체 가능한 전략으로
        - MVC 분리: 모델(데이터)-뷰(시각)-컨트롤러(로직)
      - Core 레이어: Singleton, SignalBus, StateMachine, DIContainer, SaveManager, ColorService
      - Domain 레이어: 레벨 관리, 병 아이템, 따르기 검증기, 따르기 실행기, 완성 검사기, 되돌리기 관리, 힌트 계산기, 블로커 (18종), 부스터, 재화
      - Game 레이어: 게임플레이 컨트롤러, 선택 관리자, 팝업 서비스, 홈 상태 관리
      - 저장: 접두사(약 "MS_") + 키 방식으로 PlayerPrefs 활용

  animation_feel:
    description: |
      다단계 따르기 애니메이션 + 완성 피드백.

      구조적 힌트:
      - 따르기 전체 과정 약 0.4~0.5초:
        1. Lift: 원본 병 약 1.5 단위 위로 들어올림 (약 0.15초)
        2. Move: 대상 병 위치로 수평 이동 (약 0.2초)
        3. Tilt: 약 60도 기울이기 (약 0.1초)
        4. Pour: 층당 약 0.12초로 물 이동 시각화
        5. Return: 원래 위치로 복귀 (약 0.2초)
      - 병 완성 바운스: 약 0.3 높이 점프 + 약 0.1 스케일 펀치, 약 0.25초
      - 선택 리프트: 약 0.3 위로, 약 0.1초
      - BottleAnimationConfig로 모든 타이밍/높이/각도를 데이터 구조체에 집중

  monetization:
    description: |
      이중 재화(코인/젬) 시스템.

      구조적 힌트:
      - 초기 재화: 코인 약 100, 젬 약 5
      - CurrencyManager 싱글톤이 재화 추가/차감/잔액 관리
      - 부스터 가격은 코인 또는 젬으로 설정 가능
      - 레벨 클리어 시 고정 코인 + 경험치 보상
      - 재화 저장: PlayerPrefs 기반, 접두사 키 방식
