      - [20, 39]      # 챕터 2 빗자루 비행: 확인(9/10)
      - [40, 59]      # 추정: 20레벨 단위 패턴 연장
      - [60, 79]      # 추정
      - [80, "?"]     # 이후 범위 불확실
    confidence: low
