      ① Loading ② Hub/Home ③ Journey(팝업) ④ Settings(아이콘 확인, 내용 미관찰).
      게임 보드 미노출이나 Playing/Paused/GameOver 상태 필수 추정.
      합산: Loading + MainMenu + Playing + Paused + GameClear + GameOver = 6.
      설정 화면을 별도 상태로 보면 7도 가능.

  # ── GAMEPLAY (continued) ────────────────────────────────────────

  - id: MS30
    name: pour_mechanic
    value: "tap_to_select"
    confidence: medium
    source: >
