      [1차 탭: 소스 병 선택 → 들어올림 애니메이션]
      [2차 탭: 대상 병 선택 → 따르기 애니메이션]
      모바일 세로 화면(1/10 관찰) + 터치 UI 환경 확인.
      장르 내 drag-and-drop보다 tap-to-select가 압도적 다수.
      게임 보드 미관찰이나 장르 표준으로 medium 부여.

  - id: MS31
    name: win_condition
    value: "all_bottles_single_color"
    confidence: high
    source: >
      소팅 퍼즐 장르 보편적 승리 조건으로 사실상 예외 없음.
      타이틀 'Magic Sort'(10/10) + 가마솥(정렬 타겟 추정 3/10) 맥락 일치.
      '모든 병이 단일 색상으로 완전 채워진 상태 = 클리어'는
