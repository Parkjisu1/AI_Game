      현재 레벨 18이 챕터 2 진입 전 → 챕터 1 = 1~19 추론(8/10).
      이후 챕터는 20레벨 단위 패턴 연장 가정.
      3챕터 이후는 전적으로 추정, 실제 총 챕터 수 미확인.

  - id: MS10
