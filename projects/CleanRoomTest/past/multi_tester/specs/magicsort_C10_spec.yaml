  # ── ECONOMY ─────────────────────────────────────────────────────

  - id: MS18
    name: starting_coins
    value: 0
    confidence: low
    source: >
      현재 코인 1,420(9/10), 전 세션 변화 없음(8/10).
      여정 레벨 10 코인 보상 수령 확인(9/10) → 유일한 코인 유입.
      세션 중 코인 소비 미관찰 → 1,420 = 시작 코인 + 레벨 10 보상.
      모바일 퍼즐 일반 관행(0 시작 후 첫 보상으로 동기 부여)을 고려해 0 추정.
      레벨 10 보상이 1,420코인 일괄 지급이었을 가능성도 존재.

  - id: MS19
    name: starting_gems
    value: null
    confidence: low
    source: >
      젬/다이아몬드 전 세션 미관찰. 프리미엄 재화 존재 여부
      자체가 불확실(9. 미확인 항목 목록에 명시).

  # ── GAMEPLAY ────────────────────────────────────────────────────

  - id: MS20
    name: booster_type_count
    value: 3
    confidence: low
    source: >
      여정 보상에서 확인된 부스터: 되돌리기(Undo) ×1(레벨 25)(9/10).
      소팅 퍼즐 장르 표준 인게임 부스터 구성:
      ① Undo(되돌리기) ② Add Slot(추가 병) ③ Hint(힌트).
      게임 보드 미관찰로 실제 슬롯 UI 미확인(8/10).

  - id: MS21
    name: booster_initial_counts
    value: null
    confidence: low
    source: >
      여정 레벨 25 보상(되돌리기 ×1) = 아직 미수령 상태.
      시작 시 보유 수량은 관찰 데이터에서 확인 불가.
      일부 게임은 신규 유저 온보딩용 소량 제공(1~3개)하나
      이 게임의 실제 값 미확정.

  - id: MS22
    name: undo_max_steps
    value: 1
    confidence: low
    source: >
