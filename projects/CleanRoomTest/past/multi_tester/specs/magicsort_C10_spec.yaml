      관찰 데이터에서 구분 불가.
      게임 보드 미노출(8/10)로 레벨 구조 확인 불가.

  - id: MS06
    name: max_gen_attempts
    value: null
    confidence: low
    source: >
      엔지니어링 내부 파라미터. 관찰 가능한 UI/UX 데이터에서
      추론 불가. 빌드 해시(0e9fe113...) 노출은 QA 빌드 여부만 시사.

  # ── DIFFICULTY ──────────────────────────────────────────────────

  - id: MS07
    name: difficulty_tier_count
    value: null
    confidence: low
    source: >
