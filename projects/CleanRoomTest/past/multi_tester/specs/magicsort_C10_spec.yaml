      파 이동 수 대비 보너스 코인/점수 체계 확인 불가.
      별점 시스템 존재 여부 자체가 불확실(MS23 참조).

  - id: MS11
    name: par_formula
    value: null
    confidence: low
    source: >
      게임 보드 미관찰. 파 계산이 이동 수 기반인지,
      시간 기반인지, 혼합 방식인지 판별 불가.

  # ── VISUAL ──────────────────────────────────────────────────────

  - id: MS12
