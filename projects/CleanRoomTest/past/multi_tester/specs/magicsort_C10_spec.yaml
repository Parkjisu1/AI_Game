    value: 4
    confidence: low
    source: >
      소팅 퍼즐 표준 레이아웃. 세로 모바일(1/10 관찰)에서
      4~6병/행 범위 중 4병/행이 가장 일반적.
      게임 보드 미관찰로 직접 확인 불가.

  - id: MS13
    name: h_spacing
    value: null
    confidence: low
    source: >
      게임 보드 미관찰. 수평 간격 수치(px 또는 Unity unit)
