      테스터 2·7·10이 "되돌리기(Undo)"로 해석(4/10),
      Undo 계열로 추정 결론(6. 부스터 섹션).
      게임 보드 미관찰로 연속 Undo 허용 여부 미확인.

  - id: MS26
    name: blocker_type_count
    value: null
    confidence: low
    source: >
