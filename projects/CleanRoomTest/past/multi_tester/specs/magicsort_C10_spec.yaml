      고정 2개의 빈 병(버퍼 슬롯)을 제공.
      일부 게임은 고난도에서 1개로 감소하거나
      부스터로 추가 빈 병을 구매하는 방식 채택.
      관찰된 '추가 병' 부스터 가능성(MS20)과 정합.
      게임 보드 미관찰로 직접 확인 불가, medium 부여.
