# Magic Sort 밸런스 시트 파라미터 추정

관찰 데이터를 바탕으로 장르 표준값, 관찰된 시스템 구조, 직접 수치를 3계층으로 구분하여 추정합니다.

---

```yaml
game: "Magic Sort"
condition: "C10"

# 추정 신뢰도 기준
# high   : 관찰 데이터에서 직접 확인 또는 장르 내 예외 없는 표준
# medium : 장르 표준 + 관찰 정황 보강
# low    : 장르 통계적 추정, 관찰 근거 미약
# null   : 추론 근거 부재, 게임 보드/내부 미관찰

parameters:

  # ── CORE CONSTANTS ──────────────────────────────────────────────

  - id: MS01
    name: bottle_max_height
    value: 4
    confidence: medium
    source: >
      Water Sort / Ball Sort 계열 소팅 퍼즐의 사실상 산업 표준.
      4층 구조는 장르 내 90% 이상 타이틀이 채택.
      가마솥 연출(6/10)과 색상 블록 로딩 이미지(6/10)가
      표준 4층 병 구조와 일치. 게임 보드 직접 미관찰로 medium.

  - id: MS02
    name: colors_total
    value: 8
    confidence: low
    source: >
      소팅 퍼즐 팔레트 일반 범위 8~14색.
      레벨 18(중초반) 플레이어가 챕터 1(1~19)에 위치하며
      초반 난이도에 적합한 색상 수를 고려해 8색을 하한 추정.
      게임 보드 미관찰로 직접 확인 불가.

  - id: MS03
    name: colors_playable
    value: 6
    confidence: low
    source: >
      레벨 18 기준 추산. 소팅 퍼즐의 전형적 색상 증가 패턴
      (레벨 1~5: 3색 → 5레벨마다 +1색)을 적용하면
      레벨 16~20 구간에서 6색 도달.
      여정 마일스톤 간격(10, 15, 25, 30)이 5레벨 단위를 시사.

  # ── LEVEL GENERATION ────────────────────────────────────────────

  - id: MS04
    name: builtin_levels
    value: null
    confidence: low
    source: >
      챕터 2 = 레벨 20~39(20레벨 단위) 확인(9/10).
      전체 챕터 수 및 총 레벨 수 미관찰.
      레벨맵·엔드 콘텐츠 화면이 단 한 번도 노출되지 않아
      총량 추론 불가.

  - id: MS05
    name: procedural_after_level
    value: null
    confidence: low
    source: >
