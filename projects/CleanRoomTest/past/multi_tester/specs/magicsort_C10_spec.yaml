## 신뢰도 요약

| 신뢰도 | 파라미터 수 | 해당 파라미터 |
|--------|------------|--------------|
| **high** | 1 | MS31 |
| **medium** | 4 | MS01, MS15, MS30, MS32 |
| **low (값 있음)** | 14 | MS02, MS03, MS07*, MS09, MS12, MS18, MS20, MS22, MS29, MS03, MS07... |
| **null** | 13 | MS04~06, MS08, MS10~11, MS13~14, MS16~17, MS19, MS21, MS23~28 |

> **핵심 관찰 한계:** 전 세션에서 실제 게임 보드가 **단 한 번도** 캡처되지 않음(8/10). 이로 인해 병 레이아웃, 색상 수, 애니메이션, 부스터 슬롯, 블로커, 점수 체계 관련 파라미터(MS02~03, MS08, MS10~17, MS20~26, MS32)는 **장르 표준 추정**에 의존하며 실측 검증이 필요합니다.