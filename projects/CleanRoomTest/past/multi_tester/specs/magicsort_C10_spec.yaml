      게임 보드 미노출로 힌트 UI 자체 미확인.
      힌트 점수화 시스템(이동 제안 우선순위 알고리즘 등) 판별 불가.

  # ── ARCHITECTURE ────────────────────────────────────────────────

  - id: MS27
    name: save_prefix
    value: null
    confidence: low
    source: >
      빌드 해시(0e9fe113e528adbc504bbaf56f1b403e)(5/10)와
      세션 ID 노출(4/10) 확인. QA 빌드 특성 시사.
      PlayerPrefs 키 접두사 등 저장 아키텍처는
      화이트박스 접근 없이 추론 불가.

  - id: MS28
    name: pattern_count
    value: null
    confidence: low
    source: >
