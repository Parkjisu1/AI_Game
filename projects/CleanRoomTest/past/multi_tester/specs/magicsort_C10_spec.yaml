  - id: MS14
    name: v_spacing
    value: null
    confidence: low
    source: >
      게임 보드 미관찰. 수직 간격 수치 추론 불가.

  # ── ANIMATION ───────────────────────────────────────────────────

  - id: MS15
    name: pour_total_duration
    value: 0.5
    confidence: low
    source: >
      소팅 퍼즐 장르 애니메이션 표준 범위 0.3~0.8초.
      0.5초가 게임 리듬감(너무 빠르지도 느리지도 않음)에서
      가장 보편적으로 채택되는 값.
      실제 따르기 애니메이션 미관찰.

  - id: MS16
    name: lift_height
    value: null
