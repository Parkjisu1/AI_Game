      블로커 도입 여부 확인 불가.
      소팅 퍼즐은 일반적으로 중반(레벨 30~50 이후) 블로커 도입.
      현재 레벨 기준 미도입 가능성이 있으나 단정 불가.

  # ── SCORING ─────────────────────────────────────────────────────

  - id: MS23
    name: star_rating_3star
