  # ============================================================
  # B. 캐릭터 성장 (Growth)
  # ============================================================

  - id: ANV06
    name: base_hp_lv1
    ai_estimate: 195
    actual_value: "server_data"
    source: "StatChart.cs:151 — data.stat.hp = GetStat(level, StatType.HP). GetStat(line 209-237)이 BasicStat + LevelUp + 장비 등 합산"
    note: "base HP는 BasicStat chart의 stat_key=1008 행. 서버에서 로드"

  - id: ANV07
    name: base_atk_lv1
    ai_estimate: 18
    actual_value: "server_data"
    source: "StatChart.cs:152 — data.stat.atk = GetStat(level, StatType.ATK). StatType.ATK = 1000"
    note: "base ATK는 BasicStat chart의 stat_key=1000 행. 서버에서 로드"

  - id: ANV08
    name: hp_growth_formula
    ai_estimate: "HP ≈ 197 + 26 × (Lv - 1)"
    actual_value: "HP(Lv) = BasicStat[HP] + SUM(LevelUp[1..Lv].stat_value where stat_key==1008)"
    source: "LevelUpChart.cs:42-55 — GetStat()가 level 이하 모든 LevelUpInfo 행의 stat 값 누적 합산"
    note: "선형이 아닌 누적 테이블 방식. 각 레벨마다 다른 증가분 가능. AI의 선형 추정은 관찰 범위 내 근사값"

  - id: ANV09
    name: atk_growth_formula
    ai_estimate: "ATK ≈ 18 + 0.55 × (Lv - 1)"
    actual_value: "ATK(Lv) = BasicStat[ATK] + SUM(LevelUp[1..Lv].stat_value where stat_key==1000)"
    source: "LevelUpChart.cs:42-55 — HP와 동일한 누적 합산 구조"
    note: "ATK도 선형 공식이 아닌 레벨별 개별 증가분 테이블. AI의 선형 근사는 Lv.1~10 범위에서의 관찰 근사"

  - id: ANV10
    name: exp_curve_formula
    ai_estimate: null
    actual_value: "server_data (LevelUpInfo.exp 필드)"
    source: "LevelUpChart.cs:5-19 — LevelUpInfo 구조체에 exp 필드 존재. 레벨별 요구 경험치는 서버 테이블"
    note: "공식이 아닌 레벨별 개별 EXP 값 테이블"

