#
# 확정 가능 (코드에서 직접 추출):
#   ANV05: N/A (난이도 없음)
#   ANV08: 누적 테이블 공식 (LevelUpChart)
#   ANV09: 누적 테이블 공식 (LevelUpChart)
#   ANV11: 15슬롯 (EquippedData)
