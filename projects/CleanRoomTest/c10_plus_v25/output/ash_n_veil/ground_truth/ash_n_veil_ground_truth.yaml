  - id: ANV18
    name: damage_formula
    ai_estimate: null
    actual_value: "damage = (baseATK + buffATK) × (1 + criDamage if crit) × (1 + superCriDamage if supercrit) × (1 + finalAtkInc) × (1 + weakness) - flatDmgReduction - percentDmgReduction"
    source: "CharacterPlayer.cs:650-720 — 전체 데미지 계산 로직"
    note: "크리티컬/슈퍼크리티컬/최종공격력증가/약점/피해감소 5단계 적용"

  - id: ANV19
    name: critical_rate
    ai_estimate: "5 ~ 15"
    actual_value: "float (0.0~1.0), level/equipment dependent"
    source: "CharacterPlayer.cs:690 — criRate.IsSuccess() 체크. ExtensionMethods.cs:1396-1399 — Random.Range(0,100000) < percent*100000"
    note: "0.0~1.0 소수 저장 (0.15 = 15%). 레벨/장비/버프로 변동. AI 추정 5~15%는 초반 범위로 합리적"

  - id: ANV20
    name: critical_multiplier
    ai_estimate: "1.5 ~ 2.0"
    actual_value: "additive bonus (criDamage field). effective = 1 + criDamage"
    source: "CharacterPlayer.cs:692 — realDamage += realDamage * criDamage → 즉 총 배율 = 1 + criDamage"
    note: "criDamage=0.5이면 1.5배, =1.0이면 2.0배. 추가로 superCrit 별도 존재"

