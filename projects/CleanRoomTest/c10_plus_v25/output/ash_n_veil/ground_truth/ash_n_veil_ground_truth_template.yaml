# 용도: C10+ 방법론 정확도 검증
# 작성: 애쉬앤베일 개발팀
#
# 작성 방법:
#   1. 각 파라미터의 actual_value에 실제 게임 내부 값을 기입
#   2. 해당 값이 없거나 게임에 존재하지 않는 항목은 "N/A" 기입
#   3. 비고란에 추가 설명이 있으면 기입
#   4. 작성 완료 후 파일명을 ash_n_veil_ground_truth.yaml로 변경
#
# ============================================================

version: "1.0"
game: "Ash N Veil: Fast Idle Action"
package: "studio.gameberry.anv"
extraction_date: ""  # 작성일 기입 (예: 2026-02-25)

